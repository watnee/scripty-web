# Daily MySQL dump → Cloudflare R2
#
# One-time setup: see docs/BACKUP.md for secrets and Railway TCP proxy notes.

name: Backup database

on:
  schedule:
    # 07:00 UTC daily
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: backup-database
  cancel-in-progress: false

jobs:
  backup:
    name: mysqldump → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mysql client and AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          # AWS CLI is preinstalled on ubuntu-latest; ensure it is available
          aws --version
          mysqldump --version

      - name: Run backup script
        env:
          MYSQL_BACKUP_HOST: ${{ secrets.MYSQL_BACKUP_HOST }}
          MYSQL_BACKUP_PORT: ${{ secrets.MYSQL_BACKUP_PORT }}
          MYSQL_BACKUP_USER: ${{ secrets.MYSQL_BACKUP_USER }}
          MYSQL_BACKUP_PASSWORD: ${{ secrets.MYSQL_BACKUP_PASSWORD }}
          MYSQL_BACKUP_DATABASE: ${{ secrets.MYSQL_BACKUP_DATABASE }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          chmod +x scripts/backup-mysql.sh
          ./scripts/backup-mysql.sh

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Backup database"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Result | ${{ job.status }} |"
            echo ""
            echo "See [docs/BACKUP.md](../blob/main/docs/BACKUP.md) for restore steps."
          } >> "$GITHUB_STEP_SUMMARY"
