# Daily MySQL dump → Cloudflare R2
#
# One-time setup: see docs/BACKUP.md
# Uses the same MYSQL* + CLOUDFLARE_* secrets as the Cloudflare deploy job,
# plus R2_BUCKET (e.g. scripty-db-backups). CLOUDFLARE_API_TOKEN needs R2 edit.
#
# Railway volume snapshots (Daily/Weekly/Monthly) are a separate on-platform layer;
# this workflow is the off-platform copy.

name: Backup database

on:
  schedule:
    # 07:00 UTC daily
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: backup-database
  cancel-in-progress: false

jobs:
  backup:
    name: mysqldump → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install mysql client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysqldump --version

      - name: Run backup script
        id: dump
        env:
          MYSQLHOST: ${{ secrets.MYSQLHOST }}
          MYSQLPORT: ${{ secrets.MYSQLPORT }}
          MYSQLUSER: ${{ secrets.MYSQLUSER }}
          MYSQLPASSWORD: ${{ secrets.MYSQLPASSWORD }}
          MYSQLDATABASE: ${{ secrets.MYSQLDATABASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          chmod +x scripts/backup-mysql.sh
          ./scripts/backup-mysql.sh

      - name: Summarize
        if: always()
        env:
          DUMP_FILENAME: ${{ steps.dump.outputs.filename }}
          DUMP_SIZE: ${{ steps.dump.outputs.size_bytes }}
          DUMP_SHA256: ${{ steps.dump.outputs.sha256 }}
          DUMP_BUCKET: ${{ steps.dump.outputs.bucket }}
        run: |
          {
            echo "## Backup database"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Result | ${{ job.status }} |"
            if [ -n "${DUMP_FILENAME}" ]; then
              echo "| Object | \`r2://${DUMP_BUCKET}/${DUMP_FILENAME}\` |"
              echo "| Size | ${DUMP_SIZE} bytes |"
              echo "| SHA-256 | \`${DUMP_SHA256}\` |"
            fi
            echo ""
            echo "Railway volume schedules: Daily / Weekly / Monthly (MySQL)."
            echo "See [docs/BACKUP.md](../blob/main/docs/BACKUP.md) for restore steps."
          } >> "$GITHUB_STEP_SUMMARY"
