# Weekly encrypted Railway secrets snapshot → Cloudflare R2
#
# One-time setup: see docs/BACKUP.md (Secrets backup section).
# Uses the same RAILWAY_TOKEN + CLOUDFLARE_* + R2_BUCKET secrets as the deploy
# and DB backup jobs, plus SECRETS_BACKUP_PASSPHRASE (generate a strong random
# passphrase, store it in your password manager, then add it as a GitHub secret).
#
# GitHub Actions / Cloudflare Worker secrets are write-only and can't be
# exported; Railway is the upstream store, so this snapshot covers everything
# recoverable. See scripts/backup-secrets.sh.

name: Backup secrets

on:
  schedule:
    # 07:30 UTC Sundays (after the daily DB backup window)
    - cron: "30 7 * * 0"
  workflow_dispatch:

concurrency:
  group: backup-secrets
  cancel-in-progress: false

jobs:
  backup:
    name: Railway vars → encrypted → R2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check required secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SECRETS_BACKUP_PASSPHRASE: ${{ secrets.SECRETS_BACKUP_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error title=Missing secret::Add RAILWAY_TOKEN (Railway → Project → Settings → Tokens, production environment)."
            missing=1
          fi
          if [ -z "$SECRETS_BACKUP_PASSPHRASE" ]; then
            echo "::error title=Missing secret::Add SECRETS_BACKUP_PASSPHRASE — generate a strong random passphrase, store it in your password manager, then: gh secret set SECRETS_BACKUP_PASSPHRASE"
            missing=1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing secret::Add CLOUDFLARE_API_TOKEN with R2 edit (npm run cf:token)."
            missing=1
          fi
          exit "$missing"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.26.0

      - name: Run secrets backup
        id: snapshot
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SECRETS_BACKUP_PASSPHRASE: ${{ secrets.SECRETS_BACKUP_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          chmod +x scripts/backup-secrets.sh
          ./scripts/backup-secrets.sh backup

      - name: Summarize
        if: always()
        env:
          SNAP_FILENAME: ${{ steps.snapshot.outputs.filename }}
          SNAP_SIZE: ${{ steps.snapshot.outputs.size_bytes }}
          SNAP_SHA256: ${{ steps.snapshot.outputs.sha256 }}
          SNAP_OBJECT_KEY: ${{ steps.snapshot.outputs.object_key }}
          SNAP_BUCKET: ${{ steps.snapshot.outputs.bucket }}
        run: |
          {
            echo "## Backup secrets"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Result | ${{ job.status }} |"
            if [ -n "${SNAP_FILENAME}" ]; then
              echo "| Object | \`r2://${SNAP_BUCKET}/${SNAP_OBJECT_KEY}\` |"
              echo "| Size | ${SNAP_SIZE} bytes |"
              echo "| SHA-256 | \`${SNAP_SHA256}\` |"
            fi
            echo ""
            echo "Decrypt with: \`npm run secrets:restore\` + the passphrase from the password manager."
            echo "See [docs/BACKUP.md](../blob/main/docs/BACKUP.md) for details."
          } >> "$GITHUB_STEP_SUMMARY"
