# Local observability stack: Prometheus scrapes the app on the host,
# Grafana comes pre-provisioned with Prometheus as a datasource.
#
#   cd observability
#   docker compose up -d
#
# Prometheus: http://localhost:9090   Grafana: http://localhost:3000 (admin/admin)
# The scrape token is read from prometheus/token (gitignored). Leave it empty
# for the dev profile; put METRICS_TOKEN in it to scrape a prod-like instance.
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/token:/etc/prometheus/token:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
