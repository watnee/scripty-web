global:
  scrape_interval: 15s

scrape_configs:
  - job_name: scripty
    metrics_path: /actuator/prometheus
    # Token read from observability/prometheus/token (gitignored). An empty file
    # is fine for the dev profile, which doesn't require auth.
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/token
    static_configs:
      - targets: ["host.docker.internal:8080"]
