spring:
  devtools:
    restart:
      poll-interval: 1s
      quiet-period: 400ms
      # Avoid automatic restarts on Java/classpath changes. DevTools restarts after
      # recompiles can leave the restart classloader broken (custom SecurityConfig
      # replaced by Spring Boot defaults, login page falls back, CSRF blocks sign-in).
      # Touch .reloadtrigger in the project root when you need a full restart.
      trigger-file: .reloadtrigger
    livereload:
      enabled: true
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:file:./db/scripty;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        boot:
          allow_jdbc_metadata_access: false
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

ADMIN_USERNAME: admin
ADMIN_PASSWORD: admin

app:
  asset-version: 170
  service-worker-enabled: true
  uploads-dir: ./uploads
  headshot-max-bytes: 5242880
  base-url: http://localhost:8080
  mail-from: Scripty <noreply@localhost>
  mail-enabled: false

