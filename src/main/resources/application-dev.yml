spring:
  datasource:
    url: jdbc:h2:mem:scripty;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
  # Serve templates/static straight from source with caching off so edits
  # show up on browser reload without restarting the server.
  thymeleaf:
    cache: false
    prefix: file:src/main/resources/templates/
  web:
    resources:
      static-locations: file:src/main/resources/static/
      cache:
        period: 0

ADMIN_USERNAME: admin
ADMIN_PASSWORD: admin

