server:
  port: ${PORT:8080}

app:
  # Feature flags, one line per FeatureFlag constant. Resolved at startup, so
  # changing a FEATURE_* variable on Railway restarts the service. Values must
  # be true or false — anything else fails the boot rather than reading as off.
  features:
    passkeys: ${FEATURE_PASSKEYS:true}
    service-worker: ${FEATURE_SERVICE_WORKER:true}

spring:
  # Names the service in traces (OTLP service.name) and in the log correlation pattern.
  application:
    name: scripty
  profiles:
    include:
      - native
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      server:
        prefix: /config
        native:
          search-locations: classpath:/config-repo,file:./config-repo
  # No default profile — require an explicit profile (dev locally, prod via Procfile/railpack).
  # Running without a profile fails closed (no datasource) instead of enabling DevAutoLogin.
  hateoas:
    use-hal-as-default-json-media-type: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      show-components: when-authorized
  health:
    # Mail is optional (app.mail-enabled) — an unreachable SMTP host must not flip
    # overall health to DOWN.
    mail:
      enabled: false
  metrics:
    tags:
      application: scripty
    distribution:
      percentiles-histogram:
        http.server.requests: true
        # Domain timers (exports, imports, email) get histograms too, so Grafana can
        # chart p95/p99 per format rather than just a running mean.
        scripty.export: true
        scripty.import: true
  tracing:
    # Off unless explicitly turned on: with tracing enabled but no reachable collector
    # the OTLP exporter retries against localhost:4318 and floods the logs.
    enabled: ${TRACING_ENABLED:false}
    sampling:
      # 10% keeps Grafana Cloud trace ingest cheap while still catching slow requests.
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
