server:
  port: ${PORT:8080}

app:
  # Feature flags, one line per FeatureFlag constant. Resolved at startup, so
  # changing a FEATURE_* variable on Railway restarts the service. Values must
  # be true or false — anything else fails the boot rather than reading as off.
  features:
    passkeys: ${FEATURE_PASSKEYS:true}
    service-worker: ${FEATURE_SERVICE_WORKER:true}

spring:
  profiles:
    include:
      - native
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      server:
        prefix: /config
        native:
          search-locations: classpath:/config-repo,file:./config-repo
  # No default profile — require an explicit profile (dev locally, prod via Procfile/railpack).
  # Running without a profile fails closed (no datasource) instead of enabling DevAutoLogin.
  hateoas:
    use-hal-as-default-json-media-type: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      show-components: when-authorized
  health:
    # Mail is optional (app.mail-enabled) — an unreachable SMTP host must not flip
    # overall health to DOWN.
    mail:
      enabled: false
  metrics:
    tags:
      application: scripty
    distribution:
      percentiles-histogram:
        http.server.requests: true
