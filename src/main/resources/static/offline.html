<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scripty">
    <title>Scripty - Offline</title>
    <link rel="stylesheet" href="/css/missing.min.css">
    <link href="/css/scripty.css" rel="stylesheet">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: var(--font-sans, system-ui, sans-serif);
            text-align: center;
        }
        .offline-container {
            max-width: 520px;
            padding: 2.5rem;
            background: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
        }
        h1 {
            color: #ffffff;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        p {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.5;
        }
        .retry-btn {
            background-color: #0076ff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .retry-btn:hover {
            background-color: #006ae0;
        }
        .retry-btn:active {
            transform: scale(0.98);
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            color: #aaa;
        }
        .cached-projects {
            margin: 1.5rem 0;
            text-align: left;
        }
        .cached-projects h2 {
            font-size: 0.95rem;
            color: #ccc;
            margin: 0 0 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .cached-projects ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .cached-projects li + li {
            margin-top: 0.5rem;
        }
        .cached-projects a {
            display: block;
            padding: 0.65rem 0.85rem;
            border-radius: 6px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            text-decoration: none;
        }
        .cached-projects a:hover {
            border-color: #0076ff;
            color: #fff;
        }
        .cached-projects .cached-at {
            display: block;
            font-size: 0.8rem;
            color: #777;
            margin-top: 0.15rem;
        }
        .cached-projects-empty {
            color: #777;
            font-size: 0.9rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <svg class="offline-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 5 5 0 011.414-3.536m0 0L5.636 5.636m0 0L3 3m2.636 2.636a9 9 0 0112.728 0M12 12v.01"></path>
        </svg>
        <h1>You're Offline</h1>
        <p>Open a project you visited recently, or retry when your connection returns.</p>
        <div class="cached-projects" id="cached-projects" hidden>
            <h2>Cached projects</h2>
            <ul id="cached-projects-list"></ul>
        </div>
        <p class="cached-projects-empty" id="cached-projects-empty" hidden>No cached projects yet. Visit a project while online first.</p>
        <button class="retry-btn" onclick="window.location.reload();">Retry Connection</button>
    </div>
    <script src="/js/offline-store.js"></script>
    <script>
        (function () {
            var userId = localStorage.getItem('scripty-offline-user-id');
            if (userId) {
                document.documentElement.setAttribute('data-user-id', userId);
                window.scriptyCurrentUserId = userId;
            }
            if (!window.scriptyOfflineStore) return;
            window.scriptyOfflineStore.listCachedProjects().then(function (projects) {
                if (!projects.length) {
                    document.getElementById('cached-projects-empty').hidden = false;
                    return;
                }
                var container = document.getElementById('cached-projects');
                var list = document.getElementById('cached-projects-list');
                container.hidden = false;
                Promise.all(projects.map(function (project) {
                    return window.scriptyOfflineStore.countPendingEdits(project.id).then(function (count) {
                        return { project: project, pending: count };
                    });
                })).then(function (items) {
                    items.forEach(function (item) {
                        var project = item.project;
                        var itemEl = document.createElement('li');
                        var link = document.createElement('a');
                        link.href = project.pageUrl || ('/project/show?id=' + encodeURIComponent(project.id));
                        link.textContent = project.title || ('Project ' + project.id);
                        var meta = document.createElement('span');
                        meta.className = 'cached-at';
                        var savedAt = 'Saved ' + new Date(project.cachedAt).toLocaleString();
                        if (item.pending > 0) {
                            savedAt += ' · ' + item.pending + ' unsynced change' + (item.pending === 1 ? '' : 's');
                        }
                        meta.textContent = savedAt;
                        link.appendChild(meta);
                        itemEl.appendChild(link);
                        list.appendChild(itemEl);
                    });
                });
            }).catch(function () {
                document.getElementById('cached-projects-empty').hidden = false;
            });
        }());
    </script>
</body>
</html>
