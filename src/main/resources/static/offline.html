<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <title>Scripty - Offline</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link href="/css/scripty.css" rel="stylesheet">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: var(--font-sans, system-ui, sans-serif);
            text-align: center;
        }
        .offline-container {
            max-width: 450px;
            padding: 2.5rem;
            background: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
        }
        h1 {
            color: #ffffff;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        p {
            color: #aaa;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.5;
        }
        .retry-btn {
            background-color: #0076ff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .retry-btn:hover {
            background-color: #006ae0;
        }
        .retry-btn:active {
            transform: scale(0.98);
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <!-- SVG Wi-Fi Off / Offline Icon -->
        <svg class="offline-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 5 5 0 011.414-3.536m0 0L5.636 5.636m0 0L3 3m2.636 2.636a9 9 0 0112.728 0M12 12v.01"></path>
        </svg>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Scripty is ready when you get back online.</p>
        <button class="retry-btn" onclick="window.location.reload();">Retry Connection</button>
    </div>
</body>
</html>
