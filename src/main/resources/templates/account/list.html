<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Accounts</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('accounts')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li aria-current="page">Accounts</li>
            </ol>
        </nav>
        <h1>Accounts</h1>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${viewModel.users}">
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.firstName} + ' ' + ${user.lastName}"></td>
                    <td th:text="${user.admin} ? 'Admin' : 'User'"></td>
                    <td>
                        <a th:href="@{/account/edit(id=${user.id})}" role="button">edit</a>
                        <a th:href="@{/account/delete(id=${user.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this account?') halt">delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p><a th:href="@{/account/create}" role="button">Create New Account</a></p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
