<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Actor Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/actor/list}">Casting</a></li>
                <li aria-current="page"><span th:text="${viewModel.first} + ' ' + ${viewModel.last}"></span></li>
            </ol>
        </nav>
        <h1><span th:text="${viewModel.first} + ' ' + ${viewModel.last}"></span> <small><a th:href="@{/actor/edit(id=${viewModel.id})}" role="button">edit</a> <a th:href="@{/actor/delete(id=${viewModel.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this actor?') halt">delete</a></small></h1>
        <p>Phone: <span th:text="${viewModel.phone}"></span></p>
        <p>Email: <span th:text="${viewModel.email}"></span></p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
