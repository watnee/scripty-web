<tr xmlns:th="http://www.thymeleaf.org" draggable="true" th:attr="data-block-id=${block.id},data-block-order=${block.order},data-tags=${block.tags}">
    <td class="block-left-controls">
        <input type="checkbox" class="block-select-checkbox" th:value="${block.id}" style="margin-right: 8px;" />
        <th:block th:replace="~{fragments/createBelowMenu :: button}"></th:block>
        <th:block th:replace="~{fragments/blockDragMenu :: handle(true, ${block.bookmarked}, ${block.pinned})}"></th:block>
    </td>
    <td class="block-content" th:classappend="${block.type != null ? 'block-type-' + #strings.toLowerCase(block.type) : ''}" th:attr="hx-get=@{/block/editInline(id=${block.id})}" hx-trigger="scripty-edit-block" hx-swap="innerHTML">
        <th:block th:replace="~{block/showCharacterNameInline :: characterName(${block})}"></th:block>
        <span th:text="${block.content}"></span>
        <div th:if="${not #strings.isEmpty(block.tags)}" class="block-tags-list">
            <span th:each="tag : ${#strings.arraySplit(block.tags, ',')}"
                  th:if="${not #strings.isEmpty(#strings.trim(tag))}"
                  th:text="${#strings.trim(tag)}"
                  class="block-tag clickable"></span>
        </div>
    </td>
    <td>
        <span class="nowrap">
            <a th:href="@{/block/toggleBookmark(id=${block.id})}" th:title="${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:attr="aria-label=${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:text="${block.bookmarked} ? '★' : '☆'"></a>
            <a th:href="@{/block/togglePinned(id=${block.id})}" th:title="${block.pinned} ? 'Unpin block' : 'Pin block'" th:attr="aria-label=${block.pinned} ? 'Unpin block' : 'Pin block'" th:style="${block.pinned} ? 'text-decoration: none;' : 'filter: grayscale(100%); opacity: 0.3; text-decoration: none;'">📌</a>
            <a th:href="@{/block/edit(id=${block.id})}" role="button">edit</a>
            <a th:href="@{/block/moveDown(id=${block.id})}" class="move-down" role="button">&#8595;</a>
            <a th:href="@{/block/moveUp(id=${block.id})}" class="move-up" role="button">&#8593;</a>
        </span>
    </td>
</tr>
