<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Create New Block</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <h1>Create New Block</h1>
        <form th:action="@{/block/create}" method="post" th:object="${commandModel}">
            <input type="hidden" th:field="*{sceneId}" />
            <label>
                Content
                <textarea spellcheck="true" rows="25" cols="30" th:field="*{content}"></textarea>
                <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
            </label>
            <label>
                Character
                <select th:field="*{personId}">
                    <option value="">No character</option>
                    <option th:each="person : ${viewModel.persons}" th:value="${person.id}" th:text="${person.name}"></option>
                </select>
                <span th:if="${#fields.hasErrors('personId')}" th:errors="*{personId}"></span>
            </label>
            <p>
                <a th:href="@{/scene/show(id=${viewModel.sceneId})}" role="button">Cancel</a>
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
