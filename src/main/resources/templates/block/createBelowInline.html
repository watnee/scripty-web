<tr xmlns:th="http://www.thymeleaf.org">
    <td class="block-left-controls">
        <div class="block-left-controls-inner">
            <span class="block-select-all-slot" aria-hidden="true"></span>
            <a th:attr="hx-get=@{/block/createBelowInline(id=${blockId})}" hx-target="closest tr" hx-swap="afterend" hx-boost="false" role="button" class="create-below" title="Add block below" aria-label="Add block below">+</a>
            <span class="drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag to reorder">&#8942;&#8942;</span>
        </div>
    </td>
    <td class="block-content">
        <form th:attr="hx-post=@{/block/createBelowInline}" hx-target="closest tr" hx-swap="outerHTML" hx-trigger="keydown[key=='Enter'&amp;&amp;!event.shiftKey] from:find textarea, createNext">
            <input type="hidden" name="id" th:value="${blockId}" />
            <textarea spellcheck="true" rows="1" class="block-input-textarea" name="content" autofocus onkeydown="if(event.key==='Enter'&amp;&amp;!event.shiftKey)event.preventDefault()"></textarea>
        </form>
    </td>
    <td></td>
</tr>
