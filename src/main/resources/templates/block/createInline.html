<tr xmlns:th="http://www.thymeleaf.org" draggable="true">
    <td class="block-left-controls">
        <input type="checkbox" class="block-select-checkbox" style="margin-right: 8px;" />
        <a th:attr="hx-get=@{/block/createInline(sceneId=${viewModel.sceneId})}" hx-target="closest tr" hx-swap="afterend" hx-boost="false" role="button" class="create-below">+</a>
        <span class="drag-handle">&#8942;&#8942;</span>
    </td>
    <td class="block-content">
        <form th:attr="hx-post=@{/block/createInline}" hx-target="closest tr" hx-swap="outerHTML" hx-trigger="keydown[key=='Enter'&amp;&amp;!event.shiftKey] from:find textarea, createNext">
            <input type="hidden" name="sceneId" th:value="${viewModel.sceneId}" />
            <textarea spellcheck="true" rows="1" style="width: 100%; height: 1.5em; min-height: 1.5em; padding: 0.25em;" name="content" autofocus onkeydown="if(event.key==='Enter'&amp;&amp;!event.shiftKey)event.preventDefault()" _="on blur set t to closest &lt;table/&gt; then if t is not null and my value.trim() is '' and t.querySelectorAll('tr').length > 1 then remove closest &lt;tr/&gt; end"></textarea>
        </form>
    </td>
    <td></td>
</tr>
