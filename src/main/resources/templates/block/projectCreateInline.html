<div xmlns:th="http://www.thymeleaf.org" th:fragment="createInlineRow (projectId)" class="block-row">
    <aside class="block-left-controls hide-in-reader-view sidebar menu">
        <div class="block-left-controls-inner">
            <input type="checkbox" class="block-select-checkbox block-select-checkbox-placeholder" disabled tabindex="-1" aria-hidden="true" />
            <a th:attr="hx-get=@{/block/createInline(projectId=${projectId},surface='project')}" hx-target="closest .block-row" hx-swap="afterend" hx-boost="false" role="button" class="create-below" title="Add block below" aria-label="Add block below">+</a>
            <span class="drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag to reorder">&#8942;&#8942;</span>
        </div>
    </aside>
    <div class="block-content script-block">
        <form th:attr="hx-post=@{/block/createInline(surface='project')}" hx-target="closest .block-row" hx-swap="outerHTML" hx-trigger="keydown[key=='Enter'&amp;&amp;!event.shiftKey] from:find textarea, createNext">
            <input type="hidden" name="projectId" th:value="${projectId}" />
            <textarea spellcheck="true" rows="1" class="script-block-text block-input-textarea" name="content" autofocus onkeydown="if(event.key==='Enter'&amp;&amp;!event.shiftKey){event.preventDefault();event.stopPropagation();if(window.scriptyCreateBlockFromCreateRow){window.scriptyCreateBlockFromCreateRow(this);}return false;}"></textarea>
        </form>
    </div>
    <aside class="block-actions hide-in-reader-view sidebar menu"></aside>
</div>
