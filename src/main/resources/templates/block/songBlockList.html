<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="list"
     id="song-block-list"
     class="song-block-list"
     th:attr="data-document-id=${documentId},data-project-id=${projectId}">
    <th:block th:each="block : ${blocks}">
        <th:block th:replace="~{block/songBlockRow :: row(${block}, ${focusBlockId})}"></th:block>
    </th:block>
</div>
