<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Character Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/project/list}">Projects</a></li>
                <li><a th:href="@{/project/show(id=${viewModel.projectId})}" th:text="${viewModel.projectTitle}"></a></li>
                <li aria-current="page" th:text="${viewModel.name}"></li>
            </ol>
        </nav>
        <h1><span th:text="${viewModel.name}"></span> <small><a th:href="@{/character/edit(id=${viewModel.id})}" role="button">edit</a> <a th:href="@{/character/delete(id=${viewModel.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this character?') halt">delete</a></small></h1>
        <p>Full Name: <span th:text="${viewModel.fullName}"></span></p>
        <p th:if="${not #strings.isEmpty(viewModel.actorName)}">Actor: <a th:href="@{/actor/show(id=${viewModel.actorId})}" th:text="${viewModel.actorName}"></a></p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
