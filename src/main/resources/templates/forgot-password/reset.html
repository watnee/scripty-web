<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/pwaMeta :: pwaMeta}"></th:block>
    <meta charset="UTF-8">
    <title>Scripty - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body class="login-body" hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main class="login-page">
        <section class="login-card" aria-labelledby="reset-heading">
            <header class="login-header">
                <div class="login-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <p class="login-eyebrow">Scripty</p>
                <h1 id="reset-heading" class="login-title" style="font-family: Syne, sans-serif; font-size: 1.55rem; font-weight: 600;">Reset password</h1>
                <p class="login-subtitle" th:if="${valid}">Choose a new secure password for your account.</p>
                <p class="login-subtitle" th:unless="${valid}">This reset link can no longer be used.</p>
            </header>

            <div class="login-error" th:if="${errorMessage}" role="alert">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span th:text="${errorMessage}">An error occurred.</span>
            </div>

            <form class="login-form" th:if="${valid}" method="POST" th:action="@{/forgot-password/reset}" hx-boost="false">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="token" th:value="${token}" />
                
                <p class="invite-email-note muted" th:if="${email}">
                    Resetting password for: <strong th:text="${email}">email</strong>
                </p>

                <label class="login-field">
                    <span class="login-label">New password</span>
                    <span class="login-input-wrap">
                        <svg class="login-field-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" name="password" placeholder="Enter new password" minlength="8" required autofocus />
                    </span>
                </label>

                <label class="login-field">
                    <span class="login-label">Confirm new password</span>
                    <span class="login-input-wrap">
                        <svg class="login-field-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" name="confirmPassword" placeholder="Confirm new password" minlength="8" required />
                    </span>
                </label>

                <button type="submit" class="login-submit">
                    <span>Reset Password</span>
                </button>
            </form>

            <footer class="login-footer">
                <a class="login-footer-link" th:href="@{/login}" hx-boost="false">Back to Sign In</a>
                <a class="login-footer-link" th:href="@{/help}">Help center</a>
            </footer>
        </section>
    </main>
    <script src="/js/htmx.min.js"></script>
    <script src="/js/htmx-security.js"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
