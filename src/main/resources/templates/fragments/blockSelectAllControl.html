<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="controls(selectAllId)">
    <label class="block-select-all-label" th:for="${selectAllId}">
        <input type="checkbox"
               th:id="${selectAllId}"
               class="block-select-checkbox block-select-all-checkbox"
               aria-label="Select all blocks" />
    </label>
    <div class="nav-dropdown block-select-menu-dropdown">
        <button type="button"
                class="block-select-menu-toggle nav-dropdown-toggle"
                aria-haspopup="true"
                aria-expanded="false"
                aria-label="Selection options"
                title="Selection options">&#9662;</button>
        <div class="nav-dropdown-menu block-select-menu">
            <button type="button" class="nav-dropdown-item" data-block-select-action="all">Select all</button>
            <button type="button" class="nav-dropdown-item" data-block-select-action="none">Deselect all</button>
            <hr class="nav-dropdown-divider" />
            <button type="button" class="nav-dropdown-item" data-block-select-action="bookmarked">Select bookmarked</button>
            <button type="button" class="nav-dropdown-item" data-block-select-action="unbookmark">Deselect bookmarked</button>
        </div>
    </div>
    <span class="block-select-all-slot" aria-hidden="true"></span>
</th:block>
