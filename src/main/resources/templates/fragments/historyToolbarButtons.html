<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="buttons">
    <div class="nav-dropdown history-dropdown" id="history-dropdown">
        <button type="button"
                class="nav-dropdown-toggle history-toolbar-btn"
                aria-haspopup="true"
                aria-expanded="false"
                aria-label="Undo and redo"
                title="Undo and redo">
            History
        </button>
        <div class="nav-dropdown-menu history-menu" role="menu" aria-label="Undo and redo">
            <button id="nav-undo" type="button" class="nav-dropdown-item history-action-btn" role="menuitem" aria-label="Undo" title="Undo">Undo</button>
            <button id="nav-redo" type="button" class="nav-dropdown-item history-action-btn" role="menuitem" aria-label="Redo" title="Redo">Redo</button>
        </div>
    </div>
</th:block>
