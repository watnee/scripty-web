        function paintBlockTypeLocally(row, type) {
            if (!row || !type) return;
            const blockContent = row.querySelector('.block-content');
            if (blockContent && typeof window.scriptyApplyBlockTypeClass === 'function') {
                window.scriptyApplyBlockTypeClass(blockContent, type);
                return;
            }
            row.setAttribute('data-block-type', type);
            if (blockContent) {
                Array.from(blockContent.classList).forEach(function(cls) {
                    if (cls.indexOf('block-type-') === 0) blockContent.classList.remove(cls);
                });
                blockContent.classList.add('block-type-' + String(type).toLowerCase());
                blockContent.classList.remove('script-block--dialogue', 'script-block--action');
                blockContent.classList.add(
                    type === 'DIALOGUE' ? 'script-block--dialogue' : 'script-block--action'
                );
            }
            const label = row.querySelector('.block-element-label');
            if (label) {
                label.setAttribute('data-block-type', type);
                label.textContent = (window.scriptyBlockTypeLabel && window.scriptyBlockTypeLabel(type))
                    || String(type || 'ACTION').toLowerCase().replace(/_/g, ' ').replace(/\b\w/g, function(c) {
                        return c.toUpperCase();
                    });
            }
        }

        /** Retype a saved block from the + menu. Always uses the pinned new-block id. */
        function applyTypeToExistingBlock(row, type, forcedBlockId) {
            if (!type) return;
            const blockId = forcedBlockId
                || (row && row.getAttribute('data-block-id'))
                || window.scriptyPendingCreateBelowTypeTargetId
                || null;
            if (blockId) {
                row = document.querySelector(
                    '.block-row[data-block-id="' + blockId + '"], tr[data-block-id="' + blockId + '"]'
                ) || row;
            }
            if (!row) return;

            if (isCreateBlockRow(row)) {
                if (window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(row, type);
                }
                focusBlockContentEnd(row);
                window.scriptyPendingCreateBelowTypeTargetId = null;
                return;
            }
            if (!blockId) return;

            window.scriptyPendingCreateBelowTypeTargetId = String(blockId);
            rememberActiveBlockRow(row);
            paintBlockTypeLocally(row, type);

            if (window.scriptyBeginBlockTypeChangeWait) {
                window.scriptyBeginBlockTypeChangeWait();
            }

            const fields = {
                id: String(blockId),
                type: type,
                projectId: resolveProjectId() || '',
                partial: 'project',
                content: ''
            };
            const form = row.querySelector('.block-content form[hx-post*="/block/editInline"]');
            if (form) {
                const ta = form.querySelector('textarea[name="content"]');
                if (ta && ta.value != null) fields.content = ta.value;
                const personId = form.querySelector('input[name="personId"]');
                if (personId && personId.value) fields.personId = personId.value;
                const tags = form.querySelector('input[name="tags"]');
                if (tags && tags.value !== '') fields.tags = tags.value;
            }

            fetch('/block/setTypeAndContent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(fields).toString(),
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('setTypeAndContent failed');
                return response.text();
            }).then(function(html) {
                const liveRow = document.querySelector(
                    '.block-row[data-block-id="' + blockId + '"], tr[data-block-id="' + blockId + '"]'
                ) || row;
                const blockContent = liveRow && liveRow.querySelector('.block-content');
                if (!blockContent) return;
                paintBlockTypeLocally(liveRow, type);
                blockContent.innerHTML = html;
                if (typeof htmx !== 'undefined') htmx.process(blockContent);
                paintBlockTypeLocally(liveRow, type);
                focusBlockContentEnd(liveRow);
            }).catch(function() {
                if (typeof window.scriptyApplyElementType === 'function') {
                    window.scriptyApplyElementType(type, String(blockId));
                }
            }).finally(function() {
                window.scriptyPendingCreateBelowTypeTargetId = null;
                if (window.scriptyFinishBlockTypeChangeWait) {
                    window.scriptyFinishBlockTypeChangeWait();
                }
            });
        }

        /**
         * "+" button flow (create first, then choose type):
         * 1. Insert one new saved block under the clicked row
         * 2. Open the type menu on THAT new block
         * 3. Type pick retypes only the new block (pinned id)
         */
        function addBlockBelowAndChooseType(anchorRow) {
            if (!anchorRow || window.scriptyCreateBelowInFlight) return;
            if (anchorRow.dataset.openingCreateBelow === 'true') return;

            // Empty trailing create-row: create below the previous saved block
            // (avoids stale form ids after deletes). Typed create-rows still save
            // themselves so entered text is kept.
            if (isCreateBlockRow(anchorRow)) {
                if (!createRowHasContent(anchorRow)) {
                    const prevSaved = findPreviousSavedBlockRow(anchorRow);
                    if (prevSaved) {
                        addBlockBelowAndChooseType(prevSaved);
                        return;
                    }
                }
                window.scriptyCreateBelowInFlight = true;
                const type = resolveSmartCreateType(anchorRow);
                if (window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(anchorRow, type);
                }
                const ta = anchorRow.querySelector('textarea[name="content"]');
                if (ta && window.scriptyCreateBlockFromCreateRow) {
                    window.scriptyCreateBlockFromCreateRow(ta, {
                        focusSaved: true,
                        openTypeMenu: true,
                        onDone: function() { window.scriptyCreateBelowInFlight = false; }
                    });
                } else {
                    window.scriptyCreateBelowInFlight = false;
                    openCreateBelowTypeMenu(anchorRow);
                }
                return;
            }

            const anchorId = anchorRow.getAttribute('data-block-id');
            if (!anchorId) return;

            window.scriptyCreateBelowInFlight = true;
            anchorRow.dataset.openingCreateBelow = 'true';
            const initialType = resolveSmartCreateType(anchorRow);
            window.scriptyPendingCreateType = null;

            fetch('/block/createBelowInline', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                credentials: 'same-origin',
                body: new URLSearchParams({
                    id: anchorId,
                    content: '',
                    surface: 'project',
                    type: initialType
                }).toString()
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (!isBlockFragmentHtml(html) || !anchorRow.parentNode) return;

                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children).filter(function(el) {
                    return el.nodeType === 1 && (
                        el.classList.contains('block-row') || el.hasAttribute('data-block-id')
                    );
                });
                if (!newRows.length) return;

                // Response is [savedBlock, trailingCreateRow]. Keep only the saved block.
                // Prefer a row whose id differs from the + source (always a new insert).
                let savedRow = newRows.find(function(r) {
                    return r.hasAttribute('data-block-id')
                        && r.getAttribute('data-block-id') !== anchorId;
                });
                if (!savedRow) {
                    savedRow = newRows.find(function(r) {
                        return r.hasAttribute('data-block-id');
                    });
                }
                if (!savedRow) return;

                // Empty + source: still insert a distinct new row below it.
                anchorRow.insertAdjacentElement('afterend', savedRow);
                if (typeof htmx !== 'undefined') htmx.process(savedRow);
                dedupeTrailingCreateRows(anchorRow.parentNode);
                ensureTrailingCreateRow(anchorRow.parentNode);

                // Menu on the NEW block — never the + source.
                openCreateBelowTypeMenu(savedRow);
            }).catch(function() {
                /* keep current edit if create fails */
            }).finally(function() {
                delete anchorRow.dataset.openingCreateBelow;
                window.scriptyCreateBelowInFlight = false;
            });
        }

        /** "+" button: insert one saved block below the current row, then open
         *  the type/song/draft menu on that new block. */
        function addBlockBelowCurrent(row, options) {
            options = options || {};
            if (options.openTypeMenu !== false) {
                addBlockBelowAndChooseType(row);
                return;
            }
            if (!row) return;
            if (row.dataset.openingCreateBelow === 'true') return;
            if (window.scriptyCreateBelowInFlight) return;
            window.scriptyCreateBelowInFlight = true;
            var clearInFlight = function() {
                window.scriptyCreateBelowInFlight = false;
            };

            if (isCreateBlockRow(row)) {
                const type = resolveSmartCreateType(row);
                if (window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(row, type);
                }
                const ta = row.querySelector('textarea[name="content"]');
                if (ta && window.scriptyCreateBlockFromCreateRow) {
                    window.scriptyCreateBlockFromCreateRow(ta, {
                        focusSaved: true,
                        openTypeMenu: false,
                        onDone: clearInFlight
                    });
                } else {
                    clearInFlight();
                    focusBlockContentEnd(row);
                }
                return;
            }
            if (!row.hasAttribute('data-block-id')) {
                clearInFlight();
                return;
            }
            window.scriptyPendingCreateType = resolveSmartCreateType(row);
            createEmptyBlockBelow(row, {
                focusSaved: true,
                openTypeMenu: false,
                onDone: clearInFlight
            });
        }

        function createBlockWithType(row, type) {
            if (!row || !type) return;
            if (row.dataset.openingCreateBelow === 'true') return;
            if (window.scriptyCreateBelowInFlight) return;
            window.scriptyCreateBelowInFlight = true;
            var clearInFlight = function() {
                window.scriptyCreateBelowInFlight = false;
            };

            // Trailing create row: set type, then save as one new block.
            if (isCreateBlockRow(row)) {
                if (window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(row, type);
                } else {
                    row.setAttribute('data-block-type', type);
                    var typeInput = row.querySelector('input[name="type"]');
                    if (typeInput) typeInput.value = type;
                    var label = row.querySelector('.block-element-label');
                    if (label) {
                        label.setAttribute('data-block-type', type);
                        label.textContent = (window.scriptyBlockTypeLabel && window.scriptyBlockTypeLabel(type))
                        || String(type || 'ACTION').toLowerCase().replace(/_/g, ' ').replace(/\b\w/g, function(c) {
                            return c.toUpperCase();
                        });
                    }
                }
                const ta = row.querySelector('textarea[name="content"]');
                if (ta && window.scriptyCreateBlockFromCreateRow) {
                    window.scriptyCreateBlockFromCreateRow(ta, {
                        focusSaved: true,
                        onDone: clearInFlight
                    });
                } else {
                    clearInFlight();
                    focusBlockContentEnd(row);
                }
                return;
            }
            if (!row.hasAttribute('data-block-id')) {
                clearInFlight();
                return;
            }

            // Always create via createEmptyBlockBelow (inserts only the new saved
            // row). Do not save the trailing create-row in place — that response
            // includes a companion create row and was easy to double-insert.
            window.scriptyPendingCreateType = type;
            createEmptyBlockBelow(row, {
                focusSaved: true,
                onDone: clearInFlight
            });
        }

        function removeUnsavedBlockRow(row) {
            if (!row || row.hasAttribute('data-block-id')) return false;
            var container = row.closest('.scene-blocks, #table-blocks, tbody');
            if (!container) return false;
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            // Ignore the select-all chrome row — it is a .block-row but not editable.
            var editableRows = container.querySelectorAll(rowSelector + ':not(.project-script-select-row)');
            var savedBlocks = container.querySelectorAll(rowSelector + '[data-block-id]').length;
            if (savedBlocks === 0 && editableRows.length <= 1) return false;
            row.remove();
            return true;
        }

        function clearOrphanCreateRows(container) {
            if (!container) return;
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            Array.from(container.querySelectorAll(rowSelector)).forEach(function(row) {
                if (row.hasAttribute('data-block-id')) return;
                if (row.classList.contains('project-script-select-row')) return;
                row.remove();
            });
        }

        function insertCreateInlineHtml(container, html) {
            if (!container || !html) return null;
            var template = document.createElement('template');
            template.innerHTML = html.trim();
            var newRow = template.content.firstElementChild;
            if (!newRow) return null;
            var selectRow = container.querySelector('.project-script-select-row');
            if (selectRow && selectRow.parentNode === container) {
                selectRow.after(newRow);
            } else {
                container.appendChild(newRow);
            }
            if (typeof htmx !== 'undefined') {
                htmx.process(newRow);
            }
            return newRow;
        }

        function focusCreateRowTextarea(row) {
            if (!row) return;
            var ta = row.querySelector('textarea[name="content"]');
            if (!ta) return;
            ta.focus({ preventScroll: true });
            var len = ta.value.length;
            ta.setSelectionRange(len, len);
        }

        /**
         * After deleting the last saved block, restore an empty createInline row
         * so the scene never ends up with zero editable rows.
         */
        function ensureEmptyCreateRow(container, options) {
            options = options || {};
            if (!container) return Promise.resolve(null);
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            if (container.querySelector(rowSelector + '[data-block-id]')) {
                return Promise.resolve(null);
            }

            clearOrphanCreateRows(container);

            var projectId = resolveProjectId();
            if (!projectId) return Promise.resolve(null);

            function finish(newRow) {
                clearActiveBlockMemory();
                if (options.focus !== false) {
                    focusCreateRowTextarea(newRow);
                }
                return newRow;
            }

            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyRenderCreateInlineRow) {
                var offlineRow = insertCreateInlineHtml(container, window.scriptyRenderCreateInlineRow(projectId));
                return Promise.resolve(finish(offlineRow));
            }

            return fetch('/block/createInline?projectId=' + encodeURIComponent(projectId) + '&surface=project', {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                if (!response.ok) throw new Error('createInline failed');
                return response.text();
            }).then(function(html) {
                if (!container.isConnected) return null;
                if (container.querySelector(rowSelector + '[data-block-id]')) return null;
                clearOrphanCreateRows(container);
                return finish(insertCreateInlineHtml(container, html));
            }).catch(function() {
                return null;
            });
        }
        window.scriptyEnsureEmptyCreateRow = ensureEmptyCreateRow;

        function deleteBlockFromDragMenu(row, container) {
            if (!row) return;

            if (!row.hasAttribute('data-block-id')) {
                removeUnsavedBlockRow(row);
                return;
            }

            if (row.dataset.deleting === 'true') return;
            if (!confirm('Are you sure you want to delete this block?')) return;

            var sceneContainer = container || row.closest('.scene-blocks, #table-blocks, tbody');
            row.dataset.deleting = 'true';
            fetch('/block/deleteInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('delete failed');
                row.remove();
                if (sceneContainer) {
                    reindexBlockOrders(sceneContainer);
                    updateMoveButtonStates(sceneContainer);
                }
                window.scriptyUpdateUndoRedoButtons(resolveProjectId());
                return ensureEmptyCreateRow(sceneContainer);
            }).catch(function() {
                delete row.dataset.deleting;
            });
        }

        function swapMarkerIcon(sideLink, active, type) {
            var filled = sideLink.querySelector('.' + type + '-icon--filled');
            var outline = sideLink.querySelector('.' + type + '-icon--outline');
            if (filled && outline) {
                filled.style.display = active ? '' : 'none';
                outline.style.display = active ? 'none' : '';
                return true;
            }
            var hasFilled = !!filled;
            var hasOutline = !!outline;
            if ((active && hasFilled) || (!active && hasOutline)) {
                return true;
            }
            if (type === 'bookmark') {
                sideLink.innerHTML = active
                    ? '<svg class="bookmark-icon bookmark-icon--filled" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"><\/path><\/svg>'
                    : '<svg class="bookmark-icon bookmark-icon--outline" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"><\/path><\/svg>';
                return true;
            }
            if (type === 'pin') {
                sideLink.innerHTML = active
                    ? '<svg class="pin-icon pin-icon--filled" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"><\/path><circle cx="12" cy="10" r="3"><\/circle><\/svg>'
                    : '<svg class="pin-icon pin-icon--outline" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"><\/path><circle cx="12" cy="10" r="3"><\/circle><\/svg>';
                return true;
            }
            return false;
        }

        function updateBlockBookmarkUi(row, bookmarked) {
            if (!row) return;
            row.setAttribute('data-bookmarked', bookmarked ? 'true' : 'false');
            var menuBtn = row.querySelector('[data-block-drag-action="toggle-bookmark"]');
            if (menuBtn) {
                menuBtn.textContent = bookmarked ? 'Remove bookmark' : 'Bookmark block';
                menuBtn.setAttribute('data-bookmarked', bookmarked ? 'true' : 'false');
            }
            var sideLink = row.querySelector('.block-action-bookmark');
            if (sideLink) {
                sideLink.title = bookmarked ? 'Remove bookmark' : 'Bookmark block';
                sideLink.setAttribute('aria-label', bookmarked ? 'Remove bookmark' : 'Bookmark block');
                if (!swapMarkerIcon(sideLink, bookmarked, 'bookmark')) {
                    sideLink.textContent = bookmarked ? '★' : '☆';
                }
            }
            if (typeof window.scriptyRefreshFountainOutline === 'function') {
                window.scriptyRefreshFountainOutline();
            }
        }

        function toggleBookmarkFromDragMenu(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            if (row.dataset.togglingBookmark === 'true') return;
            row.dataset.togglingBookmark = 'true';
            fetch('/block/toggleBookmarkInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('bookmark failed');
                return response.json();
            }).then(function(data) {
                updateBlockBookmarkUi(row, !!data.bookmarked);
            }).catch(function() {
                /* keep current state */
            }).finally(function() {
                delete row.dataset.togglingBookmark;
            });
        }

        function updateBlockPinUi(row, pinned) {
            if (!row) return;
            row.setAttribute('data-pinned', pinned ? 'true' : 'false');
            var menuBtn = row.querySelector('[data-block-drag-action="toggle-pin"]');
            if (menuBtn) {
                menuBtn.textContent = pinned ? 'Unpin block' : 'Pin block';
                menuBtn.setAttribute('data-pinned', pinned ? 'true' : 'false');
            }
            var sideLink = row.querySelector('.block-action-pin');
            if (!sideLink) return;
            sideLink.title = pinned ? 'Unpin block' : 'Pin block';
            sideLink.setAttribute('aria-label', pinned ? 'Unpin block' : 'Pin block');
            sideLink.classList.toggle('is-pinned', pinned);
            if (swapMarkerIcon(sideLink, pinned, 'pin')) return;
            sideLink.style.textDecoration = pinned ? 'none' : '';
            sideLink.style.filter = pinned ? '' : 'grayscale(100%)';
            sideLink.style.opacity = pinned ? '' : '0.3';
        }

        function togglePinFromDragMenu(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            if (row.dataset.togglingPin === 'true') return;
            row.dataset.togglingPin = 'true';
            fetch('/block/togglePinnedInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('pin failed');
                return response.json();
            }).then(function(data) {
                updateBlockPinUi(row, !!data.pinned);
            }).catch(function() {
                /* keep current state */
            }).finally(function() {
                delete row.dataset.togglingPin;
            });
        }

        function initBlockDragMenus(container) {
            if (!container) return;

            container.querySelectorAll('.block-drag-menu-dropdown').forEach(function(dropdown) {
                if (dropdown.dataset.dragMenuInit === 'true') return;
                dropdown.dataset.dragMenuInit = 'true';

                var toggle = dropdown.querySelector('.block-drag-menu-toggle');
                var deleteBtn = dropdown.querySelector('[data-block-drag-action="delete"]');
                var bookmarkBtn = dropdown.querySelector('[data-block-drag-action="toggle-bookmark"]');
                var pinBtn = dropdown.querySelector('[data-block-drag-action="toggle-pin"]');
                var dragStarted = false;

                if (toggle) {
                    toggle.addEventListener('dragstart', function() {
                        dragStarted = true;
                        closeAllBlockDragMenus();
                    });
                    toggle.addEventListener('dragend', function() {
                        setTimeout(function() {
                            dragStarted = false;
                        }, 0);
                    });
                    toggle.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        if (dragStarted) return;
                        var isOpen = dropdown.classList.contains('open');
                        closeAllBlockDragMenus();
                        closeAllCreateBelowMenus();
                        if (!isOpen) {
                            dropdown.classList.add('open');
                            toggle.setAttribute('aria-expanded', 'true');
                        }
                    });
                }

                dropdown.querySelectorAll('.block-drag-submenu-toggle').forEach(function(submenuToggle) {
                    submenuToggle.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var submenu = submenuToggle.closest('.block-drag-submenu');
                        if (!submenu) return;
                        var isOpen = submenu.classList.contains('open');
                        closeBlockDragSubmenus(dropdown);
                        if (!isOpen) {
                            submenu.classList.add('open');
                            submenuToggle.setAttribute('aria-expanded', 'true');
                            positionBlockDragSubmenu(submenu);
                        }
                    });
                });

                dropdown.querySelectorAll('[data-block-drag-action="set-type"]').forEach(function(typeBtn) {
                    typeBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        closeAllBlockDragMenus();
                        var type = typeBtn.getAttribute('data-set-type');
                        if (!type) return;
                        var row = findAnyBlockRow(dropdown);
                        if (!row) return;
                        if (!row.hasAttribute('data-block-id')) {
                            if (typeof window.scriptySetCreateRowType === 'function') {
                                window.scriptySetCreateRowType(row, type);
                            } else if (typeof window.scriptyApplyElementType === 'function') {
                                window.scriptyApplyElementType(type, null);
                            }
                            return;
                        }
                        if (typeof window.scriptyApplyElementType === 'function') {
                            window.scriptyApplyElementType(type, row.getAttribute('data-block-id'));
                        }
                    });
                });

                if (bookmarkBtn) {
                    bookmarkBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        closeAllBlockDragMenus();
                        var row = findBlockRow(dropdown);
                        toggleBookmarkFromDragMenu(row);
                    });
                }

                if (pinBtn) {
                    pinBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        closeAllBlockDragMenus();
                        var row = findBlockRow(dropdown);
                        togglePinFromDragMenu(row);
                    });
                }

                if (deleteBtn) {
                    deleteBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        closeAllBlockDragMenus();
                        var row = findAnyBlockRow(dropdown);
                        deleteBlockFromDragMenu(row, container);
                    });
                }
            });

            if (!window._scriptyBlockDragMenuCloseInit) {
                window._scriptyBlockDragMenuCloseInit = true;
                document.addEventListener('click', function(e) {
                    if (e.target.closest('.block-drag-menu-dropdown')) return;
                    closeAllBlockDragMenus();
                });
                document.addEventListener('click', function(e) {
                    const openDropdown = document.querySelector('.create-below-menu-dropdown.open');
                    if (openDropdown && openDropdown.dataset.suppressOutsideClose === '1') return;
                    if (e.target.closest('.create-below-menu-dropdown')) return;
                    closeAllCreateBelowMenus();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key !== 'Escape') return;
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                });
            }
        }

        window.scriptyInitBlockDragDrop = function(container, options) {
            if (!container) return;
            initBlockDragMenus(container);
            if (container.dataset.dragInit === 'true') return;
            container.dataset.dragInit = 'true';
            options = options || {};
            const projectId = options.projectId || resolveProjectId();
            let dragRow = null;

            updateMoveButtonStates(container);

            container.addEventListener('dragstart', function(e) {
                const handle = e.target.closest('.drag-handle');
                if (!handle) {
                    e.preventDefault();
                    return;
                }
                const row = findBlockRow(handle);
                if (!row || !container.contains(row) || !row.hasAttribute('data-block-id')) {
                    e.preventDefault();
                    return;
                }
                dragRow = row;
                row.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                if (e.dataTransfer.setData) {
                    e.dataTransfer.setData('text/plain', row.getAttribute('data-block-id') || 'block');
                }
                if (e.dataTransfer.setDragImage) {
                    const rowRect = row.getBoundingClientRect();
                    if (rowRect.height < 20) {
                        e.dataTransfer.setDragImage(handle, handle.offsetWidth / 2, handle.offsetHeight / 2);
                    } else {
                        e.dataTransfer.setDragImage(row, 24, Math.min(16, rowRect.height / 2));
                    }
                }
            });

            container.addEventListener('dragend', function() {
                if (dragRow) dragRow.classList.remove('dragging');
                clearDropMarkers(container);
                dragRow = null;
            });

            container.addEventListener('dragover', function(e) {
                e.preventDefault();
                if (!dragRow) return;
                if (e.dataTransfer) {
                    e.dataTransfer.dropEffect = 'move';
                }
                applyDropMarker(container, e.clientY, dragRow);
            });

            container.addEventListener('dragleave', function(e) {
                if (!e.relatedTarget || !container.contains(e.relatedTarget)) {
                    clearDropMarkers(container);
                }
            });

            container.addEventListener('drop', function(e) {
                e.preventDefault();
                const target = applyDropMarker(container, e.clientY, dragRow);
                clearDropMarkers(container);
                if (!target || !dragRow) return;

                const targetRow = target.row;
                const insertBefore = target.insertBefore;
                if (!container.contains(targetRow) || targetRow === dragRow) return;

                const blockId = dragRow.getAttribute('data-block-id');
                const newOrder = calcDropPosition(dragRow, targetRow, e.clientY);
                const dragOrder = parseInt(dragRow.getAttribute('data-block-order'), 10);

                if (insertBefore) {
                    targetRow.parentNode.insertBefore(dragRow, targetRow);
                } else {
                    targetRow.parentNode.insertBefore(dragRow, targetRow.nextSibling);
                }

                reindexBlockOrders(container);
                updateMoveButtonStates(container);

                if (!blockId || newOrder == null || newOrder === dragOrder) return;

                runWhenHtmxIdle(function() {
                    if (window.scriptyAbortUndoStatusFetch) {
                        window.scriptyAbortUndoStatusFetch();
                    }
                    const params = new URLSearchParams();
                    params.append('id', blockId);
                    params.append('position', String(newOrder));
                    if (projectId) params.append('projectId', projectId);
                    fetch('/block/moveTo', {
                        method: 'POST',
                        credentials: 'same-origin',
                        cache: 'no-store',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: params.toString()
                    }).then(function(response) {
                        if (response.ok || response.redirected) {
                            window.scriptyUpdateUndoRedoButtons(projectId);
                            return;
                        }
                        window.location.reload();
                    }).catch(function() {
                        window.location.reload();
                    });
                });
            });
        };


        window.scriptyInitProjectLiveSync = function(options) {
            options = options || {};
            var projectId = options.projectId;
            var revision = options.revision || 0;
            var pollMs = options.pollMs || 4000;
            if (!projectId) return;

            // Avoid stacking pollers across HTMX/full reloads of the project page.
            if (typeof window._scriptyLiveSyncCleanup === 'function') {
                window._scriptyLiveSyncCleanup();
                window._scriptyLiveSyncCleanup = null;
            }

            var refreshInProgress = false;
            var pendingRevision = null;
            var intervalId = null;
            var toastHideTimer = null;

            function editionQuery() {
                var editionId = typeof window.scriptyResolveEditionId === 'function'
                    ? window.scriptyResolveEditionId()
                    : (window.scriptyEditionId || null);
                return editionId ? ('&editionId=' + encodeURIComponent(editionId)) : '';
            }

            function showSyncToast(message) {
                var toast = document.getElementById('scripty-editor-toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'scripty-editor-toast';
                    toast.className = 'scripty-editor-toast';
                    toast.setAttribute('role', 'status');
                    toast.setAttribute('aria-live', 'polite');
                    document.body.appendChild(toast);
                }
                toast.textContent = message;
                toast.hidden = false;
                toast.classList.add('is-visible');
                if (toastHideTimer) {
                    clearTimeout(toastHideTimer);
                }
                toastHideTimer = setTimeout(function() {
                    toast.classList.remove('is-visible');
                    toast.hidden = true;
                }, 2800);
            }

            function scriptBody() {
                return document.getElementById('project-script-body');
            }

            function isEditing() {
                if (window.scriptyBlockCaretPreviewActive) return true;
                if (window.scriptyBlockEditOpenInFlight) return true;
                if (document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) return true;
                if (document.querySelector('.project-header-name-wrap input[name="title"]')) return true;
                if (document.querySelector('.scene-name-wrap input[name="name"]')) return true;
                if (document.querySelector('.block-content textarea:focus')) return true;
                if (document.querySelector('.block-content form')) return true;
                if (document.querySelector('.htmx-request')) return true;
                var textareas = document.querySelectorAll('.block-content textarea[name="content"]');
                for (var i = 0; i < textareas.length; i++) {
                    if (textareas[i].value !== textareas[i].defaultValue) return true;
                }
                return false;
            }

            function applyTitle(title) {
                if (title == null) return;
                var breadcrumbDisplay = document.querySelector('.project-breadcrumb-name-display');
                if (breadcrumbDisplay && !document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) {
                    var breadcrumbTrimmed = (title || '').trim();
                    if (breadcrumbTrimmed === '') {
                        breadcrumbDisplay.innerHTML = '<span class="project-name-placeholder">Untitled<\/span>';
                    } else {
                        breadcrumbDisplay.textContent = title;
                    }
                } else if (!document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) {
                    var breadcrumb = document.getElementById('project-breadcrumb-title');
                    if (breadcrumb && !breadcrumb.querySelector('.project-breadcrumb-name-wrap')) {
                        breadcrumb.textContent = title;
                    }
                }
                var readerTitle = document.getElementById('reader-visible-project-title');
                if (readerTitle && !document.querySelector('.project-header-name-wrap input[name="title"]')) {
                    var readerTrimmed = (title || '').trim();
                    if (readerTrimmed === '') {
                        readerTitle.innerHTML = '<span class="project-name-placeholder">Untitled Project<\/span>';
                    } else {
                        readerTitle.textContent = title;
                    }
                }
                if (window.scriptySyncProjectNameDisplay) {
                    window.scriptySyncProjectNameDisplay();
                }
                if (document.title.indexOf('Scripty - ') === 0) {
                    document.title = 'Scripty - ' + ((title || '').trim() === '' ? 'Project' : title);
                }
            }

            function reinitScriptBody() {
                var body = scriptBody();
                if (!body) return;
                body.querySelectorAll('.scene-blocks').forEach(function(sceneBlocks) {
                    if (window.scriptyInitBlockDragDrop) {
                        window.scriptyInitBlockDragDrop(sceneBlocks, { projectId: projectId });
                    }
                });
                if (typeof htmx !== 'undefined') {
                    htmx.process(body);
                }
                window.dispatchEvent(new CustomEvent('scripty:project-script-refreshed', { detail: { projectId: projectId } }));
            }

            // Only confirm online on success. Do not treat live-sync HTTP
            // failures as offline — those are often auth/5xx/cold-start blips
            // while the user's internet is fine. Dedicated /health probes own offline.
            function noteReachable() {
                if (window.scriptyReportServerReachable) {
                    window.scriptyReportServerReachable(true);
                }
            }

            function refreshScript(targetRevision) {
                if (refreshInProgress || isEditing()) {
                    if (typeof targetRevision === 'number') {
                        pendingRevision = targetRevision;
                    }
                    return;
                }
                refreshInProgress = true;
                var scrollY = window.scrollY;
                fetch('/project/showScript?id=' + encodeURIComponent(projectId)
                        + editionQuery(), {
                    credentials: 'same-origin',
                    cache: 'no-store',
                    headers: { 'Accept': 'text/html' }
                }).then(function(response) {
                    if (!response.ok) throw new Error('refresh failed');
                    noteReachable();
                    return response.text();
                }).then(function(html) {
                    // User may have started editing while the refresh was in flight.
                    if (isEditing()) {
                        if (typeof targetRevision === 'number') {
                            pendingRevision = targetRevision;
                        }
                        return;
                    }
                    var container = scriptBody();
                    if (!container) return;
                    container.outerHTML = html;
                    if (typeof targetRevision === 'number') {
                        revision = targetRevision;
                        if (pendingRevision != null && pendingRevision <= revision) {
                            pendingRevision = null;
                        }
                    }
                    reinitScriptBody();
                    window.scrollTo(0, scrollY);
                    showSyncToast('Script updated — refreshed from server');
                    if (window.scriptySaveProjectSnapshot) {
                        window.scriptySaveProjectSnapshot();
                    }
                }).catch(function() {
                    if (typeof targetRevision === 'number') {
                        pendingRevision = targetRevision;
                    }
                }).finally(function() {
                    refreshInProgress = false;
                });
            }

            function bumpRevisionFromServer() {
                // Allow recovery attempts while marked offline if the browser is online.
                if (window.scriptyIsOffline && window.scriptyIsOffline() && !navigator.onLine) return;
                fetch('/project/syncStatus?id=' + encodeURIComponent(projectId) + '&since=0' + editionQuery(), {
                    credentials: 'same-origin',
                    cache: 'no-store'
                }).then(function(r) {
                    if (!r.ok) throw new Error('sync status ' + r.status);
                    noteReachable();
                    return r.json();
                }).then(function(data) {
                    if (data && typeof data.revision === 'number') {
                        revision = data.revision;
                        if (pendingRevision != null && pendingRevision <= revision) {
                            pendingRevision = null;
                        }
                    }
                    if (data && data.title != null) {
                        applyTitle(data.title);
                    }
                }).catch(function() {});
            }

            function poll() {
                if (window.scriptyIsOffline && window.scriptyIsOffline() && !navigator.onLine) return;
                if (document.hidden || refreshInProgress) return;

                // Apply a deferred refresh once local editing has stopped.
                if (pendingRevision != null && !isEditing()) {
                    var deferred = pendingRevision;
                    pendingRevision = null;
                    refreshScript(deferred);
                    return;
                }

                if (isEditing()) return;

                fetch('/project/syncStatus?id=' + encodeURIComponent(projectId) + '&since=' + encodeURIComponent(revision) + editionQuery(), {
                    credentials: 'same-origin',
                    cache: 'no-store'
                }).then(function(r) {
                    if (!r.ok) throw new Error('sync status ' + r.status);
                    noteReachable();
                    return r.json();
                }).then(function(data) {
                    if (!data || !data.changed) return;
                    if (data.title != null) applyTitle(data.title);
                    if (isEditing()) {
                        pendingRevision = data.revision;
                        return;
                    }
                    refreshScript(data.revision);
                }).catch(function() {});
            }

            function onAfterLoad(e) {
                var path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                if (path.indexOf('/block/') === -1 && path.indexOf('/scene/') === -1 && path.indexOf('/project/editNameInline') === -1) return;
                runWhenHtmxIdle(bumpRevisionFromServer);
            }

            function onVisibilityChange() {
                if (!document.hidden) poll();
            }

            document.body.addEventListener('htmx:afterOnLoad', onAfterLoad);
            document.addEventListener('visibilitychange', onVisibilityChange);

            intervalId = setInterval(poll, pollMs);
            window._scriptyLiveSyncCleanup = function() {
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                if (toastHideTimer) {
                    clearTimeout(toastHideTimer);
                    toastHideTimer = null;
                }
                document.body.removeEventListener('htmx:afterOnLoad', onAfterLoad);
                document.removeEventListener('visibilitychange', onVisibilityChange);
            };

            bumpRevisionFromServer();
        };

        function autoGrowTextarea(textarea) {
            if (!textarea) return;
            textarea.style.height = 'auto';
            const style = window.getComputedStyle(textarea);
            const isBorderBox = style.boxSizing === 'border-box';
            let height = textarea.scrollHeight;
            if (isBorderBox) {
                const borderTop = parseFloat(style.borderTopWidth) || 0;
                const borderBottom = parseFloat(style.borderBottomWidth) || 0;
                height += borderTop + borderBottom;
            }
            textarea.style.height = height + 'px';
        }

        function getTextOffsetInElement(root, container, offset) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            let total = 0;
            let node;
            while ((node = walker.nextNode())) {
                if (node === container) return total + offset;
                total += node.textContent.length;
            }
            return total;
        }

        document.body.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            if (e.target.closest('a') && !e.target.closest('.character-name, .reader-visible-character-name')) return;
            const blockContent = e.target.closest('.block-content');
            if (!blockContent) return;

            let textEl = e.target.closest('.reader-visible-character-name, .character-name, .reader-visible-text, .script-block-text');
            if (textEl && textEl.tagName === 'TEXTAREA') textEl = null;
            if (!textEl) {
                textEl = blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
            }
            if (!textEl || textEl.tagName === 'TEXTAREA') return;

            const clickOffset = getBlockTextClickOffset(blockContent, e.clientX, e.clientY);
            const resolvedTextEl = clickOffset.textEl || textEl;
            const resolvedOffset = clickOffset.textEl ? clickOffset.offset : textEl.textContent.length;
            const resolvedEndOffset = null;

            if (shouldDeferBlockEditForClick() && isBlockContentViewMode(blockContent)) {
                window.scriptyPendingBlockCaret = {
                    blockContent: blockContent,
                    textEl: resolvedTextEl,
                    offset: resolvedOffset,
                    endOffset: resolvedEndOffset
                };
                return;
            }

            if (window.scriptySuppressBlockEditClick || window.scriptyBlockEditLocked) return;

            const form = blockContent.querySelector('.block-inline-edit-form, form[hx-post*="/block/editInline"]');
            if (form && form.contains(document.activeElement)) return;

            window.scriptyPendingBlockCaret = {
                blockContent: blockContent,
                textEl: resolvedTextEl,
                offset: resolvedOffset,
                endOffset: resolvedEndOffset
            };
        }, true);

        document.body.addEventListener('click', function(e) {
            const blockContent = e.target.closest('.block-content');
            if (!blockContent) return;
            if (e.target.closest('a') || e.target.closest('form')) return;
            if (window.scriptySuppressBlockEditClick || window.scriptyBlockEditLocked) return;
            if (typeof htmx !== 'undefined') {
                htmx.trigger(blockContent, 'scripty-edit-block');
            }
        });

        function focusBlockTextareaFromClick() {
            if (!window.scriptyPendingBlockCaret) return;
            const pending = window.scriptyPendingBlockCaret;
            window.scriptyPendingBlockCaret = null;
            if (!pending.blockContent.isConnected) return;

            const textarea = pending.blockContent.querySelector('textarea[name="content"]');
            if (!textarea) return;

            syncBlockTextLayout(textarea);
            textarea.focus({ preventScroll: true });
            const len = textarea.value.length;
            const start = Math.max(0, Math.min(pending.offset, len));
            const endRaw = pending.endOffset != null ? pending.endOffset : pending.offset;
            const end = Math.max(start, Math.min(endRaw, len));
            textarea.setSelectionRange(start, end);

            if (window.scriptyOpenSpellcheckSuggestions && window._pendingSpellcheckClick) {
                const pendingClick = window._pendingSpellcheckClick;
                window._pendingSpellcheckClick = null;
                requestAnimationFrame(function() {
                    window.scriptyOpenSpellcheckSuggestions(textarea, pendingClick);
                });
            }
        }

        function syncProjectNameDisplay() {
            const readerTitle = document.getElementById('reader-visible-project-title');
            if (!readerTitle || document.querySelector('.project-header-name-wrap input[name="title"]')) return;
            const title = (readerTitle.textContent || '').trim();
            const breadcrumbDisplay = document.querySelector('.project-breadcrumb-name-display');
            if (breadcrumbDisplay && !document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) {
                if (title === '' || title === 'Untitled Project') {
                    breadcrumbDisplay.innerHTML = '<span class="project-name-placeholder">Untitled<\/span>';
                } else {
                    breadcrumbDisplay.textContent = title;
                }
            }
        }

        window.scriptySyncProjectNameDisplay = syncProjectNameDisplay;

        function syncReaderVisibleText(textarea) {
            if (!textarea) return;
            const blockContent = textarea.closest('.block-content');
            const mirror = (blockContent && blockContent.querySelector(':scope > .reader-visible-text')) ||
                (textarea.closest('form') && textarea.closest('form').querySelector('.reader-visible-text'));
            if (mirror) {
                mirror.textContent = textarea.value || '\u00a0';
            }
        }

        function syncBlockTextLayout(textarea) {
            if (!textarea || textarea.name !== 'content') return;
            const form = textarea.closest('form');
            if (!form) return;
            const blockContent = textarea.closest('.block-content');
            const mirror = (blockContent && blockContent.querySelector(':scope > .reader-visible-text')) ||
                form.querySelector('.reader-visible-text');
            if (!mirror) return;

            syncReaderVisibleText(textarea);
            // Clear prior min-heights so a previous tall measure can't ratchet the block taller
            mirror.style.minHeight = '';
            textarea.style.height = 'auto';
            autoGrowTextarea(textarea);

            const height = Math.max(mirror.offsetHeight, textarea.offsetHeight);
            if (height > 0) {
                mirror.style.minHeight = height + 'px';
                textarea.style.height = height + 'px';
            }
        }

        function growTextarea(textarea) {
            if (!textarea) return;
            const blockContent = textarea.closest('.block-content');
            const hasMirror = blockContent && blockContent.querySelector(':scope > .reader-visible-text');
            if (textarea.name === 'content' && (hasMirror ||
                (textarea.closest('form') && textarea.closest('form').querySelector('.reader-visible-text')))) {
                syncBlockTextLayout(textarea);
            } else {
                autoGrowTextarea(textarea);
            }
        }
        window.scriptyGrowTextarea = growTextarea;

        function commitOpenBlockEdits() {
            document.querySelectorAll('.block-content form.block-inline-edit-form, .block-content form[hx-post*="/block/editInline"]').forEach(function(form) {
                if (form.dataset.committing === 'true') return;
                const textarea = form.querySelector('textarea[name="content"]');
                if (!textarea || textarea.value.trim() === '') return;

                if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptySaveBlockEditOffline) {
                    window.scriptySaveBlockEditOffline(form);
                    return;
                }

                form.dataset.committing = 'true';
                syncReaderVisibleText(textarea);

                const formData = new FormData(form);
                const url = form.getAttribute('hx-post') || '/block/editInline';

                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(formData).toString()
                }).then(function(response) {
                    return response.text();
                }).then(function(html) {
                    const target = form.closest('.block-content');
                    if (target) {
                        target.innerHTML = html;
                    }
                }).catch(function() {
                    /* keep edit form if save fails */
                }).finally(function() {
                    delete form.dataset.committing;
                });
            });
        }

        function autoGrowInput(input) {
            if (!input) return;
            const isSceneName = input.closest('.scene-name-wrap') || 
                                input.closest('.project-breadcrumb-name-wrap') ||
                                input.closest('.project-header-name-wrap') ||
                                input.closest('#create-scene-row') || 
                                input.closest('#create-scene-below-form');
            const hasAutoGrowClass = input.classList.contains('auto-grow');
            if (!isSceneName && !hasAutoGrowClass) return;

            let tempSpan = document.getElementById('input-width-tester');
            if (!tempSpan) {
                tempSpan = document.createElement('span');
                tempSpan.id = 'input-width-tester';
                tempSpan.style.visibility = 'hidden';
                tempSpan.style.position = 'absolute';
                tempSpan.style.whiteSpace = 'pre';
                document.body.appendChild(tempSpan);
            }
            
            const style = window.getComputedStyle(input);
            tempSpan.style.font = style.font;
            tempSpan.style.fontFamily = style.fontFamily;
            tempSpan.style.fontSize = style.fontSize;
            tempSpan.style.fontWeight = style.fontWeight;
            tempSpan.style.letterSpacing = style.letterSpacing;
            tempSpan.style.textTransform = style.textTransform;
            
            tempSpan.textContent = input.value || input.placeholder || '';
            
            const paddingLeft = parseFloat(style.paddingLeft) || 0;
            const paddingRight = parseFloat(style.paddingRight) || 0;
            const borderLeft = parseFloat(style.borderLeftWidth) || 0;
            const borderRight = parseFloat(style.borderRightWidth) || 0;
            
            const extra = paddingLeft + paddingRight + borderLeft + borderRight + 12;
            const computedWidth = tempSpan.getBoundingClientRect().width + extra;
            
            input.style.width = computedWidth + 'px';
        }

        // Run on initial load
        function initAll() {
            if (window.scriptyInitPageChrome) window.scriptyInitPageChrome();
            // Insert redirects land with #block-…; clear any leftover click-suppress from prior page.
            window.scriptySuppressBlockEditClick = false;
            window.scriptyBlockTextSelectionClickSuppress = false;
            window.scriptySuppressBlockEditForPreview = false;
            initBlockEmptyBackspace();
            initBlockEditGuards();
            initBlockTextSelection();
            initBlockControlsReveal();
            if (window.scriptyInitHistoryDropdown) window.scriptyInitHistoryDropdown();
            if (window.scriptyInitNavDropdowns) window.scriptyInitNavDropdowns();
            if (window.scriptyInitThemeToggle) window.scriptyInitThemeToggle();
            if (window.scriptyInitProjectDeleteConfirm) window.scriptyInitProjectDeleteConfirm();
            if (window.scriptyInitEditorPositionPersistence) window.scriptyInitEditorPositionPersistence();
            if (window.scriptyInitHelpCenter) {
                window.scriptyInitHelpCenter();
            }
            document.querySelectorAll('textarea').forEach(growTextarea);
            document.querySelectorAll('input[type="text"]').forEach(autoGrowInput);
            document.querySelectorAll('.scene-blocks, #table-blocks').forEach(function(container) {
                if (window.scriptyInitBlockDragDrop) {
                    window.scriptyInitBlockDragDrop(container, { projectId: resolveProjectId() });
                }
                if (window.scriptyUpdateMoveButtonStates) {
                    window.scriptyUpdateMoveButtonStates(container);
                }
            });
            if (window.scriptyUpdateLastEditedTimes) window.scriptyUpdateLastEditedTimes();
            if (window.scriptyRestoreEditorPosition) window.scriptyRestoreEditorPosition();
            if (window.scriptySyncProjectNameDisplay) {
                window.scriptySyncProjectNameDisplay();
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAll);
        } else {
            // Defer so script tags below this IIFE can register window.scriptyInit* first.
            setTimeout(initAll, 0);
        }

        // Run on HTMX content swaps
        document.body.addEventListener('htmx:afterSwap', initAll);
        document.body.addEventListener('htmx:afterSettle', function(e) {
            if (window.scriptySyncBodyPageClasses) window.scriptySyncBodyPageClasses();
            if (window.scriptySyncStylesheetVersion) window.scriptySyncStylesheetVersion();
            if (window.scriptyUpdateLastEditedTimes) window.scriptyUpdateLastEditedTimes();
            window.scriptyInitProjectPageScripts();
            requestAnimationFrame(focusBlockTextareaFromClick);
            var path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
            if (path.indexOf('/block/editInline') !== -1 &&
                document.documentElement.classList.contains('scripty-hide-block-select') &&
                !window.scriptyBlockEditLocked) {
                var swapTarget = e.detail.target;
                var editTextarea = swapTarget && swapTarget.querySelector
                    ? swapTarget.querySelector('.block-content textarea[name="content"]')
                    : null;
                if (editTextarea && !window.scriptyPendingBlockCaret) {
                    syncBlockTextLayout(editTextarea);
                    editTextarea.focus({ preventScroll: true });
                    var len = editTextarea.value.length;
                    editTextarea.setSelectionRange(len, len);
                }
            }
        });

        document.body.addEventListener('htmx:afterRequest', function(e) {
            if (!e.detail.successful) return;
            const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
            if (path.indexOf('/block/') !== -1 || path.indexOf('/project/undo') !== -1 || path.indexOf('/project/redo') !== -1) {
                window.scriptyUpdateUndoRedoButtons(resolveProjectId());
            }
        });

        // Dynamic adjustment as the user types
        document.addEventListener('input', function(e) {
            if (e.target) {
                if (e.target.tagName === 'TEXTAREA') {
                    growTextarea(e.target);
                } else if (e.target.tagName === 'INPUT' && e.target.type === 'text') {
                    autoGrowInput(e.target);
                }
            }
        });

        document.addEventListener('focusin', function(e) {
            if (e.target && e.target.tagName === 'TEXTAREA' && e.target.name === 'content') {
                syncBlockTextLayout(e.target);
            }
        });

        document.addEventListener('focusout', function(e) {
            if (e.target && e.target.tagName === 'TEXTAREA' && e.target.name === 'content') {
                syncBlockTextLayout(e.target);
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                if (window.location.pathname.indexOf('/project/show') === 0 &&
                    window.scriptySaveEditorPosition) {
                    window.scriptySaveEditorPosition();
                }
                commitOpenBlockEdits();
            }
        });

    })();
    </script>

    <div th:fragment="helpDropdown(currentPage)" class="nav-dropdown help-dropdown" id="help-dropdown">
        <button class="nav-dropdown-toggle help-toggle-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Help" title="Help"
                th:aria-current="${currentPage == 'help' or currentPage == 'shortcuts'} ? 'page'">
            <svg class="help-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <span class="help-toggle-label">Help</span>
        </button>
        <div class="nav-dropdown-menu help-dropdown-menu" role="menu" aria-label="Help">
            <div class="help-feature-search" role="search">
                <input type="search"
                       id="help-feature-search"
                       class="help-feature-search-input"
                       placeholder="Search features…"
                       aria-label="Search features"
                       autocomplete="off"
                       spellcheck="false">
                <div id="help-feature-search-results" class="help-feature-search-results" hidden></div>
                <p id="help-feature-search-empty" class="help-feature-search-empty muted" hidden>No matching features</p>
            </div>
            <hr class="nav-dropdown-divider">
            <a class="nav-dropdown-item" th:href="@{/help}" th:classappend="${currentPage == 'help'} ? 'active'">Scripty Help</a>
            <a class="nav-dropdown-item" th:href="@{/shortcuts}" th:classappend="${currentPage == 'shortcuts'} ? 'active'">Keyboard Shortcuts</a>
            <button type="button" class="nav-dropdown-item" data-scripty-install-app hidden>Install App</button>
        </div>
