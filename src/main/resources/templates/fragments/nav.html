    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme') || 'system';
            document.documentElement.setAttribute('data-theme-setting', storedTheme);
            if (storedTheme === 'dark') {
                document.documentElement.classList.add('-dark-theme');
            } else if (storedTheme === 'light') {
                document.documentElement.classList.add('-no-dark-theme');
            }
            
            const spellcheckEnabled = localStorage.getItem('spellcheck') !== 'false';
            document.documentElement.setAttribute('data-spellcheck', spellcheckEnabled ? 'true' : 'false');

            const href = window.location.href || '';
            if (window.location.protocol === 'safari-reader:' || href.indexOf('about:reader') === 0) {
                document.documentElement.classList.add('safari-reader-view');
            }
        })();
    </script>

    <div id="project-delete-modal" class="confirm-modal" hidden aria-modal="true" role="dialog" aria-labelledby="project-delete-title">
        <div class="confirm-modal-panel">
            <h2 id="project-delete-title">Delete project?</h2>
            <p>Are you sure you want to delete <strong id="project-delete-name"></strong>? This cannot be undone.</p>
            <div class="confirm-modal-actions">
                <button type="button" id="project-delete-cancel">Cancel</button>
                <button type="button" id="project-delete-confirm" class="bad">Delete</button>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
    (function() {
        let lastFocusedEditable = null;
        let hoveredRow = null;
        let lastActiveBlockRow = null;
        if (typeof window.scriptyBlockEditLocked === 'undefined') {
            window.scriptyBlockEditLocked = false;
        }
        if (typeof window.scriptyCanEditScript === 'undefined') {
            window.scriptyCanEditScript = true;
        }

        // Spellcheck state management
        function isSpellcheckEnabled() {
            return localStorage.getItem('spellcheck') !== 'false';
        }

        function updateSpellcheckToggleButton(state) {
            const btn = document.querySelector('.spellcheck-toggle-btn');
            if (!btn) return;
            const title = state ? 'Spellcheck: Enabled (click to disable)' : 'Spellcheck: Disabled (click to enable)';
            btn.title = title;
            btn.setAttribute('aria-label', title);
            btn.setAttribute('aria-pressed', state ? 'true' : 'false');
        }

        function applySpellcheckToElement(el, state) {
            if (!(el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && el.type === 'text'))) {
                return;
            }
            // Set both attribute and property — browsers differ on which they honor for rechecks.
            el.setAttribute('spellcheck', state ? 'true' : 'false');
            el.spellcheck = !!state;
        }

        // Chrome often keeps old underlines until the field is remounted after a toggle.
        function remountSpellcheckField(el, state) {
            if (!el || !el.parentNode) return el;
            const wasFocused = document.activeElement === el;
            const start = wasFocused ? el.selectionStart : null;
            const end = wasFocused ? el.selectionEnd : null;
            const clone = el.cloneNode(true);
            applySpellcheckToElement(clone, state);
            if (el.tagName === 'TEXTAREA') {
                clone.value = el.value;
            }
            // Blur during replaceChild would otherwise fire focusout → HTMX save.
            window.scriptySuppressSpellcheckRemountSave = true;
            try {
                el.parentNode.replaceChild(clone, el);
                if (wasFocused) {
                    clone.focus();
                    try {
                        if (start != null && end != null && typeof clone.setSelectionRange === 'function') {
                            clone.setSelectionRange(start, end);
                        }
                    } catch (err) { /* ignore */ }
                    if (typeof window.scriptyGrowTextarea === 'function') {
                        window.scriptyGrowTextarea(clone);
                    } else if (clone.tagName === 'TEXTAREA') {
                        clone.style.height = 'auto';
                        clone.style.height = clone.scrollHeight + 'px';
                    }
                }
            } finally {
                setTimeout(function() {
                    window.scriptySuppressSpellcheckRemountSave = false;
                }, 0);
            }
            return clone;
        }

        function updateAllSpellcheckElements(options) {
            const state = isSpellcheckEnabled();
            const remountFocused = !!(options && options.remountFocused);
            const active = document.activeElement;
            document.querySelectorAll('textarea, input[type="text"]').forEach(el => {
                if (remountFocused && el === active) {
                    remountSpellcheckField(el, state);
                } else {
                    applySpellcheckToElement(el, state);
                }
            });
            return state;
        }

        window.scriptyIsSpellcheckEnabled = isSpellcheckEnabled;
        window.scriptyApplySpellcheck = applySpellcheckToElement;
        window.scriptyUpdateAllSpellcheckElements = updateAllSpellcheckElements;

        window.toggleSpellcheck = function() {
            const newState = !isSpellcheckEnabled();
            localStorage.setItem('spellcheck', newState ? 'true' : 'false');
            document.documentElement.setAttribute('data-spellcheck', newState ? 'true' : 'false');
            // Remount the focused field so underlines appear/clear immediately.
            updateAllSpellcheckElements({ remountFocused: true });
            updateSpellcheckToggleButton(newState);
        };

        function initSpellcheck() {
            const state = isSpellcheckEnabled();
            updateAllSpellcheckElements();
            updateSpellcheckToggleButton(state);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSpellcheck);
        } else {
            initSpellcheck();
        }

        // Apply after HTMX swaps (afterOnLoad alone misses some local/offline paths)
        function syncSpellcheckAfterHtmx() {
            updateAllSpellcheckElements();
        }
        document.body.addEventListener('htmx:afterOnLoad', syncSpellcheckAfterHtmx);
        document.body.addEventListener('htmx:afterSwap', syncSpellcheckAfterHtmx);
        document.body.addEventListener('htmx:afterSettle', syncSpellcheckAfterHtmx);

        function rememberActiveBlockRow(row) {
            if (row && row.hasAttribute('data-block-id')) {
                lastActiveBlockRow = row;
            }
        }

        function clearActiveBlockMemory() {
            lastActiveBlockRow = null;
            try {
                sessionStorage.removeItem('activeBlockId');
                sessionStorage.removeItem('activeBlockCaretStart');
                sessionStorage.removeItem('activeBlockCaretEnd');
            } catch (err) { /* ignore */ }
            if (window.scriptyClearBlockCaretPreview) {
                window.scriptyClearBlockCaretPreview();
            }
        }

        // Track last focused input/textarea
        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'textarea'))) {
                lastFocusedEditable = e.target;
                window.scriptyLastFocusedEditable = e.target;
                var savedRow = findBlockRow(e.target);
                if (savedRow) {
                    rememberActiveBlockRow(savedRow);
                } else if (findAnyBlockRow(e.target) && !e.target.closest('[data-block-id]')) {
                    // Focused the trailing create row — don't keep a stale saved block active.
                    clearActiveBlockMemory();
                }
                var row = findAnyBlockRow(e.target);
                if (row && window.scriptySyncElementTypeToolbar) {
                    window.scriptySyncElementTypeToolbar(row.getAttribute('data-block-type'));
                }
            }
        });

        // Track hovered block row for fallback only — do not promote hover to
        // "active", or moving the pointer to the element toolbar retargets type changes.
        document.addEventListener('mouseover', function(e) {
            hoveredRow = findBlockRow(e.target);
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('.bulk-type-btn, .bulk-align-btn, .bulk-style-btn, .project-script-toolbar')) {
                return;
            }
            rememberActiveBlockRow(findBlockRow(e.target));
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('a, button, input, textarea, select')) return;
            const createBlockContent = e.target.closest('.project-script .block-row:not([data-block-id]) .block-content');
            if (!createBlockContent) return;
            const textarea = createBlockContent.querySelector('textarea[name="content"]');
            if (textarea) {
                textarea.focus({ preventScroll: true });
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter' || e.shiftKey || e.repeat) return;
            const textarea = e.target;
            if (!isBlockContentTextarea(textarea)) return;
            if (isCreateBlockTextarea(textarea)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                submitCreateRowFromEnter(textarea);
                return;
            }
            const form = textarea.closest('form[hx-post*="/block/editInline"]');
            if (!form) return;
            e.preventDefault();
            e.stopImmediatePropagation();
            saveBlockThenOpenCreateBelow(form);
        });

        // Move blocks up/down keyboard shortcut
        document.addEventListener('keydown', function(e) {
            const isMoveUp = (e.altKey && e.key === 'ArrowUp') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowUp');
            const isMoveDown = (e.altKey && e.key === 'ArrowDown') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowDown');
            
            if (!isMoveUp && !isMoveDown) return;

            const activeEl = document.activeElement;
            if (isEditable(activeEl) && !e.altKey) return;
            
            let targetRow = activeEl ? findBlockRow(activeEl) : null;
            if (!targetRow) {
                targetRow = hoveredRow;
            }
            
            if (!targetRow) return;
            
            e.preventDefault();
            moveBlockRow(targetRow, isMoveUp ? 'moveUp' : 'moveDown');
        });

        document.addEventListener('click', function(e) {
            const markerLink = e.target.closest('a.block-action-pin[href*="togglePinned"], a.block-action-bookmark[href*="toggleBookmark"]');
            if (!markerLink) return;
            if (markerLink.getAttribute('hx-boost') === 'false') {
                return;
            }
            e.preventDefault();
            window.location.href = markerLink.href;
        });

        document.addEventListener('click', function(e) {
            const moveUpBtn = e.target.closest('.block-move-up, .move-up[role="button"]');
            const moveDownBtn = e.target.closest('.block-move-down, .move-down[role="button"]');
            if (!moveUpBtn && !moveDownBtn) return;
            e.preventDefault();
            const targetRow = findBlockRow(moveUpBtn || moveDownBtn);
            if (!targetRow) return;
            moveBlockRow(targetRow, moveUpBtn ? 'moveUp' : 'moveDown');
        });

        function isEditable(el) {
            if (!el) return false;
            const tagName = el.tagName;
            return tagName === 'TEXTAREA' ||
                   (tagName === 'INPUT' && ['text', 'search', 'url', 'tel', 'email', 'password', 'number'].includes(el.type)) ||
                   el.isContentEditable;
        }

        function isCreateBlockTextarea(el) {
            if (!el || el.tagName !== 'TEXTAREA') return false;
            const row = findAnyBlockRow(el);
            return !!row && !row.hasAttribute('data-block-id');
        }

        function isBlockContentTextarea(el) {
            return !!el && el.tagName === 'TEXTAREA' && el.name === 'content' && !!el.closest('.block-content');
        }

        function isEmptyAtStart(textarea) {
            return textarea.value.trim() === '' &&
                   textarea.selectionStart === textarea.selectionEnd;
        }

        window.scriptyBeginBlockTypeChangeWait = function() {
            window.scriptyBlockTypeChangePending = true;
            if (!window.scriptyBlockTypeChangePromise) {
                window.scriptyBlockTypeChangePromise = new Promise(function(resolve) {
                    window.scriptyBlockTypeChangeResolve = resolve;
                });
            }
        };

        window.scriptyFinishBlockTypeChangeWait = function() {
            window.scriptyBlockTypeChangePending = false;
            if (window.scriptyBlockTypeChangeResolve) {
                window.scriptyBlockTypeChangeResolve();
                window.scriptyBlockTypeChangeResolve = null;
                window.scriptyBlockTypeChangePromise = null;
            }
        };

        function waitForBlockTypeChange() {
            if (!window.scriptyBlockTypeChangePending) {
                return Promise.resolve();
            }
            return window.scriptyBlockTypeChangePromise || Promise.resolve();
        }

        function resolveLiveEditForm(form) {
            if (!form) return null;
            const row = form.closest('[data-block-id]');
            if (!row || !row.isConnected) return null;
            return row.querySelector('.block-content form[hx-post*="/block/editInline"]') || form;
        }

        function closeBlockEdit(form, done) {
            if (!form) {
                if (done) done();
                return;
            }
            if (form.dataset.committing === 'true') {
                if (done) done();
                return;
            }
            waitForBlockTypeChange().then(function() {
                const liveForm = resolveLiveEditForm(form);
                if (!liveForm) {
                    if (done) done();
                    return;
                }
                if (liveForm.dataset.committing === 'true') {
                    if (done) done();
                    return;
                }
                const textarea = liveForm.querySelector('textarea[name="content"]');
                if (!textarea) {
                    if (done) done();
                    return;
                }
                if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptySaveBlockEditOffline) {
                    window.scriptySaveBlockEditOffline(liveForm, done);
                    return;
                }
                liveForm.dataset.committing = 'true';
                const formData = new FormData(liveForm);
                const url = liveForm.getAttribute('hx-post') || '/block/editInline';
                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(formData).toString()
                }).then(function(response) {
                    return response.text();
                }).then(function(html) {
                    const target = liveForm.closest('.block-content');
                    if (target && target.isConnected) {
                        target.innerHTML = html;
                    }
                }).catch(function() {
                    /* keep edit form if save fails */
                }).finally(function() {
                    delete liveForm.dataset.committing;
                    if (done) done();
                });
            });
        }

        function flushOpenBlockEdits(done, blockIds) {
            waitForBlockTypeChange().then(function() {
                var forms = Array.from(document.querySelectorAll(
                    '.block-content form[hx-post*="/block/editInline"]'
                ));
                if (blockIds && blockIds.length > 0) {
                    var idSet = {};
                    blockIds.forEach(function(id) { idSet[String(id)] = true; });
                    forms = forms.filter(function(form) {
                        var row = form.closest('[data-block-id]');
                        return row && idSet[row.getAttribute('data-block-id')];
                    });
                }
                if (forms.length === 0) {
                    if (done) done();
                    return;
                }
                var remaining = forms.length;
                function finishOne() {
                    remaining--;
                    if (remaining <= 0 && done) done();
                }
                forms.forEach(function(form) {
                    var textarea = form.querySelector('textarea[name="content"]');
                    if (!textarea || textarea.value.trim() === '') {
                        revertEmptySavedBlockEdit(form);
                        finishOne();
                        return;
                    }
                    closeBlockEdit(form, finishOne);
                });
            });
        }

        function handleEmptyBlockBackspace(ta) {
            // Keep the row and stay in the field; only block default browser/history behavior.
            ta.focus({ preventScroll: true });
        }

        function revertEmptySavedBlockEdit(form) {
            if (!form || form.dataset.reverting === 'true') return;
            const row = form.closest('[data-block-id]');
            const blockContent = form.closest('.block-content');
            if (!row || !blockContent) return;
            const textarea = form.querySelector('textarea[name="content"]');
            if (!textarea || textarea.value.trim() !== '') return;

            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyRevertBlockEditOffline) {
                form.dataset.reverting = 'true';
                window.scriptyRevertBlockEditOffline(form).finally(function() {
                    delete form.dataset.reverting;
                });
                return;
            }

            form.dataset.reverting = 'true';
            const blockId = row.getAttribute('data-block-id');
            fetch('/block/showInline?id=' + encodeURIComponent(blockId), {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (blockContent.isConnected) {
                    blockContent.innerHTML = html;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(blockContent);
                    }
                }
            }).catch(function() {
                /* keep edit form if revert fails */
            }).finally(function() {
                delete form.dataset.reverting;
            });
        }

        function focusBlockContentEnd(row) {
            if (!row) return;
            const blockContent = row.querySelector('.block-content');
            if (!blockContent) return;
            const existingTa = blockContent.querySelector('textarea[name="content"]');
            if (existingTa) {
                growTextarea(existingTa);
                existingTa.focus({ preventScroll: true });
                const len = existingTa.value.length;
                existingTa.setSelectionRange(len, len);
                return;
            }
            pendingBlockCaret = {
                blockContent: blockContent,
                offset: blockContent.querySelector('.script-block-text')?.textContent?.length || 0
            };
            blockContent.click();
            requestAnimationFrame(function() {
                requestAnimationFrame(focusBlockTextareaFromClick);
            });
        }

        function editSavedBlockRow(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            const blockContent = row.querySelector('.block-content');
            const blockId = row.getAttribute('data-block-id');
            if (!blockContent || !blockId) return;
            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyOpenBlockEditOffline) {
                window.scriptyOpenBlockEditOffline(blockContent);
                focusBlockContentEnd(row);
                return;
            }
            fetch('/block/editInline?id=' + encodeURIComponent(blockId), {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (!blockContent.isConnected) return;
                blockContent.innerHTML = html;

        function removeEmptyCreateRow(row) {
            if (!row || row.hasAttribute('data-block-id')) return false;
            const container = row.closest('.scene-blocks, #table-blocks, tbody');
            if (!container) return false;
            const rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            const savedBlocks = container.querySelectorAll(rowSelector + '[data-block-id]').length;
            if (savedBlocks === 0 && container.querySelectorAll(rowSelector).length <= 1) return false;
            row.remove();
            return true;
        }

        function isCreateBlockRow(row) {
            return !!(row &&
                !row.hasAttribute('data-block-id') &&
                !row.classList.contains('project-script-select-row') &&
                (row.classList.contains('block-row') || row.tagName === 'TR'));

        function createRowHasContent(row) {
            if (!row) return false;
            const ta = row.querySelector('textarea[name="content"]');
            return !!(ta && ta.value.trim() !== '');
        }

        function dedupeTrailingCreateRows(container) {
            if (!container) return;
            const rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            const rows = Array.from(container.querySelectorAll(rowSelector));
            // Only collapse empty create rows at the end of the scene — never remove a
            // create row inserted mid-list by the "+" button.
            const trailing = [];
            for (let i = rows.length - 1; i >= 0; i--) {
                if (!isCreateBlockRow(rows[i])) break;
                trailing.unshift(rows[i]);
            }
            if (trailing.length <= 1) return;
            const withContent = trailing.filter(createRowHasContent);
            if (withContent.length > 0) {
                trailing.forEach(function(row) {
                    if (!createRowHasContent(row)) row.remove();
                });
                return;
            }
            trailing.slice(0, -1).forEach(function(row) {
                row.remove();
            });
        }

        function initBlockEditGuards() {
            if (window._scriptyBlockEditGuardsInit) return;
            window._scriptyBlockEditGuardsInit = true;

            // "+" opens an element-type menu; selecting a type creates/focuses a row.
            document.addEventListener('click', function(e) {
                const songItem = e.target.closest('[data-insert-song-id]');
                if (songItem && songItem.closest('.create-below-menu')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const row = songItem.closest('.block-row, tr');
                    const songId = songItem.getAttribute('data-insert-song-id');
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    insertDocumentBelowBlock(row, songId, {
                        offlineMessage: 'Connect to insert a song into the script.'
                    });
                    return;
                }

                const draftItem = e.target.closest('[data-insert-draft-id]');
                if (draftItem && draftItem.closest('.create-below-menu')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const row = draftItem.closest('.block-row, tr');
                    const draftId = draftItem.getAttribute('data-insert-draft-id');
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    insertDocumentBelowBlock(row, draftId, {
                        asType: 'NOTE',
                        offlineMessage: 'Connect to insert a draft into the script.'
                    });
                    return;
                }

                const typeItem = e.target.closest('[data-create-type]');
                if (typeItem && typeItem.closest('.create-below-menu')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const row = typeItem.closest('.block-row, tr');
                    const type = typeItem.getAttribute('data-create-type');
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    createBlockWithType(row, type);
                    return;
                }

                const toggle = e.target.closest('.create-below-menu-toggle');
                if (toggle) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const dropdown = toggle.closest('.create-below-menu-dropdown');
                    if (!dropdown) return;
                    const isOpen = dropdown.classList.contains('open');
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    if (!isOpen) {
                        populateCreateBelowSongs(dropdown);
                        populateCreateBelowDrafts(dropdown);
                        dropdown.classList.add('open');
                        toggle.setAttribute('aria-expanded', 'true');
                    }
                    return;
                }

                // Legacy plain "+" link (offline / older markup)
                const link = e.target.closest('a.create-below');
                if (!link || link.classList.contains('create-below-menu-toggle')) return;
                const row = link.closest('.block-row, tr');
                if (!row) return;

                e.preventDefault();
                e.stopImmediatePropagation();

                if (isCreateBlockRow(row)) {
                    const ta = row.querySelector('textarea[name="content"]');
                    if (ta) {
                        submitCreateRowFromEnter(ta);
                    }
                    return;
                }

                if (!row.hasAttribute('data-block-id')) return;

                const nextRow = row.nextElementSibling;
                if (isCreateBlockRow(nextRow)) {
                    focusBlockContentEnd(nextRow);
                    return;

                openCreateBelowRow(row);
            }, true);

            document.body.addEventListener('htmx:configRequest', function(e) {
                if (!document.querySelector('.project-script')) return;
                const path = e.detail.path || '';
                if (path.indexOf('/block/createInline') === -1 &&
                    path.indexOf('/block/createBelowInline') === -1) {
                    return;

                e.detail.parameters = e.detail.parameters || {};
                e.detail.parameters.surface = 'project';
                if (path.indexOf('surface=') === -1) {
                    e.detail.path = ensureProjectCreateUrl(path);

            document.body.addEventListener('htmx:beforeRequest', function(e) {
                const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                if (window.scriptySuppressSpellcheckRemountSave &&
                    path.indexOf('/block/editInline') !== -1 &&

            document.body.addEventListener('htmx:beforeRequest', function(e) {

                if (!elt || elt.tagName !== 'FORM') return;
                const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                const textarea = elt.querySelector('textarea[name="content"]');
                if (!textarea || textarea.value.trim() !== '') return;

                if (path.indexOf('/block/editInline') !== -1 ||
                    path.indexOf('/block/createInline') !== -1 ||
                    path.indexOf('/block/createBelowInline') !== -1) {
                    e.preventDefault();

            document.body.addEventListener('htmx:beforeRequest', function(e) {
                const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                if (path.indexOf('/block/editInline') === -1) return;
                if (window.scriptyBlockEditLocked) {
                    e.preventDefault();

                }
                if (e.detail.verb !== 'get') return;
                if (window.scriptySuppressBlockEditClick) {
                    e.preventDefault();

            document.addEventListener('focusin', function(e) {
                document.querySelectorAll('.block-content form[hx-post*="/block/editInline"]').forEach(function(form) {
                    if (form.contains(e.target)) return;

                if (!isBlockContentTextarea(ta)) return;
                const form = ta.closest('form[hx-post*="/block/editInline"]');
                if (!form || ta.value.trim() !== '') return;
                setTimeout(function() {
                    if (form.contains(document.activeElement)) return;
                    revertEmptySavedBlockEdit(form);
                }, 0);
            });

        function normalizeBlockDisplayText(text) {

        function initBlockTextSelection() {
            if (window._scriptyBlockTextSelectionInit) return;
            window._scriptyBlockTextSelectionInit = true;

            const DRAG_THRESHOLD = 4;
            let pointerState = null;
            let cachedBlockSelectionMenu = null;
            let deferredBlockEditTimer = null;

            function cancelDeferredBlockEdit() {
                if (deferredBlockEditTimer) {
                    clearTimeout(deferredBlockEditTimer);
                    deferredBlockEditTimer = null;
                }
            }

            function scheduleDeferredBlockEdit(fn) {
                cancelDeferredBlockEdit();
                deferredBlockEditTimer = setTimeout(function() {
                    deferredBlockEditTimer = null;
                    if (hasActiveBlockTextSelection()) return;
                    if (window.scriptyBlockEditLocked) return;
                    fn();
                }, 250);
            }

            function isSelectableTextTarget(target) {
                return !!(target && target.closest(
                    '.reader-visible-text, .script-block-text:not(textarea), .reader-visible-character-name, .character-name'
                ));
            }

            function getBlockRangeExpandNodes(blockContent) {
                return getBlockSelectableTextNodes(blockContent);
            }

            function clearSuppressFlag() {
                window.scriptySuppressBlockEditClick = false;
                window.scriptyBlockTextSelectionClickSuppress = false;
            }

            function markBlockTextSelectionComplete() {
                window.scriptySuppressBlockEditClick = true;
                window.scriptyBlockTextSelectionClickSuppress = true;
            }

            function setBlockTextSelecting(active) {
                document.documentElement.classList.toggle('scripty-block-text-selecting', !!active);
            }

            function shouldShowBlockSelectionMenu(data) {
                if (!data || !data.mutations || !data.mutations.length) return false;
                if (data.isCrossBlock || data.hasCut) return true;
                return !!(data.copyText && data.copyText.length > 0);
            }

            function cacheBlockSelectionMenuData(pointerX, pointerY) {
                cachedBlockSelectionMenu = null;
                if (!shouldHandleBlockTextClipboard()) return null;

                const data = getCrossBlockSelectionData();
                if (!shouldShowBlockSelectionMenu(data)) return null;

                cachedBlockSelectionMenu = {
                    data: data,
                    pointerX: pointerX,
                    pointerY: pointerY
                };
                return cachedBlockSelectionMenu;
            }

            function finishBlockTextSelection(state, pointerX, pointerY) {
                if (state && state.moved && state.anchor) {
                    finalizeDragSelection(state, pointerX, pointerY);
                } else {
                    expandSelectionAcrossBlocks();
                }
                if (!cacheBlockSelectionMenuData(pointerX, pointerY)) return false;
                markBlockTextSelectionComplete();
                return true;
            }

            function showBlockSelectionContextMenu(pointerX, pointerY) {
                const selection = window.getSelection && window.getSelection();
                if (pointerX != null) {
                    const needsCaret = !selection || !selection.rangeCount || selection.isCollapsed;
                    if (needsCaret) {
                        const point = getSelectablePointAt(pointerX, pointerY);
                        if (point && point.textEl) {
                            setCollapsedSelectionAt(point.textEl, point.offset);
                        }
                    }
                }
                expandSelectionAcrossBlocks();
                updateBlockTextEditability();
                cacheBlockSelectionMenuData(pointerX, pointerY);
                if (!cachedBlockSelectionMenu) {
                    cachedBlockSelectionMenu = {
                        data: getCrossBlockSelectionData(),
                        pointerX: pointerX,
                        pointerY: pointerY
                    };
                }
                markBlockTextSelectionComplete();
                scheduleBlockSelectionMenu(pointerX, pointerY, true);
                return true;
            }

            function hasActiveBlockTextSelection() {
                const selection = window.getSelection && window.getSelection();
                return !!(selection && !selection.isCollapsed &&
                    (selection.toString() || '').length > 0);
            }

            function normalizeSelectableText(text) {
                return normalizeBlockDisplayText(text);
            }

            function getRowForRangePoint(node) {
                if (!node) return null;
                let el = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
                while (el) {
                    if (el.matches && el.matches('.block-row[data-block-id], tr[data-block-id]')) {
                        return el;
                    }
                    el = el.parentElement;
                }
                return null;
            }

            function getBlockContentTextNodes(blockContent) {
                if (!blockContent) return [];
                const textEl = blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
                return textEl ? [textEl] : [];
            }

            function getBlockSelectableTextNodes(blockContent) {
                if (!blockContent) return [];
                const nodes = [];
                const charName = blockContent.querySelector('.reader-visible-character-name, .character-name');
                if (charName) nodes.push(charName);
                const textEl = blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
                if (textEl) nodes.push(textEl);
                return nodes;
            }

            function rangeIntersectsNode(range, node) {
                if (!range || !node) return false;
                const nodeRange = document.createRange();
                try {
                    nodeRange.selectNodeContents(node);
                } catch (_err) {
                    return false;
                }
                return range.compareBoundaryPoints(Range.END_TO_START, nodeRange) < 0 &&
                    range.compareBoundaryPoints(Range.START_TO_END, nodeRange) > 0;
            }

            function getSelectedTextInNode(range, node) {
                if (!range || !node) return '';
                const nodeRange = document.createRange();
                nodeRange.selectNodeContents(node);
                if (range.compareBoundaryPoints(Range.START_TO_START, nodeRange) <= 0 &&
                    range.compareBoundaryPoints(Range.END_TO_END, nodeRange) >= 0) {
                    return normalizeSelectableText(node.textContent || '');
                }
                const intersection = document.createRange();
                if (range.compareBoundaryPoints(Range.START_TO_START, nodeRange) < 0) {
                    intersection.setStart(nodeRange.startContainer, nodeRange.startOffset);
                } else {
                    intersection.setStart(range.startContainer, range.startOffset);
                }
                if (range.compareBoundaryPoints(Range.END_TO_END, nodeRange) > 0) {
                    intersection.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                } else {
                    intersection.setEnd(range.endContainer, range.endOffset);
                }
                return normalizeSelectableText(intersection.toString());
            }

            function expandSelectionAcrossBlocks() {
                const selection = window.getSelection && window.getSelection();
                if (!selection || selection.isCollapsed || !selection.rangeCount) return;

                const range = selection.getRangeAt(0);
                const startRow = getRowForRangePoint(range.startContainer);
                const endRow = getRowForRangePoint(range.endContainer);
                if (!startRow || !endRow || startRow === endRow) return;

                const rows = Array.from(document.querySelectorAll('.block-row[data-block-id], tr[data-block-id]'));
                const startIdx = rows.indexOf(startRow);
                const endIdx = rows.indexOf(endRow);
                if (startIdx === -1 || endIdx === -1) return;

                const from = Math.min(startIdx, endIdx);
                const to = Math.max(startIdx, endIdx);
                const newRange = document.createRange();
                newRange.setStart(range.startContainer, range.startOffset);
                newRange.setEnd(range.endContainer, range.endOffset);

                for (let i = from; i <= to; i++) {
                    const content = rows[i].querySelector('.block-content');
                    if (!content) continue;
                    const isMiddleRow = to > from && i > from && i < to;
                    getBlockRangeExpandNodes(content).forEach(function(node) {
                        try {
                            const nodeRange = document.createRange();
                            nodeRange.selectNodeContents(node);
                            if (isMiddleRow) {
                                if (newRange.compareBoundaryPoints(Range.START_TO_START, nodeRange) > 0) {
                                    newRange.setStart(nodeRange.startContainer, nodeRange.startOffset);
                                }
                                if (newRange.compareBoundaryPoints(Range.END_TO_END, nodeRange) < 0) {
                                    newRange.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                                }
                                return;
                            }
                            if (rangeIntersectsNode(newRange, node)) return;
                            if (newRange.compareBoundaryPoints(Range.START_TO_START, nodeRange) > 0) {
                                newRange.setStart(nodeRange.startContainer, nodeRange.startOffset);
                            }
                            if (newRange.compareBoundaryPoints(Range.END_TO_END, nodeRange) < 0) {
                                newRange.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                            }
                        } catch (_err) {}
                    });
                }

                selection.removeAllRanges();
                selection.addRange(newRange);
            }

            function getBlockContentAtPoint(clientX, clientY) {
                const el = document.elementFromPoint(clientX, clientY);
                let blockContent = el ? el.closest('.block-content') : null;
                if (blockContent) return blockContent;

                let fallback = null;
                document.querySelectorAll('.block-row[data-block-id], tr[data-block-id]').forEach(function(row) {
                    const rect = row.getBoundingClientRect();
                    if (clientY >= rect.top && clientY <= rect.bottom) {
                        fallback = row.querySelector('.block-content');
                    }
                });
                return fallback;
            }

            function getSelectablePointAt(clientX, clientY) {
                const blockContent = getBlockContentAtPoint(clientX, clientY);
                if (!blockContent) return null;

                const row = blockContent.closest('.block-row[data-block-id], tr[data-block-id]');
                const clickOffset = getBlockTextClickOffset(blockContent, clientX, clientY);
                if (!clickOffset.textEl) return null;

                return {
                    row: row,
                    blockContent: blockContent,
                    textEl: clickOffset.textEl,
                    offset: clickOffset.offset
                };
            }

            function setRangeBoundary(range, textEl, offset, boundary) {
                if (!textEl) return;
                offset = Math.max(0, Math.min(offset, textEl.textContent.length));
                const walker = document.createTreeWalker(textEl, NodeFilter.SHOW_TEXT);
                let remaining = offset;
                let node;
                let positioned = false;

                while ((node = walker.nextNode())) {
                    const len = node.textContent.length;
                    if (remaining <= len) {
                        if (boundary === 'start') {
                            range.setStart(node, remaining);
                        } else {
                            range.setEnd(node, remaining);
                        }
                        positioned = true;
                        break;
                    }
                    remaining -= len;
                }

                if (!positioned) {
                    if (boundary === 'start') {
                        range.setStart(textEl, 0);
                    } else {
                        range.setEnd(textEl, textEl.childNodes.length);
                    }
                }
            }

            function expandRangeAcrossRows(range, fromIdx, toIdx, rows) {
                for (let i = fromIdx; i <= toIdx; i++) {
                    const content = rows[i].querySelector('.block-content');
                    if (!content) continue;
                    const isMiddleRow = toIdx > fromIdx && i > fromIdx && i < toIdx;
                    getBlockRangeExpandNodes(content).forEach(function(node) {
                        try {
                            const nodeRange = document.createRange();
                            nodeRange.selectNodeContents(node);
                            if (isMiddleRow) {
                                if (range.compareBoundaryPoints(Range.START_TO_START, nodeRange) > 0) {
                                    range.setStart(nodeRange.startContainer, nodeRange.startOffset);
                                }
                                if (range.compareBoundaryPoints(Range.END_TO_END, nodeRange) < 0) {
                                    range.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                                }
                                return;
                            }
                            if (rangeIntersectsNode(range, node)) return;
                            if (range.compareBoundaryPoints(Range.START_TO_START, nodeRange) > 0) {
                                range.setStart(nodeRange.startContainer, nodeRange.startOffset);
                            }
                            if (range.compareBoundaryPoints(Range.END_TO_END, nodeRange) < 0) {
                                range.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                            }
                        } catch (_err) {}
                    });
                }
            }

            function applyCrossBlockSelectionBetween(anchor, focus) {
                if (!anchor || !focus || !anchor.textEl || !focus.textEl || !anchor.row || !focus.row) {
                    return false;
                }

                const selection = window.getSelection && window.getSelection();
                if (!selection) return false;

                const rows = Array.from(document.querySelectorAll('.block-row[data-block-id], tr[data-block-id]'));
                const anchorIdx = rows.indexOf(anchor.row);
                const focusIdx = rows.indexOf(focus.row);
                if (anchorIdx === -1 || focusIdx === -1) return false;

                const forward = anchorIdx <= focusIdx;
                const startPoint = forward ? anchor : focus;
                const endPoint = forward ? focus : anchor;
                const range = document.createRange();

                setRangeBoundary(range, startPoint.textEl, startPoint.offset, 'start');
                setRangeBoundary(range, endPoint.textEl, endPoint.offset, 'end');
                expandRangeAcrossRows(range, Math.min(anchorIdx, focusIdx), Math.max(anchorIdx, focusIdx), rows);

                selection.removeAllRanges();
                selection.addRange(range);
                return true;
            }

            function finalizeDragSelection(state, clientX, clientY) {
                const selection = window.getSelection && window.getSelection();
                const existingText = selection ? selection.toString() : '';

                if (!state || !state.anchor) {
                    expandSelectionAcrossBlocks();
                    return;
                }

                const focus = getSelectablePointAt(clientX, clientY);
                if (focus && focus.row === state.anchor.row && existingText) {
                    expandSelectionAcrossBlocks();
                    return;
                }

                if (focus) {
                    if (focus.row === state.anchor.row && focus.offset === state.anchor.offset) {
                        if (existingText) return;
                    }
                    applyCrossBlockSelectionBetween(state.anchor, focus);
                    return;
                }

                if (existingText) {
                    expandSelectionAcrossBlocks();
                    return;
                }
                expandSelectionAcrossBlocks();
            }

            function isNodeFullySelected(range, node) {
                if (!range || !node) return false;
                const nodeRange = document.createRange();
                try {
                    nodeRange.selectNodeContents(node);
                } catch (_err) {
                    return false;
                }
                return range.compareBoundaryPoints(Range.START_TO_START, nodeRange) <= 0 &&
                    range.compareBoundaryPoints(Range.END_TO_END, nodeRange) >= 0;
            }

            function getBlockContentText(blockContent) {
                if (!blockContent) return '';
                const textarea = blockContent.querySelector('textarea[name="content"]');
                if (textarea) return normalizeBlockDisplayText(textarea.value);
                const textEl = blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
                return textEl ? normalizeBlockDisplayText(textEl.textContent) : '';
            }

            function getBlockPersonId(blockContent) {
                if (!blockContent) return '';
                const input = blockContent.querySelector('input[name="personId"]');
                if (input) return input.value || '';
                const charLink = blockContent.querySelector('a.character-name[href*="id="]');
                if (!charLink) return '';
                const match = charLink.getAttribute('href').match(/[?&]id=(\d+)/);
                return match ? match[1] : '';
            }

            const SCRIPTY_BLOCKS_MIME = 'application/x-scripty-blocks+json';
            const SCRIPTY_BLOCKS_EMBED = '\u2063';

            function getBlockRowType(row) {
                return ((row && row.getAttribute('data-block-type')) || 'ACTION').toUpperCase();
            }

            function getBlockCharacterName(blockContent) {
                if (!blockContent) return '';
                const charEl = blockContent.querySelector('.reader-visible-character-name, .character-name');
                return charEl ? charEl.textContent.trim() : '';
            }

            function buildSelectionClipboardBlock(row, blockContent, range, index, from, to) {
                const isMiddleRow = to > from && index > from && index < to;
                let content = '';
                let personId = getBlockPersonId(blockContent) || '';
                let characterName = getBlockCharacterName(blockContent);
                let clearCharacter = false;

                if (isMiddleRow) {
                    content = getBlockContentText(blockContent);
                } else {
                    getBlockSelectableTextNodes(blockContent).forEach(function(node) {
                        const isCharacter = node.classList.contains('reader-visible-character-name') ||
                            node.classList.contains('character-name');
                        if (rangeIntersectsNode(range, node)) {
                            if (isCharacter) {
                                characterName = normalizeSelectableText(node.textContent || '');
                            } else {
                                content = getSelectedTextInNode(range, node);
                            }
                        }
                        if (isCharacter && rangeIntersectsNode(range, node) && isNodeFullySelected(range, node)) {
                            clearCharacter = true;
                        }
                    });
                }

                return {
                    type: getBlockRowType(row),
                    content: content,
                    personId: clearCharacter ? '' : personId,
                    characterName: clearCharacter ? '' : characterName,
                    tags: row.getAttribute('data-tags') || ''
                };
            }

            function serializeScriptyBlocksPayload(blocks) {
                return JSON.stringify({ version: 1, blocks: blocks || [] });
            }

            function parseScriptyBlocksPayload(raw) {
                if (!raw) return null;
                try {
                    const payload = JSON.parse(raw);
                    if (!payload || !Array.isArray(payload.blocks)) return null;
                    return payload.blocks.map(function(block) {
                        return {
                            type: (block.type || 'ACTION').toUpperCase(),
                            content: block.content != null ? block.content : '',
                            personId: block.personId != null ? String(block.personId) : '',
                            characterName: block.characterName != null ? block.characterName : '',
                            tags: block.tags != null ? block.tags : ''
                        };
                    });
                } catch (_err) {
                    return null;
                }
            }

            function embedScriptyBlocksInPlainText(text, blocks) {
                if (!blocks || !blocks.length) return text;
                return text + '\n' + SCRIPTY_BLOCKS_EMBED + serializeScriptyBlocksPayload(blocks) + SCRIPTY_BLOCKS_EMBED;
            }

            function parseEmbeddedScriptyBlocks(text) {
                if (text == null) return { text: '', blocks: null };
                const endMarker = text.lastIndexOf(SCRIPTY_BLOCKS_EMBED);
                if (endMarker === -1) return { text: text, blocks: null };
                const startMarker = text.lastIndexOf(SCRIPTY_BLOCKS_EMBED, endMarker - 1);
                if (startMarker === -1) return { text: text, blocks: null };
                const plain = text.slice(0, startMarker).replace(/\n?$/, '');
                const blocks = parseScriptyBlocksPayload(text.slice(startMarker + 1, endMarker));
                return { text: plain, blocks: blocks };
            }

            function normalizeClipboardPayload(pastePayload, pasteBlocks) {
                if (typeof pastePayload === 'object' && pastePayload !== null) {
                    return {
                        text: pastePayload.text != null ? pastePayload.text : '',
                        blocks: pasteBlocks || pastePayload.blocks || null
                    };
                }
                const embedded = parseEmbeddedScriptyBlocks(pastePayload || '');
                return {
                    text: embedded.text,
                    blocks: pasteBlocks || embedded.blocks
                };
            }

            function getRemainingTextInNode(range, node) {
                if (!range || !node) return normalizeSelectableText(node ? node.textContent : '');
                if (!rangeIntersectsNode(range, node)) {
                    return normalizeSelectableText(node.textContent || '');
                }
                if (isNodeFullySelected(range, node)) {
                    return '';
                }

                const nodeRange = document.createRange();
                nodeRange.selectNodeContents(node);
                let before = '';
                let after = '';

                if (range.compareBoundaryPoints(Range.START_TO_START, nodeRange) > 0) {
                    const beforeRange = document.createRange();
                    beforeRange.setStart(nodeRange.startContainer, nodeRange.startOffset);
                    beforeRange.setEnd(range.startContainer, range.startOffset);
                    before = normalizeSelectableText(beforeRange.toString());
                }
                if (range.compareBoundaryPoints(Range.END_TO_END, nodeRange) < 0) {
                    const afterRange = document.createRange();
                    afterRange.setStart(range.endContainer, range.endOffset);
                    afterRange.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                    after = normalizeSelectableText(afterRange.toString());
                }

                return before + after;
            }

            function getBlockMainTextEl(blockContent) {
                if (!blockContent) return null;
                return blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
            }

            function getTextBeforeRangeInNode(range, node) {
                if (!range || !node) return '';
                const nodeRange = document.createRange();
                nodeRange.selectNodeContents(node);
                if (!rangeIntersectsNode(range, node)) {
                    return normalizeSelectableText(node.textContent || '');
                }
                if (range.compareBoundaryPoints(Range.START_TO_START, nodeRange) <= 0) {
                    return '';
                }
                const beforeRange = document.createRange();
                beforeRange.setStart(nodeRange.startContainer, nodeRange.startOffset);
                beforeRange.setEnd(range.startContainer, range.startOffset);
                return normalizeSelectableText(beforeRange.toString());
            }

            function getTextAfterRangeInNode(range, node) {
                if (!range || !node) return '';
                const nodeRange = document.createRange();
                nodeRange.selectNodeContents(node);
                if (!rangeIntersectsNode(range, node)) {
                    return normalizeSelectableText(node.textContent || '');
                }
                if (range.compareBoundaryPoints(Range.END_TO_END, nodeRange) >= 0) {
                    return '';
                }
                const afterRange = document.createRange();
                afterRange.setStart(range.endContainer, range.endOffset);
                afterRange.setEnd(nodeRange.endContainer, nodeRange.endOffset);
                return normalizeSelectableText(afterRange.toString());
            }

            function getTextOffsetAtRangeStart(range, textEl) {
                if (!range || !textEl) return 0;
                return getTextBeforeRangeInNode(range, textEl).length;
            }

            function setCollapsedSelectionAt(textEl, offset) {
                const selection = window.getSelection && window.getSelection();
                if (!selection || !textEl) return false;
                const range = document.createRange();
                setRangeBoundary(range, textEl, offset, 'start');
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                return true;
            }

            function getBlockPasteMutations(pasteText, pasteBlocks) {
                if (pasteText == null) pasteText = '';

                const selection = window.getSelection && window.getSelection();
                if (!selection || !selection.rangeCount) return null;

                const range = selection.getRangeAt(0);
                const rows = Array.from(document.querySelectorAll('.block-row[data-block-id], tr[data-block-id]'));
                const startRow = getRowForRangePoint(range.startContainer);
                const endRow = getRowForRangePoint(range.endContainer);
                if (!startRow || !endRow) return null;

                const startIdx = rows.indexOf(startRow);
                const endIdx = rows.indexOf(endRow);
                if (startIdx === -1 || endIdx === -1) return null;

                const from = Math.min(startIdx, endIdx);
                const to = Math.max(startIdx, endIdx);
                const isCollapsed = range.collapsed;
                const mutations = [];

                for (let i = from; i <= to; i++) {
                    const row = rows[i];
                    const blockId = row.getAttribute('data-block-id');
                    const blockContent = row.querySelector('.block-content');
                    if (!blockContent || !blockId) continue;

                    const originalContent = getBlockContentText(blockContent);
                    const originalPersonId = getBlockPersonId(blockContent);
                    const textEl = getBlockMainTextEl(blockContent);
                    const charName = blockContent.querySelector('.reader-visible-character-name, .character-name');
                    const isStart = i === from;
                    const isEnd = i === to;
                    const isMiddle = from !== to && i > from && i < to;
                    let newContent = originalContent;
                    let clearCharacter = false;
                    const blockData = pasteBlocks && pasteBlocks[i - from] ? pasteBlocks[i - from] : null;

                    if (isCollapsed && isStart && textEl) {
                        const offset = getTextOffsetAtRangeStart(range, textEl);
                        newContent = originalContent.slice(0, offset) + pasteText + originalContent.slice(offset);
                    } else if (!isCollapsed) {
                        if (isMiddle) {
                            newContent = blockData ? (blockData.content != null ? blockData.content : '') : '';
                            if (charName && rangeIntersectsNode(range, charName)) {
                                clearCharacter = !blockData || !blockData.personId;
                            }
                        } else if (textEl && rangeIntersectsNode(range, textEl)) {
                            if (isStart && isEnd) {
                                newContent = getTextBeforeRangeInNode(range, textEl) +
                                    (blockData ? blockData.content : pasteText) +
                                    getTextAfterRangeInNode(range, textEl);
                            } else if (isStart) {
                                newContent = getTextBeforeRangeInNode(range, textEl) +
                                    (blockData ? blockData.content : pasteText);
                            } else if (isEnd) {
                                newContent = (blockData ? blockData.content : pasteText) +
                                    getTextAfterRangeInNode(range, textEl);
                            } else {
                                newContent = getRemainingTextInNode(range, textEl);
                            }
                        }

                        if (charName && rangeIntersectsNode(range, charName) && isNodeFullySelected(range, charName)) {
                            clearCharacter = !blockData || !blockData.personId;
                        }
                    }

                    if (newContent !== originalContent || clearCharacter || blockData) {
                        const mutation = {
                            blockId: blockId,
                            row: row,
                            blockContent: blockContent,
                            content: newContent,
                            originalContent: originalContent,
                            clearCharacter: clearCharacter,
                            personId: clearCharacter ? '' : originalPersonId,
                            tags: row.getAttribute('data-tags') || ''
                        };
                        if (blockData) {
                            mutation.type = blockData.type;
                            mutation.applyType = true;
                            if (blockData.personId) {
                                mutation.personId = blockData.personId;
                            } else if (clearCharacter) {
                                mutation.personId = '';
                            }
                            if (blockData.tags) {
                                mutation.tags = blockData.tags;
                            }
                        }
                        mutations.push(mutation);
                    }
                }

                return mutations.length ? mutations : null;
            }

            function getCrossBlockSelectionData() {
                const selection = window.getSelection && window.getSelection();
                if (!selection || selection.isCollapsed || !selection.rangeCount) return null;

                const range = selection.getRangeAt(0);
                const rows = Array.from(document.querySelectorAll('.block-row[data-block-id], tr[data-block-id]'));
                const startRow = getRowForRangePoint(range.startContainer);
                const endRow = getRowForRangePoint(range.endContainer);
                if (!startRow || !endRow) return null;

                const startIdx = rows.indexOf(startRow);
                const endIdx = rows.indexOf(endRow);
                if (startIdx === -1 || endIdx === -1) return null;

                const from = Math.min(startIdx, endIdx);
                const to = Math.max(startIdx, endIdx);
                const lines = [];
                const blocks = [];
                const mutations = [];

                for (let i = from; i <= to; i++) {
                    const row = rows[i];
                    const blockId = row.getAttribute('data-block-id');
                    const blockContent = row.querySelector('.block-content');
                    if (!blockContent || !blockId) continue;

                    const parts = [];
                    let newContent = getBlockContentText(blockContent);
                    let clearCharacter = false;
                    const isMiddleRow = from !== to && i > from && i < to;
                    const originalContent = getBlockContentText(blockContent);
                    const originalPersonId = getBlockPersonId(blockContent);
                    const clipboardBlock = buildSelectionClipboardBlock(row, blockContent, range, i, from, to);

                    if (isMiddleRow) {
                        newContent = '';
                        getBlockSelectableTextNodes(blockContent).forEach(function(node) {
                            const isCharacter = node.classList.contains('reader-visible-character-name') ||
                                node.classList.contains('character-name');
                            parts.push(normalizeSelectableText(node.textContent || ''));
                            if (isCharacter) {
                                clearCharacter = true;
                            }
                        });
                    } else {
                        getBlockSelectableTextNodes(blockContent).forEach(function(node) {
                            const isCharacter = node.classList.contains('reader-visible-character-name') ||
                                node.classList.contains('character-name');
                            if (rangeIntersectsNode(range, node)) {
                                parts.push(getSelectedTextInNode(range, node));
                            }
                            if (isCharacter) {
                                if (rangeIntersectsNode(range, node) && isNodeFullySelected(range, node)) {
                                    clearCharacter = true;
                                }
                            } else {
                                newContent = getRemainingTextInNode(range, node);
                            }
                        });
                    }

                    lines.push(parts.length ? parts.join('\n') : '');
                    blocks.push(clipboardBlock);
                    mutations.push({
                        blockId: blockId,
                        row: row,
                        blockContent: blockContent,
                        content: newContent,
                        originalContent: originalContent,
                        clearCharacter: clearCharacter,
                        personId: clearCharacter ? '' : originalPersonId,
                        tags: row.getAttribute('data-tags') || '',
                        type: clipboardBlock.type
                    });
                }

                const copyText = lines.join('\n');
                const isCrossBlock = from !== to;
                const hasCut = mutations.some(function(m) {
                    return m.content !== m.originalContent || m.clearCharacter;
                });

                return {
                    copyText: copyText,
                    blocks: blocks,
                    mutations: mutations,
                    isCrossBlock: isCrossBlock,
                    hasCut: hasCut
                };
            }

            function getCrossBlockCopyText() {
                const data = getCrossBlockSelectionData();
                if (!data || !data.isCrossBlock) return null;
                return data.copyText;
            }

            function applyBlockMutationHtml(mutation, html) {
                if (!mutation.blockContent) return;
                if (!mutation.type && html.indexOf('block-inline-edit-form') !== -1) {
                    throw new Error('block save rejected');
                }
                mutation.blockContent.innerHTML = html;
                if (mutation.type && window.scriptyApplyBlockTypeClass) {
                    window.scriptyApplyBlockTypeClass(mutation.blockContent, mutation.type);
                }
                if (typeof htmx !== 'undefined') {
                    htmx.process(mutation.blockContent);
                }
            }

            function saveBlockContentAfterCut(mutation) {
                const fields = {
                    id: mutation.blockId,
                    content: mutation.content != null ? mutation.content : '',
                    tags: mutation.tags || ''
                };
                if (mutation.personId) {
                    fields.personId = mutation.personId;
                }

                if (window.scriptyIsOffline && window.scriptyIsOffline() &&
                    window.scriptySaveBlockContentInline) {
                    return window.scriptySaveBlockContentInline(mutation.blockContent, fields);
                }

                if (mutation.applyType && mutation.type) {
                    const typeFields = Object.assign({}, fields, {
                        type: mutation.type,
                        partial: 'project'
                    });
                    const projectId = typeof resolveProjectId === 'function' ? resolveProjectId() : null;
                    if (projectId) {
                        typeFields.projectId = projectId;
                    }
                    return fetch('/block/setTypeAndContent', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: new URLSearchParams(typeFields).toString(),
                        credentials: 'same-origin'
                    }).then(function(response) {
                        if (!response.ok) throw new Error('typed save failed');
                        return response.text();
                    }).then(function() {
                        return fetch('/block/showInline?id=' + encodeURIComponent(mutation.blockId), {
                            credentials: 'same-origin'
                        });
                    }).then(function(response) {
                        if (!response.ok) throw new Error('show inline failed');
                        return response.text();
                    }).then(function(html) {
                        applyBlockMutationHtml(mutation, html);
                    });
                }

                return fetch('/block/editInline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(fields).toString(),
                    credentials: 'same-origin'
                }).then(function(response) {
                    if (!response.ok) throw new Error('cut save failed');
                    return response.text();
                }).then(function(html) {
                    applyBlockMutationHtml(mutation, html);
                });
            }

            function insertBlockRowHtml(afterRow, html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children);
                if (!newRows.length || !afterRow || !afterRow.parentNode) return null;
                let insertAfter = afterRow;
                let savedRow = null;
                newRows.forEach(function(newRow) {
                    insertAfter.insertAdjacentElement('afterend', newRow);
                    insertAfter = newRow;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(newRow);
                    }
                    if (newRow.hasAttribute('data-block-id')) {
                        savedRow = newRow;
                    }
                });
                return savedRow;
            }

            function createTypedBlockBelow(afterRow, blockData) {
                const blockId = afterRow && afterRow.getAttribute('data-block-id');
                if (!blockId || !blockData) return Promise.resolve(afterRow);

                const body = new URLSearchParams({
                    id: blockId,
                    content: blockData.content != null ? blockData.content : '',
                    surface: 'project'
                });
                if (blockData.personId) {
                    body.set('personId', blockData.personId);
                }
                if (blockData.type) {
                    body.set('type', blockData.type);
                }

                return fetch('/block/createBelowInline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: body.toString(),
                    credentials: 'same-origin'
                }).then(function(response) {
                    if (!response.ok) throw new Error('create below failed');
                    return response.text();
                }).then(function(html) {
                    // createBelowInline returns block + empty create row; keep only the
                    // saved block so multi-block paste doesn't leave gaps of empty rows.
                    const template = document.createElement('template');
                    template.innerHTML = (html || '').trim();
                    const savedNodes = Array.from(template.content.children).filter(function(el) {
                        return el.hasAttribute && el.hasAttribute('data-block-id');
                    });
                    const insertHtml = savedNodes.length
                        ? savedNodes.map(function(el) { return el.outerHTML; }).join('')
                        : html;
                    const newRow = insertBlockRowHtml(afterRow, insertHtml);
                    if (!newRow) return afterRow;
                    const newBlockId = newRow.getAttribute('data-block-id');
                    const blockContent = newRow.querySelector('.block-content');
                    if (!newBlockId || !blockContent) return newRow;
                    // Type is applied on create; only re-save when person/tags still need syncing.
                    if (blockData.personId || (blockData.tags && blockData.type && blockData.type !== 'ACTION')) {
                        return saveBlockContentAfterCut({
                            blockId: newBlockId,
                            row: newRow,
                            blockContent: blockContent,
                            content: blockData.content != null ? blockData.content : '',
                            personId: blockData.personId || '',
                            tags: blockData.tags || '',
                            type: blockData.type,
                            applyType: !!blockData.type

                let chain = Promise.resolve(afterRow);

            function applyStructuredBlockPaste(pasteText, pasteBlocks) {

                const endRow = getRowForRangePoint(range.endContainer);

                const endIdx = rows.indexOf(endRow);

                const to = Math.max(startIdx, endIdx);

                    const blockContent = startRow.querySelector('.block-content');
                    const textEl = getBlockMainTextEl(blockContent);
                    const originalContent = getBlockContentText(blockContent);
                    const blockData = pasteBlocks[0];
                    const offset = textEl ? getTextOffsetAtRangeStart(range, textEl) : originalContent.length;

            function looksLikeScreenplayPaste(text) {
                if (!text) return false;
                const lines = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                let nonEmpty = 0;
                // Build note-open marker without consecutive brackets (Thymeleaf inline JS).
                const noteOpen = String.fromCharCode(91, 91);
                for (let i = 0; i < lines.length; i++) {
                    const trimmed = lines[i].trim();
                    if (!trimmed) continue;
                    nonEmpty++;
                    if (/^(?:INT\.?|EXT\.?|EST\.?|INT\.?\/EXT\.?|I\/E\.?)\s+/i.test(trimmed)) return true;
                    if (/^[A-Z][A-Z0-9 ]+ TO:$/.test(trimmed)) return true;
                    if (/^(?:ANGLE ON|CLOSE ON|POV|INSERT)\b/i.test(trimmed)) return true;

            function blocksFromExternalPasteText(text) {

                if (!parsed || !parsed.length) return null;
                if (parsed.length === 1 && parsed[0].type === 'ACTION') return null;

                        type: block.type || 'ACTION',
                        content: block.content != null ? block.content : '',
                        personId: '',
                        characterName: block.characterName || '',
                        tags: ''

                if (!mutations || !mutations.length) return Promise.resolve(false);

                removeBlockSelectionMenu();

                    clearBlockTextEditability();
                    updateUndoRedoButtons(resolveProjectId());
                    return true;
                }).catch(function() {
                    return false;
                });

            function performBlockTextCut() {

                removeBlockSelectionMenu();
                applyCrossBlockCut(data.mutations);
                writeTextToClipboard(data.copyText, data.blocks);
                return true;

                return Promise.all(pending.map(saveBlockContentAfterCut)).then(function() {
                    clearBlockTextEditability();
                    updateUndoRedoButtons(resolveProjectId());

            function readTextFromClipboard() {

                            const typeTasks = [];
                            if (item.types.indexOf(SCRIPTY_BLOCKS_MIME) !== -1) {
                                typeTasks.push(item.getType(SCRIPTY_BLOCKS_MIME).then(function(blob) {

                                }).then(function(raw) {

                                }));
                            }
                            if (item.types.indexOf('text/plain') !== -1) {

                                    return blob.text();

                                }));

            function writeTextToClipboard(text, blocks) {

            function getSelectionAnchorRect(selection, fallbackX, fallbackY) {
                if (!selection || !selection.rangeCount) {
