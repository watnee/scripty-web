                    }).then(function(response) {
                        if (!response.ok) throw new Error('show inline failed');
                        return response.text();
                    }).then(function(html) {
                        applyBlockMutationHtml(mutation, html);
                    });
                }

                return fetch('/block/editInline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(fields).toString(),
                    credentials: 'same-origin'
                }).then(function(response) {
                    if (!response.ok) throw new Error('cut save failed');
                    return response.text();
                }).then(function(html) {
                    applyBlockMutationHtml(mutation, html);
                });
            }

            function insertBlockRowHtml(afterRow, html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children);
                if (!newRows.length || !afterRow || !afterRow.parentNode) return null;
                let insertAfter = afterRow;
                let savedRow = null;
                newRows.forEach(function(newRow) {
                    insertAfter.insertAdjacentElement('afterend', newRow);
                    insertAfter = newRow;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(newRow);
                    }
                    if (newRow.hasAttribute('data-block-id')) {
                        savedRow = newRow;
                    }
                });
                return savedRow;
            }

            function createTypedBlockBelow(afterRow, blockData) {
                const blockId = afterRow && afterRow.getAttribute('data-block-id');
                if (!blockId || !blockData) return Promise.resolve(afterRow);

                const body = new URLSearchParams({
                    id: blockId,
                    content: blockData.content != null ? blockData.content : '',
                    surface: 'project'
                });
                if (blockData.personId) {
                    body.set('personId', blockData.personId);
                }
                if (blockData.type) {
                    body.set('type', blockData.type);
                }

                return fetch('/block/createBelowInline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: body.toString(),
                    credentials: 'same-origin'
                }).then(function(response) {
                    if (!response.ok) throw new Error('create below failed');
                    return response.text();
                }).then(function(html) {
                    // createBelowInline returns block + empty create row; keep only the
                    // saved block so multi-block paste doesn't leave gaps of empty rows.
                    const template = document.createElement('template');
                    template.innerHTML = (html || '').trim();
                    const savedNodes = Array.from(template.content.children).filter(function(el) {
                        return el.hasAttribute && el.hasAttribute('data-block-id');
                    });
                    const insertHtml = savedNodes.length
                        ? savedNodes.map(function(el) { return el.outerHTML; }).join('')
                        : html;
                    const newRow = insertBlockRowHtml(afterRow, insertHtml);
                    if (!newRow) return afterRow;
                    const newBlockId = newRow.getAttribute('data-block-id');
                    const blockContent = newRow.querySelector('.block-content');
                    if (!newBlockId || !blockContent) return newRow;
                    // Type is applied on create; only re-save when person/tags still need syncing.
                    if (blockData.personId || (blockData.tags && blockData.type && blockData.type !== 'ACTION')) {
                        return saveBlockContentAfterCut({
                            blockId: newBlockId,
                            row: newRow,
                            blockContent: blockContent,
                            content: blockData.content != null ? blockData.content : '',
                            personId: blockData.personId || '',
                            tags: blockData.tags || '',
                            type: blockData.type,
                            applyType: !!blockData.type
                        }).then(function() {
                            return newRow;
                        });
                    }
                    return newRow;
                }).catch(function() {
                    return afterRow;
                });
            }

            function createTypedBlocksBelowChain(afterRow, blocks) {
                if (!blocks || !blocks.length) return Promise.resolve();
                let chain = Promise.resolve(afterRow);
                blocks.forEach(function(blockData) {
                    chain = chain.then(function(currentRow) {
                        return createTypedBlockBelow(currentRow, blockData);
                    });
                });
                return chain;
            }

            function applyStructuredBlockPaste(pasteText, pasteBlocks) {
                const selection = window.getSelection && window.getSelection();
                if (!selection || !selection.rangeCount || !pasteBlocks || !pasteBlocks.length) {
                    return Promise.resolve(false);
                }

                const range = selection.getRangeAt(0);
                const rows = Array.from(document.querySelectorAll('.block-row[data-block-id], tr[data-block-id]'));
                const startRow = getRowForRangePoint(range.startContainer);
                const endRow = getRowForRangePoint(range.endContainer);
                if (!startRow || !endRow) return Promise.resolve(false);

                const startIdx = rows.indexOf(startRow);
                const endIdx = rows.indexOf(endRow);
                if (startIdx === -1 || endIdx === -1) return Promise.resolve(false);

                const from = Math.min(startIdx, endIdx);
                const to = Math.max(startIdx, endIdx);
                const isCollapsed = range.collapsed;
                let mutations;
                let trailingBlocks = [];

                if (isCollapsed && from === to) {
                    const blockContent = startRow.querySelector('.block-content');
                    const textEl = getBlockMainTextEl(blockContent);
                    const originalContent = getBlockContentText(blockContent);
                    const blockData = pasteBlocks[0];
                    const offset = textEl ? getTextOffsetAtRangeStart(range, textEl) : originalContent.length;
                    mutations = [{
                        blockId: startRow.getAttribute('data-block-id'),
                        row: startRow,
                        blockContent: blockContent,
                        content: originalContent.slice(0, offset) +
                            (blockData.content != null ? blockData.content : pasteText) +
                            originalContent.slice(offset),
                        originalContent: originalContent,
                        clearCharacter: false,
                        personId: blockData.personId || getBlockPersonId(blockContent) || '',
                        tags: blockData.tags || startRow.getAttribute('data-tags') || '',
                        type: blockData.type,
                        applyType: true
                    }];
                    if (pasteBlocks.length > 1) {
                        trailingBlocks = pasteBlocks.slice(1);
                    }
                } else {
                    mutations = getBlockPasteMutations(pasteText, pasteBlocks);
                    if (mutations && pasteBlocks.length > mutations.length) {
                        trailingBlocks = pasteBlocks.slice(mutations.length);
                    }
                }

                if (!mutations || !mutations.length) return Promise.resolve(false);

                clearBlockTextEditability();
                removeBlockSelectionMenu();
                selection.removeAllRanges();

                const lastRow = rows[to];
                return Promise.all(mutations.map(saveBlockContentAfterCut)).then(function() {
                    if (!trailingBlocks.length) return true;
                    return createTypedBlocksBelowChain(lastRow, trailingBlocks).then(function() {
                        return true;
                    });
                }).then(function(result) {
                    clearBlockTextEditability();
                    window.scriptyUpdateUndoRedoButtons(resolveProjectId());
                    return result;
                }).catch(function() {
                    return false;
                });
            }

            function looksLikeScreenplayPaste(text) {
                if (!text) return false;
                const lines = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                let nonEmpty = 0;
                // Build note-open marker without consecutive brackets (Thymeleaf inline JS).
                const noteOpen = String.fromCharCode(91, 91);
                for (let i = 0; i < lines.length; i++) {
                    const trimmed = lines[i].trim();
                    if (!trimmed) continue;
                    nonEmpty++;
                    if (/^(?:INT\.?|EXT\.?|EST\.?|INT\.?\/EXT\.?|I\/E\.?)\s+/i.test(trimmed)) return true;
                    if (/^[A-Z][A-Z0-9 ]+ TO:$/.test(trimmed)) return true;
                    if (/^(?:ANGLE ON|CLOSE ON|POV|INSERT)\b/i.test(trimmed)) return true;
                    if (/^[@.~>#=]/.test(trimmed) || /^={3,}$/.test(trimmed) || trimmed.indexOf(noteOpen) === 0) return true;
                    // ALL-CAPS cue followed by a non-empty next line
                    if (trimmed === trimmed.toUpperCase()
                        && trimmed.length <= 60
                        && /[A-Z]/.test(trimmed)
                        && !/[.?!]$/.test(trimmed)) {
                        for (let j = i + 1; j < lines.length; j++) {
                            if (lines[j].trim()) return true;
                        }
                    }
                }
                return nonEmpty >= 2 && /\n\s*\n/.test(text);
            }

            function blocksFromExternalPasteText(text) {
                if (text == null || text === '') return null;
                if (typeof window.scriptyParseFountainToBlocks !== 'function') return null;
                if (!/[\r\n]/.test(text)) return null;

                // Soft-wrapped prose without screenplay cues: keep as one inline paste.
                if (!looksLikeScreenplayPaste(text)) {
                    return null;
                }

                const parsed = window.scriptyParseFountainToBlocks(text);
                if (!parsed || !parsed.length) return null;
                if (parsed.length === 1 && parsed[0].type === 'ACTION') return null;
                return parsed.map(function(block) {
                    return {
                        type: block.type || 'ACTION',
                        content: block.content != null ? block.content : '',
                        personId: '',
                        characterName: block.characterName || '',
                        tags: ''
                    };
                });
            }

            function applyBlockTextPaste(pastePayload, pasteBlocks) {
                const payload = normalizeClipboardPayload(pastePayload, pasteBlocks);
                if (payload.blocks && payload.blocks.length) {
                    return applyStructuredBlockPaste(payload.text, payload.blocks);
                }

                const fountainBlocks = blocksFromExternalPasteText(payload.text);
                if (fountainBlocks && fountainBlocks.length) {
                    return applyStructuredBlockPaste(payload.text, fountainBlocks);
                }

                const mutations = getBlockPasteMutations(payload.text);
                if (!mutations || !mutations.length) return Promise.resolve(false);

                clearBlockTextEditability();
                removeBlockSelectionMenu();
                const selection = window.getSelection && window.getSelection();
                if (selection) selection.removeAllRanges();

                return Promise.all(mutations.map(saveBlockContentAfterCut)).then(function() {
                    clearBlockTextEditability();
                    window.scriptyUpdateUndoRedoButtons(resolveProjectId());
                    return true;
                }).catch(function() {
                    return false;
                });
            }

            function performBlockTextCut() {
                if (!shouldHandleBlockTextClipboard()) return false;

                let data = cachedBlockSelectionMenu && cachedBlockSelectionMenu.data;
                if (!data || !data.hasCut) {
                    data = prepareBlockTextClipboardData();
                }
                if (!data || !data.hasCut) return false;

                clearBlockTextEditability();
                removeBlockSelectionMenu();
                applyCrossBlockCut(data.mutations);
                writeTextToClipboard(data.copyText, data.blocks);
                return true;
            }

            function performBlockTextDelete() {
                if (!shouldHandleBlockTextClipboard()) return false;

                let data = cachedBlockSelectionMenu && cachedBlockSelectionMenu.data;
                if (!data || !data.hasCut) {
                    data = prepareBlockTextClipboardData();
                }
                if (!data || !data.hasCut) return false;

                clearBlockTextEditability();
                removeBlockSelectionMenu();
                applyCrossBlockCut(data.mutations);
                return true;
            }

            function applyCrossBlockCut(mutations) {
                if (!mutations || !mutations.length) return Promise.resolve();

                const pending = mutations.filter(function(m) {
                    return m.content !== m.originalContent || m.clearCharacter;
                });
                if (!pending.length) return Promise.resolve();

                const selection = window.getSelection && window.getSelection();
                if (selection) selection.removeAllRanges();

                return Promise.all(pending.map(saveBlockContentAfterCut)).then(function() {
                    clearBlockTextEditability();
                    window.scriptyUpdateUndoRedoButtons(resolveProjectId());
                }).catch(function() {
                    /* keep page state if cut save fails */
                });
            }

            function shouldHandleBlockTextClipboard() {
                if (window.scriptyBlockEditLocked) return false;
                const active = document.activeElement;
                if (isBlockContentTextarea(active) && active.selectionStart !== active.selectionEnd) {
                    return false;
                }
                return !!document.querySelector('.project-script, #table-blocks, .table-blocks-all');
            }

            function clearBlockTextEditability() {
                document.querySelectorAll(
                    '.script-block-text[contenteditable]:not(textarea), .reader-visible-text[contenteditable]'
                ).forEach(function(el) {
                    el.removeAttribute('contenteditable');
                    el.removeAttribute('spellcheck');
                });
            }

            function removeBlockSelectionMenu() {
                document.querySelectorAll('.block-selection-menu').forEach(function(el) {
                    el.remove();
                });
                document.removeEventListener('keydown', blockSelectionMenuEscapeHandler, true);
            }

            function blockSelectionMenuEscapeHandler(e) {
                if (e.key !== 'Escape') return;
                if (!document.querySelector('.block-selection-menu')) return;
                e.preventDefault();
                removeBlockSelectionMenu();
            }

            function readTextFromClipboard() {
                if (navigator.clipboard && navigator.clipboard.read) {
                    return navigator.clipboard.read().then(function(items) {
                        let plainText = '';
                        let blocks = null;
                        const tasks = items.map(function(item) {
                            const typeTasks = [];
                            if (item.types.indexOf(SCRIPTY_BLOCKS_MIME) !== -1) {
                                typeTasks.push(item.getType(SCRIPTY_BLOCKS_MIME).then(function(blob) {
                                    return blob.text();
                                }).then(function(raw) {
                                    blocks = parseScriptyBlocksPayload(raw);
                                }));
                            }
                            if (item.types.indexOf('text/plain') !== -1) {
                                typeTasks.push(item.getType('text/plain').then(function(blob) {
                                    return blob.text();
                                }).then(function(text) {
                                    plainText = text;
                                }));
                            }
                            return Promise.all(typeTasks);
                        });
                        return Promise.all(tasks).then(function() {
                            const embedded = parseEmbeddedScriptyBlocks(plainText);
                            return {
                                text: embedded.text,
                                blocks: blocks || embedded.blocks
                            };
                        });
                    }).catch(function() {
                        if (navigator.clipboard.readText) {
                            return navigator.clipboard.readText().then(function(text) {
                                const embedded = parseEmbeddedScriptyBlocks(text);
                                return {
                                    text: embedded.text,
                                    blocks: embedded.blocks
                                };
                            });
                        }
                        return Promise.reject(new Error('clipboard unavailable'));
                    });
                }
                if (navigator.clipboard && navigator.clipboard.readText) {
                    return navigator.clipboard.readText().then(function(text) {
                        const embedded = parseEmbeddedScriptyBlocks(text);
                        return {
                            text: embedded.text,
                            blocks: embedded.blocks
                        };
                    });
                }
                return Promise.reject(new Error('clipboard unavailable'));
            }

            function writeTextToClipboard(text, blocks) {
                const payload = blocks && blocks.length ? serializeScriptyBlocksPayload(blocks) : null;
                if (payload && navigator.clipboard && navigator.clipboard.write && window.ClipboardItem) {
                    const clipItems = {
                        'text/plain': new Blob([text], { type: 'text/plain' })
                    };
                    clipItems[SCRIPTY_BLOCKS_MIME] = new Blob([payload], { type: SCRIPTY_BLOCKS_MIME });
                    return navigator.clipboard.write([new ClipboardItem(clipItems)]).catch(function() {
                        return writePlainClipboardText(embedScriptyBlocksInPlainText(text, blocks));
                    });
                }
                if (payload) {
                    return writePlainClipboardText(embedScriptyBlocksInPlainText(text, blocks));
                }
                return writePlainClipboardText(text);
            }

            function writePlainClipboardText(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return Promise.resolve();
            }

            function getSelectionAnchorRect(selection, fallbackX, fallbackY) {
                if (!selection || !selection.rangeCount) {
                    return {
                        left: fallbackX != null ? fallbackX : 8,
                        top: fallbackY != null ? fallbackY : 8,
                        bottom: (fallbackY != null ? fallbackY : 8) + 18,
                        width: 1,
                        height: 18
                    };
                }

                const range = selection.getRangeAt(0);
                let rect = range.getBoundingClientRect();
                if (rect.width > 0 || rect.height > 0) {
                    return rect;
                }

                const clientRects = range.getClientRects();
                for (let i = clientRects.length - 1; i >= 0; i--) {
                    if (clientRects[i].width > 0 || clientRects[i].height > 0) {
                        return clientRects[i];
                    }
                }

                const endRange = range.cloneRange();
                endRange.collapse(false);
                rect = endRange.getBoundingClientRect();
                if (rect.width > 0 || rect.height > 0) {
                    return rect;
                }

                const startRange = range.cloneRange();
                startRange.collapse(true);
                rect = startRange.getBoundingClientRect();
                if (rect.width > 0 || rect.height > 0) {
                    return rect;
                }

                return {
                    left: fallbackX != null ? fallbackX : 8,
                    top: fallbackY != null ? fallbackY : 8,
                    bottom: (fallbackY != null ? fallbackY : 8) + 18,
                    width: 1,
                    height: 18
                };
            }

            const BLOCK_SELECTION_ICONS = {
                copy: '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/><\/svg>',
                cut: '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88"/><path d="M14.47 14.48 20 20"/><path d="M8.12 8.12 12 12"/><\/svg>',
                paste: '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 2H9a1 1 0 0 0-1 1v2c0 .6.4 1 1 1h6c.6 0 1-.4 1-1V3a1 1 0 0 0-1-1Z"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><\/svg>',
                delete: '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><\/svg>'
            };

            function isMacPlatform() {
                return /Mac|iPhone|iPod|iPad/i.test(navigator.platform || navigator.userAgent || '');
            }

            function blockSelectionShortcut(key) {
                return isMacPlatform() ? '⌘' + key : 'Ctrl+' + key;
            }

            function createBlockSelectionMenuButton(action, label, shortcut) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.action = action;
                btn.className = 'block-selection-menu-btn';
                btn.setAttribute('role', 'menuitem');
                const hint = shortcut ? label + ' (' + shortcut + ')' : label;
                btn.title = hint;
                btn.setAttribute('aria-label', hint);
                btn.innerHTML =
                    '<span class="block-selection-menu-icon">' + BLOCK_SELECTION_ICONS[action] + '<\/span>' +
                    '<span class="block-selection-menu-label">' + label + '<\/span>';
                return btn;
            }

            function appendBlockSelectionMenuDivider(menu) {
                const divider = document.createElement('span');
                divider.className = 'block-selection-menu-divider';
                divider.setAttribute('role', 'separator');
                divider.setAttribute('aria-hidden', 'true');
                menu.appendChild(divider);
            }

            function runBlockSelectionMenuAction(action, menuData) {
                if (action === 'copy') {
                    if (!menuData || !menuData.copyText) return;
                    writeTextToClipboard(menuData.copyText, menuData.blocks);
                    removeBlockSelectionMenu();
                } else if (action === 'cut') {
                    if (!menuData || !menuData.hasCut) return;
                    clearBlockTextEditability();
                    removeBlockSelectionMenu();
                    applyCrossBlockCut(menuData.mutations);
                    writeTextToClipboard(menuData.copyText, menuData.blocks);
                } else if (action === 'paste') {
                    readTextFromClipboard().then(function(payload) {
                        return applyBlockTextPaste(payload);
                    }).finally(function() {
                        removeBlockSelectionMenu();
                    });
                } else if (action === 'delete') {
                    if (!menuData || !menuData.hasCut) return;
                    clearBlockTextEditability();
                    removeBlockSelectionMenu();
                    applyCrossBlockCut(menuData.mutations);
                }
            }

            function positionBlockSelectionMenu(menu, rect, pointerX, pointerY) {
                menu.style.visibility = 'hidden';
                menu.style.left = '0';
                menu.style.top = '0';
                document.body.appendChild(menu);

                const menuWidth = menu.offsetWidth;
                const menuHeight = menu.offsetHeight;
                const anchorLeft = rect.left + (rect.width / 2) - (menuWidth / 2);
                let left = Math.max(8, Math.min(anchorLeft, window.innerWidth - menuWidth - 8));
                let top = rect.bottom + 8;
                if (top + menuHeight > window.innerHeight - 8) {
                    top = Math.max(8, rect.top - menuHeight - 8);
                }
                if (pointerX != null && pointerY != null && top + menuHeight > window.innerHeight - 8) {
                    top = Math.max(8, Math.min(pointerY - menuHeight - 8, window.innerHeight - menuHeight - 8));
                }

                menu.style.left = left + 'px';
                menu.style.top = top + 'px';
                menu.style.visibility = '';
            }

            function showBlockSelectionMenu(pointerX, pointerY, forceShow) {
                removeBlockSelectionMenu();

                let data = null;
                const selection = window.getSelection && window.getSelection();
                const liveSelection = !!(selection && !selection.isCollapsed && selection.rangeCount);

                if (liveSelection) {
                    expandSelectionAcrossBlocks();
                    data = getCrossBlockSelectionData();
                }

                if ((!data || !shouldShowBlockSelectionMenu(data)) && cachedBlockSelectionMenu) {
                    data = cachedBlockSelectionMenu.data;
                    pointerX = pointerX != null ? pointerX : cachedBlockSelectionMenu.pointerX;
                    pointerY = pointerY != null ? pointerY : cachedBlockSelectionMenu.pointerY;
                }

                const hasCopyCut = !!(data && shouldShowBlockSelectionMenu(data));
                if (!hasCopyCut && !forceShow) return;

                const rect = getSelectionAnchorRect(
                    liveSelection ? selection : null,
                    pointerX,
                    pointerY
                );

                const menu = document.createElement('div');
                menu.className = 'block-selection-menu';

                    hasClipboardActions = true;
                }
                if (data && data.hasCut) {
                    menu.appendChild(createBlockSelectionMenuButton('cut', 'Cut', blockSelectionShortcut('X')));
                    hasClipboardActions = true;
                }
                menu.appendChild(createBlockSelectionMenuButton('paste', 'Paste', blockSelectionShortcut('V')));
                if (data && data.hasCut) {
                    if (hasClipboardActions) {
                        appendBlockSelectionMenuDivider(menu);
                    }
                    menu.appendChild(createBlockSelectionMenuButton('delete', 'Delete', 'Del'));
                }

                positionBlockSelectionMenu(menu, rect, pointerX, pointerY);
                document.addEventListener('keydown', blockSelectionMenuEscapeHandler, true);

                const firstBtn = menu.querySelector('.block-selection-menu-btn');
                if (firstBtn) {
                    requestAnimationFrame(function() {
                        firstBtn.focus({ preventScroll: true });
                    });
                }

                menu.addEventListener('mousedown', function(e) {
                    const btn = e.target.closest('[data-action]');
                    if (btn) {
                        e.preventDefault();
                        runBlockSelectionMenuAction(btn.dataset.action, menu._blockSelectionData);
                        return;
                    }

                    if (e.key === 'Escape') {
                        e.preventDefault();
                        removeBlockSelectionMenu();
                        return;
                    }

                    const currentIndex = buttons.indexOf(document.activeElement);
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        // Space after '[' avoids Thymeleaf treating [(...)] as an inline expression.

                    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prev = buttons[ (currentIndex - 1 + buttons.length) % buttons.length];
                        if (prev) prev.focus();
                    } else if (e.key === 'Enter' || e.key === ' ') {
                        const activeBtn = document.activeElement;
                        if (activeBtn && activeBtn.closest('.block-selection-menu') === menu &&
                            activeBtn.matches('.block-selection-menu-btn')) {
                            e.preventDefault();
                            runBlockSelectionMenuAction(activeBtn.dataset.action, menu._blockSelectionData);
                        }
                    }
                });
            }

            function scheduleBlockSelectionMenu(pointerX, pointerY, forceShow) {
                requestAnimationFrame(function() {

                        showBlockSelectionMenu(pointerX, pointerY, forceShow);
                    });
                });
            }

            function updateBlockTextEditability() {
                clearBlockTextEditability();

            if (rows.length === 0) return null;
            const minRowHeight = 24;
            for (let i = 0; i < rows.length; i++) {
                const rect = rows[i].getBoundingClientRect();
                const effectiveHeight = Math.max(rect.height, minRowHeight);
                if (clientY < rect.top + effectiveHeight / 2) {

            return { row: rows[rows.length - 1], insertBefore: false };

            fetch(url, {

                if (response.ok || response.type === 'opaqueredirect' || (response.status >= 300 && response.status < 400)) {

                    lines.push(textarea.value);
                }

                return lines.join('\n').trimEnd();
            }

            function copyTextToClipboard(text, button) {
                if (!text) return;

                function markCopied() {
                    if (!button) return;
                    var original = button.textContent;
                    button.textContent = 'Copied';
                    button.classList.add('is-copied');
                    window.setTimeout(function() {
                        button.textContent = original;
                        button.classList.remove('is-copied');
                    }, 1500);
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(markCopied).catch(function() {
                        var textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.setAttribute('readonly', '');
                        textarea.style.position = 'fixed';
                        textarea.style.left = '-9999px';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        markCopied();
                    });
                } else {
                    var fallback = document.createElement('textarea');
                    fallback.value = text;
                    fallback.setAttribute('readonly', '');
                    fallback.style.position = 'fixed';
                    fallback.style.left = '-9999px';
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                    markCopied();
                }
            }

            function resolveAlignStyleTargetIds(triggerEl) {
                var ids = window.scriptyGetSelectedBlockIds();
                if (ids.length > 0) return ids;
                // Match element-type: apply to the focused/active block when nothing is checked.
                var activeId = window.scriptyGetActiveBlockId
                    ? window.scriptyGetActiveBlockId(triggerEl)
                    : null;
                return activeId ? [String(activeId)] : [];
            }

            // Keep focus in the active block (same as element-type) so align/style
            // work from the caret without checkbox selection. Also covers the
            // text-align dropdown toggle, which would otherwise blur before pick.
            document.body.addEventListener('mousedown', function(e) {

                    '.bulk-align-btn, .bulk-style-btn, .text-format-toolbar-btn'
                );

            }, true);

            document.body.addEventListener('click', function(e) {
                if (!document.querySelector('.project-script')) return;
                // Element type buttons are handled by /js/element-type.js

                var alignBtn = e.target.closest('.bulk-align-btn');
                if (alignBtn) {

                    runBulkAction({

                    });
                    return;
                }

                var styleBtn = e.target.closest('.bulk-style-btn');
                if (styleBtn) {
                    e.preventDefault();
                    var styleIds = resolveAlignStyleTargetIds(styleBtn);
                    if (styleIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkToggleStyle',
                        fields: {
                            ids: styleIds.join(','),
                            style: styleBtn.getAttribute('data-bulk-style'),
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                if (e.target.closest('#project-bulk-add-tags-btn')) {
                    e.preventDefault();
                    var tagIds = window.scriptyGetSelectedBlockIds();
                    if (tagIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    var tagsInput = document.getElementById('project-bulk-tags-input');
                    var tags = tagsInput ? tagsInput.value.trim() : '';
                    if (!tags) {
                        alert('Please enter tags to add.');
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkAddTags',
                        fields: {
                            ids: tagIds.join(','),
                            tags: tags,
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                if (e.target.closest('#project-bulk-copy-btn')) {
                    var copyCheckboxes = document.querySelectorAll(
                        '.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked'
                    );
                    if (copyCheckboxes.length === 0) {
                        window.scriptyBulkSelectionAlert();

                    var copyText = Array.from(copyCheckboxes).map(function(cb) {
                        return getBlockRowCopyText(cb.closest('.block-row, tr[data-block-id]'));
                    }).filter(function(value) {
                        return value.length > 0;
                    }).join('\n');
                    if (!copyText) {
                        alert('No text to copy in the selected blocks.');
                        return;
                    }
                    copyTextToClipboard(copyText, e.target.closest('#project-bulk-copy-btn'));
                    return;
                }

                if (e.target.closest('#project-bulk-delete-btn')) {
                    e.preventDefault();
                    var deleteIds = window.scriptyGetSelectedBlockIds();
                    if (deleteIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    var confirmMsg = 'Are you sure you want to delete the ' + deleteIds.length +
                        ' selected block' + (deleteIds.length > 1 ? 's' : '') + '?';
                    if (!confirm(confirmMsg)) {

                    runBulkAction({
                        action: '/block/bulkDelete',

        window.scriptyInitBlockBulkSelection = function(options) {
            options = options || {};
            var selectAllId = options.selectAllId;
            if (!selectAllId) return;

            var scope = options.scope || document;
            var selectAllCheckbox = document.getElementById(selectAllId);
            if (!selectAllCheckbox || selectAllCheckbox.dataset.bulkSelectionInit === 'true') return;
            selectAllCheckbox.dataset.bulkSelectionInit = 'true';

            var bulkBar = options.bulkBarId ? document.getElementById(options.bulkBarId) : null;
            var bulkCount = options.bulkCountId ? document.getElementById(options.bulkCountId) : null;
            var controlRoot = selectAllCheckbox.closest('.block-left-controls') || scope;
            var menuDropdown = controlRoot.querySelector('.block-select-menu-dropdown');

            function blockCheckboxes() {
                return scope.querySelectorAll(
                    '.block-row[data-block-id] .block-select-checkbox, tr[data-block-id] .block-select-checkbox'
                );
            }

            function blockRows() {
                return scope.querySelectorAll('.block-row[data-block-id], tr[data-block-id]');
            }

            function isSelectableRow(row) {
                if (!row || !row.hasAttribute('data-block-id')) return false;
                if (row.classList.contains('filtered-out')) return false;
                if (row.style.display === 'none') return false;
                return true;
            }

            function isBookmarkedRow(row) {
                return row.getAttribute('data-bookmarked') === 'true';
            }

            function updateBulkBar() {
                var count = window.scriptyGetSelectedBlockIds
                    ? window.scriptyGetSelectedBlockIds().length
                    : scope.querySelectorAll(
                        '.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked'
                    ).length;
                if (bulkBar) {
                    bulkBar.hidden = count === 0;
                }
                if (bulkCount) {
                    bulkCount.textContent = count === 1 ? '1 block selected' : count + ' blocks selected';
                }
            }

            function syncSelectAllState() {
                var checkboxes = blockCheckboxes();
                var checkedCount = 0;
                checkboxes.forEach(function(cb) {
                    if (cb.checked) checkedCount++;
                });
                if (checkboxes.length === 0) {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    return;
                }
                selectAllCheckbox.checked = checkedCount === checkboxes.length;
                selectAllCheckbox.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
            }

            function setCheckboxChecked(checkbox, checked) {
                if (!checkbox || checkbox.checked === checked) return;
                checkbox.checked = checked;
                checkbox.dispatchEvent(new Event('change', { bubbles: true }));
            }

            function applySelectionAction(action) {
                if (action === 'all') {
                    blockCheckboxes().forEach(function(cb) {
                        setCheckboxChecked(cb, true);
                    });
                    selectAllCheckbox.checked = true;
                    selectAllCheckbox.indeterminate = false;
                } else if (action === 'none') {
                    blockCheckboxes().forEach(function(cb) {
                        setCheckboxChecked(cb, false);
                    });
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                } else if (action === 'bookmarked' || action === 'unbookmark') {
                    var shouldCheck = action === 'bookmarked';
                    blockRows().forEach(function(row) {
                        if (!isSelectableRow(row) || !isBookmarkedRow(row)) return;
                        var cb = row.querySelector('.block-select-checkbox');
                        setCheckboxChecked(cb, shouldCheck);
                    });
                    syncSelectAllState();
                }
                updateBulkBar();
            }

            function closeSelectMenu() {
                if (!menuDropdown) return;
                menuDropdown.classList.remove('open');
                var toggle = menuDropdown.querySelector('.block-select-menu-toggle');
                if (toggle) toggle.setAttribute('aria-expanded', 'false');
            }

            selectAllCheckbox.addEventListener('change', function() {
                var checked = selectAllCheckbox.checked;
                selectAllCheckbox.indeterminate = false;
                blockCheckboxes().forEach(function(cb) {
                    cb.checked = checked;
                });
                updateBulkBar();
            });

            scope.addEventListener('change', function(e) {
                if (!e.target || !e.target.classList.contains('block-select-checkbox')) return;
                if (e.target === selectAllCheckbox || e.target.classList.contains('block-select-all-checkbox')) return;
                syncSelectAllState();
                updateBulkBar();
            });

            if (menuDropdown && !menuDropdown.dataset.selectMenuInit) {
                menuDropdown.dataset.selectMenuInit = 'true';
                var menuToggle = menuDropdown.querySelector('.block-select-menu-toggle');
                if (menuToggle) {
                    menuToggle.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var isOpen = menuDropdown.classList.contains('open');
                        document.querySelectorAll('.block-select-menu-dropdown').forEach(function(d) {
                            d.classList.remove('open');
                            var btn = d.querySelector('.block-select-menu-toggle');
                            if (btn) btn.setAttribute('aria-expanded', 'false');
                        });
                        menuToggle.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
                        if (!isOpen) {
                            menuDropdown.classList.add('open');
                        }
                    });
                }

                menuDropdown.querySelectorAll('[data-block-select-action]').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        e.preventDefault();
                        applySelectionAction(item.getAttribute('data-block-select-action'));
                        closeSelectMenu();
                    });
                });

                document.addEventListener('click', function(e) {
                    if (!menuDropdown.contains(e.target)) {
                        closeSelectMenu();
                    }
                });
            }

            if (options.syncOnHtmxLoad !== false) {
                document.body.addEventListener('htmx:afterOnLoad', function() {
                    syncSelectAllState();
                    updateBulkBar();
                });
            }

            if (options.resetOnScriptRefresh) {
                window.addEventListener('scripty:project-script-refreshed', function() {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    blockCheckboxes().forEach(function(cb) {
                        cb.checked = false;
                    });
                    updateBulkBar();
                });
            }

            syncSelectAllState();
            updateBulkBar();
        };

        function escapeCreateBelowAttr(value) {

        function createBelowManageLinkHtml(options) {

        function populateCreateBelowDocumentSection(dropdown, options) {
            if (!dropdown || !options) return;

        function isBlockRowContentEmpty(row) {
            if (!row) return false;
            var textarea = row.querySelector('textarea[name="content"]');
            if (textarea) return textarea.value.trim() === '';
            var textEl = row.querySelector('.script-block-text');
            if (!textEl) return false;

        }

        function findPreviousSavedBlockRow(row) {
            if (!row) return null;
            var prev = row.previousElementSibling;
            while (prev) {
                if (prev.hasAttribute('data-block-id')) return prev;
                prev = prev.previousElementSibling;
            }
            return null;
        }

        function findPreviousSavedBlockId(row) {
            var prev = findPreviousSavedBlockRow(row);
            return prev ? prev.getAttribute('data-block-id') : null;
        }

        function resolveAfterBlockIdForDocumentInsert(row) {
            if (!row) return null;
            // + creates an empty block first, then opens this menu. Inserting a
            // song/draft should replace that placeholder, not leave it behind.
            if (row.hasAttribute('data-block-id') && isBlockRowContentEmpty(row)) {
                var previousId = findPreviousSavedBlockId(row);
                if (previousId) return previousId;
            }
            if (row.hasAttribute('data-block-id')) {
                return row.getAttribute('data-block-id');
            }
            return findPreviousSavedBlockId(row);
        }

        function submitDocumentInsertForm(documentId, afterBlockId, options) {
            options = options || {};
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '/project/documents/insert';
            form.style.display = 'none';

            var idInput = document.createElement('input');
            idInput.type = 'hidden';
            idInput.name = 'id';
            idInput.value = String(documentId);
            form.appendChild(idInput);

            if (afterBlockId) {
                var afterInput = document.createElement('input');
                afterInput.type = 'hidden';
                afterInput.name = 'afterBlockId';
                afterInput.value = String(afterBlockId);
                form.appendChild(afterInput);
            }

            if (options.asType) {
                var typeInput = document.createElement('input');
                typeInput.type = 'hidden';
                typeInput.name = 'asType';
                typeInput.value = String(options.asType);
                form.appendChild(typeInput);
            }

            document.body.appendChild(form);
            form.submit();
        }

        function insertDocumentBelowBlock(row, documentId, options) {
            if (!documentId || window.scriptyCanEditScript === false) return;
            options = options || {};
            if (window.scriptyIsOffline && window.scriptyIsOffline()) {
                window.alert(options.offlineMessage || 'Connect to insert into the script.');
                return;
            }

            var replaceEmptyId = null;
            var afterBlockId = resolveAfterBlockIdForDocumentInsert(row);
            if (row && row.hasAttribute('data-block-id') && isBlockRowContentEmpty(row)) {
                var emptyId = row.getAttribute('data-block-id');
                // Only delete the placeholder when we can insert after a previous
                // block. If this is the lone empty block, the server fills it.
                if (afterBlockId && afterBlockId !== emptyId) {
                    replaceEmptyId = emptyId;
                }
            }

            if (!replaceEmptyId) {
                submitDocumentInsertForm(documentId, afterBlockId, options);
                return;
            }

            fetch('/block/deleteInline?id=' + encodeURIComponent(replaceEmptyId), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('delete failed');
                submitDocumentInsertForm(documentId, afterBlockId, options);
            }).catch(function() {
                // Fall back to inserting after the empty row if cleanup fails.
                submitDocumentInsertForm(documentId, replaceEmptyId, options);
            });
        }

            // Pin AFTER closeAll — closeAll clears the pin when no type save is
            // in flight, and we need it for the type pick that follows.
            if (targetId) {
                window.scriptyPendingCreateBelowTypeTargetId = String(targetId);

            clearRevealedBlockControls();

            rememberActiveBlockRow(row);

            populateCreateBelowSongs(dropdown);

            dropdown.dataset.suppressOutsideClose = '1';
