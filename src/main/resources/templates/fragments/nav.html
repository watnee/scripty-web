<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="nav(currentPage)" class="sidebar menu">
    <meta name="app-asset-version" th:content="${assetVersion}">
    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme') || 'system';
            document.documentElement.setAttribute('data-theme-setting', storedTheme);
            if (storedTheme === 'dark') {
                document.documentElement.classList.add('-dark-theme');
            } else if (storedTheme === 'light') {
                document.documentElement.classList.add('-no-dark-theme');
            }
            
            const spellcheckEnabled = localStorage.getItem('spellcheck') !== 'false';
            document.documentElement.setAttribute('data-spellcheck', spellcheckEnabled ? 'true' : 'false');

            const href = window.location.href || '';
            if (window.location.protocol === 'safari-reader:' || href.indexOf('about:reader') === 0) {
                document.documentElement.classList.add('safari-reader-view');
            }
        })();
    </script>
    <nav>
        <a th:href="@{/}" class="nav-brand"><strong>Scripty</strong></a>
    </nav>
    <div class="header-actions">
        <div class="header-actions-group" aria-label="Account and settings">
        <div class="nav-dropdown help-dropdown" id="help-dropdown">
            <button class="nav-dropdown-toggle help-toggle-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Help" title="Help"
                    th:aria-current="${currentPage == 'help' or currentPage == 'shortcuts'} ? 'page'">
                <svg class="help-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
            <div class="nav-dropdown-menu">
                <a class="nav-dropdown-item" th:href="@{/help}" th:classappend="${currentPage == 'help'} ? 'active'">Scripty Help</a>
                <a class="nav-dropdown-item" th:href="@{/shortcuts}" th:classappend="${currentPage == 'shortcuts'} ? 'active'">Keyboard Shortcuts</a>
            </div>
        </div>
        <div class="nav-dropdown settings-dropdown" id="settings-dropdown">
            <button class="nav-dropdown-toggle settings-toggle-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Settings" title="Settings">
                <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <div class="nav-dropdown-menu">
                <button class="nav-dropdown-item theme-option" data-theme="light" type="button" role="menuitemradio" aria-checked="false">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; display: inline; vertical-align: middle;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg> Light
                </button>
                <button class="nav-dropdown-item theme-option" data-theme="dark" type="button" role="menuitemradio" aria-checked="false">
                    <svg class="moon-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; display: inline; vertical-align: middle;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>

        <div class="nav-dropdown user-dropdown-container" id="user-dropdown">
            <button class="nav-dropdown-toggle user-toggle-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="User menu" title="User menu">
                <svg class="user-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
            <div class="nav-dropdown-menu">
                <a class="nav-dropdown-item" th:href="@{/login}" sec:authorize="!isAuthenticated()">Sign In</a>
                <a class="nav-dropdown-item" th:href="@{/team/list}" th:classappend="${currentPage == 'teams'} ? 'active'" sec:authorize="isAuthenticated()">Teams</a>
                <a class="nav-dropdown-item" th:href="@{/user/list}" th:classappend="${currentPage == 'users'} ? 'active'" sec:authorize="hasRole('ROLE_ADMIN')">Users</a>

        </div>
    </div>
    <div id="project-delete-modal" class="confirm-modal" hidden aria-modal="true" role="dialog" aria-labelledby="project-delete-title">
        <div class="confirm-modal-panel">
            <h2 id="project-delete-title">Delete project?</h2>
            <p>Are you sure you want to delete <strong id="project-delete-name"></strong>? This cannot be undone.</p>
            <div class="confirm-modal-actions">
                <button type="button" id="project-delete-cancel">Cancel</button>
                <button type="button" id="project-delete-confirm" class="bad">Delete</button>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
    (function() {
        let lastFocusedEditable = null;
        let hoveredRow = null;
        let lastActiveBlockRow = null;
        if (typeof window.scriptyBlockEditLocked === 'undefined') {
            window.scriptyBlockEditLocked = false;
        }

        // Spellcheck state management
        function applySpellcheckToElement(el, state) {
            if (el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && el.type === 'text')) {
                el.setAttribute('spellcheck', state ? 'true' : 'false');
            }
        }

        function updateAllSpellcheckElements() {
            const state = localStorage.getItem('spellcheck') !== 'false';
            document.querySelectorAll('textarea, input[type="text"]').forEach(el => {
                applySpellcheckToElement(el, state);
            });
        }

        window.toggleSpellcheck = function() {
            const currentState = localStorage.getItem('spellcheck') !== 'false';
            const newState = !currentState;
            localStorage.setItem('spellcheck', newState ? 'true' : 'false');
            document.documentElement.setAttribute('data-spellcheck', newState ? 'true' : 'false');
            updateAllSpellcheckElements();
            
            const btn = document.querySelector('.spellcheck-toggle-btn');
            if (btn) {
                const title = newState ? 'Spellcheck: Enabled (click to disable)' : 'Spellcheck: Disabled (click to enable)';
                btn.title = title;
                btn.setAttribute('aria-label', title);
            }
        };

        // Initialize spellcheck on load
        function initSpellcheck() {
            const state = localStorage.getItem('spellcheck') !== 'false';
            updateAllSpellcheckElements();
            const btn = document.querySelector('.spellcheck-toggle-btn');
            if (btn) {
                const title = state ? 'Spellcheck: Enabled (click to disable)' : 'Spellcheck: Disabled (click to enable)';
                btn.title = title;
                btn.setAttribute('aria-label', title);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSpellcheck);
        } else {
            initSpellcheck();
        }

        // Apply on HTMX content swaps
        document.body.addEventListener('htmx:afterOnLoad', function() {
            updateAllSpellcheckElements();
        });

        function rememberActiveBlockRow(row) {
            if (row && row.hasAttribute('data-block-id')) {
                lastActiveBlockRow = row;
            }
        }

        // Track last focused input/textarea
        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'textarea'))) {
                lastFocusedEditable = e.target;
                rememberActiveBlockRow(findBlockRow(e.target));
            }
        });

        // Track hovered block row
        document.addEventListener('mouseover', function(e) {
            hoveredRow = findBlockRow(e.target);
            rememberActiveBlockRow(hoveredRow);
        });

        document.addEventListener('click', function(e) {
            rememberActiveBlockRow(findBlockRow(e.target));
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('a, button, input, textarea, select')) return;
            const createBlockContent = e.target.closest('.project-script .block-row:not([data-block-id]) .block-content');
            if (!createBlockContent) return;
            const textarea = createBlockContent.querySelector('textarea[name="content"]');
            if (textarea) {
                textarea.focus({ preventScroll: true });
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter' || e.shiftKey || e.repeat) return;
            const textarea = e.target;
            if (!isBlockContentTextarea(textarea)) return;
            if (isCreateBlockTextarea(textarea)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                submitCreateRowFromEnter(textarea);
                return;
            }
            const form = textarea.closest('form[hx-post*="/block/editInline"]');
            if (!form) return;
            e.preventDefault();
            e.stopImmediatePropagation();
            saveBlockThenOpenCreateBelow(form);
        });

        // Move blocks up/down keyboard shortcut
        document.addEventListener('keydown', function(e) {
            const isMoveUp = (e.altKey && e.key === 'ArrowUp') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowUp');
            const isMoveDown = (e.altKey && e.key === 'ArrowDown') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowDown');
            
            if (!isMoveUp && !isMoveDown) return;
            
            const activeEl = document.activeElement;
            let targetRow = activeEl ? findBlockRow(activeEl) : null;
            if (!targetRow) {
                targetRow = hoveredRow;
            }
            
            if (!targetRow) return;
            
            e.preventDefault();
            moveBlockRow(targetRow, isMoveUp ? 'moveUp' : 'moveDown');
        });

        document.addEventListener('click', function(e) {
            const markerLink = e.target.closest('a.block-action-pin[href*="togglePinned"], a.block-action-bookmark[href*="toggleBookmark"]');
            if (!markerLink) return;
            if (markerLink.getAttribute('hx-boost') === 'false') {
                return;
            }
            e.preventDefault();
            window.location.href = markerLink.href;
        });

        document.addEventListener('click', function(e) {
            const moveUpBtn = e.target.closest('.block-move-up, .move-up[role="button"]');
            const moveDownBtn = e.target.closest('.block-move-down, .move-down[role="button"]');
            if (!moveUpBtn && !moveDownBtn) return;
            e.preventDefault();
            const targetRow = findBlockRow(moveUpBtn || moveDownBtn);
            if (!targetRow) return;
            moveBlockRow(targetRow, moveUpBtn ? 'moveUp' : 'moveDown');
        });

        function isEditable(el) {
            if (!el) return false;
            const tagName = el.tagName;
            return tagName === 'TEXTAREA' ||
                   (tagName === 'INPUT' && ['text', 'search', 'url', 'tel', 'email', 'password', 'number'].includes(el.type)) ||
                   el.isContentEditable;
        }

        function isCreateBlockTextarea(el) {
            if (!el || el.tagName !== 'TEXTAREA') return false;
            const row = findAnyBlockRow(el);
            return !!row && !row.hasAttribute('data-block-id');
        }

        function isBlockContentTextarea(el) {
            return !!el && el.tagName === 'TEXTAREA' && el.name === 'content' && !!el.closest('.block-content');
        }

        function isEmptyAtStart(textarea) {
            return textarea.value.trim() === '' &&
                   textarea.selectionStart === textarea.selectionEnd;
        }

        function closeBlockEdit(form, done) {
            if (!form) {
                if (done) done();
                return;
            }
            if (form.dataset.committing === 'true') {
                if (done) done();
                return;
            }
            const textarea = form.querySelector('textarea[name="content"]');
            if (!textarea) {
                if (done) done();
                return;
            }
            form.dataset.committing = 'true';
            const formData = new FormData(form);
            const url = form.getAttribute('hx-post') || '/block/editInline';
            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams(formData).toString()
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                const target = form.closest('.block-content');
                if (target) {
                    target.innerHTML = html;
                }
            }).catch(function() {
                /* keep edit form if save fails */
            }).finally(function() {
                delete form.dataset.committing;
                if (done) done();
            });
        }

        function flushOpenBlockEdits(done) {
            var forms = Array.from(document.querySelectorAll(
                '.block-content form[hx-post*="/block/editInline"]'
            ));
            if (forms.length === 0) {
                if (done) done();
                return;
            }
            var remaining = forms.length;
            function finishOne() {
                remaining--;
                if (remaining <= 0 && done) done();
            }
            forms.forEach(function(form) {
                var textarea = form.querySelector('textarea[name="content"]');
                if (!textarea || textarea.value.trim() === '') {
                    revertEmptySavedBlockEdit(form);
                    finishOne();
                    return;
                }
                closeBlockEdit(form, finishOne);
            });
        }

        function handleEmptyBlockBackspace(ta) {
            // Keep the row and stay in the field; only block default browser/history behavior.
            ta.focus({ preventScroll: true });
        }

        function revertEmptySavedBlockEdit(form) {
            if (!form || form.dataset.reverting === 'true') return;
            const row = form.closest('[data-block-id]');
            const blockContent = form.closest('.block-content');
            if (!row || !blockContent) return;
            const textarea = form.querySelector('textarea[name="content"]');
            if (!textarea || textarea.value.trim() !== '') return;

            form.dataset.reverting = 'true';
            const blockId = row.getAttribute('data-block-id');
            fetch('/block/showInline?id=' + encodeURIComponent(blockId), {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (blockContent.isConnected) {
                    blockContent.innerHTML = html;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(blockContent);
                    }
                }
            }).catch(function() {
                /* keep edit form if revert fails */
            }).finally(function() {
                delete form.dataset.reverting;
            });
        }

        function focusBlockContentEnd(row) {
            if (!row) return;
            const blockContent = row.querySelector('.block-content');
            if (!blockContent) return;
            const existingTa = blockContent.querySelector('textarea[name="content"]');
            if (existingTa) {
                autoGrowTextarea(existingTa);
                existingTa.focus({ preventScroll: true });
                const len = existingTa.value.length;
                existingTa.setSelectionRange(len, len);
                return;
            }
            pendingBlockCaret = {
                blockContent: blockContent,
                offset: blockContent.querySelector('.script-block-text')?.textContent?.length || 0
            };
            blockContent.click();
            requestAnimationFrame(function() {
                requestAnimationFrame(focusBlockTextareaFromClick);
            });
        }

        function editSavedBlockRow(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            const blockContent = row.querySelector('.block-content');
            const blockId = row.getAttribute('data-block-id');
            if (!blockContent || !blockId) return;
            fetch('/block/editInline?id=' + encodeURIComponent(blockId), {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (!blockContent.isConnected) return;
                blockContent.innerHTML = html;
                if (typeof htmx !== 'undefined') {
                    htmx.process(blockContent);
                }
                focusBlockContentEnd(row);
            }).catch(function() {
                focusBlockContentEnd(row);
            });
        }

        function openCreateBelowRow(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            if (row.dataset.openingCreateBelow === 'true') return;
            const nextRow = row.nextElementSibling;
            if (nextRow && nextRow.classList.contains('block-row') && !nextRow.hasAttribute('data-block-id')) {
                focusBlockContentEnd(nextRow);
                return;
            }
            row.dataset.openingCreateBelow = 'true';
            const blockId = row.getAttribute('data-block-id');
            fetch('/block/createBelowInline?id=' + encodeURIComponent(blockId) + '&surface=project', {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const createRow = template.content.firstElementChild;
                if (!createRow || !row.parentNode) return;
                row.insertAdjacentElement('afterend', createRow);
                if (typeof htmx !== 'undefined') {
                    htmx.process(createRow);
                }
                focusBlockContentEnd(createRow);
            }).catch(function() {
                /* keep current edit if create-row load fails */
            }).finally(function() {
                delete row.dataset.openingCreateBelow;
            });
        }

        function createEmptyBlockBelow(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            if (row.dataset.openingCreateBelow === 'true') return;
            row.dataset.openingCreateBelow = 'true';
            const blockId = row.getAttribute('data-block-id');
            const body = new URLSearchParams({
                id: blockId,
                content: '',
                surface: 'project'
            });
            fetch('/block/createBelowInline', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                credentials: 'same-origin',
                body: body.toString()
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children);
                if (newRows.length === 0 || !row.parentNode) return;
                let insertAfter = row;
                newRows.forEach(function(newRow) {
                    insertAfter.insertAdjacentElement('afterend', newRow);
                    insertAfter = newRow;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(newRow);
                    }
                });
                dedupeTrailingCreateRows(row.parentNode);
                const createRow = newRows.find(function(newRow) {
                    return !newRow.hasAttribute('data-block-id') && newRow.querySelector('textarea[name="content"]');
                });
                if (createRow) {
                    focusBlockContentEnd(createRow);
                } else {
                    const savedRow = newRows.find(function(newRow) {
                        return newRow.hasAttribute('data-block-id');
                    });
                    if (savedRow) {
                        editSavedBlockRow(savedRow);
                    }
                }
            }).catch(function() {
                /* keep current edit if create fails */
            }).finally(function() {
                delete row.dataset.openingCreateBelow;
            });
        }

        function saveBlockThenOpenCreateBelow(form) {
            const row = form ? form.closest('[data-block-id]') : null;
            if (!row) return;
            if (row.dataset.enterCreatingBelow === 'true') return;
            row.dataset.enterCreatingBelow = 'true';
            const textarea = form.querySelector('textarea[name="content"]');
            if (textarea && textarea.value.trim() === '') {
                const blockContent = form.closest('.block-content');
                if (!blockContent) {
                    delete row.dataset.enterCreatingBelow;
                    return;
                }
                fetch('/block/showInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                    credentials: 'same-origin',
                    cache: 'no-store'
                }).then(function(response) {
                    return response.text();
                }).then(function(html) {
                    if (blockContent.isConnected) {
                        blockContent.innerHTML = html;
                        if (typeof htmx !== 'undefined') {
                            htmx.process(blockContent);
                        }
                    }
                }).catch(function() {
                    /* keep edit form if revert fails */
                }).finally(function() {
                    createEmptyBlockBelow(row);
                    delete row.dataset.enterCreatingBelow;
                });
                return;
            }
            closeBlockEdit(form, function() {
                openCreateBelowRow(row);
                delete row.dataset.enterCreatingBelow;
            });
        }

        function buildCreateFormPostBody(form) {
            const formData = new FormData(form);
            const params = new URLSearchParams(formData);
            if (document.querySelector('.project-script') && !params.has('surface')) {
                params.set('surface', 'project');
            }
            return params;
        }

        function ensureProjectCreateUrl(url) {
            if (!url || !document.querySelector('.project-script')) return url;
            if (url.indexOf('surface=') !== -1) return url;
            return url + (url.indexOf('?') === -1 ? '?' : '&') + 'surface=project';
        }

        function submitCreateRowFromEnter(textarea) {
            if (!isBlockContentTextarea(textarea) || !isCreateBlockTextarea(textarea)) return;
            const form = textarea.closest('form');
            const row = findAnyBlockRow(textarea);
            if (!form || !row || row.dataset.enterCreatingBelow === 'true') return;
            row.dataset.enterCreatingBelow = 'true';
            const url = ensureProjectCreateUrl(form.getAttribute('hx-post') || '/block/createBelowInline');
            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                credentials: 'same-origin',
                body: buildCreateFormPostBody(form).toString()
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children);
                if (newRows.length === 0 || !row.parentNode) return;
                row.replaceWith.apply(row, newRows);
                if (typeof htmx !== 'undefined') {
                    newRows.forEach(function(newRow) {
                        htmx.process(newRow);
                    });
                }
                dedupeTrailingCreateRows(row.parentNode);
                const savedRow = newRows.find(function(newRow) {
                    return newRow.hasAttribute('data-block-id');

        function initBlockTextSelection() {
            if (window._scriptyBlockTextSelectionInit) return;

            const DRAG_THRESHOLD = 4;
            let pointerState = null;

            function clearSuppressFlag() {
                window.scriptySuppressBlockEditClick = false;
            }

            function scheduleClearSuppressFlag() {
                window.scriptySuppressBlockEditClick = true;
                setTimeout(clearSuppressFlag, 0);
            }

            document.body.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;
                if (e.target.closest('a, .drag-handle, .block-drag-menu-dropdown, .block-left-controls, .block-actions, .block-select-checkbox')) return;

                const blockContent = e.target.closest('.block-content');
                pointerState = blockContent ? {
                    blockContent: blockContent,
                    startX: e.clientX,
                    startY: e.clientY,
                    moved: false,
                    selectionStart: (window.getSelection && window.getSelection().toString()) || ''
                } : null;
                clearSuppressFlag();
            }, true);

            document.body.addEventListener('mousemove', function(e) {
                if (!pointerState || pointerState.moved) return;
                const dx = Math.abs(e.clientX - pointerState.startX);
                const dy = Math.abs(e.clientY - pointerState.startY);
                if (dx >= DRAG_THRESHOLD || dy >= DRAG_THRESHOLD) {
                    pointerState.moved = true;
                    window.scriptySuppressBlockEditClick = true;
                }
            }, true);

            document.body.addEventListener('mouseup', function() {
                if (!pointerState) return;

                const selectionText = (window.getSelection && window.getSelection().toString()) || '';
                const selectionChanged = selectionText !== pointerState.selectionStart;
                const wasSelecting = pointerState.moved ||
                    (selectionChanged && selectionText.length > 0);
                pointerState = null;

                if (wasSelecting) {
                    scheduleClearSuppressFlag();
                    pendingBlockCaret = null;
                    return;
                }

                if (pendingBlockCaret && pendingBlockCaret.blockContent &&
                    pendingBlockCaret.blockContent.querySelector('form textarea[name="content"]')) {

        function resolveProjectId() {
            const params = new URLSearchParams(window.location.search);
            if (window.location.pathname.startsWith('/project/show') && params.has('id')) {
                return params.get('id');

            if (params.has('projectId')) {
                return params.get('projectId');
            }
            const projectLink = document.querySelector('a[href*="/project/show?id="], a[href*="/project/show/"]');
            if (projectLink) {
                const href = projectLink.getAttribute('href');
                const match = href.match(/[\?&]id=(\d+)/);
                if (match) {
                    return match[1];
                }
            }
            return null;
        }

        function abortUndoStatusFetch() {

        function calcDropPosition(dragRow, targetRow, clientY) {
            const dragOrder = parseInt(dragRow.getAttribute('data-block-order'), 10);
            const targetOrder = parseInt(targetRow.getAttribute('data-block-order'), 10);
            if (Number.isNaN(dragOrder) || Number.isNaN(targetOrder)) {
                return null;
            }
            const rect = targetRow.getBoundingClientRect();
            const effectiveHeight = Math.max(rect.height, 24);
            const insertBefore = clientY < rect.top + effectiveHeight / 2;
            let newOrder = insertBefore ? targetOrder : targetOrder + 1;
            if (dragOrder < newOrder) {
                newOrder--;
            }
            return newOrder;
        }

        window.scriptyAbortUndoStatusFetch = abortUndoStatusFetch;
        window.scriptyCalcDropPosition = calcDropPosition;

        function getBlockRowId(row) {
            if (!row || !row.isConnected || row.classList.contains('filtered-out') || row.style.display === 'none') {

                lastActiveBlockRow,
                hoveredRow,
                findBlockRow(triggerEl)
            ];
            for (let i = 0; i < candidates.length; i++) {
                const id = getBlockRowId(candidates[i]);
                if (id) return id;

        function findAdjacentBlockRow(row, direction) {
            if (!row) return null;
            const isUp = direction === 'moveUp';
            let sibling = isUp ? row.previousElementSibling : row.nextElementSibling;
            while (sibling) {
                if (sibling.hasAttribute('data-block-id')) return sibling;
                sibling = isUp ? sibling.previousElementSibling : sibling.nextElementSibling;
            }
            return null;
        }

        function reindexBlockOrders(container) {

        function updateMoveButtonStates(container) {
            if (!container) return;
            const rows = container.querySelectorAll('[data-block-id]');
            rows.forEach(function(row, index) {
                const up = row.querySelector('.block-move-up');
                const down = row.querySelector('.block-move-down');
                if (up) up.style.display = index === 0 ? 'none' : '';
                if (down) down.style.display = index === rows.length - 1 ? 'none' : '';
            });
        }

        function swapBlockRows(row, direction) {
            const sibling = findAdjacentBlockRow(row, direction);
            if (!sibling) return false;
            const container = row.parentNode;
            if (direction === 'moveUp') {
                container.insertBefore(row, sibling);
            } else {
                container.insertBefore(sibling, row);
            }
            reindexBlockOrders(container);
            updateMoveButtonStates(container);
            return true;
        }

        function clearDropMarkers(container) {

        function findDropTarget(container, clientY, dragRow) {
            if (!container) return null;
            const rows = Array.from(container.querySelectorAll('[data-block-id]')).filter(function(row) {
                return row !== dragRow;
            });
            if (rows.length === 0) return null;
            const minRowHeight = 24;
            for (let i = 0; i < rows.length; i++) {
                const rect = rows[i].getBoundingClientRect();
                const effectiveHeight = Math.max(rect.height, minRowHeight);
                if (clientY < rect.top + effectiveHeight / 2) {
                    return { row: rows[i], insertBefore: true };
                }
            }
            return { row: rows[rows.length - 1], insertBefore: false };
        }

        function applyDropMarker(container, clientY, dragRow) {
            clearDropMarkers(container);

        function executeMove(blockId, direction, targetRow) {
            sessionStorage.setItem('activeBlockId', blockId);
            if (window.scriptyAbortUndoStatusFetch) {
                window.scriptyAbortUndoStatusFetch();
            }
            const projectId = resolveProjectId();
            let url = '/block/' + direction + '?id=' + blockId;
            if (projectId) {
                url += '&projectId=' + projectId;
            }
            fetch(url, {
                method: 'GET',
                credentials: 'same-origin',
                cache: 'no-store',
                redirect: 'manual'
            }).then(function(response) {
                if (response.ok || response.type === 'opaqueredirect' || (response.status >= 300 && response.status < 400)) {
                    if (targetRow && swapBlockRows(targetRow, direction)) {
                        updateUndoRedoButtons(projectId);
                        return;
                    }
                }
                window.location.reload();
            }).catch(function() {
                window.location.reload();
            });
        }

        function moveBlockRow(targetRow, direction) {
            if (!targetRow) return;
            const blockId = targetRow.getAttribute('data-block-id');
            if (!blockId) return;

            const form = targetRow.querySelector('form');
            if (form) {
                const formData = new FormData(form);
                const actionUrl = form.getAttribute('hx-post') || form.action || '/block/editInline';
                fetch(actionUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(formData).toString()
                }).then(function() {
                    executeMove(blockId, direction, targetRow);
                }).catch(function() {
                    executeMove(blockId, direction, targetRow);
                });
            } else {
                executeMove(blockId, direction, targetRow);
            }
        }

            function submitBulkPostForm(action, fields) {
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = action;
                form.setAttribute('hx-boost', 'false');
                Object.keys(fields).forEach(function(name) {
                    var input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = name;
                    input.value = fields[name];
                    form.appendChild(input);
                });
                document.body.appendChild(form);
                form.submit();
            }

            function runBulkAction(fieldsByAction) {
                runWhenHtmxIdle(function() {
                    flushOpenBlockEdits(function() {
                        runWhenHtmxIdle(function() {
                            submitBulkPostForm(fieldsByAction.action, fieldsByAction.fields);
                        });
                    });
                });
            }

            function findOpenEditFormForBlock(blockId) {
                if (!blockId) return null;
                var row = document.querySelector(
                    '.block-row[data-block-id="' + blockId + '"], tr[data-block-id="' + blockId + '"]'
                );
                return row ? row.querySelector('.block-content form[hx-post*="/block/editInline"]') : null;
            }

            function applyBlockTypeClass(blockContent, type) {
                if (!blockContent || !type) return;
                blockContent.classList.forEach(function(cls) {
                    if (cls.indexOf('block-type-') === 0) {
                        blockContent.classList.remove(cls);
                    }
                });
                blockContent.classList.add('block-type-' + type.toLowerCase());
                blockContent.classList.remove('script-block--dialogue', 'script-block--action');
                if (type === 'DIALOGUE') {
                    blockContent.classList.add('script-block--dialogue');
                } else {
                    blockContent.classList.add('script-block--action');
                }
                var row = blockContent.closest('.block-row');
                if (!row) return;
                row.setAttribute('data-block-type', type);
                var label = row.querySelector('.block-element-label');
                if (label) {
                    label.setAttribute('data-block-type', type);
                    label.textContent = window.scriptyBlockTypeLabel ? window.scriptyBlockTypeLabel(type) : type;
                }
            }

            window.scriptyBlockTypeLabel = function(type) {
                var labels = {
                    SCENE: 'Scene',
                    ACTION: 'Action',
                    DIALOGUE: 'Dialogue',
                    PARENTHETICAL: '(Paren)',
                    TRANSITION: 'Transition',
                    LYRICS: 'Lyrics',
                    CENTERED: 'Centered',
                    SECTION: 'Section',
                    SYNOPSIS: 'Synopsis',
                    NOTE: 'Note',
                    PAGE_BREAK: 'Page Break'
                };
                return labels[type] || type;
            };

            var pendingTypeChangeContent = null;

            function finishBlockTypeChange() {
                window.scriptyBlockTypeChangePending = false;
                pendingTypeChangeContent = null;
            }

            function beginBlockTypeChange(blockId) {
                window.scriptyBlockTypeChangePending = true;
                pendingTypeChangeContent = null;
                if (!blockId) return;
                var row = document.querySelector(
                    '.block-row[data-block-id="' + blockId + '"], tr[data-block-id="' + blockId + '"]'
                );
                if (!row) return;
                var textarea = row.querySelector('textarea[name="content"]');
                if (textarea) {
                    pendingTypeChangeContent = textarea.value;
                }
            }

            function resolveTypeChangeContent(form) {
                var textarea = form ? form.querySelector('textarea[name="content"]') : null;
                if (textarea && textarea.value != null) {
                    return textarea.value;
                }
                if (pendingTypeChangeContent != null) {
                    return pendingTypeChangeContent;
                }
                return null;
            }

            function runSingleBlockTypeAction(blockId, type, form) {
                var textarea = form.querySelector('textarea[name="content"]');
                var caretStart = textarea ? textarea.selectionStart : 0;
                var caretEnd = textarea ? textarea.selectionEnd : caretStart;
                var fields = {
                    id: blockId,
                    type: type,
                    projectId: resolveBulkProjectId(),
                    partial: 'project'
                };
                var content = resolveTypeChangeContent(form);
                if (content != null) {
                    fields.content = content;
                }
                if (form) {
                    var formData = new FormData(form);
                    var personId = formData.get('personId');
                    if (personId) {
                        fields.personId = personId;
                    }
                    var tags = formData.get('tags');
                    if (tags != null && tags !== '') {
                        fields.tags = tags;
                    }
                }
                fetch('/block/setTypeAndContent', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(fields).toString()
                }).then(function(response) {
                    if (!response.ok) {
                        throw new Error('setTypeAndContent failed');
                    }
                    return response.text();
                }).then(function(html) {
                    var row = form.closest('.block-row');
                    var blockContent = row ? row.querySelector('.block-content') : null;
                    if (!blockContent) return;
                    applyBlockTypeClass(blockContent, type);
                    blockContent.innerHTML = html;
                    var newTextarea = blockContent.querySelector('textarea[name="content"]');
                    if (!newTextarea) return;
                    autoGrowTextarea(newTextarea);
                    newTextarea.focus({ preventScroll: true });
                    var len = newTextarea.value.length;
                    var start = Math.max(0, Math.min(caretStart, len));
                    var end = Math.max(start, Math.min(caretEnd, len));
                    newTextarea.setSelectionRange(start, end);
                }).catch(function() {
                    var fallbackFields = Object.assign({}, fields);
                    delete fallbackFields.partial;
                    submitBulkPostForm('/block/setTypeAndContent', fallbackFields);
                }).finally(finishBlockTypeChange);
            }

            function getBlockRowCopyText(row) {
                if (!row) return '';

                if (row.classList.contains('scene-header-row')) {
                    var sceneName = row.querySelector('.scene-name-display');
                    if (sceneName && !sceneName.querySelector('.scene-name-placeholder')) {
                        return sceneName.textContent.trim();
                    }
                    var sceneSection = row.closest('.script-scene');
                    var readerSceneName = sceneSection ? sceneSection.querySelector('.reader-visible-scene-name') : null;
                    return readerSceneName ? readerSceneName.textContent.trim() : '';
                }

                var content = row.querySelector('.block-content');
                if (!content) return '';

                var lines = [];
                var character = content.querySelector('.reader-visible-character-name, .character-name');
                if (character) {
                    lines.push(character.textContent.trim());
                }

                var textarea = content.querySelector('textarea[name="content"]');
                var textEl = content.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
                if (textarea && content.querySelector('form:focus-within')) {
                    lines.push(textarea.value);
                } else if (textEl) {
                    lines.push(textEl.textContent);
                } else if (textarea) {
                    lines.push(textarea.value);
                }

                return lines.join('\n').trimEnd();
            }

            function copyTextToClipboard(text, button) {
                if (!text) return;

                function markCopied() {
                    if (!button) return;
                    var original = button.textContent;
                    button.textContent = 'Copied';
                    button.classList.add('is-copied');
                    window.setTimeout(function() {
                        button.textContent = original;
                        button.classList.remove('is-copied');
                    }, 1500);
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(markCopied).catch(function() {
                        var textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.setAttribute('readonly', '');
                        textarea.style.position = 'fixed';
                        textarea.style.left = '-9999px';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        markCopied();
                    });
                } else {
                    var fallback = document.createElement('textarea');
                    fallback.value = text;
                    fallback.setAttribute('readonly', '');
                    fallback.style.position = 'fixed';
                    fallback.style.left = '-9999px';
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                    markCopied();
                }
            }

            document.body.addEventListener('click', function(e) {
                if (!document.querySelector('.project-script')) return;

                var typeBtn = e.target.closest('.bulk-type-btn');
                if (typeBtn) {
                    e.preventDefault();
                    var typeIds = window.scriptyGetSelectedBlockIds();
                    if (typeIds.length === 0) {
                        var activeBlockId = window.scriptyGetActiveBlockId
                            ? window.scriptyGetActiveBlockId(typeBtn)
                            : null;
                        if (!activeBlockId) {
                            window.scriptyBulkSelectionAlert();
                            return;
                        }
                        typeIds = [activeBlockId];
                    }
                    sessionStorage.setItem('activeBlockId', typeIds[0]);
                    rememberActiveBlockCaret(typeIds[0]);
                    var type = typeBtn.getAttribute('data-bulk-type');
                    if (typeIds.length === 1) {
                        beginBlockTypeChange(typeIds[0]);
                        var editForm = findOpenEditFormForBlock(typeIds[0]);
                        if (editForm) {
                            runSingleBlockTypeAction(typeIds[0], type, editForm);
                            return;
                        }
                        finishBlockTypeChange();
                    }
                    runBulkAction({
                        action: '/block/bulkSetType',
                        fields: {
                            ids: typeIds.join(','),
                            type: type,
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                var alignBtn = e.target.closest('.bulk-align-btn');
                if (alignBtn) {
                    e.preventDefault();
                    var alignIds = window.scriptyGetSelectedBlockIds();
                    if (alignIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkSetAlign',
                        fields: {
                            ids: alignIds.join(','),
                            align: alignBtn.getAttribute('data-bulk-align'),
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                var styleBtn = e.target.closest('.bulk-style-btn');
                if (styleBtn) {
                    e.preventDefault();
                    var styleIds = window.scriptyGetSelectedBlockIds();
                    if (styleIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkToggleStyle',
                        fields: {
                            ids: styleIds.join(','),
                            style: styleBtn.getAttribute('data-bulk-style'),
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                if (e.target.closest('#project-bulk-add-tags-btn')) {
                    e.preventDefault();
                    var tagIds = window.scriptyGetSelectedBlockIds();
                    if (tagIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    var tagsInput = document.getElementById('project-bulk-tags-input');
                    var tags = tagsInput ? tagsInput.value.trim() : '';
                    if (!tags) {
                        alert('Please enter tags to add.');
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkAddTags',
                        fields: {
                            ids: tagIds.join(','),
                            tags: tags,
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                if (e.target.closest('#project-bulk-copy-btn')) {
                    var copyCheckboxes = document.querySelectorAll(
                        '.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked'
                    );
                    if (copyCheckboxes.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    var copyText = Array.from(copyCheckboxes).map(function(cb) {
                        return getBlockRowCopyText(cb.closest('.block-row, tr[data-block-id]'));
                    }).filter(function(value) {
                        return value.length > 0;
                    }).join('\n');
                    if (!copyText) {
                        alert('No text to copy in the selected blocks.');
                        return;
                    }
                    copyTextToClipboard(copyText, e.target.closest('#project-bulk-copy-btn'));
                    return;
                }

                if (e.target.closest('#project-bulk-delete-btn')) {
                    e.preventDefault();
                    var deleteIds = window.scriptyGetSelectedBlockIds();
                    if (deleteIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    var confirmMsg = 'Are you sure you want to delete the ' + deleteIds.length +
                        ' selected block' + (deleteIds.length > 1 ? 's' : '') + '?';
                    if (!confirm(confirmMsg)) {
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkDelete',
                        fields: {
                            ids: deleteIds.join(','),
                            projectId: resolveBulkProjectId()
                        }
                    });
                }
            });

            document.body.addEventListener('mousedown', function(e) {
                if (e.target.closest('.bulk-type-btn')) {
                    var activeBlockId = window.scriptyGetActiveBlockId
                        ? window.scriptyGetActiveBlockId(e.target)
                        : null;
                    beginBlockTypeChange(activeBlockId);
                    e.preventDefault();
                }
            }, true);
        };

        window.scriptyInitProjectPageScripts = function() {
            if (!document.querySelector('.project-script')) return;
            document.querySelectorAll('.project-script .scene-blocks').forEach(function(container) {
                dedupeTrailingCreateRows(container);
            });
            if (window.scriptyInitProjectBulkActions) {
                window.scriptyInitProjectBulkActions();
            }
            if (window.scriptyInitBlockBulkSelection) {
                window.scriptyInitBlockBulkSelection({
                    selectAllId: 'project-select-all-blocks',
                    bulkBarId: 'project-bulk-bar',
                    bulkCountId: 'project-bulk-count',
                    resetOnScriptRefresh: true
                });
            }
        };

        window.scriptyInitBlockBulkSelection = function(options) {
            options = options || {};
            var selectAllId = options.selectAllId;
            if (!selectAllId) return;

            var scope = options.scope || document;
            var selectAllCheckbox = document.getElementById(selectAllId);
            if (!selectAllCheckbox || selectAllCheckbox.dataset.bulkSelectionInit === 'true') return;
            selectAllCheckbox.dataset.bulkSelectionInit = 'true';

            var bulkBar = options.bulkBarId ? document.getElementById(options.bulkBarId) : null;
            var bulkCount = options.bulkCountId ? document.getElementById(options.bulkCountId) : null;
            var controlRoot = selectAllCheckbox.closest('.block-left-controls') || scope;
            var menuDropdown = controlRoot.querySelector('.block-select-menu-dropdown');

            function blockCheckboxes() {
                return scope.querySelectorAll(
                    '.block-row[data-block-id] .block-select-checkbox, tr[data-block-id] .block-select-checkbox'
                );
            }

            function blockRows() {
                return scope.querySelectorAll('.block-row[data-block-id], tr[data-block-id]');
            }

            function isSelectableRow(row) {
                if (!row || !row.hasAttribute('data-block-id')) return false;
                if (row.classList.contains('filtered-out')) return false;
                if (row.style.display === 'none') return false;
                return true;
            }

            function isBookmarkedRow(row) {
                return row.getAttribute('data-bookmarked') === 'true';
            }

            function updateBulkBar() {
                var count = window.scriptyGetSelectedBlockIds
                    ? window.scriptyGetSelectedBlockIds().length
                    : scope.querySelectorAll(
                        '.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked'
                    ).length;
                if (bulkBar) {
                    bulkBar.hidden = count === 0;
                }
                if (bulkCount) {
                    bulkCount.textContent = count === 1 ? '1 block selected' : count + ' blocks selected';
                }
            }

            function syncSelectAllState() {
                var checkboxes = blockCheckboxes();
                var checkedCount = 0;
                checkboxes.forEach(function(cb) {
                    if (cb.checked) checkedCount++;
                });
                if (checkboxes.length === 0) {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    return;
                }
                selectAllCheckbox.checked = checkedCount === checkboxes.length;
                selectAllCheckbox.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
            }

            function setCheckboxChecked(checkbox, checked) {
                if (!checkbox || checkbox.checked === checked) return;
                checkbox.checked = checked;
                checkbox.dispatchEvent(new Event('change', { bubbles: true }));
            }

            function applySelectionAction(action) {
                if (action === 'all') {
                    blockCheckboxes().forEach(function(cb) {
                        setCheckboxChecked(cb, true);
                    });
                    selectAllCheckbox.checked = true;
                    selectAllCheckbox.indeterminate = false;
                } else if (action === 'none') {
                    blockCheckboxes().forEach(function(cb) {
                        setCheckboxChecked(cb, false);
                    });
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                } else if (action === 'bookmarked' || action === 'unbookmark') {
                    var shouldCheck = action === 'bookmarked';
                    blockRows().forEach(function(row) {
                        if (!isSelectableRow(row) || !isBookmarkedRow(row)) return;
                        var cb = row.querySelector('.block-select-checkbox');
                        setCheckboxChecked(cb, shouldCheck);
                    });
                    syncSelectAllState();
                }
                updateBulkBar();
            }

            function closeSelectMenu() {
                if (!menuDropdown) return;
                menuDropdown.classList.remove('open');
                var toggle = menuDropdown.querySelector('.block-select-menu-toggle');
                if (toggle) toggle.setAttribute('aria-expanded', 'false');
            }

            selectAllCheckbox.addEventListener('change', function() {
                var checked = selectAllCheckbox.checked;
                selectAllCheckbox.indeterminate = false;
                blockCheckboxes().forEach(function(cb) {
                    cb.checked = checked;
                });
                updateBulkBar();
            });

            scope.addEventListener('change', function(e) {
                if (!e.target || !e.target.classList.contains('block-select-checkbox')) return;
                if (e.target === selectAllCheckbox || e.target.classList.contains('block-select-all-checkbox')) return;
                syncSelectAllState();
                updateBulkBar();
            });

            if (menuDropdown && !menuDropdown.dataset.selectMenuInit) {
                menuDropdown.dataset.selectMenuInit = 'true';
                var menuToggle = menuDropdown.querySelector('.block-select-menu-toggle');
                if (menuToggle) {
                    menuToggle.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var isOpen = menuDropdown.classList.contains('open');
                        document.querySelectorAll('.block-select-menu-dropdown').forEach(function(d) {
                            d.classList.remove('open');
                            var btn = d.querySelector('.block-select-menu-toggle');
                            if (btn) btn.setAttribute('aria-expanded', 'false');
                        });
                        menuToggle.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
                        if (!isOpen) {
                            menuDropdown.classList.add('open');
                        }
                    });
                }

                menuDropdown.querySelectorAll('[data-block-select-action]').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        e.preventDefault();
                        applySelectionAction(item.getAttribute('data-block-select-action'));
                        closeSelectMenu();
                    });
                });

                document.addEventListener('click', function(e) {
                    if (!menuDropdown.contains(e.target)) {
                        closeSelectMenu();
                    }
                });
            }

            if (options.syncOnHtmxLoad !== false) {
                document.body.addEventListener('htmx:afterOnLoad', function() {
                    syncSelectAllState();
                    updateBulkBar();
                });
            }

            if (options.resetOnScriptRefresh) {
                window.addEventListener('scripty:project-script-refreshed', function() {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    blockCheckboxes().forEach(function(cb) {
                        cb.checked = false;
                    });
                    updateBulkBar();
                });
            }

            syncSelectAllState();
            updateBulkBar();
        };

        function closeAllBlockDragMenus() {
            document.querySelectorAll('.block-drag-menu-dropdown.open').forEach(function(dropdown) {
                dropdown.classList.remove('open');
                var toggle = dropdown.querySelector('.block-drag-menu-toggle');
                if (toggle) toggle.setAttribute('aria-expanded', 'false');
            });
        }

        function removeUnsavedBlockRow(row) {
            if (!row || row.hasAttribute('data-block-id')) return false;
            var container = row.closest('.scene-blocks, #table-blocks, tbody');
            if (!container) return false;
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            var savedBlocks = container.querySelectorAll(rowSelector + '[data-block-id]').length;
            if (savedBlocks === 0 && container.querySelectorAll(rowSelector).length <= 1) return false;
            row.remove();
            return true;
        }

        function deleteBlockFromDragMenu(row, container) {
            if (!row) return;

            if (!row.hasAttribute('data-block-id')) {
                removeUnsavedBlockRow(row);
                return;
            }

            if (row.dataset.deleting === 'true') return;
            if (!confirm('Are you sure you want to delete this block?')) return;

            row.dataset.deleting = 'true';
            fetch('/block/deleteInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('delete failed');
                row.remove();
                if (container) {
                    reindexBlockOrders(container);
                    updateMoveButtonStates(container);
                }
                updateUndoRedoButtons(resolveProjectId());
            }).catch(function() {
                delete row.dataset.deleting;
            });
        }

        function swapMarkerIcon(sideLink, active, type) {
            var filled = sideLink.querySelector('.' + type + '-icon--filled');
            var outline = sideLink.querySelector('.' + type + '-icon--outline');
            if (filled && outline) {
                filled.style.display = active ? '' : 'none';
                outline.style.display = active ? 'none' : '';
                return true;
            }
            var hasFilled = !!filled;
            var hasOutline = !!outline;
            if ((active && hasFilled) || (!active && hasOutline)) {
                return true;
            }
            if (type === 'bookmark') {
                sideLink.innerHTML = active
                    ? '<svg class="bookmark-icon bookmark-icon--filled" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>'
                    : '<svg class="bookmark-icon bookmark-icon--outline" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>';
                return true;
            }
            if (type === 'pin') {
                sideLink.innerHTML = active
                    ? '<svg class="pin-icon pin-icon--filled" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path><circle cx="12" cy="10" r="3"></circle></svg>'
                    : '<svg class="pin-icon pin-icon--outline" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path><circle cx="12" cy="10" r="3"></circle></svg>';
                return true;
            }
            return false;
        }

        function updateBlockBookmarkUi(row, bookmarked) {
            if (!row) return;
            row.setAttribute('data-bookmarked', bookmarked ? 'true' : 'false');
            var menuBtn = row.querySelector('[data-block-drag-action="toggle-bookmark"]');

        function toggleBookmarkFromDragMenu(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            if (row.dataset.togglingBookmark === 'true') return;
            row.dataset.togglingBookmark = 'true';
            fetch('/block/toggleBookmarkInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('bookmark failed');
                return response.json();
            }).then(function(data) {
                updateBlockBookmarkUi(row, !!data.bookmarked);
            }).catch(function() {
                /* keep current state */
            }).finally(function() {
                delete row.dataset.togglingBookmark;
            });
        }

        function updateBlockPinUi(row, pinned) {
            if (!row) return;
            row.setAttribute('data-pinned', pinned ? 'true' : 'false');
            var menuBtn = row.querySelector('[data-block-drag-action="toggle-pin"]');

        window.scriptyInitBlockDragDrop = function(container, options) {
            if (!container) return;
            initBlockDragMenus(container);
            if (container.dataset.dragInit === 'true') return;
            container.dataset.dragInit = 'true';
            options = options || {};
            const projectId = options.projectId || resolveProjectId();
            let dragRow = null;

            updateMoveButtonStates(container);

            container.addEventListener('dragstart', function(e) {
                const handle = e.target.closest('.drag-handle');
                if (!handle) {
                    e.preventDefault();
                    return;
                }
                const row = findBlockRow(handle);
                if (!row || !container.contains(row) || !row.hasAttribute('data-block-id')) {
                    e.preventDefault();
                    return;
                }
                dragRow = row;
                row.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                if (e.dataTransfer.setData) {
                    e.dataTransfer.setData('text/plain', row.getAttribute('data-block-id') || 'block');
                }
                if (e.dataTransfer.setDragImage) {
                    const rowRect = row.getBoundingClientRect();
                    if (rowRect.height < 20) {
                        e.dataTransfer.setDragImage(handle, handle.offsetWidth / 2, handle.offsetHeight / 2);
                    } else {
                        e.dataTransfer.setDragImage(row, 24, Math.min(16, rowRect.height / 2));
                    }
                }
            });

            container.addEventListener('dragend', function() {
                if (dragRow) dragRow.classList.remove('dragging');
                clearDropMarkers(container);
                dragRow = null;
            });

            container.addEventListener('dragover', function(e) {
                e.preventDefault();
                if (!dragRow) return;
                if (e.dataTransfer) {
                    e.dataTransfer.dropEffect = 'move';
                }
                applyDropMarker(container, e.clientY, dragRow);
            });

            container.addEventListener('dragleave', function(e) {
                if (!e.relatedTarget || !container.contains(e.relatedTarget)) {
                    clearDropMarkers(container);
                }
            });

            container.addEventListener('drop', function(e) {
                e.preventDefault();
                const target = applyDropMarker(container, e.clientY, dragRow);
                clearDropMarkers(container);
                if (!target || !dragRow) return;

                const targetRow = target.row;
                const insertBefore = target.insertBefore;
                if (!container.contains(targetRow) || targetRow === dragRow) return;

                const blockId = dragRow.getAttribute('data-block-id');
                const newOrder = calcDropPosition(dragRow, targetRow, e.clientY);
                const dragOrder = parseInt(dragRow.getAttribute('data-block-order'), 10);

                if (insertBefore) {
                    targetRow.parentNode.insertBefore(dragRow, targetRow);
                } else {
                    targetRow.parentNode.insertBefore(dragRow, targetRow.nextSibling);
                }

                reindexBlockOrders(container);
                updateMoveButtonStates(container);

                if (!blockId || newOrder == null || newOrder === dragOrder) return;

                runWhenHtmxIdle(function() {
                    if (window.scriptyAbortUndoStatusFetch) {
                        window.scriptyAbortUndoStatusFetch();
                    }
                    const params = new URLSearchParams();
                    params.append('id', blockId);
                    params.append('position', String(newOrder));
                    if (projectId) params.append('projectId', projectId);
                    fetch('/block/moveTo', {
                        method: 'POST',
                        credentials: 'same-origin',
                        cache: 'no-store',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: params.toString()
                    }).then(function(response) {
                        if (response.ok || response.redirected) {
                            updateUndoRedoButtons(projectId);
                            return;
                        }
                        window.location.reload();
                    }).catch(function() {
                        window.location.reload();
                    });
                });
            });
        };
