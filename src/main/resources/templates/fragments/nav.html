                        top: fallbackY != null ? fallbackY : 8,
                        bottom: (fallbackY != null ? fallbackY : 8) + 18,
                        width: 1,
                        height: 18
                    };
                }

                const range = selection.getRangeAt(0);
                let rect = range.getBoundingClientRect();
                if (rect.width > 0 || rect.height > 0) {
                    return rect;
                }

                const clientRects = range.getClientRects();
                for (let i = clientRects.length - 1; i >= 0; i--) {
                    if (clientRects[i].width > 0 || clientRects[i].height > 0) {
                        return clientRects[i];
                    }
                }

                const endRange = range.cloneRange();
                endRange.collapse(false);
                rect = endRange.getBoundingClientRect();
                if (rect.width > 0 || rect.height > 0) {
                    return rect;
                }

                const startRange = range.cloneRange();
                startRange.collapse(true);
                rect = startRange.getBoundingClientRect();
                if (rect.width > 0 || rect.height > 0) {
                    return rect;
                }

                return {
                    left: fallbackX != null ? fallbackX : 8,
                    top: fallbackY != null ? fallbackY : 8,
                    bottom: (fallbackY != null ? fallbackY : 8) + 18,
                    width: 1,
                    height: 18

            }

                cut: '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88"/><path d="M14.47 14.48 20 20"/><path d="M8.12 8.12 12 12"/><\/svg>',
                paste: '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 2H9a1 1 0 0 0-1 1v2c0 .6.4 1 1 1h6c.6 0 1-.4 1-1V3a1 1 0 0 0-1-1Z"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><\/svg>',

            function isMacPlatform() {

            function createBlockSelectionMenuButton(action, label, shortcut) {

            function appendBlockSelectionMenuDivider(menu) {

                    removeBlockSelectionMenu();

                    if (!menuData || !menuData.hasCut) return;
                    clearBlockTextEditability();
                    removeBlockSelectionMenu();
                    applyCrossBlockCut(menuData.mutations);
                    writeTextToClipboard(menuData.copyText, menuData.blocks);

                    }).finally(function() {

                    removeBlockSelectionMenu();
                    applyCrossBlockCut(menuData.mutations);
                }

            const params = new URLSearchParams(window.location.search);
            if (window.location.pathname.startsWith('/project/show') && params.has('id')) {
                return params.get('id');
            }
            if (params.has('projectId')) {
                return params.get('projectId');
            }
            const projectLink = document.querySelector('a[href*="/project/show?id="], a[href*="/project/show/"]');
            if (projectLink) {
                const href = projectLink.getAttribute('href');
                const match = href.match(/[\?&]id=(\d+)/);
                if (match) {
                    return match[1];
                }
            }
            return null;

        function calcDropPosition(dragRow, targetRow, clientY) {
            const dragOrder = parseInt(dragRow.getAttribute('data-block-order'), 10);
            const targetOrder = parseInt(targetRow.getAttribute('data-block-order'), 10);
            if (Number.isNaN(dragOrder) || Number.isNaN(targetOrder)) {
                return null;
            }
            const rect = targetRow.getBoundingClientRect();
            const effectiveHeight = Math.max(rect.height, 24);
            const insertBefore = clientY < rect.top + effectiveHeight / 2;
            let newOrder = insertBefore ? targetOrder : targetOrder + 1;
            if (dragOrder < newOrder) {
                newOrder--;
            }
            return newOrder;
        }

        window.scriptyCalcDropPosition = calcDropPosition;

            if (!row || !row.isConnected || row.classList.contains('filtered-out') || row.style.display === 'none') {

            return id && /^\d+$/.test(id) ? id : null;

        window.scriptyGetActiveBlockId = function(triggerEl) {
            function findEditingBlockRow() {
                const focused = document.activeElement;
                if (focused && focused.name === 'content') {
                    const row = findBlockRow(focused);
                    if (row && row.querySelector('.block-content form[hx-post*="/block/editInline"]')) {
                        return row;
                    }
                }
                const form = document.querySelector(
                    '.block-content form[hx-post*="/block/editInline"]:focus-within'
                );
                return form ? findBlockRow(form) : null;
            }

            function findCaretPreviewBlockRow() {
                const preview = window.scriptyBlockCaretPreviewActive;
                if (preview && preview.row && preview.row.isConnected) {
                    return preview.row;
                }
                return document.querySelector('.block-row.block-controls-revealed[data-block-id], tr.block-controls-revealed[data-block-id]');
            }

            const focusedEditableRow = (function() {
                if (!lastFocusedEditable || !lastFocusedEditable.isConnected) return null;
                if (document.activeElement === lastFocusedEditable) {
                    return findBlockRow(lastFocusedEditable);
                }
                // Stale blur target — only trust it when nothing more recent is active.
                return null;
            })();

            const candidates = [
                findEditingBlockRow(),
                findCaretPreviewBlockRow(),
                findBlockRow(document.activeElement),
                focusedEditableRow,
                lastActiveBlockRow,
                hoveredRow,
                findBlockRow(triggerEl)
            ];
            for (let i = 0; i < candidates.length; i++) {
                const id = getBlockRowId(candidates[i]);
                if (id) return id;
            }
            return null;
        };

        }

        function findAdjacentBlockRow(row, direction) {
            if (!row) return null;
            const isUp = direction === 'moveUp';
            let sibling = isUp ? row.previousElementSibling : row.nextElementSibling;
            while (sibling) {
                if (sibling.hasAttribute('data-block-id')) return sibling;
                sibling = isUp ? sibling.previousElementSibling : sibling.nextElementSibling;
            }
            return null;
        }

        function reindexBlockOrders(container) {

            if (!container) return;
            const rows = container.querySelectorAll('[data-block-id]');
            rows.forEach(function(row, index) {
                const up = row.querySelector('.block-move-up');
                const down = row.querySelector('.block-move-down');
                if (up) up.style.display = index === 0 ? 'none' : '';
                if (down) down.style.display = index === rows.length - 1 ? 'none' : '';
            });
        }

        function swapBlockRows(row, direction) {
            const sibling = findAdjacentBlockRow(row, direction);
            if (!sibling) return false;
            const container = row.parentNode;
            if (direction === 'moveUp') {
                container.insertBefore(row, sibling);
            } else {
                container.insertBefore(sibling, row);
            }
            reindexBlockOrders(container);
            updateMoveButtonStates(container);
            return true;
        }

        function findDropTarget(container, clientY, dragRow) {
            if (!container) return null;
            const rows = Array.from(container.querySelectorAll('[data-block-id]')).filter(function(row) {
                return row !== dragRow;
            });
            if (rows.length === 0) return null;
            const minRowHeight = 24;
            for (let i = 0; i < rows.length; i++) {
                const rect = rows[i].getBoundingClientRect();
                const effectiveHeight = Math.max(rect.height, minRowHeight);
                if (clientY < rect.top + effectiveHeight / 2) {
                    return { row: rows[i], insertBefore: true };
                }
            }
            return { row: rows[rows.length - 1], insertBefore: false };
        }

        function applyDropMarker(container, clientY, dragRow) {

            const target = findDropTarget(container, clientY, dragRow);

        function executeMove(blockId, direction, targetRow) {
            sessionStorage.setItem('activeBlockId', blockId);
            rememberActiveBlockCaret(blockId);
            if (window.scriptyAbortUndoStatusFetch) {
                window.scriptyAbortUndoStatusFetch();
            }
            const projectId = resolveProjectId();
            let url = '/block/' + direction + '?id=' + blockId;
            if (projectId) {
                url += '&projectId=' + projectId;
            }
            fetch(url, {
                method: 'GET',
                credentials: 'same-origin',
                cache: 'no-store',
                redirect: 'manual'
            }).then(function(response) {
                if (response.ok || response.type === 'opaqueredirect' || (response.status >= 300 && response.status < 400)) {
                    if (targetRow && swapBlockRows(targetRow, direction)) {
                        updateUndoRedoButtons(projectId);
                        return;
                    }
                }
                window.location.reload();
            }).catch(function() {

            });

            const form = targetRow.querySelector('form');
            if (form) {
                const formData = new FormData(form);
                const actionUrl = form.getAttribute('hx-post') || form.action || '/block/editInline';
                fetch(actionUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(formData).toString()
                }).then(function() {
                    executeMove(blockId, direction, targetRow);
                }).catch(function() {

                });

                executeMove(blockId, direction, targetRow);
            }
        }

        window.scriptyInitProjectBulkActions = function() {
            if (window._scriptyProjectBulkDelegation) return;
            window._scriptyProjectBulkDelegation = true;

            function resolveBulkProjectId() {
                return resolveProjectId() || '';
            }

            function submitBulkPostForm(action, fields) {
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = action;
                form.setAttribute('hx-boost', 'false');
                Object.keys(fields).forEach(function(name) {
                    var input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = name;
                    input.value = fields[name];
                    form.appendChild(input);

            function runBulkAction(fieldsByAction) {
                runWhenHtmxIdle(function() {

                            submitBulkPostForm(fieldsByAction.action, fieldsByAction.fields);
                        });
                    }, fieldsByAction.flushBlockIds || null);
                });
            }

            function getBlockRowCopyText(row) {
                if (!row) return '';

                if (row.classList.contains('scene-header-row')) {
                    var sceneName = row.querySelector('.scene-name-display');
                    if (sceneName && !sceneName.querySelector('.scene-name-placeholder')) {
                        return sceneName.textContent.trim();
                    }
                    var sceneSection = row.closest('.script-scene');
                    var readerSceneName = sceneSection ? sceneSection.querySelector('.reader-visible-scene-name') : null;
                    return readerSceneName ? readerSceneName.textContent.trim() : '';
                }

                var content = row.querySelector('.block-content');
                if (!content) return '';

                var lines = [];
                var character = content.querySelector('.reader-visible-character-name, .character-name');
                if (character) {
                    lines.push(character.textContent.trim());
                }

                var textarea = content.querySelector('textarea[name="content"]');
                var textEl = content.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
                if (textarea && content.querySelector('form:focus-within')) {
                    lines.push(textarea.value);
                } else if (textEl) {
                    lines.push(normalizeBlockDisplayText(textEl.textContent));
                } else if (textarea) {
                    lines.push(textarea.value);
                }

                return lines.join('\n').trimEnd();
            }

            function copyTextToClipboard(text, button) {
                if (!text) return;

                function markCopied() {
                    if (!button) return;
                    var original = button.textContent;
                    button.textContent = 'Copied';
                    button.classList.add('is-copied');
                    window.setTimeout(function() {
                        button.textContent = original;
                        button.classList.remove('is-copied');
                    }, 1500);
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(markCopied).catch(function() {
                        var textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.setAttribute('readonly', '');
                        textarea.style.position = 'fixed';
                        textarea.style.left = '-9999px';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        markCopied();
                    });
                } else {
                    var fallback = document.createElement('textarea');
                    fallback.value = text;
                    fallback.setAttribute('readonly', '');
                    fallback.style.position = 'fixed';
                    fallback.style.left = '-9999px';
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                    markCopied();
                }

            document.body.addEventListener('click', function(e) {
                if (!document.querySelector('.project-script')) return;
                // Element type buttons are handled by /js/element-type.js

                var alignBtn = e.target.closest('.bulk-align-btn');
                if (alignBtn) {
                    e.preventDefault();

                    }

                            ids: alignIds.join(','),
                            align: alignBtn.getAttribute('data-bulk-align'),
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                var styleBtn = e.target.closest('.bulk-style-btn');
                if (styleBtn) {
                    e.preventDefault();
                    var styleIds = window.scriptyGetSelectedBlockIds();
                    if (styleIds.length === 0) {
                        window.scriptyBulkSelectionAlert();
                        return;
                    }
                    runBulkAction({
                        action: '/block/bulkToggleStyle',
                        fields: {
                            ids: styleIds.join(','),
                            style: styleBtn.getAttribute('data-bulk-style'),
                            projectId: resolveBulkProjectId()
                        }
                    });
                    return;
                }

                if (e.target.closest('#project-bulk-add-tags-btn')) {
                    e.preventDefault();
                    var tagIds = window.scriptyGetSelectedBlockIds();

        window.scriptyInitBlockBulkSelection = function(options) {
            options = options || {};
            var selectAllId = options.selectAllId;
            if (!selectAllId) return;

            var scope = options.scope || document;
            var selectAllCheckbox = document.getElementById(selectAllId);
            if (!selectAllCheckbox || selectAllCheckbox.dataset.bulkSelectionInit === 'true') return;
            selectAllCheckbox.dataset.bulkSelectionInit = 'true';

            var bulkBar = options.bulkBarId ? document.getElementById(options.bulkBarId) : null;
            var bulkCount = options.bulkCountId ? document.getElementById(options.bulkCountId) : null;
            var controlRoot = selectAllCheckbox.closest('.block-left-controls') || scope;
            var menuDropdown = controlRoot.querySelector('.block-select-menu-dropdown');

            function blockCheckboxes() {
                return scope.querySelectorAll(
                    '.block-row[data-block-id] .block-select-checkbox, tr[data-block-id] .block-select-checkbox'
                );
            }

            function blockRows() {
                return scope.querySelectorAll('.block-row[data-block-id], tr[data-block-id]');
            }

            function isSelectableRow(row) {
                if (!row || !row.hasAttribute('data-block-id')) return false;
                if (row.classList.contains('filtered-out')) return false;
                if (row.style.display === 'none') return false;
                return true;
            }

            function isBookmarkedRow(row) {
                return row.getAttribute('data-bookmarked') === 'true';
            }

            function updateBulkBar() {
                var count = window.scriptyGetSelectedBlockIds
                    ? window.scriptyGetSelectedBlockIds().length
                    : scope.querySelectorAll(
                        '.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked'
                    ).length;
                if (bulkBar) {
                    bulkBar.hidden = count === 0;
                }
                if (bulkCount) {
                    bulkCount.textContent = count === 1 ? '1 block selected' : count + ' blocks selected';
                }
            }

            function syncSelectAllState() {
                var checkboxes = blockCheckboxes();
                var checkedCount = 0;
                checkboxes.forEach(function(cb) {
                    if (cb.checked) checkedCount++;
                });
                if (checkboxes.length === 0) {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    return;
                }
                selectAllCheckbox.checked = checkedCount === checkboxes.length;
                selectAllCheckbox.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
            }

            function setCheckboxChecked(checkbox, checked) {
                if (!checkbox || checkbox.checked === checked) return;
                checkbox.checked = checked;
                checkbox.dispatchEvent(new Event('change', { bubbles: true }));
            }

            function applySelectionAction(action) {
                if (action === 'all') {
                    blockCheckboxes().forEach(function(cb) {
                        setCheckboxChecked(cb, true);
                    });
                    selectAllCheckbox.checked = true;
                    selectAllCheckbox.indeterminate = false;
                } else if (action === 'none') {
                    blockCheckboxes().forEach(function(cb) {
                        setCheckboxChecked(cb, false);
                    });
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                } else if (action === 'bookmarked' || action === 'unbookmark') {
                    var shouldCheck = action === 'bookmarked';
                    blockRows().forEach(function(row) {
                        if (!isSelectableRow(row) || !isBookmarkedRow(row)) return;
                        var cb = row.querySelector('.block-select-checkbox');
                        setCheckboxChecked(cb, shouldCheck);
                    });
                    syncSelectAllState();
                }
                updateBulkBar();
            }

            function closeSelectMenu() {
                if (!menuDropdown) return;
                menuDropdown.classList.remove('open');
                var toggle = menuDropdown.querySelector('.block-select-menu-toggle');
                if (toggle) toggle.setAttribute('aria-expanded', 'false');
            }

            selectAllCheckbox.addEventListener('change', function() {
                var checked = selectAllCheckbox.checked;
                selectAllCheckbox.indeterminate = false;
                blockCheckboxes().forEach(function(cb) {
                    cb.checked = checked;
                });
                updateBulkBar();
            });

            scope.addEventListener('change', function(e) {
                if (!e.target || !e.target.classList.contains('block-select-checkbox')) return;
                if (e.target === selectAllCheckbox || e.target.classList.contains('block-select-all-checkbox')) return;
                syncSelectAllState();
                updateBulkBar();
            });

            if (menuDropdown && !menuDropdown.dataset.selectMenuInit) {
                menuDropdown.dataset.selectMenuInit = 'true';
                var menuToggle = menuDropdown.querySelector('.block-select-menu-toggle');
                if (menuToggle) {
                    menuToggle.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var isOpen = menuDropdown.classList.contains('open');
                        document.querySelectorAll('.block-select-menu-dropdown').forEach(function(d) {
                            d.classList.remove('open');
                            var btn = d.querySelector('.block-select-menu-toggle');
                            if (btn) btn.setAttribute('aria-expanded', 'false');
                        });
                        menuToggle.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
                        if (!isOpen) {
                            menuDropdown.classList.add('open');
                        }
                    });
                }

                menuDropdown.querySelectorAll('[data-block-select-action]').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        e.preventDefault();
                        applySelectionAction(item.getAttribute('data-block-select-action'));
                        closeSelectMenu();
                    });
                });

                document.addEventListener('click', function(e) {
                    if (!menuDropdown.contains(e.target)) {
                        closeSelectMenu();
                    }
                });
            }

            if (options.syncOnHtmxLoad !== false) {
                document.body.addEventListener('htmx:afterOnLoad', function() {
                    syncSelectAllState();
                    updateBulkBar();
                });
            }

            if (options.resetOnScriptRefresh) {
                window.addEventListener('scripty:project-script-refreshed', function() {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    blockCheckboxes().forEach(function(cb) {
                        cb.checked = false;
                    });
                    updateBulkBar();
                });
            }

            syncSelectAllState();
            updateBulkBar();
        };

        function escapeCreateBelowAttr(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeCreateBelowText(value) {

        }

        function populateCreateBelowDocumentSection(dropdown, options) {
            if (!dropdown || !options) return;
            var section = dropdown.querySelector(options.sectionSelector);
            var list = dropdown.querySelector(options.listSelector);
            if (!section || !list) return;

            var items = Array.isArray(options.items) ? options.items : [];
            var canEdit = window.scriptyCanEditScript !== false;
            if (!canEdit || !document.querySelector('.project-script')) {
                section.hidden = true;

            if (!items.length) {
                section.hidden = true;
                list.innerHTML = '';

            }

            section.hidden = false;
            list.innerHTML = items.map(function(item) {
                var id = item && item.id != null ? item.id : '';
                var title = (item && item.title) ? item.title : options.untitledLabel;
                return '<button type="button" class="nav-dropdown-item" role="menuitem" ' +
                    options.idAttr + '="' + escapeCreateBelowAttr(id) + '" ' +
                    'title="' + escapeCreateBelowAttr(options.insertTitle) + '">' +

        function resolveAfterBlockIdForDocumentInsert(row) {
            if (!row) return null;
            if (row.hasAttribute('data-block-id')) {
                return row.getAttribute('data-block-id');
            }
            var prev = row.previousElementSibling;
            while (prev) {
                if (prev.hasAttribute('data-block-id')) {
                    return prev.getAttribute('data-block-id');
                }
                prev = prev.previousElementSibling;
            }
            return null;
        }

        function insertDocumentBelowBlock(row, documentId, options) {
            if (!documentId || window.scriptyCanEditScript === false) return;
            options = options || {};
            if (window.scriptyIsOffline && window.scriptyIsOffline()) {
                window.alert(options.offlineMessage || 'Connect to insert into the script.');
                return;
            }
            var afterBlockId = resolveAfterBlockIdForDocumentInsert(row);
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '/project/documents/insert';
            form.style.display = 'none';

            var idInput = document.createElement('input');
            idInput.type = 'hidden';
            idInput.name = 'id';
            idInput.value = String(documentId);
            form.appendChild(idInput);

            if (afterBlockId) {
                var afterInput = document.createElement('input');
                afterInput.type = 'hidden';
                afterInput.name = 'afterBlockId';
                afterInput.value = String(afterBlockId);
                form.appendChild(afterInput);
            }

            if (options.asType) {
                var typeInput = document.createElement('input');
                typeInput.type = 'hidden';
                typeInput.name = 'asType';
                typeInput.value = String(options.asType);
                form.appendChild(typeInput);
            }

            document.body.appendChild(form);
            form.submit();
        }

        function createBlockWithType(row, type) {
            if (!row || !type) return;
            if (isCreateBlockRow(row)) {
                if (window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(row, type);
                } else {
                    row.setAttribute('data-block-type', type);
                    var typeInput = row.querySelector('input[name="type"]');
                    if (typeInput) typeInput.value = type;
                    var label = row.querySelector('.block-element-label');
                    if (label) {
                        label.setAttribute('data-block-type', type);
                        label.textContent = (window.scriptyBlockTypeLabel && window.scriptyBlockTypeLabel(type)) || type;
                    }
                }
                focusBlockContentEnd(row);
                return;
            }
            if (!row.hasAttribute('data-block-id')) return;
            window.scriptyPendingCreateType = type;
            const nextRow = row.nextElementSibling;
            if (isCreateBlockRow(nextRow)) {
                if (window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(nextRow, type);
                }
                window.scriptyPendingCreateType = null;
                focusBlockContentEnd(nextRow);
                return;
            }
            openCreateBelowRow(row);
        }

        function removeUnsavedBlockRow(row) {
            if (!row || row.hasAttribute('data-block-id')) return false;
            var container = row.closest('.scene-blocks, #table-blocks, tbody');
            if (!container) return false;
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            var savedBlocks = container.querySelectorAll(rowSelector + '[data-block-id]').length;
            if (savedBlocks === 0 && container.querySelectorAll(rowSelector).length <= 1) return false;
            row.remove();
            return true;
        }

        function clearOrphanCreateRows(container) {
            if (!container) return;
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            Array.from(container.querySelectorAll(rowSelector)).forEach(function(row) {
                if (row.hasAttribute('data-block-id')) return;
                if (row.classList.contains('project-script-select-row')) return;
                row.remove();
            });
        }

        function insertCreateInlineHtml(container, html) {
            if (!container || !html) return null;
            var template = document.createElement('template');
            template.innerHTML = html.trim();
            var newRow = template.content.firstElementChild;
            if (!newRow) return null;
            var selectRow = container.querySelector('.project-script-select-row');
            if (selectRow && selectRow.parentNode === container) {
                selectRow.after(newRow);
            } else {
                container.appendChild(newRow);
            }
            if (typeof htmx !== 'undefined') {
                htmx.process(newRow);
            }
            return newRow;
        }

        function focusCreateRowTextarea(row) {
            if (!row) return;
            var ta = row.querySelector('textarea[name="content"]');
            if (!ta) return;
            ta.focus({ preventScroll: true });
            var len = ta.value.length;
            ta.setSelectionRange(len, len);
        }

        /**
         * After deleting the last saved block, restore an empty createInline row
         * so the scene never ends up with zero editable rows.
         */
        function ensureEmptyCreateRow(container, options) {
            options = options || {};
            if (!container) return Promise.resolve(null);
            var rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            if (container.querySelector(rowSelector + '[data-block-id]')) {
                return Promise.resolve(null);
            }

            clearOrphanCreateRows(container);

            var projectId = resolveProjectId();
            if (!projectId) return Promise.resolve(null);

            function finish(newRow) {
                clearActiveBlockMemory();
                if (options.focus !== false) {
                    focusCreateRowTextarea(newRow);
                }
                return newRow;
            }

            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyRenderCreateInlineRow) {
                var offlineRow = insertCreateInlineHtml(container, window.scriptyRenderCreateInlineRow(projectId));
                return Promise.resolve(finish(offlineRow));
            }

            return fetch('/block/createInline?projectId=' + encodeURIComponent(projectId) + '&surface=project', {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                if (!response.ok) throw new Error('createInline failed');
                return response.text();
            }).then(function(html) {
                if (!container.isConnected) return null;
                if (container.querySelector(rowSelector + '[data-block-id]')) return null;
                clearOrphanCreateRows(container);
                return finish(insertCreateInlineHtml(container, html));
            }).catch(function() {
                return null;
            });
        }
        window.scriptyEnsureEmptyCreateRow = ensureEmptyCreateRow;

        function deleteBlockFromDragMenu(row, container) {
            if (!row) return;

            if (!row.hasAttribute('data-block-id')) {
                removeUnsavedBlockRow(row);
                return;
            }

            if (row.dataset.deleting === 'true') return;
            if (!confirm('Are you sure you want to delete this block?')) return;

            var sceneContainer = container || row.closest('.scene-blocks, #table-blocks, tbody');
            row.dataset.deleting = 'true';
            fetch('/block/deleteInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                method: 'POST',
                credentials: 'same-origin'
            }).then(function(response) {
                if (!response.ok) throw new Error('delete failed');
                row.remove();
                if (sceneContainer) {
                    reindexBlockOrders(sceneContainer);
                    updateMoveButtonStates(sceneContainer);
                }
                updateUndoRedoButtons(resolveProjectId());
                return ensureEmptyCreateRow(sceneContainer);
            }).catch(function() {
                delete row.dataset.deleting;
            });
        }

        function swapMarkerIcon(sideLink, active, type) {
            var filled = sideLink.querySelector('.' + type + '-icon--filled');
            var outline = sideLink.querySelector('.' + type + '-icon--outline');
            if (filled && outline) {
                filled.style.display = active ? '' : 'none';
                outline.style.display = active ? 'none' : '';
                return true;
            }
            var hasFilled = !!filled;
            var hasOutline = !!outline;
            if ((active && hasFilled) || (!active && hasOutline)) {
                return true;
            }
            if (type === 'bookmark') {
                sideLink.innerHTML = active
                    ? '<svg class="bookmark-icon bookmark-icon--filled" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"><\/path><\/svg>'
                    : '<svg class="bookmark-icon bookmark-icon--outline" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"><\/path><\/svg>';
                return true;
            }
            if (type === 'pin') {
                sideLink.innerHTML = active
                    ? '<svg class="pin-icon pin-icon--filled" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"><\/path><circle cx="12" cy="10" r="3"><\/circle><\/svg>'
                    : '<svg class="pin-icon pin-icon--outline" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"><\/path><circle cx="12" cy="10" r="3"><\/circle><\/svg>';
                return true;
            }
            return false;
        }

        function initBlockDragMenus(container) {
            if (!container) return;

            container.querySelectorAll('.block-drag-menu-dropdown').forEach(function(dropdown) {
                if (dropdown.dataset.dragMenuInit === 'true') return;
                dropdown.dataset.dragMenuInit = 'true';

                var toggle = dropdown.querySelector('.block-drag-menu-toggle');
                var deleteBtn = dropdown.querySelector('[data-block-drag-action="delete"]');
                var bookmarkBtn = dropdown.querySelector('[data-block-drag-action="toggle-bookmark"]');
                var pinBtn = dropdown.querySelector('[data-block-drag-action="toggle-pin"]');
                var dragStarted = false;

                if (toggle) {
                    toggle.addEventListener('dragstart', function() {
                        dragStarted = true;
                        closeAllBlockDragMenus();

                    toggle.addEventListener('dragend', function() {
                        setTimeout(function() {
                            dragStarted = false;

        window.scriptyInitBlockDragDrop = function(container, options) {
            if (!container) return;
            initBlockDragMenus(container);
            if (container.dataset.dragInit === 'true') return;
            container.dataset.dragInit = 'true';
            options = options || {};
            const projectId = options.projectId || resolveProjectId();
            let dragRow = null;

            updateMoveButtonStates(container);

            container.addEventListener('dragstart', function(e) {
                const handle = e.target.closest('.drag-handle');
                if (!handle) {
                    e.preventDefault();
                    return;
                }
                const row = findBlockRow(handle);
                if (!row || !container.contains(row) || !row.hasAttribute('data-block-id')) {
                    e.preventDefault();
                    return;
                }
                dragRow = row;
                row.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                if (e.dataTransfer.setData) {
                    e.dataTransfer.setData('text/plain', row.getAttribute('data-block-id') || 'block');
                }
                if (e.dataTransfer.setDragImage) {
                    const rowRect = row.getBoundingClientRect();
                    if (rowRect.height < 20) {
                        e.dataTransfer.setDragImage(handle, handle.offsetWidth / 2, handle.offsetHeight / 2);
                    } else {
                        e.dataTransfer.setDragImage(row, 24, Math.min(16, rowRect.height / 2));
                    }
                }
            });

            container.addEventListener('dragend', function() {
                if (dragRow) dragRow.classList.remove('dragging');
                clearDropMarkers(container);
                dragRow = null;
            });

            container.addEventListener('dragover', function(e) {
                e.preventDefault();
                if (!dragRow) return;
                if (e.dataTransfer) {
                    e.dataTransfer.dropEffect = 'move';
                }
                applyDropMarker(container, e.clientY, dragRow);
            });

            container.addEventListener('dragleave', function(e) {
                if (!e.relatedTarget || !container.contains(e.relatedTarget)) {
                    clearDropMarkers(container);
                }
            });

            container.addEventListener('drop', function(e) {
                e.preventDefault();
                const target = applyDropMarker(container, e.clientY, dragRow);
                clearDropMarkers(container);
                if (!target || !dragRow) return;

                const targetRow = target.row;
                const insertBefore = target.insertBefore;
                if (!container.contains(targetRow) || targetRow === dragRow) return;

                const blockId = dragRow.getAttribute('data-block-id');
                const newOrder = calcDropPosition(dragRow, targetRow, e.clientY);
                const dragOrder = parseInt(dragRow.getAttribute('data-block-order'), 10);

                if (insertBefore) {
                    targetRow.parentNode.insertBefore(dragRow, targetRow);
                } else {
                    targetRow.parentNode.insertBefore(dragRow, targetRow.nextSibling);
                }

                reindexBlockOrders(container);
                updateMoveButtonStates(container);

                if (!blockId || newOrder == null || newOrder === dragOrder) return;

                runWhenHtmxIdle(function() {
                    if (window.scriptyAbortUndoStatusFetch) {
                        window.scriptyAbortUndoStatusFetch();
                    }
                    const params = new URLSearchParams();
                    params.append('id', blockId);
                    params.append('position', String(newOrder));
                    if (projectId) params.append('projectId', projectId);
                    fetch('/block/moveTo', {
                        method: 'POST',
                        credentials: 'same-origin',
                        cache: 'no-store',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: params.toString()
                    }).then(function(response) {
                        if (response.ok || response.redirected) {
                            updateUndoRedoButtons(projectId);
                            return;
                        }
                        window.location.reload();
                    }).catch(function() {
                        window.location.reload();
                    });
                });
            });
        };

        window.scriptyInitProjectLiveSync = function(options) {
            options = options || {};
            var projectId = options.projectId;
            var revision = options.revision || 0;
            var pollMs = options.pollMs || 4000;
            if (!projectId) return;

            var refreshInProgress = false;

            function scriptBody() {
                return document.getElementById('project-script-body');

            function isEditing() {
                if (document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) return true;
                if (document.querySelector('.scene-name-wrap input[name="name"]')) return true;
                if (document.querySelector('.block-content textarea:focus')) return true;

                return false;
            }

            function applyTitle(title) {
                if (title == null) return;
                var breadcrumbDisplay = document.querySelector('.project-breadcrumb-name-display');
                if (breadcrumbDisplay && !document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) {
                    var breadcrumbTrimmed = (title || '').trim();
                    if (breadcrumbTrimmed === '') {
                        breadcrumbDisplay.innerHTML = '<span class="project-name-placeholder">Untitled<\/span>';

                        breadcrumbDisplay.textContent = title;
                    }
                } else if (!document.querySelector('.project-breadcrumb-name-wrap input[name="title"]')) {
                    var breadcrumb = document.getElementById('project-breadcrumb-title');
                    if (breadcrumb && !breadcrumb.querySelector('.project-breadcrumb-name-wrap')) {
                        breadcrumb.textContent = title;
                    }
                }
                var readerTitle = document.getElementById('reader-visible-project-title');
                if (readerTitle) {
                    var readerTrimmed = (title || '').trim();
                    readerTitle.textContent = readerTrimmed === '' ? 'Untitled Project' : title;
                }
                if (window.scriptySyncProjectNameDisplay) {
                    window.scriptySyncProjectNameDisplay();
                }
                if (document.title.indexOf('Scripty - ') === 0) {
                    document.title = 'Scripty - ' + ((title || '').trim() === '' ? 'Project' : title);
                }
            }

            function reinitScriptBody() {
                var body = scriptBody();
                if (!body) return;
                body.querySelectorAll('.scene-blocks').forEach(function(sceneBlocks) {
                    if (window.scriptyInitBlockDragDrop) {
                        window.scriptyInitBlockDragDrop(sceneBlocks, { projectId: projectId });
                    }
                });
                if (typeof htmx !== 'undefined') {
                    htmx.process(body);
                }
                window.dispatchEvent(new CustomEvent('scripty:project-script-refreshed', { detail: { projectId: projectId } }));
            }

            function refreshScript() {
                if (refreshInProgress) return;
                refreshInProgress = true;
                var scrollY = window.scrollY;
                fetch('/project/showScript?id=' + encodeURIComponent(projectId), {
                    credentials: 'same-origin',
                    cache: 'no-store',
                    headers: { 'Accept': 'text/html' }
                }).then(function(response) {
                    if (!response.ok) throw new Error('refresh failed');
                    return response.text();
                }).then(function(html) {
                    var container = scriptBody();
                    if (!container) return;
                    container.outerHTML = html;
                    reinitScriptBody();
                    window.scrollTo(0, scrollY);
                    if (window.scriptySaveProjectSnapshot) {
                        window.scriptySaveProjectSnapshot();
                    }
                }).catch(function() {
                }).finally(function() {
                    refreshInProgress = false;
                });
            }

            function bumpRevisionFromServer() {
                if (window.scriptyIsOffline && window.scriptyIsOffline()) return;
                fetch('/project/syncStatus?id=' + encodeURIComponent(projectId) + '&since=0', {
                    credentials: 'same-origin',
                    cache: 'no-store'
                }).then(function(r) { return r.json(); })
                  .then(function(data) {
                    if (data && typeof data.revision === 'number') {
                        revision = data.revision;
                    }
                    if (data && data.title != null) {
                        applyTitle(data.title);
                    }
                  }).catch(function() {});
            }

            function poll() {
                if (window.scriptyIsOffline && window.scriptyIsOffline()) return;
                if (document.hidden || isEditing() || refreshInProgress) return;
                fetch('/project/syncStatus?id=' + encodeURIComponent(projectId) + '&since=' + encodeURIComponent(revision), {
                    credentials: 'same-origin',
                    cache: 'no-store'
                }).then(function(r) { return r.json(); })
                  .then(function(data) {
                    if (!data || !data.changed) return;
                    revision = data.revision;
                    if (data.title != null) applyTitle(data.title);
                    refreshScript();
                  }).catch(function() {});
            }

            document.body.addEventListener('htmx:afterOnLoad', function(e) {
                var path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                if (path.indexOf('/block/') === -1 && path.indexOf('/scene/') === -1 && path.indexOf('/project/editNameInline') === -1) return;
                runWhenHtmxIdle(bumpRevisionFromServer);
            });

            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) poll();
            });

            setInterval(poll, pollMs);
            bumpRevisionFromServer();
        };

        function updateUndoRedoButtons(projectId) {

            const undoBtn = document.getElementById('nav-undo');

            if (!undoBtn || !redoBtn) return;

            const isMac = /Mac|iPhone|iPod|iPad/i.test(navigator.platform || navigator.userAgent || '');
            const hasCmd = e.metaKey;
            const hasCtrl = e.ctrlKey;
            const hasValidModifier = hasCmd || hasCtrl;

            if (hasValidModifier) {
                let action = null;
                if (e.key.toLowerCase() === 'z') {
                    action = e.shiftKey ? 'redo' : 'undo';
                } else if (e.key.toLowerCase() === 'y') {
                    if (hasCtrl || (hasCmd && !isMac)) {
                        action = 'redo';
                    }
                }

                if (action) {
                    e.preventDefault();
                    const activeEl = document.activeElement;
                    if (isInlineTextEdit(activeEl)) {
                        activeEl.focus();
                        document.execCommand(action);
                    } else {
                        performHistoryAction(action);
                    }
                }
            }
        });

        function initThemeToggle() {
            const dropdown = document.getElementById('settings-dropdown');
            if (!dropdown) return;

            const items = dropdown.querySelectorAll('[data-theme]');
            if (!items.length) return;

            function applyTheme(theme) {
                const root = document.documentElement;
                root.setAttribute('data-theme-setting', theme);
                
                if (theme === 'dark') {
                    root.classList.add('-dark-theme');
                    root.classList.remove('-no-dark-theme');
                } else if (theme === 'light') {
                    root.classList.add('-no-dark-theme');
                    root.classList.remove('-dark-theme');
                } else {
                    root.classList.remove('-dark-theme');
                    root.classList.remove('-no-dark-theme');
                }

                items.forEach(item => {
                    const isActive = item.getAttribute('data-theme') === theme;
                    item.classList.toggle('active', isActive);
                    item.setAttribute('aria-checked', isActive ? 'true' : 'false');
                });
            }

            items.forEach(item => {
                item.onclick = function(e) {
                    e.preventDefault();
                    const selectedTheme = this.getAttribute('data-theme');
                    localStorage.setItem('theme', selectedTheme);
                    applyTheme(selectedTheme);
                    dropdown.classList.remove('open');
                    const toggleBtn = dropdown.querySelector('.nav-dropdown-toggle');
                    if (toggleBtn) toggleBtn.setAttribute('aria-expanded', 'false');
                };
            });

            const currentTheme = localStorage.getItem('theme') || 'system';
            applyTheme(currentTheme);

        function autoGrowTextarea(textarea) {
            if (!textarea) return;
            textarea.style.height = 'auto';
            const style = window.getComputedStyle(textarea);
            const isBorderBox = style.boxSizing === 'border-box';
            let height = textarea.scrollHeight;
            if (isBorderBox) {
                const borderTop = parseFloat(style.borderTopWidth) || 0;
                const borderBottom = parseFloat(style.borderBottomWidth) || 0;
                height += borderTop + borderBottom;
            }
            textarea.style.height = height + 'px';
        }

        function getTextOffsetInElement(root, container, offset) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            let total = 0;
            let node;
            while ((node = walker.nextNode())) {
                if (node === container) return total + offset;
                total += node.textContent.length;
            }
            return total;
        }

        let pendingBlockCaret = null;

        document.body.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            if (e.target.closest('a') && !e.target.closest('.character-name, .reader-visible-character-name')) return;
            const blockContent = e.target.closest('.block-content');
            if (!blockContent) return;

            let textEl = e.target.closest('.reader-visible-character-name, .character-name, .reader-visible-text, .script-block-text');
            if (textEl && textEl.tagName === 'TEXTAREA') textEl = null;
            if (!textEl) {
                textEl = blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');
            }
            if (!textEl || textEl.tagName === 'TEXTAREA') return;

            const clickOffset = getBlockTextClickOffset(blockContent, e.clientX, e.clientY);
            const resolvedTextEl = clickOffset.textEl || textEl;
            const resolvedOffset = clickOffset.textEl ? clickOffset.offset : textEl.textContent.length;

            if (shouldDeferBlockEditForClick() && isBlockContentViewMode(blockContent)) {
                pendingBlockCaret = {
                    blockContent: blockContent,
                    textEl: resolvedTextEl,
                    offset: resolvedOffset
                };
                return;
            }

            if (window.scriptySuppressBlockEditClick || window.scriptyBlockEditLocked) return;

            const form = blockContent.querySelector('.block-inline-edit-form, form[hx-post*="/block/editInline"]');
            if (form && form.contains(document.activeElement)) return;

            pendingBlockCaret = {
                blockContent: blockContent,
                textEl: resolvedTextEl,
                offset: resolvedOffset
            };
        }, true);

        function focusBlockTextareaFromClick() {
            if (!pendingBlockCaret) return;
            const pending = pendingBlockCaret;
            pendingBlockCaret = null;
            if (!pending.blockContent.isConnected) return;

            const textarea = pending.blockContent.querySelector('textarea[name="content"]');
            if (!textarea) return;

            syncBlockTextLayout(textarea);
            textarea.focus({ preventScroll: true });
            const len = textarea.value.length;
            const start = Math.max(0, Math.min(pending.offset, len));
            const endRaw = pending.endOffset != null ? pending.endOffset : pending.offset;
            const end = Math.max(start, Math.min(endRaw, len));
            textarea.setSelectionRange(start, end);
        }
