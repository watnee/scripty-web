<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="nav(currentPage)" class="sidebar menu">
    <div id="scripty-offline-banner" class="scripty-offline-banner" hidden role="status" aria-live="polite">
        <span id="scripty-offline-banner-text">You're offline — edits save locally and sync when you're back online.</span>
        <button type="button" id="scripty-offline-sync-retry" class="scripty-offline-sync-retry" hidden>Retry sync</button>
    </div>
    <meta name="app-asset-version" th:content="${assetVersion}">
    <meta name="service-worker-enabled" th:content="${serviceWorkerEnabled}">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <script th:src="@{/js/csrf.js(v=${assetVersion})}"></script>
    <script th:src="@{/js/scripty-project-utils.js(v=${assetVersion})}"></script>
    <script th:src="@{/js/theme-boot.js(v=${assetVersion})}"></script>
    <script th:inline="javascript">
        (function() {
            var currentUserId = /*[[${currentUserId}]]*/ null;
            if (currentUserId) {
                document.documentElement.setAttribute('data-user-id', String(currentUserId));
                window.scriptyCurrentUserId = String(currentUserId);
                try {
                    localStorage.setItem('scripty-offline-user-id', String(currentUserId));
                } catch (err) { /* ignore */ }
            }
        })();
    </script>
    <nav>
        <a th:href="@{/}" class="nav-brand"><strong>Scripty</strong></a>
    </nav>
    <div class="header-actions">
        <div class="header-actions-group" aria-label="Account">
        <th:block th:unless="${currentPage == 'project'}">
            <div th:replace="~{:: helpDropdown(${currentPage})}"></div>
        </th:block>
        <div class="nav-dropdown user-dropdown-container" id="user-dropdown">
            <button class="nav-dropdown-toggle user-toggle-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="User menu" title="User menu">
                <svg class="user-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
            <div class="nav-dropdown-menu" role="menu" aria-label="User menu">
                <a class="nav-dropdown-item" th:href="@{/login}" hx-boost="false" sec:authorize="!isAuthenticated()">Sign In</a>
                <a class="nav-dropdown-item" th:href="@{/team/list}" th:classappend="${currentPage == 'teams'} ? 'active'" sec:authorize="isAuthenticated()">Teams</a>
                <a class="nav-dropdown-item" th:href="@{/account/password}" th:classappend="${currentPage == 'account'} ? 'active'" sec:authorize="isAuthenticated()">Change password</a>
                <a class="nav-dropdown-item" th:href="@{/user/list}" th:classappend="${currentPage == 'users'} ? 'active'" sec:authorize="hasRole('ROLE_ADMIN')">Users</a>
                <hr class="nav-dropdown-divider">
                <div class="user-menu-label" id="settings-dropdown">Theme</div>
                <button class="nav-dropdown-item theme-option" data-theme="light" type="button" role="menuitemradio" aria-checked="false">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span>Light</span>
                </button>
                <button class="nav-dropdown-item theme-option" data-theme="dark" type="button" role="menuitemradio" aria-checked="false">
                    <svg class="moon-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <span>Dark</span>
                </button>
                <button class="nav-dropdown-item theme-option" data-theme="system" type="button" role="menuitemradio" aria-checked="false">
                    <svg class="system-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span>System</span>
                </button>
                <hr class="nav-dropdown-divider" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" hx-boost="false" sec:authorize="isAuthenticated()"
                      onsubmit="try{localStorage.removeItem('scripty-offline-user-id');}catch(e){}if('caches' in window){caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return k.indexOf('scripty-cache')===0;}).map(function(k){return caches.delete(k);}));}).catch(function(){});}">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="nav-dropdown-item">Logout</button>
                </form>
            </div>
        </div>
        </div>
    </div>
    <div id="project-delete-modal" class="confirm-modal" hidden aria-modal="true" role="dialog" aria-labelledby="project-delete-title">
        <div class="confirm-modal-panel">
            <h2 id="project-delete-title">Delete project?</h2>
            <p>Are you sure you want to delete <strong id="project-delete-name"></strong>? This cannot be undone.</p>
            <div class="confirm-modal-actions">
                <button type="button" id="project-delete-cancel">Cancel</button>
                <button type="button" id="project-delete-confirm" class="bad">Delete</button>
            </div>
        </div>
    </div>
    <script th:inline="none">
    (function() {
        // Aliases for shared helpers loaded via scripty-project-utils.js
        var resolveProjectId = window.scriptyResolveProjectId;
        var resolveEditionId = window.scriptyResolveEditionId;
        var calcDropPosition = window.scriptyCalcDropPosition;
        var findBlockRow = window.scriptyFindBlockRow;
        var getBlockRowId = window.scriptyGetBlockRowId;
        var reindexBlockOrders = window.scriptyReindexBlockOrders;
        var updateMoveButtonStates = window.scriptyUpdateMoveButtonStates;
        var runWhenHtmxIdle = window.scriptyRunWhenHtmxIdle;

        let lastFocusedEditable = null;
        let hoveredRow = null;
        let lastActiveBlockRow = null;
        if (typeof window.scriptyPendingBlockCaret === 'undefined') {
            window.scriptyPendingBlockCaret = null;
        }
        if (typeof window.scriptyBlockEditLocked === 'undefined') {
            window.scriptyBlockEditLocked = false;
        }
        if (typeof window.scriptyCanEditScript === 'undefined') {
            window.scriptyCanEditScript = true;
        }

        function rememberActiveBlockRow(row) {
            if (row && row.hasAttribute('data-block-id')) {
                lastActiveBlockRow = row;
                window.scriptyLastActiveBlockRow = row;
            }
        }

        function clearActiveBlockMemory() {
            lastActiveBlockRow = null;
            window.scriptyLastActiveBlockRow = null;
            try {
                sessionStorage.removeItem('activeBlockId');
                sessionStorage.removeItem('activeBlockCaretStart');
                sessionStorage.removeItem('activeBlockCaretEnd');
            } catch (err) { /* ignore */ }
            if (window.scriptyClearBlockCaretPreview) {
                window.scriptyClearBlockCaretPreview();
            }
        }

        // Track last focused input/textarea
        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'textarea'))) {
                lastFocusedEditable = e.target;
                window.scriptyLastFocusedEditable = e.target;
                var savedRow = findBlockRow(e.target);
                if (savedRow) {
                    rememberActiveBlockRow(savedRow);
                } else if (findAnyBlockRow(e.target) && !e.target.closest('[data-block-id]')) {
                    // Focused the trailing create row — don't keep a stale saved block active.
                    clearActiveBlockMemory();
                }
                var row = findAnyBlockRow(e.target);
                if (row && window.scriptySyncElementTypeToolbar) {
                    window.scriptySyncElementTypeToolbar(row.getAttribute('data-block-type'));
                }
            }
        });

        // Track hovered block row for fallback only — do not promote hover to
        // "active", or moving the pointer to the element toolbar retargets type changes.
        document.addEventListener('mouseover', function(e) {
            hoveredRow = findBlockRow(e.target);
            window.scriptyHoveredRow = hoveredRow;
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('.bulk-type-btn, .bulk-align-btn, .bulk-style-btn, .project-script-toolbar')) {
                return;
            }
            rememberActiveBlockRow(findBlockRow(e.target));
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('a, button, input, textarea, select')) return;
            const createBlockContent = e.target.closest('.project-script .block-row:not([data-block-id]) .block-content');
            if (!createBlockContent) return;
            const textarea = createBlockContent.querySelector('textarea[name="content"]');
            if (textarea) {
                textarea.focus({ preventScroll: true });
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter' || e.shiftKey || e.repeat) return;
            const textarea = e.target;
            if (!isBlockContentTextarea(textarea)) return;
            if (isCreateBlockTextarea(textarea)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                submitCreateRowFromEnter(textarea);
                return;
            }
            const form = textarea.closest('form[hx-post*="/block/editInline"]');
            if (!form) return;
            e.preventDefault();
            e.stopImmediatePropagation();
            saveBlockThenOpenCreateBelow(form);
        });

        // Move blocks up/down keyboard shortcut
        document.addEventListener('keydown', function(e) {
            const isMoveUp = (e.altKey && e.key === 'ArrowUp') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowUp');
            const isMoveDown = (e.altKey && e.key === 'ArrowDown') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowDown');
            
            if (!isMoveUp && !isMoveDown) return;

            const activeEl = document.activeElement;
            if (isEditable(activeEl) && !e.altKey) return;
            
            let targetRow = activeEl ? findBlockRow(activeEl) : null;
            if (!targetRow) {
                targetRow = hoveredRow;
            }
            
            if (!targetRow) return;
            
            e.preventDefault();
            moveBlockRow(targetRow, isMoveUp ? 'moveUp' : 'moveDown');
        });

        document.addEventListener('click', function(e) {
            const markerLink = e.target.closest('a.block-action-pin[href*="togglePinned"], a.block-action-bookmark[href*="toggleBookmark"]');
            if (!markerLink) return;
            if (markerLink.getAttribute('hx-boost') === 'false') {
                return;
            }
            e.preventDefault();
            window.location.href = markerLink.href;
        });

        document.addEventListener('click', function(e) {
            const moveUpBtn = e.target.closest('.block-move-up, .move-up[role="button"]');
            const moveDownBtn = e.target.closest('.block-move-down, .move-down[role="button"]');
            if (!moveUpBtn && !moveDownBtn) return;
            e.preventDefault();
            const targetRow = findBlockRow(moveUpBtn || moveDownBtn);
            if (!targetRow) return;
            moveBlockRow(targetRow, moveUpBtn ? 'moveUp' : 'moveDown');
        });

        function isEditable(el) {
            if (!el) return false;
            const tagName = el.tagName;
            return tagName === 'TEXTAREA' ||
                   (tagName === 'INPUT' && ['text', 'search', 'url', 'tel', 'email', 'password', 'number'].includes(el.type)) ||
                   el.isContentEditable;
        }

        function isCreateBlockTextarea(el) {
            if (!el || el.tagName !== 'TEXTAREA') return false;
            const row = findAnyBlockRow(el);
            return !!row && !row.hasAttribute('data-block-id');
        }

        function isBlockContentTextarea(el) {
            return !!el && el.tagName === 'TEXTAREA' && el.name === 'content' && !!el.closest('.block-content');
        }

        function isEmptyAtStart(textarea) {
            return textarea.value.trim() === '' &&
                   textarea.selectionStart === textarea.selectionEnd;
        }

        window.scriptyBeginBlockTypeChangeWait = function() {
            window.scriptyBlockTypeChangePending = true;
            if (!window.scriptyBlockTypeChangePromise) {
                window.scriptyBlockTypeChangePromise = new Promise(function(resolve) {
                    window.scriptyBlockTypeChangeResolve = resolve;
                });
            }
        };

        window.scriptyFinishBlockTypeChangeWait = function() {
            window.scriptyBlockTypeChangePending = false;
            if (window.scriptyBlockTypeChangeResolve) {
                window.scriptyBlockTypeChangeResolve();
                window.scriptyBlockTypeChangeResolve = null;
                window.scriptyBlockTypeChangePromise = null;
            }
        };

        function waitForBlockTypeChange() {
            if (!window.scriptyBlockTypeChangePending) {
                return Promise.resolve();
            }
            return window.scriptyBlockTypeChangePromise || Promise.resolve();
        }

        function resolveLiveEditForm(form) {
            if (!form) return null;
            const row = form.closest('[data-block-id]');
            if (!row || !row.isConnected) return null;
            return row.querySelector('.block-content form[hx-post*="/block/editInline"]') || form;
        }

        function closeBlockEdit(form, done) {
            if (!form) {
                if (done) done();
                return;
            }
            if (form.dataset.committing === 'true') {
                if (done) done();
                return;
            }
            waitForBlockTypeChange().then(function() {
                const liveForm = resolveLiveEditForm(form);
                if (!liveForm) {
                    if (done) done();
                    return;
                }
                if (liveForm.dataset.committing === 'true') {
                    if (done) done();
                    return;
                }
                const textarea = liveForm.querySelector('textarea[name="content"]');
                if (!textarea) {
                    if (done) done();
                    return;
                }
                if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptySaveBlockEditOffline) {
                    window.scriptySaveBlockEditOffline(liveForm, done);
                    return;
                }
                liveForm.dataset.committing = 'true';
                const formData = new FormData(liveForm);
                const url = liveForm.getAttribute('hx-post') || '/block/editInline';
                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(formData).toString()
                }).then(function(response) {
                    return response.text();
                }).then(function(html) {
                    const target = liveForm.closest('.block-content');
                    if (target && target.isConnected) {
                        target.innerHTML = html;
                    }
                }).catch(function() {
                    /* keep edit form if save fails */
                }).finally(function() {
                    delete liveForm.dataset.committing;
                    if (done) done();
                });
            });
        }

        function flushOpenBlockEdits(done, blockIds) {
            waitForBlockTypeChange().then(function() {
                var forms = Array.from(document.querySelectorAll(
                    '.block-content form[hx-post*="/block/editInline"]'
                ));
                if (blockIds && blockIds.length > 0) {
                    var idSet = {};
                    blockIds.forEach(function(id) { idSet[String(id)] = true; });
                    forms = forms.filter(function(form) {
                        var row = form.closest('[data-block-id]');
                        return row && idSet[row.getAttribute('data-block-id')];
                    });
                }
                if (forms.length === 0) {
                    if (done) done();
                    return;
                }
                var remaining = forms.length;
                function finishOne() {
                    remaining--;
                    if (remaining <= 0 && done) done();
                }
                forms.forEach(function(form) {
                    var textarea = form.querySelector('textarea[name="content"]');
                    if (!textarea || textarea.value.trim() === '') {
                        revertEmptySavedBlockEdit(form);
                        finishOne();
                        return;
                    }
                    closeBlockEdit(form, finishOne);
                });
            });
        }

        function handleEmptyBlockBackspace(ta) {
            // Keep the row and stay in the field; only block default browser/history behavior.
            ta.focus({ preventScroll: true });
        }

        function revertEmptySavedBlockEdit(form) {
            if (!form || form.dataset.reverting === 'true') return;
            const row = form.closest('[data-block-id]');
            const blockContent = form.closest('.block-content');
            if (!row || !blockContent) return;
            // Don't tear down an empty edit while the + type menu is open on this
            // row, or while a type change is in flight — that race drops menu picks.
            if (window.scriptyBlockTypeChangePending) return;
            if (row.querySelector('.create-below-menu-dropdown.open')) return;
            const textarea = form.querySelector('textarea[name="content"]');
            if (!textarea || textarea.value.trim() !== '') return;

            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyRevertBlockEditOffline) {
                form.dataset.reverting = 'true';
                window.scriptyRevertBlockEditOffline(form).finally(function() {
                    delete form.dataset.reverting;
                });
                return;
            }

            form.dataset.reverting = 'true';
            const blockId = row.getAttribute('data-block-id');
            fetch('/block/showInline?id=' + encodeURIComponent(blockId), {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (blockContent.isConnected) {
                    blockContent.innerHTML = html;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(blockContent);
                    }
                }
            }).catch(function() {
                /* keep edit form if revert fails */
            }).finally(function() {
                delete form.dataset.reverting;
            });
        }

        function focusBlockContentEnd(row) {
            if (!row) return;
            const blockContent = row.querySelector('.block-content');
            if (!blockContent) return;
            const existingTa = blockContent.querySelector('textarea[name="content"]');
            if (existingTa) {
                growTextarea(existingTa);
                existingTa.focus({ preventScroll: true });
                const len = existingTa.value.length;
                existingTa.setSelectionRange(len, len);
                return;
            }
            window.scriptyPendingBlockCaret = {
                blockContent: blockContent,
                offset: blockContent.querySelector('.script-block-text')?.textContent?.length || 0
            };
            blockContent.click();
            requestAnimationFrame(function() {
                requestAnimationFrame(focusBlockTextareaFromClick);
            });
        }

        function editSavedBlockRow(row, done) {
            if (!row || !row.hasAttribute('data-block-id')) {
                if (done) done(null);
                return;
            }
            const blockContent = row.querySelector('.block-content');
            const blockId = row.getAttribute('data-block-id');
            if (!blockContent || !blockId) {
                if (done) done(null);
                return;
            }
            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyOpenBlockEditOffline) {
                window.scriptyOpenBlockEditOffline(blockContent);
                focusBlockContentEnd(row);
                if (done) done(row);
                return;
            }
            fetch('/block/editInline?id=' + encodeURIComponent(blockId), {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (!blockContent.isConnected) {
                    if (done) done(null);
                    return;
                }
                // + type pick may already be saving this block. Do not replace
                // the row with a stale ACTION edit form and wipe the new type.
                if (window.scriptyBlockTypeChangePending &&
                    String(window.scriptyPendingCreateBelowTypeTargetId || '') === String(blockId)) {
                    if (done) done(row);
                    return;
                }
                blockContent.innerHTML = html;
                if (typeof htmx !== 'undefined') {
                    htmx.process(blockContent);
                }
                focusBlockContentEnd(row);
                if (done) done(row);
            }).catch(function() {
                focusBlockContentEnd(row);
                if (done) done(row);
            });
        }

        function openCreateBelowRow(row) {
            if (!row || !row.hasAttribute('data-block-id')) return;
            if (row.dataset.openingCreateBelow === 'true') return;
            const nextRow = row.nextElementSibling;
            if (nextRow && nextRow.classList.contains('block-row') && !nextRow.hasAttribute('data-block-id')) {
                if (window.scriptyPendingCreateType && window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(nextRow, window.scriptyPendingCreateType);
                    window.scriptyPendingCreateType = null;
                }
                focusBlockContentEnd(nextRow);
                return;
            }
            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyOpenCreateBelowOffline) {
                window.scriptyOpenCreateBelowOffline(row);
                return;
            }
            row.dataset.openingCreateBelow = 'true';
            const blockId = row.getAttribute('data-block-id');
            const fromType = row.getAttribute('data-block-type') || 'ACTION';
            if (!window.scriptyPendingCreateType && window.scriptyNextFountainType) {
                window.scriptyPendingCreateType = window.scriptyNextFountainType(fromType);
            }
            fetch('/block/createBelowInline?id=' + encodeURIComponent(blockId) + '&surface=project', {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const createRow = template.content.firstElementChild;
                if (!createRow || !row.parentNode) return;
                row.insertAdjacentElement('afterend', createRow);
                if (typeof htmx !== 'undefined') {
                    htmx.process(createRow);
                }
                if (window.scriptyPendingCreateType && window.scriptySetCreateRowType) {
                    window.scriptySetCreateRowType(createRow, window.scriptyPendingCreateType);
                    createRow.dataset.scriptyTypedCreate = '1';
                    window.scriptyPendingCreateType = null;
                } else if (window.scriptyApplyPendingCreateType) {
                    window.scriptyApplyPendingCreateType(createRow);
                } else if (window.scriptyPrepareCreateRowType) {
                    window.scriptyPrepareCreateRowType(createRow, fromType);
                }
                focusBlockContentEnd(createRow);
            }).catch(function() {
                /* keep current edit if create-row load fails */
            }).finally(function() {
                delete row.dataset.openingCreateBelow;
            });
        }

        function createEmptyBlockBelow(row, options) {
            if (!row || !row.hasAttribute('data-block-id')) {
                if (options && options.onDone) options.onDone();
                return;
            }
            if (row.dataset.openingCreateBelow === 'true') {
                if (options && options.onDone) options.onDone();
                return;
            }
            options = options || {};
            const focusSaved = !!options.focusSaved;
            const openTypeMenu = !!options.openTypeMenu;
            const onDone = typeof options.onDone === 'function' ? options.onDone : null;
            row.dataset.openingCreateBelow = 'true';
            const blockId = row.getAttribute('data-block-id');
            const fromType = row.getAttribute('data-block-type') || 'ACTION';
            const nextType = (window.scriptyPendingCreateType
                || (window.scriptyNextFountainType && window.scriptyNextFountainType(fromType))
                || 'ACTION');
            // Consume pending type immediately so a second pick cannot reuse it.
            window.scriptyPendingCreateType = null;
            const body = new URLSearchParams({
                id: blockId,
                content: '',
                surface: 'project',
                type: nextType
            });
            fetch('/block/createBelowInline', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                credentials: 'same-origin',
                body: body.toString()
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children);
                if (newRows.length === 0 || !row.parentNode) return;
                const savedRow = newRows.find(function(newRow) {
                    return newRow.hasAttribute('data-block-id');
                });
                const createRow = newRows.find(function(newRow) {
                    return !newRow.hasAttribute('data-block-id') && newRow.querySelector('textarea[name="content"]');
                });
                const savedId = savedRow && savedRow.getAttribute('data-block-id');
                // Never insert a row that reuses the anchor's id — that creates
                // duplicate DOM nodes and breaks type-menu clicks (querySelector
                // updates the first match, not the menu's row).
                const isDuplicateOfAnchor = !!(savedId && savedId === blockId);
                // + menu: insert only the new saved block directly under the current
                // row. Skip the response's create-row so we don't leave an empty
                // mid-list gap before the next existing block.
                const rowsToInsert = (focusSaved && savedRow && !isDuplicateOfAnchor)
                    ? [savedRow]
                    : (isDuplicateOfAnchor ? [] : newRows.filter(function(newRow) {
                        // Even without focusSaved, never insert more than one saved
                        // block from a single create response.
                        return newRow === savedRow || newRow === createRow;
                    }));
                let insertAfter = row;
                rowsToInsert.forEach(function(newRow) {
                    insertAfter.insertAdjacentElement('afterend', newRow);
                    insertAfter = newRow;
                    if (typeof htmx !== 'undefined') {
                        htmx.process(newRow);
                    }
                });
                dedupeTrailingCreateRows(row.parentNode);
                ensureTrailingCreateRow(row.parentNode);
                if (isDuplicateOfAnchor) {
                    if (openTypeMenu) {
                        openCreateBelowTypeMenu(row);
                    } else {
                        focusBlockContentEnd(row);
                    }
                } else if (savedRow && savedRow.isConnected) {
                    // + flow: open the type menu on the NEW block immediately.
                    // Do not fetch editInline first — that races the type save and
                    // remounts the row as ACTION after the user already picked.
                    if (openTypeMenu) {
                        openCreateBelowTypeMenu(savedRow);
                    } else if (focusSaved) {
                        editSavedBlockRow(savedRow);
                    } else if (createRow && createRow.isConnected) {
                        if (window.scriptySetCreateRowType) {
                            window.scriptySetCreateRowType(createRow, nextType);
                        }
                        focusBlockContentEnd(createRow);
                    }
                } else if (createRow && createRow.isConnected) {
                    if (window.scriptySetCreateRowType) {
                        window.scriptySetCreateRowType(createRow, nextType);
                    }
                    focusBlockContentEnd(createRow);
                    if (openTypeMenu) {
                        openCreateBelowTypeMenu(createRow);
                    }
                }
            }).catch(function() {
                /* keep current edit if create fails */
            }).finally(function() {
                delete row.dataset.openingCreateBelow;
                if (onDone) onDone();
            });
        }

        function saveBlockThenOpenCreateBelow(form) {
            const row = form ? form.closest('[data-block-id]') : null;
            if (!row) return;
            if (row.dataset.enterCreatingBelow === 'true') return;
            row.dataset.enterCreatingBelow = 'true';
            const fromType = row.getAttribute('data-block-type') || 'ACTION';
            if (!window.scriptyPendingCreateType && window.scriptyNextFountainType) {
                window.scriptyPendingCreateType = window.scriptyNextFountainType(fromType);
            }
            waitForBlockTypeChange().then(function() {
                const liveForm = resolveLiveEditForm(form);
                if (!liveForm || !row.isConnected) {
                    delete row.dataset.enterCreatingBelow;
                    return;
                }
                const textarea = liveForm.querySelector('textarea[name="content"]');
                if (textarea && textarea.value.trim() === '') {
                    const blockContent = liveForm.closest('.block-content');
                    if (!blockContent) {
                        delete row.dataset.enterCreatingBelow;
                        return;
                    }
                    fetch('/block/showInline?id=' + encodeURIComponent(row.getAttribute('data-block-id')), {
                        credentials: 'same-origin',
                        cache: 'no-store'
                    }).then(function(response) {
                        return response.text();
                    }).then(function(html) {
                        if (blockContent.isConnected) {
                            blockContent.innerHTML = html;
                            if (typeof htmx !== 'undefined') {
                                htmx.process(blockContent);
                            }
                        }
                    }).catch(function() {
                        /* keep edit form if revert fails */
                    }).finally(function() {
                        createEmptyBlockBelow(row);
                        delete row.dataset.enterCreatingBelow;
                    });
                    return;
                }
                closeBlockEdit(liveForm, function() {
                    openCreateBelowRow(row);
                    delete row.dataset.enterCreatingBelow;
                });
            });
        }

        function buildCreateFormPostBody(form) {
            const formData = new FormData(form);
            const params = new URLSearchParams(formData);
            if (document.querySelector('.project-script') && !params.has('surface')) {
                params.set('surface', 'project');
            }
            return params;
        }

        function ensureProjectCreateUrl(url) {
            if (!url || !document.querySelector('.project-script')) return url;
            if (url.indexOf('surface=') !== -1) return url;
            return url + (url.indexOf('?') === -1 ? '?' : '&') + 'surface=project';
        }

        function syncCreateRowAnchorId(form, row) {
            if (!form || !row) return form;
            const hxPost = form.getAttribute('hx-post') || '';
            // createInline uses projectId — nothing to sync.
            if (hxPost.indexOf('/block/createInline') !== -1) return form;
            const prevId = findPreviousSavedBlockId(row);
            const idInput = form.querySelector('input[name="id"]');
            if (prevId && idInput) {
                idInput.value = prevId;
                return form;
            }
            // No saved block above (lone empty create row): switch to createInline.
            const projectId = resolveProjectId();
            if (!projectId) return form;
            form.setAttribute('hx-post', '/block/createInline?surface=project');
            if (idInput) idInput.remove();
            let projectInput = form.querySelector('input[name="projectId"]');
            if (!projectInput) {
                projectInput = document.createElement('input');
                projectInput.type = 'hidden';
                projectInput.name = 'projectId';
                form.appendChild(projectInput);
            }
            projectInput.value = String(projectId);
            return form;
        }

        function isBlockFragmentHtml(html) {
            if (!html) return false;
            const trimmed = String(html).trim();
            if (!trimmed || trimmed.charAt(0) === '<!DOCTYPE' || /^<html[\s>]/i.test(trimmed)) {
                return false;
            }
            return /data-block-id\s*=/.test(trimmed);
        }

        function submitCreateRowFromEnter(textarea, options) {
            options = options || {};
            const onDone = typeof options.onDone === 'function' ? options.onDone : null;
            if (!isBlockContentTextarea(textarea) || !isCreateBlockTextarea(textarea)) {
                if (onDone) onDone();
                return;
            }
            const form = textarea.closest('form');
            const row = findAnyBlockRow(textarea);
            if (!form || !row || row.dataset.enterCreatingBelow === 'true') {
                if (onDone) onDone();
                return;
            }
            const focusSaved = !!options.focusSaved;
            const openTypeMenu = !!options.openTypeMenu;
            // Quiet save: persist the create row as a block without focusing,
            // opening edit, or restoring a trailing empty create row (used by lock).
            const quiet = !!options.quiet;
            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptySaveCreateBelowOffline) {
                row.dataset.enterCreatingBelow = 'true';
                window.scriptySaveCreateBelowOffline(form, row, function() {
                    delete row.dataset.enterCreatingBelow;
                    if (onDone) onDone();
                });
                return;
            }
            row.dataset.enterCreatingBelow = 'true';
            syncCreateRowAnchorId(form, row);
            const url = ensureProjectCreateUrl(form.getAttribute('hx-post') || '/block/createBelowInline');
            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                credentials: 'same-origin',
                body: buildCreateFormPostBody(form).toString()
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                // Stale/deleted anchor ids return a full page redirect — never
                // replace the create row with that, or the + looks like a no-op.
                if (!isBlockFragmentHtml(html) || !row.parentNode) {
                    if (!quiet) focusBlockContentEnd(row);
                    return;
                }
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const newRows = Array.from(template.content.children).filter(function(el) {
                    return el.nodeType === 1 && (
                        el.classList.contains('block-row') || el.hasAttribute('data-block-id')
                    );
                });
                if (newRows.length === 0) {
                    if (!quiet) focusBlockContentEnd(row);
                    return;
                }
                const savedRow = newRows.find(function(newRow) {
                    return newRow.hasAttribute('data-block-id');
                });
                const createRow = newRows.find(function(newRow) {
                    return !newRow.hasAttribute('data-block-id') && newRow.querySelector('textarea[name="content"]');
                });
                // Replace the create row with only the new saved block when this
                // came from the + type menu or a quiet lock save. The trailing
                // create row is restored separately so we never leave a second
                // empty mid-list block.
                if ((focusSaved || quiet) && savedRow) {
                    row.replaceWith(savedRow);
                    if (typeof htmx !== 'undefined') {
                        htmx.process(savedRow);
                    }
                } else {
                    row.replaceWith.apply(row, newRows);
                    if (typeof htmx !== 'undefined') {
                        newRows.forEach(function(newRow) {
                            htmx.process(newRow);
                        });
                    }
                }
                if (quiet) {
                    window.scriptyPendingCreateType = null;
                    return;
                }
                dedupeTrailingCreateRows(savedRow && savedRow.parentNode);
                ensureTrailingCreateRow((savedRow && savedRow.parentNode) || row.parentNode);
                if (focusSaved && savedRow) {
                    window.scriptyPendingCreateType = null;
                    if (openTypeMenu) {
                        openCreateBelowTypeMenu(savedRow);
                    } else {
                        editSavedBlockRow(savedRow);
                    }
                } else if (createRow && createRow.isConnected) {
                    const savedType = savedRow
                        ? (savedRow.getAttribute('data-block-type') || 'ACTION')
                        : 'ACTION';
                    const nextType = window.scriptyNextFountainType
                        ? window.scriptyNextFountainType(savedType)
                        : 'ACTION';
                    if (window.scriptySetCreateRowType) {
                        window.scriptySetCreateRowType(createRow, nextType);
                    }
                    window.scriptyPendingCreateType = null;
                    focusBlockContentEnd(createRow);
                    if (openTypeMenu) {
                        openCreateBelowTypeMenu(createRow);
                    }
                } else if (savedRow) {
                    if (openTypeMenu) {
                        openCreateBelowTypeMenu(savedRow);
                    } else {
                        editSavedBlockRow(savedRow);
                    }
                } else {
                    focusBlockContentEnd(newRows[0]);
                }
            }).catch(function() {
                if (!quiet) focusBlockContentEnd(row);
            }).finally(function() {
                delete row.dataset.enterCreatingBelow;
                if (onDone) onDone();
            });
        }

        window.scriptyCreateBlockFromSavedEdit = function(textarea) {
            if (!isBlockContentTextarea(textarea) || isCreateBlockTextarea(textarea)) return;
            const form = textarea.closest('form[hx-post*="/block/editInline"]');
            if (!form) return;
            saveBlockThenOpenCreateBelow(form);
        };

        window.scriptyCreateBlockFromCreateRow = function(textarea, options) {
            submitCreateRowFromEnter(textarea, options);
        };

        function removeEmptyCreateRow(row) {
            if (!row || row.hasAttribute('data-block-id')) return false;
            const container = row.closest('.scene-blocks, #table-blocks, tbody');
            if (!container) return false;
            const rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            // Ignore the select-all chrome row — it is a .block-row but not editable.
            const editableRows = container.querySelectorAll(rowSelector + ':not(.project-script-select-row)');
            const savedBlocks = container.querySelectorAll(rowSelector + '[data-block-id]').length;
            if (savedBlocks === 0 && editableRows.length <= 1) return false;
            row.remove();
            return true;
        }

        function isCreateBlockRow(row) {
            return !!(row &&
                !row.hasAttribute('data-block-id') &&
                !row.classList.contains('project-script-select-row') &&
                (row.classList.contains('block-row') || row.tagName === 'TR'));
        }

        function createRowHasContent(row) {
            if (!row) return false;
            const ta = row.querySelector('textarea[name="content"]');
            return !!(ta && ta.value.trim() !== '');
        }

        function ensureTrailingCreateRow(container) {
            if (!container) return;
            const rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            const rows = Array.from(container.querySelectorAll(rowSelector));
            if (!rows.length) return;
            const last = rows[rows.length - 1];
            if (isCreateBlockRow(last)) return;
            const lastSaved = [...rows].reverse().find(function(r) {
                return r.hasAttribute('data-block-id');
            });
            if (!lastSaved) return;
            // Reuse openCreateBelowRow without focusing — just restore the end create row.
            const blockId = lastSaved.getAttribute('data-block-id');
            if (!blockId || lastSaved.dataset.openingCreateBelow === 'true') return;
            if (window.scriptyIsOffline && window.scriptyIsOffline() && window.scriptyOpenCreateBelowOffline) {
                window.scriptyOpenCreateBelowOffline(lastSaved);
                return;
            }
            fetch('/block/createBelowInline?id=' + encodeURIComponent(blockId) + '&surface=project', {
                credentials: 'same-origin',
                cache: 'no-store'
            }).then(function(response) {
                return response.text();
            }).then(function(html) {
                if (!container.isConnected || !lastSaved.isConnected) return;
                const stillLast = container.querySelector(rowSelector + ':last-child');
                if (stillLast && isCreateBlockRow(stillLast)) return;
                const template = document.createElement('template');
                template.innerHTML = html.trim();
                const createRow = template.content.firstElementChild;
                if (!createRow) return;
                container.appendChild(createRow);
                if (typeof htmx !== 'undefined') {
                    htmx.process(createRow);
                }
            }).catch(function() { /* ignore */ });
        }

        function dedupeTrailingCreateRows(container) {
            if (!container) return;
            const rowSelector = container.matches('tbody') ? 'tr' : '.block-row';
            const rows = Array.from(container.querySelectorAll(rowSelector));
            // Only collapse empty create rows at the end of the scene — never remove a
            // create row inserted mid-list by the "+" button.
            const trailing = [];
            for (let i = rows.length - 1; i >= 0; i--) {
                if (!isCreateBlockRow(rows[i])) break;
                trailing.unshift(rows[i]);
            }
            if (trailing.length <= 1) return;
            const withContent = trailing.filter(createRowHasContent);
            if (withContent.length > 0) {
                trailing.forEach(function(row) {
                    if (!createRowHasContent(row)) row.remove();
                });
                return;
            }
            trailing.slice(0, -1).forEach(function(row) {
                row.remove();
            });
        }

        function initBlockEmptyBackspace() {
            if (window.scriptyInstallBlockEmptyGuard) {
                window.scriptyInstallBlockEmptyGuard();
            }

        function initBlockEditGuards() {
            if (window._scriptyBlockEditGuardsInit) return;
            window._scriptyBlockEditGuardsInit = true;

            // Order: + adds a block below, then opens the type/song/draft menu
            // on that new block. Type picks retype the new block (do not create
            // another). Songs/drafts insert below / replace the empty new block.
            // Apply menu choices on mousedown so empty-block revert cannot race
            // the type change after the new empty row is focused.
            document.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;

                const songItem = e.target.closest('[data-insert-song-id]');
                if (songItem && songItem.closest('.create-below-menu')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const target = resolveCreateBelowMenuTarget(songItem);
                    const songId = songItem.getAttribute('data-insert-song-id');
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    insertDocumentBelowBlock(target.row, songId, {
                        offlineMessage: 'Connect to insert a song into the script.'
                    });
                    return;
                }

                const draftItem = e.target.closest('[data-insert-draft-id]');
                if (draftItem && draftItem.closest('.create-below-menu')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const target = resolveCreateBelowMenuTarget(draftItem);
                    const draftId = draftItem.getAttribute('data-insert-draft-id');
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    insertDocumentBelowBlock(target.row, draftId, {
                        asType: 'NOTE',
                        offlineMessage: 'Connect to insert a note into the script.'
                    });
                    return;
                }

                const typeItem = e.target.closest('[data-create-type]');
                if (typeItem && typeItem.closest('.create-below-menu')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    const target = resolveCreateBelowMenuTarget(typeItem);
                    const type = typeItem.getAttribute('data-create-type');
                    if (window.scriptyBeginBlockTypeChangeWait) {
                        window.scriptyBeginBlockTypeChangeWait();
                    }
                    closeAllCreateBelowMenus();
                    closeAllBlockDragMenus();
                    applyTypeToExistingBlock(target.row, type, target.blockId);
                    return;
                }
            }, true);

            document.addEventListener('click', function(e) {
                // Menu choices are handled on mousedown; ignore their click.
                if (e.target.closest('.create-below-menu [data-create-type], .create-below-menu [data-insert-song-id], .create-below-menu [data-insert-draft-id]')) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return;
                }

                const plusBtn = e.target.closest('.create-below-menu-toggle, a.create-below');
                if (!plusBtn) return;
                // Ignore clicks that are really on a menu item inside an open dropdown.
                if (plusBtn.closest('.create-below-menu')) return;
                const row = plusBtn.closest('.block-row, tr');
                if (!row) return;

                e.preventDefault();
                e.stopImmediatePropagation();
                closeAllCreateBelowMenus();
                closeAllBlockDragMenus();
                // Dedicated path: create new block → menu on new block → retype it.
                addBlockBelowAndChooseType(row);
            }, true);

            document.body.addEventListener('htmx:configRequest', function(e) {
                if (!document.querySelector('.project-script')) return;
                const path = e.detail.path || '';
                if (path.indexOf('/block/createInline') === -1 &&
                    path.indexOf('/block/createBelowInline') === -1) {
                    return;
                }
                e.detail.parameters = e.detail.parameters || {};
                e.detail.parameters.surface = 'project';
                if (path.indexOf('surface=') === -1) {
                    e.detail.path = ensureProjectCreateUrl(path);
                }
            });

            document.body.addEventListener('htmx:beforeRequest', function(e) {
                const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                if (window.scriptySuppressSpellcheckRemountSave &&
                    path.indexOf('/block/editInline') !== -1 &&
                    e.detail.verb === 'post') {
                    e.preventDefault();
                    return;
                }
                if (window.scriptyBlockTypeChangePending &&
                    path.indexOf('/block/editInline') !== -1 &&
                    e.detail.verb === 'post') {
                    e.preventDefault();
                }
            });

            document.body.addEventListener('htmx:beforeRequest', function(e) {
                const elt = e.detail.elt;
                if (!elt || elt.tagName !== 'FORM') return;
                const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                const textarea = elt.querySelector('textarea[name="content"]');
                if (!textarea || textarea.value.trim() !== '') return;

                if (path.indexOf('/block/editInline') !== -1 ||
                    path.indexOf('/block/createInline') !== -1 ||
                    path.indexOf('/block/createBelowInline') !== -1) {
                    e.preventDefault();
                }
            });

            document.body.addEventListener('htmx:beforeRequest', function(e) {
                const path = (e.detail.pathInfo && e.detail.pathInfo.requestPath) || '';
                if (path.indexOf('/block/editInline') === -1) return;
                if (window.scriptyBlockEditLocked) {
                    e.preventDefault();
                    return;
                }
                if (e.detail.verb !== 'get') return;
                if (window.scriptySuppressBlockEditClick) {
                    e.preventDefault();
                }
            });

            document.addEventListener('focusin', function(e) {
                document.querySelectorAll('.block-content form[hx-post*="/block/editInline"]').forEach(function(form) {
                    if (form.contains(e.target)) return;
                    revertEmptySavedBlockEdit(form);
                });
            });

            document.addEventListener('focusout', function(e) {
                const ta = e.target;
                if (!isBlockContentTextarea(ta)) return;
                const form = ta.closest('form[hx-post*="/block/editInline"]');
                if (!form || ta.value.trim() !== '') return;
                setTimeout(function() {
                    if (form.contains(document.activeElement)) return;
                    revertEmptySavedBlockEdit(form);
                }, 0);
            });
        }

        function normalizeBlockDisplayText(text) {
            if (text == null) return '';
            return String(text).replace(/\u00a0/g, '');
        }

        function initBlockTextSelection() {
            if (window._scriptyBlockTextSelectionInit) return;
            window._scriptyBlockTextSelectionInit = true;

            const DRAG_THRESHOLD = 4;
            let pointerState = null;
            let cachedBlockSelectionMenu = null;
            let deferredBlockEditTimer = null;

            function cancelDeferredBlockEdit() {
                if (deferredBlockEditTimer) {
                    clearTimeout(deferredBlockEditTimer);
                    deferredBlockEditTimer = null;
                }
            }

            function scheduleDeferredBlockEdit(fn) {
                cancelDeferredBlockEdit();
                deferredBlockEditTimer = setTimeout(function() {
                    deferredBlockEditTimer = null;
                    if (hasActiveBlockTextSelection()) return;
                    if (window.scriptyBlockEditLocked) return;
                    fn();

            }

            function isSelectableTextTarget(target) {

                ));

            function getBlockRangeExpandNodes(blockContent) {
                return getBlockSelectableTextNodes(blockContent);

            function clearSuppressFlag() {
                window.scriptySuppressBlockEditClick = false;
                window.scriptyBlockTextSelectionClickSuppress = false;
            }

            function markBlockTextSelectionComplete() {
                window.scriptySuppressBlockEditClick = true;
                window.scriptyBlockTextSelectionClickSuppress = true;
            }

            function setBlockTextSelecting(active) {
                document.documentElement.classList.toggle('scripty-block-text-selecting', !!active);
            }

            function shouldShowBlockSelectionMenu(data) {
                if (!data || !data.mutations || !data.mutations.length) return false;
                if (data.isCrossBlock || data.hasCut) return true;
                return !!(data.copyText && data.copyText.length > 0);
            }

            function cacheBlockSelectionMenuData(pointerX, pointerY) {
                cachedBlockSelectionMenu = null;
                if (!shouldHandleBlockTextClipboard()) return null;

                const data = getCrossBlockSelectionData();
                if (!shouldShowBlockSelectionMenu(data)) return null;

                cachedBlockSelectionMenu = {
                    data: data,
                    pointerX: pointerX,
                    pointerY: pointerY
                };

            function finishBlockTextSelection(state, pointerX, pointerY) {
                if (state && state.moved && state.anchor) {
                    finalizeDragSelection(state, pointerX, pointerY);

                if (!cacheBlockSelectionMenuData(pointerX, pointerY)) return false;
                markBlockTextSelectionComplete();

            function showBlockSelectionContextMenu(pointerX, pointerY) {
                const selection = window.getSelection && window.getSelection();

                        if (point && point.textEl) {
                            setCollapsedSelectionAt(point.textEl, point.offset);

                expandSelectionAcrossBlocks();
                updateBlockTextEditability();
                cacheBlockSelectionMenuData(pointerX, pointerY);
                if (!cachedBlockSelectionMenu) {
                    cachedBlockSelectionMenu = {
                        data: getCrossBlockSelectionData(),
                        pointerX: pointerX,
                        pointerY: pointerY

            }

            function getBlockContentTextNodes(blockContent) {
                if (!blockContent) return [];
                const textEl = blockContent.querySelector('.reader-visible-text, .script-block-text:not(textarea)');

            }

            function getBlockSelectableTextNodes(blockContent) {
                if (!blockContent) return [];
                const nodes = [];
                const charName = blockContent.querySelector('.reader-visible-character-name, .character-name');
