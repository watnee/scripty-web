<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="nav(currentPage)">
    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme') || 'system';
            document.documentElement.setAttribute('data-theme-setting', storedTheme);
            if (storedTheme === 'dark') {
                document.documentElement.classList.add('-dark-theme');
            } else if (storedTheme === 'light') {
                document.documentElement.classList.add('-no-dark-theme');
            }
            
            const spellcheckEnabled = localStorage.getItem('spellcheck') !== 'false';
            document.documentElement.setAttribute('data-spellcheck', spellcheckEnabled ? 'true' : 'false');
        })();
    </script>
    <nav>
        <a th:href="@{/}"><strong>Scripty</strong></a>
        <th:block sec:authorize="isAuthenticated()">
            <a th:href="@{/project/list}" th:aria-current="${currentPage == 'projects'} ? 'page'">Projects</a>
            <a th:if="${globalDefaultProjectId != null}" th:href="@{/project/show(id=${globalDefaultProjectId})}" th:aria-current="(${isDefault} != null and ${isDefault}) ? 'page'" class="nav-default-project" th:title="'Default Project: ' + ${globalDefaultProjectTitle}">
                <span class="star-icon">★</span><span class="title-text" th:text="${globalDefaultProjectTitle}"></span>
            </a>
            <a th:href="@{/actor/list}" th:aria-current="${currentPage == 'casting'} ? 'page'">Casting</a>
            <a th:href="@{/team/list}" th:aria-current="${currentPage == 'teams'} ? 'page'">Teams</a>
            <a sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/account/list}" th:aria-current="${currentPage == 'accounts'} ? 'page'">Accounts</a>
        </th:block>
        <a th:href="@{/help}" th:aria-current="${currentPage == 'help'} ? 'page'">Scripty Help</a>
        <a th:href="@{/shortcuts}" th:aria-current="${currentPage == 'shortcuts'} ? 'page'">Shortcuts</a>
    </nav>
    <!-- Theme Toggle Dropdown -->
    <div class="nav-dropdown theme-toggle-container" id="theme-dropdown">
        <button class="nav-dropdown-toggle theme-toggle-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Theme settings" title="Theme settings">
            <!-- Sun icon -->
            <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <!-- Moon icon -->
            <svg class="moon-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <!-- Monitor icon -->
            <svg class="system-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
        </button>
        <div class="nav-dropdown-menu">
            <button class="nav-dropdown-item" data-theme="light" type="button">
                <svg class="sun-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; display: inline; vertical-align: middle;">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg> Light
            </button>
            <button class="nav-dropdown-item" data-theme="dark" type="button">
                <svg class="moon-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; display: inline; vertical-align: middle;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg> Dark
            </button>
            <button class="nav-dropdown-item" data-theme="system" type="button">
                <svg class="system-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; display: inline; vertical-align: middle;">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg> System
            </button>
        </div>
    </div>
    <!-- Spellcheck Toggle Button -->
    <div class="spellcheck-toggle-container">
        <button class="spellcheck-toggle-btn" type="button" onclick="window.toggleSpellcheck()" aria-label="Toggle spellcheck" title="Toggle spellcheck">
            <svg class="spellcheck-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 16 6-12 6 12"></path>
                <path d="M8 12h8"></path>
                <path d="m16 20 2 2 4-4" class="spellcheck-check"></path>
                <line x1="3" y1="3" x2="21" y2="21" class="spellcheck-slash" stroke="var(--bad-fg-color, #e11d48)" stroke-width="2"></line>
            </svg>
        </button>
    </div>
    <script th:inline="javascript">
    (function() {
        let lastFocusedEditable = null;
        let hoveredRow = null;

        // Spellcheck state management
        function applySpellcheckToElement(el, state) {
            if (el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && el.type === 'text')) {
                el.setAttribute('spellcheck', state ? 'true' : 'false');
            }
        }

        function updateAllSpellcheckElements() {
            const state = localStorage.getItem('spellcheck') !== 'false';
            document.querySelectorAll('textarea, input[type="text"]').forEach(el => {
                applySpellcheckToElement(el, state);
            });
        }

        window.toggleSpellcheck = function() {
            const currentState = localStorage.getItem('spellcheck') !== 'false';
            const newState = !currentState;
            localStorage.setItem('spellcheck', newState ? 'true' : 'false');
            document.documentElement.setAttribute('data-spellcheck', newState ? 'true' : 'false');
            updateAllSpellcheckElements();
            
            const btn = document.querySelector('.spellcheck-toggle-btn');
            if (btn) {
                const title = newState ? 'Spellcheck: Enabled (click to disable)' : 'Spellcheck: Disabled (click to enable)';
                btn.title = title;
                btn.setAttribute('aria-label', title);
            }
        };

        // Initialize spellcheck on load
        function initSpellcheck() {
            const state = localStorage.getItem('spellcheck') !== 'false';
            updateAllSpellcheckElements();
            const btn = document.querySelector('.spellcheck-toggle-btn');
            if (btn) {
                const title = state ? 'Spellcheck: Enabled (click to disable)' : 'Spellcheck: Disabled (click to enable)';
                btn.title = title;
                btn.setAttribute('aria-label', title);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSpellcheck);
        } else {
            initSpellcheck();
        }

        // Apply on HTMX content swaps
        document.body.addEventListener('htmx:afterOnLoad', function() {
            updateAllSpellcheckElements();
        });

        // Track last focused input/textarea
        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'textarea'))) {
                lastFocusedEditable = e.target;
            }
        });

        // Track hovered block row
        document.addEventListener('mouseover', function(e) {
            const tr = e.target.closest('tr[data-block-id]');
            hoveredRow = tr || null;
        });

        function executeMove(blockId, direction) {
            sessionStorage.setItem('activeBlockId', blockId);
            const url = '/block/' + direction + '?id=' + blockId;
            fetch(url, {
                method: 'GET',
                redirect: 'manual'
            }).then(function() {
                window.location.reload();
            }).catch(function() {
                window.location.reload();
            });
        }

        // Move blocks up/down keyboard shortcut
        document.addEventListener('keydown', function(e) {
            const isMoveUp = (e.altKey && e.key === 'ArrowUp') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowUp');
            const isMoveDown = (e.altKey && e.key === 'ArrowDown') || (e.ctrlKey && e.shiftKey && e.key === 'ArrowDown');
            
            if (!isMoveUp && !isMoveDown) return;
            
            // Find active or hovered block row
            const activeEl = document.activeElement;
            let targetRow = null;
            if (activeEl) {
                targetRow = activeEl.closest('tr[data-block-id]');
            }
            if (!targetRow) {
                targetRow = hoveredRow;
            }
            
            if (!targetRow) return;
            
            e.preventDefault();
            
            const blockId = targetRow.getAttribute('data-block-id');
            const direction = isMoveUp ? 'moveUp' : 'moveDown';
            
            // Check if there is an active form to save first
            const form = targetRow.querySelector('form');
            if (form) {
                const formData = new FormData(form);
                const searchParams = new URLSearchParams(formData);
                const actionUrl = form.getAttribute('hx-post') || form.action || '/block/editInline';
                
                fetch(actionUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: searchParams.toString()
                }).then(function() {
                    executeMove(blockId, direction);
                }).catch(function() {
                    executeMove(blockId, direction);
                });
            } else {
                executeMove(blockId, direction);
            }
        });

        function isEditable(el) {
            if (!el) return false;
            const tagName = el.tagName;
            return tagName === 'TEXTAREA' ||
                   (tagName === 'INPUT' && ['text', 'search', 'url', 'tel', 'email', 'password', 'number'].includes(el.type)) ||
                   el.isContentEditable;
        }

        // Global keyboard shortcuts for undo and redo
        document.addEventListener('keydown', function(e) {
            const undoBtn = document.getElementById('nav-undo');
            const redoBtn = document.getElementById('nav-redo');
            if (!undoBtn || !redoBtn) return;

            const dropdown = document.getElementById('history-dropdown');
            if (!dropdown || dropdown.style.display === 'none') return;

            const isMac = /Mac|iPhone|iPod|iPad/i.test(navigator.platform || navigator.userAgent || '');
            const hasCmd = e.metaKey;
            const hasCtrl = e.ctrlKey;
            const hasValidModifier = hasCmd || hasCtrl;

            if (hasValidModifier) {
                let action = null;
                if (e.key.toLowerCase() === 'z') {
                    action = e.shiftKey ? 'redo' : 'undo';
                } else if (e.key.toLowerCase() === 'y') {
                    // Only allow Y modifier if it is Control, or if it is Command on non-Mac.
                    // Specifically exclude Command + Y on Mac to avoid conflict with Safari's History shortcut.
                    if (hasCtrl || (hasCmd && !isMac)) {
                        action = 'redo';
                    }
                }

                if (action) {
                    e.preventDefault();
                    const activeEl = document.activeElement;
                    if (isEditable(activeEl)) {
                        activeEl.focus();
                        document.execCommand(action);
                    } else {
                        if (action === 'undo') {
                            undoBtn.click();
                        } else {
                            redoBtn.click();
                        }
                    }
                }
            }
        });

        function initHistoryDropdown() {
            const dropdown = document.getElementById('history-dropdown');
            if (!dropdown) return;

            const toggleBtn = dropdown.querySelector('.nav-dropdown-toggle');
            const versionHistoryLink = document.getElementById('nav-version-history');
            const undoBtn = document.getElementById('nav-undo');
            const redoBtn = document.getElementById('nav-redo');

            if (!toggleBtn || !versionHistoryLink || !undoBtn || !redoBtn) return;

            // Dynamically display keyboard shortcuts based on OS
            const isMac = /Mac|iPhone|iPod|iPad/i.test(navigator.platform || navigator.userAgent || '');
            const undoShortcut = isMac ? ' (⌘Z)' : ' (Ctrl+Z)';
            const redoShortcut = isMac ? ' (⌘⇧Z)' : ' (Ctrl+Y)';
            
            undoBtn.textContent = 'Undo' + undoShortcut;
            redoBtn.textContent = 'Redo' + redoShortcut;

            // Toggle dropdown open/close
            toggleBtn.onclick = function(e) {
                e.stopPropagation();
                const isOpen = dropdown.classList.contains('open');
                // Close all first
                document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
                toggleBtn.setAttribute('aria-expanded', !isOpen);
                if (!isOpen) {
                    dropdown.classList.add('open');
                }
            };

            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                    toggleBtn.setAttribute('aria-expanded', 'false');
                }
            });

            // Resolve Project ID from URL or page DOM
            let projectId = null;
            const params = new URLSearchParams(window.location.search);
            
            if (window.location.pathname.startsWith('/project/show') && params.has('id')) {
                projectId = params.get('id');
            } else if (params.has('projectId')) {
                projectId = params.get('projectId');
            } else {
                // Check breadcrumbs link to project show page
                const projectLink = document.querySelector('a[href*="/project/show?id="], a[href*="/project/show/"]');
                if (projectLink) {
                    const href = projectLink.getAttribute('href');
                    const match = href.match(/[\?&]id=(\d+)/);
                    if (match) {
                        projectId = match[1];
                    }
                }
            }

            if (projectId) {
                // Update Version History href
                versionHistoryLink.href = /*[[@{/project/version/list}]]*/ '/project/version/list';
                versionHistoryLink.href += '?projectId=' + projectId;
                dropdown.style.display = 'inline-block';
            } else {
                dropdown.style.display = 'none';
            }

            // Undo action
            undoBtn.onclick = function(e) {
                e.preventDefault();
                dropdown.classList.remove('open');
                let el = lastFocusedEditable || document.querySelector('textarea, input[type="text"]');
                if (el) {
                    el.focus();
                    document.execCommand('undo');
                }
            };

            // Redo action
            redoBtn.onclick = function(e) {
                e.preventDefault();
                dropdown.classList.remove('open');
                let el = lastFocusedEditable || document.querySelector('textarea, input[type="text"]');
                if (el) {
                    el.focus();
                    document.execCommand('redo');
                }
            };
        }

        function initThemeToggle() {
            const dropdown = document.getElementById('theme-dropdown');
            if (!dropdown) return;

            const toggleBtn = dropdown.querySelector('.nav-dropdown-toggle');
            const items = dropdown.querySelectorAll('.nav-dropdown-item');
            if (!toggleBtn || !items.length) return;

            toggleBtn.onclick = function(e) {
                e.stopPropagation();
                const isOpen = dropdown.classList.contains('open');
                document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
                toggleBtn.setAttribute('aria-expanded', !isOpen);
                if (!isOpen) {
                    dropdown.classList.add('open');
                }
            };

            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                    toggleBtn.setAttribute('aria-expanded', 'false');
                }
            });

            function applyTheme(theme) {
                const root = document.documentElement;
                root.setAttribute('data-theme-setting', theme);
                
                if (theme === 'dark') {
                    root.classList.add('-dark-theme');
                    root.classList.remove('-no-dark-theme');
                } else if (theme === 'light') {
                    root.classList.add('-no-dark-theme');
                    root.classList.remove('-dark-theme');
                } else {
                    root.classList.remove('-dark-theme');
                    root.classList.remove('-no-dark-theme');
                }

                items.forEach(item => {
                    if (item.getAttribute('data-theme') === theme) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }

            items.forEach(item => {
                item.onclick = function(e) {
                    e.preventDefault();
                    const selectedTheme = this.getAttribute('data-theme');
                    localStorage.setItem('theme', selectedTheme);
                    applyTheme(selectedTheme);
                    dropdown.classList.remove('open');
                    toggleBtn.setAttribute('aria-expanded', 'false');
                };
            });

            const currentTheme = localStorage.getItem('theme') || 'system';
            applyTheme(currentTheme);
        }

        function autoGrowTextarea(textarea) {
            if (!textarea) return;
            textarea.style.height = 'auto';
            const style = window.getComputedStyle(textarea);
            const isBorderBox = style.boxSizing === 'border-box';
            let height = textarea.scrollHeight;
            if (isBorderBox) {
                const borderTop = parseFloat(style.borderTopWidth) || 0;
                const borderBottom = parseFloat(style.borderBottomWidth) || 0;
                height += borderTop + borderBottom;
            }
            textarea.style.height = height + 'px';
        }

        function autoGrowInput(input) {
            if (!input) return;
            const isSceneName = input.closest('.scene-name-wrap') || 
                                input.closest('#create-scene-row') || 
                                input.closest('#create-scene-below-form');
            const hasAutoGrowClass = input.classList.contains('auto-grow');
            if (!isSceneName && !hasAutoGrowClass) return;

            let tempSpan = document.getElementById('input-width-tester');
            if (!tempSpan) {
                tempSpan = document.createElement('span');
                tempSpan.id = 'input-width-tester';
                tempSpan.style.visibility = 'hidden';
                tempSpan.style.position = 'absolute';
                tempSpan.style.whiteSpace = 'pre';
                document.body.appendChild(tempSpan);
            }
            
            const style = window.getComputedStyle(input);
            tempSpan.style.font = style.font;
            tempSpan.style.fontFamily = style.fontFamily;
            tempSpan.style.fontSize = style.fontSize;
            tempSpan.style.fontWeight = style.fontWeight;
            tempSpan.style.letterSpacing = style.letterSpacing;
            tempSpan.style.textTransform = style.textTransform;
            
            tempSpan.textContent = input.value || input.placeholder || '';
            
            const paddingLeft = parseFloat(style.paddingLeft) || 0;
            const paddingRight = parseFloat(style.paddingRight) || 0;
            const borderLeft = parseFloat(style.borderLeftWidth) || 0;
            const borderRight = parseFloat(style.borderRightWidth) || 0;
            
            const extra = paddingLeft + paddingRight + borderLeft + borderRight + 12;
            const computedWidth = tempSpan.getBoundingClientRect().width + extra;
            
            input.style.width = computedWidth + 'px';
        }

        function updateLastEditedTimes() {
            document.querySelectorAll('.last-edited-time').forEach(function(el) {
                const timestamp = el.getAttribute('data-timestamp');
                if (!timestamp) return;
                
                const date = new Date(timestamp);
                if (isNaN(date.getTime())) return;
                
                const now = new Date();
                const diffMs = now - date;
                const diffSec = Math.floor(diffMs / 1000);
                const diffMin = Math.floor(diffSec / 60);
                const diffHr = Math.floor(diffMin / 60);
                const diffDays = Math.floor(diffHr / 24);
                
                let text = '';
                if (diffSec < 60) {
                    text = 'just now';
                } else if (diffMin < 60) {
                    text = diffMin + 'm ago';
                } else if (diffHr < 24) {
                    text = diffHr + 'h ago';
                } else if (diffDays === 1) {
                    text = 'yesterday';
                } else if (diffDays < 7) {
                    text = diffDays + 'd ago';
                } else {
                    text = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                }
                
                el.textContent = text;
            });
        }

        function restoreActiveBlock() {
            const activeBlockId = sessionStorage.getItem('activeBlockId');
            if (activeBlockId) {
                sessionStorage.removeItem('activeBlockId');
                const row = document.querySelector(`tr[data-block-id="${activeBlockId}"]`);
                if (row) {
                    const blockContent = row.querySelector('.block-content');
                    if (blockContent) {
                        blockContent.click();
                        
                        setTimeout(function() {
                            const textarea = row.querySelector('textarea[name="content"]');
                            if (textarea) {
                                textarea.focus();
                                const val = textarea.value;
                                textarea.value = '';
                                textarea.value = val;
                            }
                        }, 100);
                    }
                }
            }
        }

        // Run on initial load
        function initAll() {
            initHistoryDropdown();
            initThemeToggle();
            document.querySelectorAll('textarea').forEach(autoGrowTextarea);
            document.querySelectorAll('input[type="text"]').forEach(autoGrowInput);
            updateLastEditedTimes();
            restoreActiveBlock();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAll);
        } else {
            initAll();
        }

        // Run on HTMX content swaps
        document.body.addEventListener('htmx:afterSwap', initAll);

        // Dynamic adjustment as the user types
        document.addEventListener('input', function(e) {
            if (e.target) {
                if (e.target.tagName === 'TEXTAREA') {
                    autoGrowTextarea(e.target);
                } else if (e.target.tagName === 'INPUT' && e.target.type === 'text') {
                    autoGrowInput(e.target);
                }
            }
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const registerSW = () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.error('SW registration failed:', err));
            };
            if (document.readyState === 'complete') {
                registerSW();
            } else {
                window.addEventListener('load', registerSW);
            }
        }
    })();
    </script>
</header>
</html>
