<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <span th:fragment="display(projectId, title)"
          class="project-breadcrumb-name-display"
          th:attr="hx-get=@{/project/editNameInline(id=${projectId},surface='breadcrumb')}"
          hx-trigger="click"
          hx-target="closest .project-breadcrumb-name-wrap"
          hx-swap="innerHTML"
          title="Click to rename project">
        <th:block th:if="${#strings.isEmpty(title) || #strings.isEmpty(title.trim())}">
            <span class="project-name-placeholder">Untitled</span>
        </th:block>
        <th:block th:unless="${#strings.isEmpty(title) || #strings.isEmpty(title.trim())}" th:text="${title}"></th:block>
    </span>

    <div th:fragment="search" class="project-search-dropdown" id="project-search-dropdown" data-mode="filter">
        <div class="project-search-wrap">
            <label class="visually-hidden" for="project-search">Search blocks, character names, or tags</label>
            <input type="search"
                   id="project-search"
                   class="project-search-input"
                   placeholder="Search blocks, tags..."
                   autocomplete="off"
                   enterkeyhint="search"
                   tabindex="-1" />
            <span class="project-search-count" id="project-search-count" role="status" aria-live="polite" hidden></span>
            <span class="project-search-nav" id="project-search-nav" hidden>
                <button type="button" id="project-search-prev" class="project-search-nav-btn"
                        aria-label="Previous match" title="Previous match">&#8593;</button>
                <button type="button" id="project-search-next" class="project-search-nav-btn"
                        aria-label="Next match" title="Next match">&#8595;</button>
            </span>
            <button type="button"
                    id="project-search-clear"
                    class="project-search-clear"
                    aria-label="Clear search"
                    hidden>&times;</button>
        </div>
        <div class="project-replace-wrap" id="project-replace-wrap" hidden>
            <label class="visually-hidden" for="project-replace">Replace matches with</label>
            <input type="text"
                   id="project-replace"
                   class="project-replace-input"
                   placeholder="Replace with..."
                   autocomplete="off" />
            <span class="project-replace-actions">
                <button type="button" id="project-replace-one" class="project-replace-btn"
                        aria-label="Replace this match" title="Replace this match">Replace</button>
                <button type="button" id="project-replace-all" class="project-replace-btn"
                        aria-label="Replace all matches" title="Replace all matches">All</button>
            </span>
        </div>
        <div class="project-replace-options" id="project-replace-options" hidden>
            <label class="project-replace-option">
                <input type="checkbox" id="project-search-match-case" /><span>Match case</span>
            </label>
            <label class="project-replace-option">
                <input type="checkbox" id="project-search-whole-word" /><span>Whole word</span>
            </label>
            <label class="project-replace-option" title="Character cues stay in sync with the character list, so they are skipped by default">
                <input type="checkbox" id="project-search-include-cues" /><span>Character cues</span>
            </label>
        </div>
    </div>

    <li th:fragment="item(projectId, title)"
        id="project-breadcrumb-title"
        aria-current="page">
        <span class="breadcrumb-name-meta">
            <span class="project-breadcrumb-name-wrap" id="project-breadcrumb-name-wrap">
                <span th:replace="~{:: display(${projectId}, ${title})}"></span>
            </span>
        </span>
    </li>

    <li th:fragment="itemOob(projectId, title)"
        id="project-breadcrumb-title"
        aria-current="page"
        hx-swap-oob="true">
        <span class="breadcrumb-name-meta">
            <span class="project-breadcrumb-name-wrap" id="project-breadcrumb-name-wrap">
                <span th:replace="~{:: display(${projectId}, ${title})}"></span>
            </span>
        </span>
    </li>
</body>
</html>
