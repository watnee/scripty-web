<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <span th:fragment="display(projectId, title)"
          class="project-breadcrumb-name-display"
          th:attr="hx-get=@{/project/editNameInline(id=${projectId},surface='breadcrumb')}"
          hx-trigger="click"
          hx-target="closest .project-breadcrumb-name-wrap"
          hx-swap="innerHTML"
          title="Click to rename project">
        <th:block th:if="${#strings.isEmpty(title) || #strings.isEmpty(title.trim())}">
            <span class="project-name-placeholder">Untitled</span>
        </th:block>
        <th:block th:unless="${#strings.isEmpty(title) || #strings.isEmpty(title.trim())}" th:text="${title}"></th:block>
    </span>

    <div th:fragment="search" class="project-search-dropdown" id="project-search-dropdown">
        <div class="project-search-wrap">
            <label class="visually-hidden" for="project-search">Search blocks, character names, or tags</label>
            <input type="search"
                   id="project-search"
                   class="project-search-input"
                   placeholder="Search blocks, tags..."
                   autocomplete="off"
                   enterkeyhint="search"
                   tabindex="-1" />
            <button type="button"
                    id="project-search-clear"
                    class="project-search-clear"
                    aria-label="Clear search"
                    hidden>&times;</button>
        </div>
    </div>

    <li th:fragment="item(projectId, title)"
        id="project-breadcrumb-title"
        aria-current="page">
        <span class="breadcrumb-name-meta">
            <span class="project-breadcrumb-name-wrap" id="project-breadcrumb-name-wrap">
                <span th:replace="~{:: display(${projectId}, ${title})}"></span>
            </span>
        </span>
    </li>

    <li th:fragment="itemOob(projectId, title)"
        id="project-breadcrumb-title"
        aria-current="page"
        hx-swap-oob="true">
        <span class="breadcrumb-name-meta">
            <span class="project-breadcrumb-name-wrap" id="project-breadcrumb-name-wrap">
                <span th:replace="~{:: display(${projectId}, ${title})}"></span>
            </span>
        </span>
    </li>
</body>
</html>
