<div xmlns:th="http://www.thymeleaf.org" th:fragment="actions(project)" class="project-list-actions">
    <a th:href="@{/project/show(id=${project.id})}"
       role="button"
       class="project-list-action-btn project-list-action-btn--primary"
       title="Open screenplay">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        <span class="project-list-action-label">Screenplay</span>
    </a>
    <a th:href="@{/project/production(id=${project.id})}"
       role="button"
       class="project-list-action-btn project-list-action-btn--secondary"
       title="Open production hub">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
            <line x1="12" y1="12" x2="12" y2="16"></line>
            <line x1="10" y1="14" x2="14" y2="14"></line>
        </svg>
        <span class="project-list-action-label">Production</span>
    </a>
    <button type="button"
            class="project-list-action-btn project-list-action-btn--ghost rename-project-btn"
            th:attr="hx-get=@{/project/editNameInline(id=${project.id})}"
            hx-target="closest .project-title-container"
            hx-swap="outerHTML"
            title="Rename project"
            aria-label="Rename project">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span class="project-list-action-label">Rename</span>
    </button>
    <span class="project-list-actions-divider" aria-hidden="true"></span>
    <button type="button"
            class="project-list-action-btn project-list-delete-btn"
            th:attr="data-delete-url=@{/project/delete(id=${project.id})}"
            title="Delete project"
            aria-label="Delete project">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <span class="project-list-action-label">Delete</span>
    </button>
</div>
