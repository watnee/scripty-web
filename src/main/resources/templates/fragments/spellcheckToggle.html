<button xmlns:th="http://www.thymeleaf.org"
        th:fragment="menuItem"
        id="nav-spellcheck-toggle"
        type="button"
        class="nav-dropdown-item spellcheck-toggle-btn"
        role="menuitemcheckbox"
        aria-pressed="true"
        aria-checked="true"
        aria-label="Spellcheck"
        title="Spellcheck"
        onclick="window.toggleSpellcheck()">
    <svg class="spellcheck-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m6 16 6-12 6 12"></path>
        <path d="M8 12h8"></path>
        <path d="m16 20 2 2 4-4" class="spellcheck-check"></path>
        <line x1="3" y1="3" x2="21" y2="21" class="spellcheck-slash" stroke="var(--bad-fg-color, #e11d48)" stroke-width="2"></line>
    </svg>
    <span>Spellcheck</span>
</button>
