<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Sign In</title>
    <link rel="stylesheet" href="/css/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body class="login-body" hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main class="login-page">
        <section class="login-card" aria-labelledby="login-heading">
            <header class="login-header">
                <div class="login-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 7h16"></path>
                        <path d="M4 12h10"></path>
                        <path d="M4 17h14"></path>
                        <circle cx="19" cy="17" r="2"></circle>
                    </svg>
                </div>
                <p class="login-eyebrow">Scripty</p>
                <h1 id="login-heading" class="login-title">Please sign in</h1>
                <p class="login-subtitle">Access your screenplays, projects, and team workspaces.</p>
            </header>

            <div class="login-success" th:if="${inviteAccepted}" role="status">
                <span>Account created. Sign in with your new username and password.</span>
            </div>

            <div class="login-error" th:if="${param.login_error}" role="alert">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span>Incorrect username or password. Please try again.</span>
            </div>

            <form class="login-form" method="POST" th:action="@{/login}" hx-boost="false">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <label class="login-field">
                    <span class="login-label">Username</span>
                    <span class="login-input-wrap">
                        <svg class="login-field-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required autofocus />
                    </span>
                </label>
                <label class="login-field">
                    <span class="login-label">Password</span>
                    <span class="login-input-wrap">
                        <svg class="login-field-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
                    </span>
                </label>
                <button type="submit" class="login-submit">
                    <span>Sign In</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <footer class="login-footer">
                <a class="login-footer-link" th:href="@{/}">Back to home</a>
                <a class="login-footer-link" th:href="@{/help}">Help center</a>
            </footer>
        </section>
    </main>
    <script src="/js/htmx.min.js"></script>
    <script src="/js/htmx-security.js"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
