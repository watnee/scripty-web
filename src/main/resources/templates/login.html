<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Login</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main class="home">
        <h1>Scripty</h1>
        <p th:if="${param.login_error}" >Incorrect Username or Password.</p>
        <form method="POST" th:action="@{/login}" hx-boost="false">
            <label>
                Username
                <input type="text" name="username" placeholder="Username" />
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Password" />
            </label>
            <button type="submit">Sign In</button>
        </form>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
