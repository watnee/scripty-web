<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title th:text="${isNew} ? (${isSong} ? 'Scripty - New Song' : 'Scripty - New Draft') : ('Scripty - ' + ${commandModel.title})">Scripty - Document</title>
    <link rel="stylesheet" href="/css/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main class="text-documents-page text-document-edit-page"
          th:classappend="${isSong} ? ' text-document-edit-page--song' : ' text-document-edit-page--draft'">
        <div class="top-bar">
            <nav aria-label="Breadcrumb">
                <ol>
                    <li><a th:href="@{/project/list}">Projects</a></li>
                    <li><a th:href="@{/project/show(id=${projectId})}" th:text="${projectTitle}">Project</a></li>
                    <li>
                        <a th:href="@{${listPath}(projectId=${projectId})}"
                           th:text="${isSong} ? 'Songs' : 'Drafts'">Documents</a>
                    </li>
                    <li aria-current="page"
                        th:text="${isNew} ? (${isSong} ? 'New Song' : 'New Draft') : ${commandModel.title}">Document</li>
                </ol>
            </nav>
        </div>

        <header class="text-documents-header"
                th:classappend="${isSong} ? ' text-documents-header--song' : ' text-documents-header--draft'">
            <div class="text-documents-header-text">
                <p class="text-documents-kicker"
                   th:text="${isSong} ? 'Song' : 'Draft'">Document</p>
                <h1 th:text="${isNew} ? (${isSong} ? 'New Song' : 'New Draft') : (${isSong} ? 'Edit Song' : 'Edit Draft')">Edit</h1>
                <p class="muted"
                   th:text="${isSong} ? 'Write lyrics freely. Each line becomes a Lyrics block when you insert into the screenplay.' : 'Write notes or scratch text freely. Each line becomes a Note block when you insert into the screenplay.'">
                    Write freely here.
                </p>
            </div>
            <div class="text-documents-header-actions">
                <a th:href="@{${listPath}(projectId=${projectId})}"
                   class="project-list-action-btn project-list-action-btn--secondary"
                   th:text="${isSong} ? 'Back to Songs' : 'Back to Drafts'">Back</a>
            </div>
        </header>

        <p class="text-document-import-banner"
           th:if="${documentImportMessage != null}"
           th:text="${documentImportMessage}"
           role="status"></p>

        <form th:action="@{/project/documents/save}"
              method="post"
              th:object="${commandModel}"
              class="text-document-form"
              id="text-document-form"
              hx-boost="false">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{projectId}" />
            <input type="hidden" th:field="*{documentType}" />

            <div class="text-document-editor-shell">
                <label class="text-document-title-label text-document-title-full">
                    Title
                    <input type="text"
                           th:field="*{title}"
                           th:placeholder="${isSong} ? 'e.g. Opening Theme' : 'e.g. Scene notes'"
                           autocomplete="off"
                           spellcheck="true"
                           maxlength="200"
                           required />
                    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
                </label>

                <label class="text-document-content-label">
                    <span class="text-document-content-heading">
                        <span th:text="${isSong} ? 'Lyrics' : 'Content'">Content</span>
                        <span class="muted text-document-content-hint">Tab inserts four spaces</span>
                    </span>
                    <textarea th:field="*{content}"
                              id="text-document-content"
                              class="text-document-content"
                              rows="18"
                              th:placeholder="${isSong} ? 'Write your song lyrics here…&#10;&#10;Each line will become a Lyrics block when inserted.' : 'Write notes or draft text here…&#10;&#10;Each line will become a Note block when inserted.'"
                              autocomplete="off"
                              spellcheck="true"></textarea>
                </label>
            </div>

            <p class="form-actions text-document-form-actions">
                <a th:href="@{${listPath}(projectId=${projectId})}"
                   class="project-list-action-btn project-list-action-btn--ghost">Cancel</a>
                <button type="submit"
                        name="stay"
                        value="true"
                        class="project-list-action-btn project-list-action-btn--secondary">Save</button>
                <button type="submit"
                        class="project-list-action-btn project-list-action-btn--primary">Save &amp; Close</button>
            </p>
        </form>

        <aside class="text-document-insert-panel"
               th:if="${!isNew and commandModel.id != null and canEditScript}">
            <div class="text-document-insert-panel-text">
                <h2>Insert into Screenplay</h2>
                <p class="muted"
                   th:text="${isSong} ? 'Adds this song at the end of the script as Lyrics blocks.' : 'Adds this draft at the end of the script as Note blocks (or choose another type).'">
                    Adds this at the end of the script.
                </p>
            </div>
            <form th:action="@{/project/documents/insert}" method="post" class="text-document-insert-form" hx-boost="false">
                <input type="hidden" name="id" th:value="${commandModel.id}" />
                <label class="text-document-insert-type-label" th:if="${!isSong}">
                    Insert as
                    <select name="asType">
                        <option value="">Note (default)</option>
                        <option value="NOTE">Note</option>
                        <option value="ACTION">Action</option>
                        <option value="DIALOGUE">Dialogue</option>
                        <option value="LYRICS">Lyrics</option>
                        <option value="CENTERED">Centered</option>
                    </select>
                </label>
                <button type="submit"
                        class="project-list-action-btn project-list-action-btn--primary"
                        th:text="${isSong} ? 'Insert Song into Script' : 'Insert Draft into Script'">
                    Insert into Script
                </button>
            </form>
        </aside>
    </main>
    <script src="/js/htmx.min.js"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script>
        (function() {
            var ta = document.getElementById('text-document-content');
            if (!ta) return;
            ta.addEventListener('keydown', function(e) {
                if (e.key !== 'Tab' || e.metaKey || e.ctrlKey || e.altKey) return;
                e.preventDefault();
                var start = ta.selectionStart;
                var end = ta.selectionEnd;
                var value = ta.value;
                ta.value = value.slice(0, start) + '    ' + value.slice(end);
                ta.selectionStart = ta.selectionEnd = start + 4;
            });
        })();
    </script>
</body>
</html>
