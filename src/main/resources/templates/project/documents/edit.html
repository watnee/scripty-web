<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/pwaMeta :: pwaMeta}"></th:block>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? (${isSong} ? 'Scripty - New Song' : 'Scripty - New Note') : ('Scripty - ' + ${commandModel.title})">Scripty - Document</title>
    <link rel="stylesheet" href="/css/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main class="text-documents-page text-document-edit-page"
          th:classappend="${isSong} ? ' text-document-edit-page--song' : ' text-document-edit-page--draft'">
        <div class="top-bar">
            <nav aria-label="Breadcrumb">
                <ol>
                    <li><a th:href="@{/project/list}">Projects</a></li>
                    <li><a th:href="@{/project/show(id=${projectId})}" th:text="${projectTitle}">Project</a></li>
                    <li>
                        <a th:href="@{${listPath}(projectId=${projectId})}"
                           th:text="${isSong} ? 'Songs' : 'Notes'">Documents</a>
                    </li>
                    <li aria-current="page" class="text-document-breadcrumb-title">
                        <label class="text-document-breadcrumb-title-label">
                            <span class="visually-hidden"
                                  th:text="${isSong} ? 'Song Title' : 'Note Title'">Title</span>
                            <input type="text"
                                   id="title"
                                   name="title"
                                   form="text-document-form"
                                   class="text-document-breadcrumb-title-input auto-grow"
                                   th:value="${commandModel.title}"
                                   th:placeholder="${isNew} ? (${isSong} ? 'New Song' : 'New Note') : (${isSong} ? 'Song title' : 'Note title')"
                                   th:attr="aria-label=${isSong} ? 'Song Title' : 'Note Title'"
                                   autocomplete="off"
                                   spellcheck="true"
                                   maxlength="200"
                                   required />
                        </label>
                    </li>
                </ol>
            </nav>
            <div class="text-document-top-bar-actions">
                <div class="nav-dropdown text-document-file-dropdown" id="text-doc-file-dropdown">
                    <button type="button"
                            class="nav-dropdown-toggle text-doc-file-toggle"
                            aria-haspopup="true"
                            aria-expanded="false"
                            aria-label="Import, export, and print"
                            title="Import, export, and print">
                        File
                    </button>
                    <div class="nav-dropdown-menu" role="menu" aria-label="Import, export, and print">
                        <a id="text-doc-new"
                           class="nav-dropdown-item"
                           role="menuitem"
                           th:href="@{/project/documents/create(projectId=${projectId}, type=${isSong} ? 'SONG' : 'NOTES')}"
                           th:text="${isSong} ? 'New song' : 'New note'">New</a>
                        <button id="text-doc-import" type="button" class="nav-dropdown-item" role="menuitem">Import…</button>
                        <div class="nav-dropdown-divider" role="separator"></div>
                        <button id="text-doc-insert" type="button" class="nav-dropdown-item" role="menuitem" title="Insert as blocks at the end of the screenplay">Insert into script</button>
                        <button id="text-doc-download" type="button" class="nav-dropdown-item" role="menuitem">Download (.txt)</button>
                        <button id="text-doc-print" type="button" class="nav-dropdown-item" role="menuitem">Print</button>
                        <div class="nav-dropdown-divider" role="separator"></div>
                        <button id="text-doc-delete"
                                type="button"
                                class="nav-dropdown-item text-document-menu-danger"
                                role="menuitem"
                                th:text="${isSong} ? 'Delete song' : 'Delete note'"
                                th:attr="data-confirm=${isSong} ? 'Delete this song? This cannot be undone.' : 'Delete this note? This cannot be undone.'">Delete</button>
                    </div>
                </div>
                <div class="nav-dropdown text-document-edit-dropdown" id="text-doc-edit-dropdown">
                    <button type="button"
                            class="nav-dropdown-toggle text-doc-edit-toggle"
                            aria-haspopup="true"
                            aria-expanded="false"
                            aria-label="Edit"
                            title="Edit">
                        Edit
                    </button>
                    <div class="nav-dropdown-menu" role="menu" aria-label="Edit">
                        <button id="text-doc-undo" type="button" class="nav-dropdown-item" role="menuitem" aria-label="Undo" title="Undo">
                            <span class="nav-dropdown-item-label">Undo</span>
                            <span class="nav-dropdown-shortcut" aria-hidden="true"></span>
                        </button>
                        <button id="text-doc-redo" type="button" class="nav-dropdown-item" role="menuitem" aria-label="Redo" title="Redo">
                            <span class="nav-dropdown-item-label">Redo</span>
                            <span class="nav-dropdown-shortcut" aria-hidden="true"></span>
                        </button>
                        <div class="nav-dropdown-divider" role="separator"></div>
                        <button id="text-doc-find-open" type="button" class="nav-dropdown-item" role="menuitem" aria-label="Find and replace" title="Find and replace">
                            <span class="nav-dropdown-item-label">Find &amp; Replace</span>
                            <span class="nav-dropdown-shortcut" aria-hidden="true"></span>
                        </button>
                        <th:block th:if="${isSong}">
                            <div class="nav-dropdown-divider" role="separator"></div>
                            <button th:replace="~{fragments/spellcheckToggle :: menuItem}"></button>
                        </th:block>
                    </div>
                </div>
                <details class="text-document-about">
                    <summary class="text-document-about-toggle"
                             title="How this works"
                             aria-label="How this works">
                        <svg class="text-document-about-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </summary>
                    <p class="muted text-document-about-text"
                       th:text="${isSong} ? 'Write lyrics freely. Each line becomes a Lyrics block when inserted. Edits auto-save and update places already in the screenplay.' : 'Write freely. Each line becomes a Note block when inserted. Edits auto-save and update places already in the screenplay.'">
                        Write freely here.
                    </p>
                </details>
            </div>
        </div>

        <p class="text-document-import-banner"
           th:if="${documentImportMessage != null}"
           th:text="${documentImportMessage}"
           role="status"></p>

        <form id="text-doc-import-form"
              th:action="@{/project/documents/import}"
              method="post"
              enctype="multipart/form-data"
              hx-boost="false"
              hidden>
            <input type="hidden" name="projectId" th:value="${projectId}" />
            <input type="hidden" name="type" th:value="${isSong} ? 'SONG' : 'NOTES'" />
            <input id="text-doc-import-file" type="file" name="file" accept=".txt,.fountain,.docx,.doc,.fdx,.pdf" />
        </form>
        <form id="text-doc-insert-form"
              th:action="@{/project/documents/insert}"
              method="post"
              hx-boost="false"
              hidden>
            <input type="hidden" name="id" value="" />
        </form>
        <form id="text-doc-delete-form"
              th:action="@{/project/documents/delete}"
              method="post"
              hx-boost="false"
              hidden>
            <input type="hidden" name="id" value="" />
            <input type="hidden" name="projectId" th:value="${projectId}" />
            <input type="hidden" name="type" th:value="${isSong} ? 'SONG' : 'NOTES'" />
        </form>

        <div id="text-doc-find-panel" class="text-document-find-panel" role="search" aria-label="Find and replace" hidden>
            <div class="text-document-find-row">
                <input id="text-doc-find-input"
                       type="text"
                       class="text-document-find-input"
                       placeholder="Find"
                       aria-label="Find"
                       autocomplete="off"
                       spellcheck="false" />
                <span id="text-doc-find-count" class="text-document-find-count muted" aria-live="polite"></span>
                <button id="text-doc-find-case" type="button" class="text-document-find-btn text-document-find-case" aria-pressed="false" title="Match case" aria-label="Match case">Aa</button>
                <button id="text-doc-find-prev" type="button" class="text-document-find-btn" title="Previous match" aria-label="Previous match">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
                <button id="text-doc-find-next" type="button" class="text-document-find-btn" title="Next match" aria-label="Next match">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
            </div>
            <div class="text-document-find-row">
                <input id="text-doc-replace-input"
                       type="text"
                       class="text-document-find-input"
                       placeholder="Replace with"
                       aria-label="Replace with"
                       autocomplete="off"
                       spellcheck="false" />
                <button id="text-doc-replace-one" type="button" class="text-document-find-btn text-document-find-text-btn">Replace</button>
                <button id="text-doc-replace-all" type="button" class="text-document-find-btn text-document-find-text-btn">All</button>
                <button id="text-doc-find-close" type="button" class="text-document-find-btn text-document-find-close" title="Close" aria-label="Close find and replace">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>

        <form th:action="@{/project/documents/save}"
              method="post"
              th:object="${commandModel}"
              class="text-document-form"
              id="text-document-form"
              hx-boost="false"
              onsubmit="return false;">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{projectId}" />
            <input type="hidden" th:field="*{documentType}" />

            <div class="text-document-editor-shell">
                <label class="text-document-content-label">
                    <span class="visually-hidden"
                          th:text="${isSong} ? 'Lyrics' : 'Content'">Content</span>
                    <textarea th:field="*{content}"
                              id="text-document-content"
                              class="text-document-content"
                              rows="18"
                              th:attr="aria-label=${isSong} ? 'Lyrics' : 'Content'"
                              th:placeholder="${isSong} ? 'Write your song lyrics here…&#10;&#10;Each line will become a Lyrics block when inserted.' : 'Write notes or scratch text here…&#10;&#10;Each line will become a Note block when inserted.'"
                              autocomplete="off"
                              spellcheck="true"></textarea>
                </label>
            </div>

            <div class="text-document-meta-bar">
                <span id="text-document-last-edited" class="text-document-last-edited muted" th:style="${updatedAt == null} ? 'display: none;' : ''">
                    Last edited <span class="last-edited-time"
                                      th:attr="data-timestamp=${updatedAt != null ? #temporals.format(updatedAt, 'yyyy-MM-dd''T''HH:mm:ss') : ''}"
                                      th:text="${updatedAt != null ? #temporals.format(updatedAt, 'MMM d, yyyy') : ''}"></span>
                </span>
                <span id="text-document-save-status"
                      class="text-document-save-status muted"
                      role="status"
                      aria-live="polite"
                      hidden></span>
            </div>
        </form>

        <div id="text-doc-print-sheet" class="text-document-print-sheet" aria-hidden="true"></div>
    </main>
    <script src="/js/htmx.min.js"></script>
    <script src="/js/htmx-security.js"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:src="@{/js/text-document-edit.js(v=${assetVersion})}"></script>
</body>
</html>
