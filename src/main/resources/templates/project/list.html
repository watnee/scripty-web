<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Projects</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('projects')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li aria-current="page">Projects</li>
            </ol>
        </nav>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
            <h1 style="margin: 0;">Projects</h1>
            <a th:href="@{/project/create}" role="button" style="margin: 0;">Create New Project</a>
        </div>
        <div class="project-list-search-wrapper" style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; align-items: center;">
            <input type="text" id="project-list-search" placeholder="Search projects by title..." style="flex-grow: 1; max-width: 400px; margin: 0; padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border, #cbd5e1);" />
            <button type="button" id="project-list-search-clear" class="bad" style="margin: 0; display: none;">Clear</button>
        </div>
        <table id="table-projects">
            <tr th:each="project : ${viewModel.projects}" th:classappend="${project.id == defaultProjectId} ? 'default-project-row' : ''">
                <td style="width: 2.5rem; padding: 0; text-align: center; vertical-align: middle;">
                    <form th:action="@{/project/toggleDefault}" method="POST" style="margin: 0; display: inline;">
                        <input type="hidden" name="id" th:value="${project.id}" />
                        <button type="submit" 
                                class="default-project-toggle" 
                                th:classappend="${project.id == defaultProjectId} ? 'is-default' : ''"
                                th:title="${project.id == defaultProjectId} ? 'Remove as default project' : 'Set as default project'">
                            <span class="icon-outline">☆</span>
                            <span class="icon-filled">★</span>
                        </button>
                    </form>
                </td>
                <td style="vertical-align: middle;">
                    <div class="project-title-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <a th:href="@{/project/show(id=${project.id})}" th:text="${project.title}"></a>
                        <button type="button" class="rename-project-btn" style="margin: 0; padding: 0.25rem 0.5rem; font-size: 0.8rem;" th:attr="hx-get=@{/project/editNameInline(id=${project.id})}" hx-target="closest .project-title-container" hx-swap="outerHTML">Rename</button>
                    </div>
                </td>
            </tr>
        </table>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:inline="javascript">
    (function() {
        const searchInput = document.getElementById('project-list-search');
        const clearBtn = document.getElementById('project-list-search-clear');
        if (!searchInput) return;

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (clearBtn) {
                clearBtn.style.display = query ? 'inline-block' : 'none';
            }

            const rows = document.querySelectorAll('#table-projects tr');
            rows.forEach(row => {
                const titleLink = row.querySelector('a');
                if (titleLink) {
                    const titleText = titleLink.textContent.toLowerCase();
                    if (titleText.includes(query)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                }
            });
        }

        searchInput.addEventListener('input', performSearch);

        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });
        }
    })();
    </script>
</body>
</html>
