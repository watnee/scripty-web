<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Projects</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('projects')}"></div>
    <main class="project-list-page">

        <header class="project-list-header">
            <div class="project-list-header-text">
                <h1>Projects</h1>
                <p class="muted" th:if="${!#lists.isEmpty(viewModel.projects)}"
                   th:text="${#lists.size(viewModel.projects)} + (${#lists.size(viewModel.projects) == 1} ? ' project' : ' projects')"></p>
            </div>
        </header>

        <div class="project-list-toolbar">
            <div class="project-list-search-wrap" id="project-list-search-wrap">
                <label class="visually-hidden" for="project-list-search">Search projects</label>
                <span class="project-list-search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                    </svg>
                </span>
                <input type="search"
                       id="project-list-search"
                       class="project-list-search"
                       placeholder="Search projects..."
                       autocomplete="off"
                       enterkeyhint="search" />
                <button type="button"
                        id="project-list-search-clear"
                        class="project-list-search-clear"
                        aria-label="Clear search"
                        hidden>&times;</button>
            </div>
            <div class="project-list-toolbar-actions">
                <label class="project-list-sort-label" for="project-list-sort">
                    <span class="visually-hidden">Sort projects</span>
                    <select id="project-list-sort" class="project-list-sort" aria-label="Sort projects">
                        <option value="last-edited" selected>Last edited</option>
                        <option value="title">Name A–Z</option>
                    </select>
                </label>
                <a th:href="@{/project/create}" role="button" class="project-list-create-btn">
                    <span class="project-list-create-icon" aria-hidden="true">+</span>
                    New Project
                </a>
            </div>
        </div>

        <div class="project-list-panel" th:if="${!#lists.isEmpty(viewModel.projects)}">
            <table id="table-projects" class="project-list-table">
                <tbody>
                    <tr th:each="project : ${viewModel.projects}"
                        class="project-list-row"
                        th:classappend="${project.id == defaultProjectId} ? 'default-project-row' : ''"
                        th:attr="data-sort-title=${#strings.toLowerCase(project.title)}, data-sort-edited=${project.lastEdited != null ? #temporals.format(project.lastEdited, 'yyyy-MM-dd''T''HH:mm:ss') : ''}">
                        <td class="project-list-star-cell">
                            <form th:action="@{/project/toggleDefault}" method="POST" class="project-list-star-form">
                                <input type="hidden" name="id" th:value="${project.id}" />
                                <button type="submit"
                                        class="default-project-toggle"
                                        th:classappend="${project.id == defaultProjectId} ? 'is-default' : ''"
                                        th:aria-label="${project.id == defaultProjectId} ? 'Remove as default project' : 'Set as default project'"
                                        th:title="${project.id == defaultProjectId} ? 'Remove as default project' : 'Set as default project'">
                                    <span class="icon-outline" aria-hidden="true">☆</span>
                                    <span class="icon-filled" aria-hidden="true">★</span>
                                </button>
                            </form>
                        </td>
                        <td class="project-list-main-cell">
                            <div class="project-title-container">
                                <div class="project-list-title-wrap">
                                    <div class="project-list-title-row">
                                        <a th:href="@{/project/show(id=${project.id})}" class="project-list-title" th:text="${project.title}"></a>
                                        <span class="project-list-default-label" th:if="${project.id == defaultProjectId}">Default</span>
                                        <th:block th:each="team : ${project.teams}">
                                            <span th:replace="~{fragments/projectListTeam :: link(${team.id}, ${team.name})}"></span>
                                        </th:block>
                                    </div>
                                    <span class="project-list-last-edited" th:if="${project.lastEdited != null}" th:title="${#temporals.format(project.lastEdited, 'MMM d, yyyy, h:mm a')}">
                                        Last edited <span th:replace="~{fragments/lastEditedTime :: relativeTime(${project.lastEdited})}"></span>
                                    </span>
                                </div>
                                <div th:replace="~{fragments/projectListActions :: actions(${project})}"></div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p class="project-list-no-results" id="project-list-no-results" hidden>
                No projects match <strong id="project-list-search-query"></strong>.
            </p>
        </div>

        <div class="project-list-empty" th:if="${#lists.isEmpty(viewModel.projects)}">
            <span class="project-list-empty-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </span>
            <p class="project-list-empty-title">No projects yet</p>
            <p class="muted">Create your first screenplay to get started.</p>
            <a th:href="@{/project/create}" role="button" class="project-list-create-btn">
                <span class="project-list-create-icon" aria-hidden="true">+</span>
                Create New Project
            </a>
        </div>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:inline="javascript">
    (function() {
        const searchInput = document.getElementById('project-list-search');
        const clearBtn = document.getElementById('project-list-search-clear');
        const searchWrap = document.getElementById('project-list-search-wrap');
        const noResultsEl = document.getElementById('project-list-no-results');
        const noResultsQueryEl = document.getElementById('project-list-search-query');
        const sortSelect = document.getElementById('project-list-sort');
        const tbody = document.querySelector('#table-projects tbody');
        if (!searchInput) return;

        function sortProjects() {
            if (!tbody || !sortSelect) return;
            const mode = sortSelect.value;
            const rows = Array.from(tbody.querySelectorAll('.project-list-row'));
            rows.sort(function(a, b) {
                if (mode === 'last-edited') {
                    const aTime = Date.parse(a.getAttribute('data-sort-edited') || '') || 0;
                    const bTime = Date.parse(b.getAttribute('data-sort-edited') || '') || 0;
                    if (bTime !== aTime) {
                        return bTime - aTime;
                    }
                }
                return (a.getAttribute('data-sort-title') || '').localeCompare(b.getAttribute('data-sort-title') || '');
            });
            rows.forEach(function(row) {
                tbody.appendChild(row);
            });
        }

        function performSearch() {
            const query = searchInput.value.trim();
            const normalizedQuery = query.toLowerCase();

            if (clearBtn) {
                clearBtn.hidden = !query;
            }
            if (searchWrap) {
                searchWrap.classList.toggle('has-value', !!query);
            }

            const rows = document.querySelectorAll('#table-projects .project-list-row');
            let visibleCount = 0;

            rows.forEach(function(row) {
                const titleLink = row.querySelector('.project-list-title');
                if (!titleLink) return;

                const titleText = titleLink.textContent.toLowerCase();
                const matches = !normalizedQuery || titleText.includes(normalizedQuery);
                row.hidden = !matches;
                if (matches) visibleCount++;
            });

            if (noResultsEl) {
                noResultsEl.hidden = visibleCount > 0 || !query;
            }
            if (noResultsQueryEl) {
                noResultsQueryEl.textContent = query ? '"' + query + '"' : '';
            }
        }

        searchInput.addEventListener('input', performSearch);

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            }
        });

        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });
        }

        if (sortSelect) {
            const savedSort = sessionStorage.getItem('projectListSort');
            if (savedSort && sortSelect.querySelector('option[value="' + savedSort + '"]')) {
                sortSelect.value = savedSort;
            }
            sortSelect.addEventListener('change', function() {
                sessionStorage.setItem('projectListSort', sortSelect.value);
                sortProjects();
            });
            sortProjects();
        }
    })();
    </script>
</body>
</html>
