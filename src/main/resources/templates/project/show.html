<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Project Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <aside class="top-bar hide-in-reader-view">
            <nav aria-label="Breadcrumb">
                <ol>
                    <li><a th:href="@{/project/list}">Projects</a></li>
                    <li id="project-breadcrumb-title" aria-current="page" th:text="${viewModel.title}"></li>
                </ol>
            </nav>
            <div class="text-size-control">
                <button id="nav-bookmarks-toggle"
                        type="button"
                        class="nav-dropdown-toggle bookmark-filter-toggle"
                        aria-pressed="false"
                        aria-label="Hide bookmark buttons in blocks"
                        title="Hide bookmark buttons in blocks">
                    <span th:replace="~{fragments/bookmarkIcon :: toolbarIcon}"></span>
                </button>
                <button id="nav-pins-toggle"
                        type="button"
                        class="nav-dropdown-toggle pin-filter-toggle"
                        aria-pressed="false"
                        aria-label="Hide pin buttons in blocks"
                        title="Hide pin buttons in blocks">
                    <span th:replace="~{fragments/pinIcon :: toolbarIcon}"></span>
                </button>
                <div class="nav-dropdown project-search-dropdown" id="project-search-dropdown">
                    <button class="nav-dropdown-toggle project-search-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Search script" title="Search script">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"></circle>
                            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                        </svg>
                    </button>
                    <div class="nav-dropdown-menu project-search-panel">
                        <div class="project-search-wrap">
                            <label class="visually-hidden" for="project-search">Search scene names, blocks, character names, or tags</label>
                            <input type="search"
                                   id="project-search"
                                   class="project-search-input"
                                   placeholder="Search scenes, blocks, tags..."
                                   autocomplete="off"
                                   enterkeyhint="search" />
                            <button type="button"
                                    id="project-search-clear"
                                    class="project-search-clear"
                                    aria-label="Clear search"
                                    hidden>&times;</button>
                        </div>
                    </div>
                </div>
                <span th:replace="~{fragments/historyToolbarButtons :: buttons}"></span>
                <div class="nav-dropdown" id="history-dropdown" style="display: inline-block;">
                    <button class="nav-dropdown-toggle" type="button" aria-haspopup="true" aria-expanded="false" title="Project menu" aria-label="Project menu">⋯</button>
                    <div class="nav-dropdown-menu">
                        <a class="nav-dropdown-item" th:href="@{/project/titlePage(id=${viewModel.id})}">Title Page</a>
                        <a class="nav-dropdown-item" id="nav-version-history" th:href="@{/project/version/list(projectId=${viewModel.id})}" hx-boost="false">Version History</a>
                    </div>
                </div>
                <button id="text-size-decrease" type="button" aria-label="Decrease text size">A−</button>
                <button id="text-size-increase" type="button" aria-label="Increase text size">A+</button>
            </div>
        </aside>
        <article class="entry-content script-content project-script">
            <header>
                <h1 class="project-header-title">
                    <span class="project-header-row">
                        <span class="project-name-wrap">
                            <span class="project-name-display"
                                  th:attr="hx-get=@{/project/editNameInline(id=${viewModel.id},surface='header')}"
                                  hx-trigger="click"
                                  hx-target="closest .project-name-wrap"
                                  hx-swap="innerHTML"
                                  title="Click to rename project">
                                <th:block th:if="${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim())}">
                                    <span class="project-name-placeholder">Click to name project</span>
                                </th:block>
                                <th:block th:unless="${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim())}" th:text="${viewModel.title}"></th:block>
                            </span>
                        </span>
                        <span class="project-last-edited-line hide-in-reader-view sidebar menu" th:if="${viewModel.lastEdited != null}" id="project-last-edited">
                            <span th:replace="~{fragments/lastEditedLine :: line(${viewModel.lastEdited})}"></span>
                        </span>
                    </span>
                </h1>
            </header>
            <aside class="project-script-toolbar hide-in-reader-view sidebar menu">
                <div class="project-toolbar-row">
                    <div class="project-toolbar-left block-left-controls" th:insert="~{fragments/blockSelectAllControl :: controls('project-select-all-blocks')}"></div>
                    <div class="project-toolbar-main">
                        <h2 class="project-scenes-heading">Scenes</h2>
                        <div class="tags-bulk-action tags-bulk-action--compact block-bulk-actions" id="project-bulk-bar" hidden>
                            <span class="bulk-selection-count" id="project-bulk-count">0 selected</span>
                            <input type="text" id="project-bulk-tags-input" placeholder="Add tags…" aria-label="Tags to add to selected blocks" />
                            <button type="button" id="project-bulk-add-tags-btn" title="Add tags to selected blocks">Tag</button>
                            <button type="button" id="project-bulk-delete-btn" class="bad" title="Delete selected blocks">Delete</button>
                        </div>
                    </div>
                    <div class="project-toolbar-right" aria-hidden="true"></div>
                </div>
            </aside>
            <div th:replace="~{project/showScriptBody :: scriptBody(${viewModel})}"></div>
        </article>
        <p class="hide-in-reader-view sidebar menu project-create-scene">
            <form th:action="@{/scene/createAndReturn}" method="POST" hx-boost="false" style="display:inline">
                <input type="hidden" name="projectId" th:value="${viewModel.id}" />
                <button type="submit" role="button">Create New Scene</button>
            </form>
        </p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:src="@{/js/text-size.js(v=${assetVersion})}"></script>
    <script th:inline="javascript">
    document.querySelectorAll('.project-script .scene-blocks').forEach(function(sceneBlocks) {
        if (window.scriptyInitBlockDragDrop) {
            window.scriptyInitBlockDragDrop(sceneBlocks, { projectId: /*[[${viewModel.id}]]*/ '' });
        }
    });
    </script>
    <script th:inline="javascript">
    (function() {
        var bulkAddTagsBtn = document.getElementById('project-bulk-add-tags-btn');
        if (bulkAddTagsBtn) {
            bulkAddTagsBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                var tagsInput = document.getElementById('project-bulk-tags-input');
                var tags = tagsInput ? tagsInput.value.trim() : '';
                if (!tags) {
                    alert('Please enter tags to add.');
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkAddTags}]]*/ '/block/bulkAddTags';
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var tagsValInput = document.createElement('input');
                tagsValInput.type = 'hidden';
                tagsValInput.name = 'tags';
                tagsValInput.value = tags;
                form.appendChild(tagsValInput);
                
                var projectIdInput = document.createElement('input');
                projectIdInput.type = 'hidden';
                projectIdInput.name = 'projectId';
                projectIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(projectIdInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                var firstRow = checkboxes[0].closest('.block-row');
                var sceneId = '';
                if (firstRow) {
                    var sceneBlocks = firstRow.closest('.scene-blocks');
                    if (sceneBlocks) {
                        sceneId = sceneBlocks.id.replace('table-blocks-', '');
                    }
                }
                sceneIdInput.value = sceneId;
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        var bulkDeleteBtn = document.getElementById('project-bulk-delete-btn');
        if (bulkDeleteBtn) {
            bulkDeleteBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                
                var count = checkboxes.length;
                var confirmMsg = 'Are you sure you want to delete the ' + count + ' selected block' + (count > 1 ? 's' : '') + '?';
                if (!confirm(confirmMsg)) {
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkDelete}]]*/ '/block/bulkDelete';
                form.setAttribute('hx-boost', 'false');
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var projectIdInput = document.createElement('input');
                projectIdInput.type = 'hidden';
                projectIdInput.name = 'projectId';
                projectIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(projectIdInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                var firstRow = checkboxes[0].closest('.block-row');
                var sceneId = '';
                if (firstRow) {
                    var sceneBlocks = firstRow.closest('.scene-blocks');
                    if (sceneBlocks) {
                        sceneId = sceneBlocks.id.replace('table-blocks-', '');
                    }
                }
                sceneIdInput.value = sceneId;
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        if (window.scriptyInitBlockBulkSelection) {
            window.scriptyInitBlockBulkSelection({
                selectAllId: 'project-select-all-blocks',
                bulkBarId: 'project-bulk-bar',
                bulkCountId: 'project-bulk-count',
                resetOnScriptRefresh: true
            });
        }
    })();
    </script>
    <script th:inline="javascript">
    (function() {
        const searchDropdown = document.getElementById('project-search-dropdown');
        const searchToggle = searchDropdown ? searchDropdown.querySelector('.project-search-toggle') : null;
        const searchInput = document.getElementById('project-search');
        const clearBtn = document.getElementById('project-search-clear');
        const projectId = /*[[${viewModel.id}]]*/ 0;
        if (!searchInput) return;

        if (window.scriptyInitBlockMarkerToggles) {
            window.scriptyInitBlockMarkerToggles({ projectId: projectId });
        }

        function rowMatchesSearch(row, query, isSceneNameMatch) {
            const blockId = row.getAttribute('data-block-id');
            if (!blockId) return query === '';
            if (!query) return true;
            const contentCell = row.querySelector('.block-content');
            const blockContentText = contentCell ? contentCell.textContent.toLowerCase() : '';
            const tagsAttr = row.getAttribute('data-tags') || '';
            return isSceneNameMatch || blockContentText.includes(query) || tagsAttr.toLowerCase().includes(query);
        }

        function setSearchOpen(isOpen) {
            if (!searchDropdown || !searchToggle) return;
            searchDropdown.classList.toggle('open', isOpen);
            searchToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            if (isOpen) {
                setTimeout(function() { searchInput.focus(); }, 0);
            }
        }

        if (searchToggle) {
            searchToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = searchDropdown.classList.contains('open');
                document.querySelectorAll('.nav-dropdown').forEach(function(d) { d.classList.remove('open'); });
                if (!isOpen) {
                    searchDropdown.classList.add('open');
                    searchToggle.setAttribute('aria-expanded', 'true');
                    setTimeout(function() { searchInput.focus(); }, 0);
                } else {
                    setSearchOpen(false);
                }
            });
        }

        document.addEventListener('click', function(e) {
            const tagBadge = e.target.closest('.block-tag.clickable');
            if (tagBadge) {
                searchInput.value = tagBadge.textContent.trim();
                performSearch();
                setSearchOpen(true);
                return;
            }
            if (!searchDropdown || !searchDropdown.classList.contains('open')) return;
            if (!searchDropdown.contains(e.target)) {
                setSearchOpen(false);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && searchDropdown && searchDropdown.classList.contains('open')) {
                setSearchOpen(false);
                if (searchToggle) searchToggle.focus();
            }
        });

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (clearBtn) {
                clearBtn.hidden = !query;
            }
            if (searchToggle) {
                searchToggle.classList.toggle('is-active', !!query);
            }

            const sceneHeaders = document.querySelectorAll('.project-script .scene-header');
            sceneHeaders.forEach(header => {
                const sceneNameDisplay = header.querySelector('.scene-name-display');
                const sceneName = sceneNameDisplay ? sceneNameDisplay.textContent.toLowerCase() : '';
                const sceneBlocks = header.parentElement.querySelector('.scene-blocks');
                const isSceneNameMatch = sceneName.includes(query);

                let visibleBlocksInScene = 0;

                if (sceneBlocks) {
                    const rows = sceneBlocks.querySelectorAll('.block-row');
                    rows.forEach(row => {
                        const blockId = row.getAttribute('data-block-id');
                        const visible = rowMatchesSearch(row, query, isSceneNameMatch);
                        row.style.display = visible ? '' : 'none';
                        if (visible && blockId) {
                            visibleBlocksInScene++;
                        }
                    });
                }

                const sceneSection = header.closest('.script-scene');
                const sceneLinks = sceneSection ? sceneSection.querySelector('.scene-header-links') : null;
                const showScene = query === '' || isSceneNameMatch || visibleBlocksInScene > 0;

                header.style.display = showScene ? '' : 'none';
                if (sceneLinks) sceneLinks.style.display = showScene ? '' : 'none';
                if (sceneBlocks) sceneBlocks.style.display = showScene ? '' : 'none';
            });
        }

        searchInput.addEventListener('input', performSearch);

        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });
        }

        performSearch();
        window.addEventListener('beforeprint', performSearch);
        window.addEventListener('afterprint', performSearch);
        window.addEventListener('scripty:project-script-refreshed', performSearch);
    })();
    </script>
    <script th:inline="javascript">
    if (window.scriptyInitProjectLiveSync) {
        window.scriptyInitProjectLiveSync({
            projectId: /*[[${viewModel.id}]]*/ 0,
            revision: /*[[${syncRevision}]]*/ 0
        });
    }
    </script>
</body>
</html>
