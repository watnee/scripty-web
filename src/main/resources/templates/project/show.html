<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="scripty-hide-block-bookmarks scripty-hide-block-pins scripty-hide-block-select scripty-hide-block-element-labels">
<head>
    <script th:inline="javascript">
    (function() {
        var projectId = /*[[${viewModel.id}]]*/ 0;
        if (!projectId) return;
        var showBookmarks = localStorage.getItem('scripty-show-block-bookmarks-project-' + projectId);
        var showPins = localStorage.getItem('scripty-show-block-pins-project-' + projectId);
        var showSelect = localStorage.getItem('scripty-show-block-select-project-' + projectId);
        var showElementLabels = localStorage.getItem('scripty-show-block-element-labels-project-' + projectId);
        var blockEditLocked = localStorage.getItem('scripty-block-edit-locked-project-' + projectId) === 'true';
        showBookmarks = showBookmarks === null ? false : showBookmarks !== 'false';
        showPins = showPins === null ? false : showPins !== 'false';
        showSelect = showSelect === null ? false : showSelect !== 'false';
        showElementLabels = showElementLabels === null ? false : showElementLabels !== 'false';
        window.scriptyBlockEditLocked = blockEditLocked;
        var root = document.documentElement;
        root.classList.toggle('scripty-hide-block-bookmarks', !showBookmarks);
        root.classList.toggle('scripty-hide-block-pins', !showPins);
        root.classList.toggle('scripty-hide-block-select', !showSelect);
        root.classList.toggle('scripty-hide-block-element-labels', !showElementLabels);
        root.classList.toggle('scripty-block-edit-locked', blockEditLocked);
        var toolbarHidden = localStorage.getItem('scripty-toolbar-hidden') === 'true';
        root.classList.toggle('scripty-toolbar-hidden', toolbarHidden);
    })();
    </script>

    <script th:inline="javascript">
    (function() {
        const searchDropdown = document.getElementById('project-search-dropdown');
        const searchToggle = searchDropdown ? searchDropdown.querySelector('.project-search-toggle') : null;
        const searchInput = document.getElementById('project-search');
        const clearBtn = document.getElementById('project-search-clear');
        const projectId = /*[[${viewModel.id}]]*/ 0;
        if (!searchInput) return;

        if (window.scriptyInitBlockMarkerToggles) {
            window.scriptyInitBlockMarkerToggles({ projectId: projectId });
        }

        function rowMatchesSearch(row, query, isSceneNameMatch) {
            const blockId = row.getAttribute('data-block-id');
            if (!blockId) return query === '';
            if (!query) return true;
            const contentCell = row.querySelector('.block-content');
            const blockContentText = contentCell ? contentCell.textContent.toLowerCase() : '';
            const tagsAttr = row.getAttribute('data-tags') || '';
            return isSceneNameMatch || blockContentText.includes(query) || tagsAttr.toLowerCase().includes(query);
        }

        function setSearchOpen(isOpen) {
            if (!searchDropdown || !searchToggle) return;
            searchDropdown.classList.toggle('open', isOpen);
            searchToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            if (isOpen) {
                setTimeout(function() { searchInput.focus(); searchInput.select(); }, 0);
            }
        }

        window.scriptyOpenProjectSearch = function() {
            setSearchOpen(true);
        };

        if (searchToggle) {
            const isMac = window.scriptyIsMac ? window.scriptyIsMac() : /Mac|iPhone|iPod|iPad/i.test(navigator.userAgent);
            const searchShortcut = isMac ? ' (⌘F)' : ' (Ctrl+F)';
            searchToggle.title = 'Search script' + searchShortcut;
            searchToggle.setAttribute('aria-label', 'Search script' + searchShortcut);

            searchToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = searchDropdown.classList.contains('open');
                document.querySelectorAll('.nav-dropdown').forEach(function(d) { d.classList.remove('open'); });
                if (!isOpen) {
                    searchDropdown.classList.add('open');
                    searchToggle.setAttribute('aria-expanded', 'true');
                    setTimeout(function() { searchInput.focus(); }, 0);
                } else {
                    setSearchOpen(false);
                }
            });
        }

        document.addEventListener('click', function(e) {
            const tagBadge = e.target.closest('.block-tag.clickable');
            if (tagBadge) {
                searchInput.value = tagBadge.textContent.trim();
                performSearch();
                setSearchOpen(true);
                return;
            }
            if (!searchDropdown || !searchDropdown.classList.contains('open')) return;
            if (!searchDropdown.contains(e.target)) {
                setSearchOpen(false);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && searchDropdown && searchDropdown.classList.contains('open')) {
                setSearchOpen(false);
                if (searchToggle) searchToggle.focus();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (!(e.metaKey || e.ctrlKey) || e.altKey || e.shiftKey) return;
            if (e.key.toLowerCase() !== 'f') return;
            const active = document.activeElement;
            if (window.scriptyIsTypingContext && window.scriptyIsTypingContext(active)) {
                if (active !== searchInput) return;
            }
            e.preventDefault();
            document.querySelectorAll('.nav-dropdown').forEach(function(d) { d.classList.remove('open'); });
            setSearchOpen(true);
        });

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (clearBtn) {
                clearBtn.hidden = !query;
            }
            if (searchToggle) {
                searchToggle.classList.toggle('is-active', !!query);
            }

            document.querySelectorAll('.project-script .scene-blocks .block-row[data-block-id]').forEach(function(row) {
                const visible = rowMatchesSearch(row, query, false);
                row.style.display = visible ? '' : 'none';
            });
        }

        searchInput.addEventListener('input', performSearch);

        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });
        }

        performSearch();
        window.addEventListener('beforeprint', performSearch);
        window.addEventListener('afterprint', performSearch);
        window.addEventListener('scripty:project-script-refreshed', performSearch);
    })();
    </script>
    <script>
    (function() {
        function wireToolbarDropdown(dropdownId, toggleSelector, options) {
            const dropdown = document.getElementById(dropdownId);
            const toggle = dropdown ? dropdown.querySelector(toggleSelector) : null;
            if (!dropdown || !toggle) return;
            const keepOpenOnItemClick = !!(options && options.keepOpenOnItemClick);

            function setOpen(isOpen) {
                dropdown.classList.toggle('open', isOpen);
                toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            }

            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = dropdown.classList.contains('open');
                document.querySelectorAll('.nav-dropdown').forEach(function(d) {
                    d.classList.remove('open');
                    const t = d.querySelector('.nav-dropdown-toggle');
                    if (t) t.setAttribute('aria-expanded', 'false');
                });
                setOpen(!isOpen);
            });

            dropdown.addEventListener('click', function(e) {
                const item = e.target.closest('.nav-dropdown-item');
                if (!item) return;
                if (!keepOpenOnItemClick) {
                    setOpen(false);
                }
            });

            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target)) {
                    setOpen(false);
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    setOpen(false);
                }
            });
        }

        wireToolbarDropdown('project-file-dropdown', '.file-toolbar-btn');
        wireToolbarDropdown('project-lists-dropdown', '.lists-toolbar-btn');
        wireToolbarDropdown('project-view-dropdown', '.view-toolbar-btn', { keepOpenOnItemClick: true });
    })();
    </script>
    <script th:inline="javascript">
    (function() {
        const shareDropdown = document.getElementById('project-share-dropdown');
        const shareToggle = shareDropdown ? shareDropdown.querySelector('.project-share-toggle') : null;
        const projectId = /*[[${viewModel.id}]]*/ 0;
        if (!shareDropdown || !projectId) return;

        const shareLinkInput = shareDropdown.querySelector('.project-share-link-input');
        if (shareLinkInput && !shareLinkInput.value) {
            shareLinkInput.value = window.location.origin + '/project/show?id=' + projectId;
        }

        function setShareOpen(isOpen) {
            shareDropdown.classList.toggle('open', isOpen);
            if (shareToggle) {
                shareToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            }
        }

        if (shareToggle) {
            shareToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = shareDropdown.classList.contains('open');
                document.querySelectorAll('.nav-dropdown').forEach(function(d) {
                    d.classList.remove('open');
                    const toggle = d.querySelector('.nav-dropdown-toggle');
                    if (toggle) toggle.setAttribute('aria-expanded', 'false');
                });
                setShareOpen(!isOpen);
            });
        }

        shareDropdown.addEventListener('click', function(e) {
            const copyBtn = e.target.closest('.project-share-copy-btn');
            if (!copyBtn) return;
            e.preventDefault();
            const targetId = copyBtn.getAttribute('data-copy-target');
            const input = targetId ? document.getElementById(targetId) : shareLinkInput;
            const link = input ? input.value : '';
            if (!link) return;

            function markCopied() {
                copyBtn.textContent = 'Copied';
                copyBtn.classList.add('is-copied');
                window.setTimeout(function() {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('is-copied');
                }, 1500);
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(markCopied).catch(function() {
                    if (input) {
                        input.focus();
                        input.select();
                        document.execCommand('copy');
                        markCopied();
                    }
                });
            } else if (input) {
                input.focus();
                input.select();
                document.execCommand('copy');
                markCopied();
            }
        });

        document.addEventListener('click', function(e) {
            if (!shareDropdown.classList.contains('open')) return;
            if (!shareDropdown.contains(e.target)) {
                setShareOpen(false);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && shareDropdown.classList.contains('open')) {
                setShareOpen(false);
                if (shareToggle) shareToggle.focus();
            }
        });
    })();
    </script>

        window.scriptyInitProjectLiveSync({
            projectId: /*[[${viewModel.id}]]*/ 0,
            revision: /*[[${syncRevision}]]*/ 0
        });

    (function ensureBlockEmptyGuard() {
        if (window.scriptyInstallBlockEmptyGuard) {
            window.scriptyInstallBlockEmptyGuard();
        }
        function onScriptPageReady() {
            if (!document.querySelector('.project-script')) return;
            if (window.scriptyInstallBlockEmptyGuard) {
                window.scriptyInstallBlockEmptyGuard();
            }
        }
        document.body.addEventListener('htmx:afterSettle', onScriptPageReady);
        document.body.addEventListener('htmx:afterSwap', onScriptPageReady);
    })();
    </script>
