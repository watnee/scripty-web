<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Project Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/project/list}">Projects</a></li>
                <li aria-current="page" th:text="${viewModel.title}"></li>
            </ol>
        </nav>
        <div class="text-size-control">
            <div th:replace="~{fragments/textstyle :: textStyleDropdown}"></div>
            <div class="nav-dropdown" id="history-dropdown" style="display: none;">
                <button class="nav-dropdown-toggle" type="button" aria-haspopup="true" aria-expanded="false" title="History">🕒</button>
                <div class="nav-dropdown-menu">
                    <a class="nav-dropdown-item" id="nav-version-history" href="#">Version History</a>
                    <hr class="nav-dropdown-divider">
                    <button class="nav-dropdown-item" id="nav-undo" type="button">Undo</button>
                    <button class="nav-dropdown-item" id="nav-redo" type="button">Redo</button>
                </div>
            </div>
            <button id="text-size-decrease" type="button" aria-label="Decrease text size">A−</button>
            <button id="text-size-increase" type="button" aria-label="Increase text size">A+</button>
        </div>
        <h1>
            <span th:text="${viewModel.title}"></span>
            <form th:action="@{/project/toggleDefault}" method="POST" style="display: inline-block; margin-left: 0.5rem; vertical-align: middle;">
                <input type="hidden" name="id" th:value="${viewModel.id}" />
                <button type="submit" 
                        class="default-project-badge" 
                        th:classappend="${isDefault} ? 'is-default' : ''"
                        th:title="${isDefault} ? 'Remove as default project' : 'Set as default project'">
                    <span class="badge-text" th:text="${isDefault} ? 'Default Project' : 'Set as Default'"></span>
                </button>
            </form>
            <small><a th:href="@{/project/edit(id=${viewModel.id})}" role="button">edit</a> <a th:href="@{/project/delete(id=${viewModel.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this project?') halt">delete</a></small>
        </h1>
        <div class="f-row" style="gap: 2rem; align-items: start">
            <div style="flex: 3">
                <h2>Scenes <small><a th:href="@{/scene/all(projectId=${viewModel.id})}" role="button">View All</a></small></h2>
                <div class="tags-bulk-action" style="margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; margin: 0 0.5rem 0 0; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="project-select-all-blocks" style="margin-right: 6px;" /> Select All
                    </label>
                    <input type="text" id="project-bulk-tags-input" placeholder="Add tags to selected blocks (comma separated)..." style="flex-grow: 1; max-width: 400px; margin: 0;" />
                    <button type="button" id="project-bulk-add-tags-btn" style="margin: 0;">Add Tags</button>
                    <button type="button" id="project-bulk-delete-btn" class="bad" style="margin: 0;" title="Delete selected blocks">🗑️</button>
                </div>
                <th:block th:each="scene : ${viewModel.scenes}">
                    <h3 class="scene-header" style="margin-bottom: 0.25em">
                        <span class="scene-name-wrap">
                            <span class="scene-name-display" th:attr="hx-get=@{/scene/editNameInline(id=${scene.id})}" hx-trigger="click" hx-target="closest .scene-name-wrap" hx-swap="innerHTML" style="cursor: pointer; min-width: 10em; display: inline-block">
                                <th:block th:if="${#strings.isEmpty(scene.name) || #strings.isEmpty(scene.name.trim())}">
                                    <span style="color: #ccc; font-style: italic">click to name scene</span>
                                </th:block>
                                <th:block th:unless="${#strings.isEmpty(scene.name) || #strings.isEmpty(scene.name.trim())}" th:text="${scene.name}"></th:block>
                            </span>
                        </span>
                        <small>
                            <a th:href="@{/scene/show(id=${scene.id})}" role="button">view</a>
                        </small>
                    </h3>
                    <table class="table-blocks-all" th:id="'table-blocks-' + ${scene.id}">
                        <tr th:each="block : ${scene.blocks}" draggable="true" th:attr="data-block-id=${block.id},data-block-order=${block.order}">
                            <td class="block-left-controls">
                                <input type="checkbox" class="block-select-checkbox" th:value="${block.id}" style="margin-right: 8px;" />
                                <a th:attr="hx-get=@{/block/createBelowInline(id=${block.id})}" hx-target="closest tr" hx-swap="afterend" hx-boost="false" role="button" class="create-below">+</a>
                                <span class="drag-handle">&#8942;&#8942;</span>
                            </td>
                            <td class="block-content" th:attr="hx-get=@{/block/editInline(id=${block.id})}" hx-trigger="click[!event.target.closest('a')&amp;&amp;!event.target.closest('form')]" hx-swap="innerHTML" style="cursor: pointer">
                                <p th:if="${not #strings.isEmpty(block.personName)}" style="margin-bottom: 0; text-align: center">
                                    <a th:href="@{/character/show(id=${block.personId})}" class="character-name" style="text-transform: uppercase" th:text="${block.personName}"></a>
                                </p>
                                <span th:text="${block.content}"></span>
                            </td>
                            <td>
                                <span class="nowrap">
                                    <a th:href="@{/block/toggleBookmark(id=${block.id})}" th:title="${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:attr="aria-label=${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:text="${block.bookmarked} ? '★' : '☆'"></a>
                                    <a th:href="@{/block/togglePinned(id=${block.id})}" th:title="${block.pinned} ? 'Unpin block' : 'Pin block'" th:attr="aria-label=${block.pinned} ? 'Unpin block' : 'Pin block'" th:style="${block.pinned} ? 'text-decoration: none;' : 'filter: grayscale(100%); opacity: 0.3; text-decoration: none;'">📌</a>
                                </span>
                            </td>
                        </tr>
                        <tr th:attr="hx-get=@{/block/createInline(sceneId=${scene.id})}" hx-trigger="load" hx-swap="outerHTML"></tr>
                    </table>
                </th:block>
                <form th:action="@{/scene/createAndReturn}" method="POST" hx-boost="false" style="display:inline">
                    <input type="hidden" name="projectId" th:value="${viewModel.id}" />
                    <button type="submit" role="button">Create New Scene</button>
                </form>
            </div>
            <aside style="flex: 1">
                <p th:if="${viewModel.team != null and !viewModel.team.isEmpty()}">Team: <span th:text="${viewModel.team}"></span></p>
                <p><a th:href="@{/character/list(projectId=${viewModel.id})}" role="button">Characters</a></p>
            </aside>
        </div>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:src="@{/js/text-size.js}"></script>
    <script th:src="@{/js/text-style.js}"></script>
    <script th:inline="javascript">
    document.querySelectorAll('.table-blocks-all').forEach(function(table) {
        var dragRow = null;

        table.addEventListener('dragstart', function(e) {
            var tr = e.target.closest('tr');
            if (!tr || !table.contains(tr)) { e.preventDefault(); return; }
            dragRow = tr;
            tr.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        table.addEventListener('dragend', function() {
            if (dragRow) dragRow.classList.remove('dragging');
            table.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            dragRow = null;
        });

        table.addEventListener('dragover', function(e) {
            e.preventDefault();
            var tr = e.target.closest('tr');
            if (!tr || !table.contains(tr) || tr === dragRow) return;
            table.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            tr.classList.add('drag-over');
        });

        table.addEventListener('dragleave', function(e) {
            var tr = e.target.closest('tr');
            if (tr) tr.classList.remove('drag-over');
        });

        table.addEventListener('drop', function(e) {
            e.preventDefault();
            var targetRow = e.target.closest('tr');
            if (!targetRow || !table.contains(targetRow) || !dragRow || targetRow === dragRow) return;
            var blockId = dragRow.getAttribute('data-block-id');
            var targetOrder = targetRow.getAttribute('data-block-order');
            if (blockId && targetOrder) {
                var params = new URLSearchParams();
                params.append('id', blockId);
                params.append('position', targetOrder);
                fetch(/*[[@{/block/moveTo}]]*/ '/block/moveTo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: params.toString(),
                    redirect: 'manual'
                }).then(function() { window.location.reload(); });
            } else {
                var rect = targetRow.getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                if (e.clientY < mid) {
                    targetRow.parentNode.insertBefore(dragRow, targetRow);
                } else {
                    targetRow.parentNode.insertBefore(dragRow, targetRow.nextSibling);
                }
            }
        });
    });
    </script>
    <script th:inline="javascript">
    (function() {
        var bulkAddTagsBtn = document.getElementById('project-bulk-add-tags-btn');
        if (bulkAddTagsBtn) {
            bulkAddTagsBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                var tagsInput = document.getElementById('project-bulk-tags-input');
                var tags = tagsInput ? tagsInput.value.trim() : '';
                if (!tags) {
                    alert('Please enter tags to add.');
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkAddTags}]]*/ '/block/bulkAddTags';
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var tagsValInput = document.createElement('input');
                tagsValInput.type = 'hidden';
                tagsValInput.name = 'tags';
                tagsValInput.value = tags;
                form.appendChild(tagsValInput);
                
                var projectIdInput = document.createElement('input');
                projectIdInput.type = 'hidden';
                projectIdInput.name = 'projectId';
                projectIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(projectIdInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                var firstTr = checkboxes[0].closest('tr');
                var sceneId = '';
                if (firstTr) {
                    var table = firstTr.closest('table');
                    if (table) {
                        sceneId = table.id.replace('table-blocks-', '');
                    }
                }
                sceneIdInput.value = sceneId;
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        var bulkDeleteBtn = document.getElementById('project-bulk-delete-btn');
        if (bulkDeleteBtn) {
            bulkDeleteBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                
                var count = checkboxes.length;
                var confirmMsg = 'Are you sure you want to delete the ' + count + ' selected block' + (count > 1 ? 's' : '') + '?';
                if (!confirm(confirmMsg)) {
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkDelete}]]*/ '/block/bulkDelete';
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var projectIdInput = document.createElement('input');
                projectIdInput.type = 'hidden';
                projectIdInput.name = 'projectId';
                projectIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(projectIdInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                var firstTr = checkboxes[0].closest('tr');
                var sceneId = '';
                if (firstTr) {
                    var table = firstTr.closest('table');
                    if (table) {
                        sceneId = table.id.replace('table-blocks-', '');
                    }
                }
                sceneIdInput.value = sceneId;
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        var selectAllCheckbox = document.getElementById('project-select-all-blocks');
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', function() {
                var checkboxes = document.querySelectorAll('.block-select-checkbox');
                checkboxes.forEach(function(cb) {
                    cb.checked = selectAllCheckbox.checked;
                });
            });
        }

        document.addEventListener('change', function(e) {
            if (e.target && e.target.classList.contains('block-select-checkbox')) {
                var selectAllCheckbox = document.getElementById('project-select-all-blocks');
                if (selectAllCheckbox) {
                    var checkboxes = document.querySelectorAll('.block-select-checkbox');
                    var allChecked = checkboxes.length > 0;
                    checkboxes.forEach(function(cb) {
                        if (!cb.checked) allChecked = false;
                    });
                    selectAllCheckbox.checked = allChecked;
                }
            }
        });

        document.body.addEventListener('htmx:afterOnLoad', function() {
            var selectAllCheckbox = document.getElementById('project-select-all-blocks');
            if (selectAllCheckbox) {
                var checkboxes = document.querySelectorAll('.block-select-checkbox');
                var allChecked = checkboxes.length > 0;
                checkboxes.forEach(function(cb) {
                    if (!cb.checked) allChecked = false;
                });
                selectAllCheckbox.checked = allChecked;
            }
        });
    })();
    </script>
</body>
</html>
