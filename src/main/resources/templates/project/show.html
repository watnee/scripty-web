<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="scripty-hide-block-bookmarks scripty-hide-block-pins scripty-hide-block-select">
<head>
    <script th:inline="javascript">
    (function() {
        var projectId = /*[[${viewModel.id}]]*/ 0;
        if (!projectId) return;
        var showBookmarks = localStorage.getItem('scripty-show-block-bookmarks-project-' + projectId);
        var showPins = localStorage.getItem('scripty-show-block-pins-project-' + projectId);
        var showSelect = localStorage.getItem('scripty-show-block-select-project-' + projectId);
        showBookmarks = showBookmarks === null ? false : showBookmarks !== 'false';
        showPins = showPins === null ? false : showPins !== 'false';
        showSelect = showSelect === null ? false : showSelect !== 'false';
        var root = document.documentElement;
        root.classList.toggle('scripty-hide-block-bookmarks', !showBookmarks);
        root.classList.toggle('scripty-hide-block-pins', !showPins);
        root.classList.toggle('scripty-hide-block-select', !showSelect);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title th:text="'Scripty - ' + (${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim()) ? 'Project' : viewModel.title})">Scripty - Project</title>
    <meta property="og:title" th:content="${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim()) ? 'Untitled Project' : viewModel.title}">
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true" class="has-toolbar-brand">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <aside class="top-bar project-top-bar hide-in-reader-view">
        <div class="project-top-bar-breadcrumb">
            <nav aria-label="Breadcrumb">
                <ol>
                    <li><a th:href="@{/project/list}">Projects</a></li>
                    <li id="project-breadcrumb-title" aria-current="page" th:text="${viewModel.title}"></li>
                </ol>
            </nav>
        </div>
        <div class="text-size-control">
            <button id="nav-bookmarks-toggle"
                    type="button"
                    class="nav-dropdown-toggle bookmark-filter-toggle is-active"
                    aria-pressed="true"
                    aria-label="Show bookmark buttons in blocks"
                    title="Show bookmark buttons in blocks">
                <span th:replace="~{fragments/bookmarkIcon :: toolbarIcon}"></span>
            </button>
            <button id="nav-pins-toggle"
                    type="button"
                    class="nav-dropdown-toggle pin-filter-toggle is-active"
                    aria-pressed="true"
                    aria-label="Show pin buttons in blocks"
                    title="Show pin buttons in blocks">
                <span th:replace="~{fragments/pinIcon :: toolbarIcon}"></span>
            </button>
            <button id="nav-select-toggle"
                    type="button"
                    class="nav-dropdown-toggle select-filter-toggle is-active"
                    aria-pressed="true"
                    aria-label="Show select checkboxes in blocks"
                    title="Show select checkboxes in blocks">
                <span th:replace="~{fragments/selectIcon :: toolbarIcon}"></span>
            </button>
            <span th:replace="~{fragments/spellcheckToggle :: toolbarButton}"></span>
            <div class="nav-dropdown project-search-dropdown" id="project-search-dropdown">
                <button class="nav-dropdown-toggle project-search-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Search script" title="Search script">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                    </svg>
                </button>
                <div class="nav-dropdown-menu project-search-panel">
                    <div class="project-search-wrap">
                        <label class="visually-hidden" for="project-search">Search scene names, blocks, character names, or tags</label>
                        <input type="search"
                               id="project-search"
                               class="project-search-input"
                               placeholder="Search scenes, blocks, tags..."
                               autocomplete="off"
                               enterkeyhint="search" />
                        <button type="button"
                                id="project-search-clear"
                                class="project-search-clear"
                                aria-label="Clear search"
                                hidden>&times;</button>
                    </div>
                </div>
            </div>
            <span th:replace="~{fragments/historyToolbarButtons :: buttons}"></span>
            <a id="nav-version-history"
               class="nav-dropdown-toggle version-history-toolbar-btn"
               th:href="@{/project/version/list(projectId=${viewModel.id})}"
               hx-boost="false"
               aria-label="Version history"
               title="Version history">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </a>
            <button id="nav-import"
                    type="button"
                    class="nav-dropdown-toggle import-toolbar-btn"
                    aria-label="Import script"
                    title="Import Fountain, text, or Word document">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </button>
            <form id="project-import-form"
                  th:action="@{/project/import(id=${viewModel.id})}"
                  method="post"
                  enctype="multipart/form-data"
                  hx-boost="false"
                  hidden>
                <input type="file"
                       id="project-import-file"
                       name="file"
                       accept=".fountain,.txt,.doc,.docx,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                       aria-hidden="true"
                       tabindex="-1" />
            </form>
            <a class="nav-dropdown-toggle title-page-toolbar-btn"
               th:href="@{/project/titlePage(id=${viewModel.id})}"
               aria-label="Title page"
               title="Title page">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
            </a>
            <button id="nav-print"
                    type="button"
                    class="nav-dropdown-toggle print-toolbar-btn"
                    aria-label="Print script"
                    title="Print script"
                    onclick="window.print()">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
            </button>
            <button id="focus-toggle"
                    type="button"
                    class="nav-dropdown-toggle focus-toolbar-btn"
                    aria-pressed="false"
                    aria-label="Focus mode"
                    title="Hide distractions while writing">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <line x1="12" y1="2" x2="12" y2="6"></line>
                    <line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line>
                    <line x1="18" y1="12" x2="22" y2="12"></line>
                </svg>
            </button>
            <button id="text-size-decrease" type="button" aria-label="Decrease text size">A−</button>
            <button id="text-size-increase" type="button" aria-label="Increase text size">A+</button>
        </div>
    </aside>
    <aside class="project-script-toolbar hide-in-reader-view sidebar menu">
        <div class="project-toolbar-row">
            <div class="project-toolbar-main">
                <div class="tags-bulk-action tags-bulk-action--compact block-bulk-actions" id="project-bulk-bar" hidden>
                    <span class="bulk-selection-count" id="project-bulk-count">0 selected</span>
                    <input type="text" id="project-bulk-tags-input" placeholder="Add tags…" aria-label="Tags to add to selected blocks" />
                    <button type="button" id="project-bulk-add-tags-btn" title="Add tags to selected blocks">Tag</button>
                    <button type="button" id="project-bulk-delete-btn" class="bad" title="Delete selected blocks">Delete</button>
                </div>
                <div class="element-type-actions hide-in-reader-view sidebar menu">
                    <button type="button" class="bulk-type-btn" data-bulk-type="SCENE" title="Turn selected rows into scene headings">Scene</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="ACTION" title="Turn selected rows into action">Action</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="DIALOGUE" title="Turn selected rows into dialogue">Dialogue</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="PARENTHETICAL" title="Turn selected rows into parentheticals">(Paren)</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="TRANSITION" title="Turn selected rows into transitions">Transition</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="LYRICS" title="Turn selected rows into lyrics">Lyrics</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="CENTERED" title="Turn selected rows into centered text">Centered</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="SECTION" title="Turn selected rows into outline sections (non-printing)">Section</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="SYNOPSIS" title="Turn selected rows into synopses (non-printing)">Synopsis</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="NOTE" title="Turn selected rows into notes (non-printing)">Note</button>
                    <button type="button" class="bulk-type-btn" data-bulk-type="PAGE_BREAK" title="Turn selected rows into page breaks">Page Break</button>
                </div>
            </div>
            <div class="project-toolbar-right" aria-hidden="true"></div>
        </div>
    </aside>
    <main>
        <article class="entry-content script-content project-script">
            <div class="project-script-header">
                <h1 class="project-header-title entry-title">
                    <span class="reader-visible-project-title"
                          id="reader-visible-project-title"
                          th:text="${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim()) ? 'Untitled Project' : viewModel.title}">Project</span>
                </h1>
                <p class="hide-in-reader-view sidebar menu project-header-row">
                    <span class="project-header-title-group">
                        <span class="project-name-wrap">
                            <span class="project-name-display"
                                  th:attr="hx-get=@{/project/editNameInline(id=${viewModel.id},surface='header')}"
                                  hx-trigger="click"
                                  hx-target="closest .project-name-wrap"
                                  hx-swap="innerHTML"
                                  title="Click to rename project">
                                <th:block th:if="${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim())}">
                                    <span class="project-name-placeholder">Click to name project</span>
                                </th:block>
                                <th:block th:unless="${#strings.isEmpty(viewModel.title) || #strings.isEmpty(viewModel.title.trim())}" th:text="${viewModel.title}"></th:block>
                            </span>
                        </span>
                        <span class="project-header-trailing">
                            <span class="project-last-edited-line" th:if="${viewModel.lastEdited != null}" id="project-last-edited">
                                <span th:replace="~{fragments/lastEditedLine :: line(${viewModel.lastEdited})}"></span>
                            </span>
                        </span>
                    </span>
                </p>
            </div>
            <aside class="project-script-select-toolbar hide-in-reader-view sidebar menu">
                <div class="project-toolbar-row project-toolbar-select-row">
                    <aside class="project-toolbar-left block-left-controls">
                        <div class="block-left-controls-inner" th:insert="~{fragments/blockSelectAllControl :: controls('project-select-all-blocks')}"></div>
                    </aside>
                    <div class="project-toolbar-main" aria-hidden="true"></div>
                    <div class="project-toolbar-right" aria-hidden="true"></div>
                </div>
            </aside>
            <div th:replace="~{project/showScriptBody :: scriptBody(${viewModel})}"></div>
        </article>
        <p class="hide-in-reader-view sidebar menu project-create-scene">
            <form th:action="@{/block/createSceneAndReturn}" method="POST" hx-boost="false" style="display:inline">
                <input type="hidden" name="projectId" th:value="${viewModel.id}" />
                <button type="submit" role="button">Create New Scene</button>
            </form>
        </p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:src="@{/js/text-size.js(v=${assetVersion})}"></script>
    <script th:src="@{/js/focus-mode.js(v=${assetVersion})}"></script>
    <script th:src="@{/js/import-script.js(v=${assetVersion})}"></script>
    <script th:src="@{/js/block-empty-guard.js(v=${assetVersion})}"></script>
    <script th:inline="javascript">
    document.querySelectorAll('.project-script .scene-blocks').forEach(function(sceneBlocks) {
        if (window.scriptyInitBlockDragDrop) {
            window.scriptyInitBlockDragDrop(sceneBlocks, { projectId: /*[[${viewModel.id}]]*/ '' });
        }
    });
    </script>
    <script th:inline="javascript">
    (function() {
        var bulkAddTagsBtn = document.getElementById('project-bulk-add-tags-btn');
        if (bulkAddTagsBtn) {
            bulkAddTagsBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                var tagsInput = document.getElementById('project-bulk-tags-input');
                var tags = tagsInput ? tagsInput.value.trim() : '';
                if (!tags) {
                    alert('Please enter tags to add.');
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkAddTags}]]*/ '/block/bulkAddTags';
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var tagsValInput = document.createElement('input');
                tagsValInput.type = 'hidden';
                tagsValInput.name = 'tags';
                tagsValInput.value = tags;
                form.appendChild(tagsValInput);
                
                var projectIdInput = document.createElement('input');
                projectIdInput.type = 'hidden';
                projectIdInput.name = 'projectId';
                projectIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(projectIdInput);

                document.body.appendChild(form);
                form.submit();
            });
        }

        function bulkSetType(type) {
            var checkboxes = document.querySelectorAll('.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked, .scene-header .block-select-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('Please select at least one block.');
                return;
            }
            var ids = Array.from(checkboxes).map(function(cb) { return cb.value; });
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = /*[[@{/block/bulkSetType}]]*/ '/block/bulkSetType';
            var idsInput = document.createElement('input');
            idsInput.type = 'hidden';
            idsInput.name = 'ids';
            idsInput.value = ids.join(',');
            form.appendChild(idsInput);
            var typeInput = document.createElement('input');
            typeInput.type = 'hidden';
            typeInput.name = 'type';
            typeInput.value = type;
            form.appendChild(typeInput);
            var projectIdInput = document.createElement('input');
            projectIdInput.type = 'hidden';
            projectIdInput.name = 'projectId';
            projectIdInput.value = /*[[${viewModel.id}]]*/ '';
            form.appendChild(projectIdInput);
            document.body.appendChild(form);
            form.submit();
        }

        document.querySelectorAll('.bulk-type-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                bulkSetType(btn.getAttribute('data-bulk-type'));
            });
        });

        var bulkDeleteBtn = document.getElementById('project-bulk-delete-btn');
        if (bulkDeleteBtn) {
            bulkDeleteBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-row[data-block-id] .block-select-checkbox:checked, tr[data-block-id] .block-select-checkbox:checked, .scene-header .block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                
                var count = checkboxes.length;
                var confirmMsg = 'Are you sure you want to delete the ' + count + ' selected block' + (count > 1 ? 's' : '') + '?';
                if (!confirm(confirmMsg)) {
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkDelete}]]*/ '/block/bulkDelete';
                form.setAttribute('hx-boost', 'false');
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var projectIdInput = document.createElement('input');
                projectIdInput.type = 'hidden';
                projectIdInput.name = 'projectId';
                projectIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(projectIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        if (window.scriptyInitBlockBulkSelection) {
            window.scriptyInitBlockBulkSelection({
                selectAllId: 'project-select-all-blocks',
                bulkBarId: 'project-bulk-bar',
                bulkCountId: 'project-bulk-count',
                resetOnScriptRefresh: true
            });
        }
    })();
    </script>
    <script th:inline="javascript">
    (function() {
        const searchDropdown = document.getElementById('project-search-dropdown');
        const searchToggle = searchDropdown ? searchDropdown.querySelector('.project-search-toggle') : null;
        const searchInput = document.getElementById('project-search');
        const clearBtn = document.getElementById('project-search-clear');
        const projectId = /*[[${viewModel.id}]]*/ 0;
        if (!searchInput) return;

        if (window.scriptyInitBlockMarkerToggles) {
            window.scriptyInitBlockMarkerToggles({ projectId: projectId });
        }

        function rowMatchesSearch(row, query, isSceneNameMatch) {
            const blockId = row.getAttribute('data-block-id');
            if (!blockId) return query === '';
            if (!query) return true;
            const contentCell = row.querySelector('.block-content');
            const blockContentText = contentCell ? contentCell.textContent.toLowerCase() : '';
            const tagsAttr = row.getAttribute('data-tags') || '';
            return isSceneNameMatch || blockContentText.includes(query) || tagsAttr.toLowerCase().includes(query);
        }

        function setSearchOpen(isOpen) {
            if (!searchDropdown || !searchToggle) return;
            searchDropdown.classList.toggle('open', isOpen);
            searchToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            if (isOpen) {
                setTimeout(function() { searchInput.focus(); }, 0);
            }
        }

        if (searchToggle) {
            searchToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = searchDropdown.classList.contains('open');
                document.querySelectorAll('.nav-dropdown').forEach(function(d) { d.classList.remove('open'); });
                if (!isOpen) {
                    searchDropdown.classList.add('open');
                    searchToggle.setAttribute('aria-expanded', 'true');
                    setTimeout(function() { searchInput.focus(); }, 0);
                } else {
                    setSearchOpen(false);
                }
            });
        }

        document.addEventListener('click', function(e) {
            const tagBadge = e.target.closest('.block-tag.clickable');
            if (tagBadge) {
                searchInput.value = tagBadge.textContent.trim();
                performSearch();
                setSearchOpen(true);
                return;
            }
            if (!searchDropdown || !searchDropdown.classList.contains('open')) return;
            if (!searchDropdown.contains(e.target)) {
                setSearchOpen(false);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && searchDropdown && searchDropdown.classList.contains('open')) {
                setSearchOpen(false);
                if (searchToggle) searchToggle.focus();
            }
        });

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (clearBtn) {
                clearBtn.hidden = !query;
            }
            if (searchToggle) {
                searchToggle.classList.toggle('is-active', !!query);
            }

            const sceneHeaders = document.querySelectorAll('.project-script .scene-header');
            sceneHeaders.forEach(header => {
                const sceneNameDisplay = header.querySelector('.scene-name-display');
                const sceneName = sceneNameDisplay ? sceneNameDisplay.textContent.toLowerCase() : '';
                const sceneBlocks = header.parentElement.querySelector('.scene-blocks');
                const isSceneNameMatch = sceneName.includes(query);

                let visibleBlocksInScene = 0;

                if (sceneBlocks) {
                    const rows = sceneBlocks.querySelectorAll('.block-row');
                    rows.forEach(row => {
                        const blockId = row.getAttribute('data-block-id');
                        const visible = rowMatchesSearch(row, query, isSceneNameMatch);
                        row.style.display = visible ? '' : 'none';
                        if (visible && blockId) {
                            visibleBlocksInScene++;
                        }
                    });
                }

                const sceneSection = header.closest('.script-scene');
                const sceneLinks = sceneSection ? sceneSection.querySelector('.scene-header-links') : null;
                const showScene = query === '' || isSceneNameMatch || visibleBlocksInScene > 0;

                header.style.display = showScene ? '' : 'none';
                if (sceneLinks) sceneLinks.style.display = showScene ? '' : 'none';
                if (sceneBlocks) sceneBlocks.style.display = showScene ? '' : 'none';
            });
        }

        searchInput.addEventListener('input', performSearch);

        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });
        }

        performSearch();
        window.addEventListener('beforeprint', performSearch);
        window.addEventListener('afterprint', performSearch);
        window.addEventListener('scripty:project-script-refreshed', performSearch);
    })();
    </script>
    <script th:inline="javascript">
    if (window.scriptyInitProjectLiveSync) {
        window.scriptyInitProjectLiveSync({
            projectId: /*[[${viewModel.id}]]*/ 0,
            revision: /*[[${syncRevision}]]*/ 0
        });
    }
    (function ensureBlockEmptyGuard() {
        if (window.scriptyInstallBlockEmptyGuard) {
            window.scriptyInstallBlockEmptyGuard();
        }
        function onScriptPageReady() {
            if (!document.querySelector('.project-script')) return;
            if (window.scriptyInstallBlockEmptyGuard) {
                window.scriptyInstallBlockEmptyGuard();
            }
        }
        document.body.addEventListener('htmx:afterSettle', onScriptPageReady);
        document.body.addEventListener('htmx:afterSwap', onScriptPageReady);
    })();
    </script>
</body>
</html>
