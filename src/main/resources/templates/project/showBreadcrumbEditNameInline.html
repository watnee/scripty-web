<form xmlns:th="http://www.thymeleaf.org" th:object="${commandModel}" th:attr="hx-post=@{/project/editNameInline(surface='breadcrumb')}" hx-target="closest .project-breadcrumb-name-wrap" hx-swap="innerHTML" hx-trigger="focusout from:find input[name='title']">
    <input type="hidden" name="id" th:field="*{id}" />
    <input type="text" name="title" th:field="*{title}" class="project-breadcrumb-name-input auto-grow" autofocus maxlength="100" required _="on keydown[key=='Enter'] halt the event then blur() me on keydown[key=='Escape'] halt the event then set my.value to my.defaultValue then blur() me" />
    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="project-breadcrumb-name-error"></span>
</form>
