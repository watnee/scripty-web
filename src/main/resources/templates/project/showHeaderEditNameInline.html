<form xmlns:th="http://www.thymeleaf.org"
      th:object="${commandModel}"
      th:attr="hx-post=@{/project/editNameInline(surface='header')}"
      hx-target="closest .project-header-name-wrap"
      hx-swap="innerHTML"
      hx-trigger="focusout from:find input[name='title']"
      class="project-header-name-edit-form">
    <input type="hidden" name="id" th:field="*{id}" />
    <input type="text"
           name="title"
           th:field="*{title}"
           class="project-header-name-input auto-grow"
           autofocus
           maxlength="100"
           required
           aria-label="Project title"
           _="on keydown[key=='Enter'] halt the event then blur() me on keydown[key=='Escape'] halt the event then set my.value to my.defaultValue then blur() me" />
    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="project-header-name-error"></span>
</form>
