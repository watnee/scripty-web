<th:block xmlns:th="http://www.thymeleaf.org">
    <span th:replace="~{fragments/projectHeaderName :: display(${project.id}, ${project.title})}"></span>
    <span hx-swap-oob="innerHTML:#project-breadcrumb-name-wrap">
        <span th:replace="~{fragments/projectBreadcrumbName :: display(${project.id}, ${project.title})}"></span>
    </span>
    <span id="project-last-edited"
          class="project-last-edited-line"
          th:if="${project.lastEdited != null}"
          hx-swap-oob="true">
        <span th:replace="~{fragments/lastEditedLine :: line(${project.lastEdited})}"></span>
    </span>
    <title th:text="'Scripty - ' + (${#strings.isEmpty(project.title) || #strings.isEmpty(project.title.trim()) ? 'Project' : project.title})" hx-swap-oob="true">Scripty</title>
</th:block>
