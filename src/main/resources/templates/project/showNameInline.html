<div xmlns:th="http://www.thymeleaf.org" class="project-title-container">
    <div class="project-list-title-wrap">
        <div class="project-list-title-row">
            <a th:href="@{/project/show(id=${project.id})}" class="project-list-title" th:text="${project.title}"></a>
            <span class="project-list-default-label" th:if="${defaultProjectId != null and project.id == defaultProjectId}">Default</span>
            <span class="project-list-team" th:if="${project.team != null and !#strings.isEmpty(project.team)}" th:text="${project.team}"></span>
        </div>
        <span class="project-list-last-edited" th:if="${project.lastEdited != null}" th:title="${#temporals.format(project.lastEdited, 'MMM d, yyyy, h:mm a')}">
            Last edited <span th:replace="~{fragments/lastEditedTime :: relativeTime(${project.lastEdited})}"></span>
        </span>
    </div>
    <div class="project-list-actions">
        <a th:href="@{/project/show(id=${project.id})}"
           role="button"
           class="project-list-action-btn"
           title="Open screenplay">Screenplay</a>
        <a th:href="@{/project/production(id=${project.id})}"
           role="button"
           class="project-list-action-btn"
           title="Open production hub">Production</a>
        <button type="button"
                class="project-list-action-btn rename-project-btn"
                th:attr="hx-get=@{/project/editNameInline(id=${project.id})}"
                hx-target="closest .project-title-container"
                hx-swap="outerHTML"
                title="Rename project">Rename</button>
        <button type="button"
                class="project-list-action-btn project-list-delete-btn bad"
                th:attr="data-delete-url=@{/project/delete(id=${project.id})}">Delete</button>
    </div>
</div>
