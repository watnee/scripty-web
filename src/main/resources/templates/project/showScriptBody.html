<div xmlns:th="http://www.thymeleaf.org" th:fragment="scriptBody(viewModel)" id="project-script-body">
    <section th:each="scene : ${viewModel.scenes}" class="script-scene">
        <h2 class="scene-header" th:if="${scene.id != null}">
            <input type="checkbox" class="block-select-checkbox hide-in-reader-view sidebar menu" th:value="${scene.id}" />
            <span class="scene-name-wrap">
                <span class="scene-name-display" th:attr="hx-get=@{/block/editSceneNameInline(id=${scene.id})}" hx-trigger="click" hx-target="closest .scene-name-wrap" hx-swap="innerHTML" style="cursor: pointer; min-width: 10em; display: inline-block">
                    <th:block th:if="${#strings.isEmpty(scene.name) || #strings.isEmpty(scene.name.trim())}">
                        <span style="color: #ccc; font-style: italic">click to name scene</span>
                    </th:block>
                    <th:block th:unless="${#strings.isEmpty(scene.name) || #strings.isEmpty(scene.name.trim())}" th:text="${scene.name}"></th:block>
                </span>
            </span>
        </h2>
        <p class="scene-header-links hide-in-reader-view sidebar menu" th:if="${scene.id != null}">
            <a th:href="@{/block/delete(id=${scene.id})}" hx-boost="false" _="on click if not confirm('Delete this scene heading? Its blocks will merge into the scene above.') halt">delete</a>
        </p>
        <div class="scene-blocks table-blocks-all" th:id="${scene.id != null} ? ('table-blocks-' + ${scene.id}) : 'table-blocks-orphan'">
            <th:block th:each="block, blockStat : ${scene.blocks}">
                <div th:replace="~{block/projectBlockRow :: blockRow(block=${block}, projectId=${viewModel.id}, canMoveUp=${!blockStat.first}, canMoveDown=${!blockStat.last})}"></div>
            </th:block>
            <div th:if="${scene.lastBlockId != null}" th:attr="hx-get=@{/block/createBelowInline(id=${scene.lastBlockId},surface='project')}" hx-trigger="load" hx-swap="outerHTML"></div>
        </div>
    </section>
</div>
