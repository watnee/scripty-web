<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Version History</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/project/list}">Projects</a></li>
                <li><a th:href="@{/project/show(id=${viewModel.projectId})}" th:text="${viewModel.projectTitle}"></a></li>
                <li aria-current="page">Version History</li>
            </ol>
        </nav>
        <h1>Version History</h1>
        <form th:action="@{/project/version/create}" method="POST" hx-boost="false" style="margin-bottom: 2rem; display: flex; gap: 0.5rem; align-items: end">
            <input type="hidden" name="projectId" th:value="${viewModel.projectId}" />
            <label>
                Label
                <input type="text" name="label" placeholder="e.g. Draft 2, Before rewrite..." style="min-width: 300px">
            </label>
            <button type="submit">Save Current Version</button>
        </form>
        <th:block th:if="${#lists.isEmpty(viewModel.versions)}">
            <p>No versions saved yet. Save a version to create a snapshot you can restore later.</p>
        </th:block>
        <table th:if="${not #lists.isEmpty(viewModel.versions)}">
            <thead>
                <tr>
                    <th>Label</th>
                    <th>Saved</th>
                    <th>Changes</th>
                    <th>Scenes</th>
                    <th>Blocks</th>
                    <th>Characters</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="version : ${viewModel.versions}">
                    <td th:text="${version.label}"></td>
                    <td class="nowrap" th:text="${#temporals.format(version.createdAt, 'MMM d, yyyy h:mm a')}"></td>
                    <td class="version-changes">
                        <span class="version-change-summary" th:text="${version.changeSummary.compactSummary}"></span>
                        <ul class="version-change-details" th:if="${not #lists.isEmpty(version.changeSummary.visibleDetails)}">
                            <li th:each="detail : ${version.changeSummary.visibleDetails}" th:text="${detail}"></li>
                        </ul>
                    </td>
                    <td th:text="${version.sceneCount}"></td>
                    <td th:text="${version.blockCount}"></td>
                    <td th:text="${version.characterCount}"></td>
                    <td class="nowrap">
                        <form th:action="@{/project/version/restore}" method="POST" hx-boost="false" style="display: inline">
                            <input type="hidden" name="id" th:value="${version.id}" />
                            <input type="hidden" name="projectId" th:value="${viewModel.projectId}" />
                            <button type="submit" role="button" _="on click if not confirm('Restore this version? Current content will be replaced.') halt">Restore</button>
                        </form>
                        <form th:action="@{/project/version/delete}" method="POST" hx-boost="false" style="display: inline">
                            <input type="hidden" name="id" th:value="${version.id}" />
                            <input type="hidden" name="projectId" th:value="${viewModel.projectId}" />
                            <button type="submit" role="button" _="on click if not confirm('Delete this version?') halt">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
