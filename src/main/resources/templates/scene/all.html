<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - All Scenes</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/project/list}">Projects</a></li>
                <li><a th:href="@{/project/show(id=${viewModel.projectId})}" th:text="${viewModel.projectTitle}"></a></li>
                <li aria-current="page">All Scenes</li>
            </ol>
        </nav>
        <h1><span th:text="${viewModel.projectTitle}"></span> <small>All Scenes</small></h1>
        <th:block th:each="scene : ${viewModel.scenes}">
            <h2 class="scene-header"><a th:href="@{/scene/show(id=${scene.id})}" th:text="${scene.name}"></a> <small><a th:href="@{/scene/show(id=${scene.id})}" role="button">view</a></small></h2>
            <table class="table-blocks-all">
                <tr th:each="block : ${scene.blocks}">
                    <td class="block-content">
                        <th:block th:replace="~{block/showInline :: blockContent}"></th:block>
                    </td>
                </tr>
            </table>
        </th:block>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
