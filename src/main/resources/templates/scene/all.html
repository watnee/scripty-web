<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/scriptReader :: head(${viewModel.projectTitle + ' – Script'})}"></head>
<body class="script-reader-page">
    <main role="main">
        <article>
            <header>
                <h1 th:text="${viewModel.projectTitle}">Script</h1>
            </header>
            <th:block th:replace="~{fragments/scriptReader :: scenes(${viewModel.scenes})}"></th:block>
        </article>
    </main>
    <footer th:replace="~{fragments/scriptReader :: projectFooter(${viewModel.projectId})}"></footer>
</body>
</html>
