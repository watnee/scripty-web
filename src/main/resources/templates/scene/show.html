<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Scene Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <div class="top-bar">
            <nav aria-label="Breadcrumb">
                <ol>
                    <li><a th:href="@{/project/list}">Projects</a></li>
                    <li><a th:href="@{/project/show(id=${viewModel.projectId})}" th:text="${viewModel.projectTitle}"></a></li>
                    <li aria-current="page" th:text="${viewModel.name}"></li>
                </ol>
            </nav>
            <div class="text-size-control">
                <span class="project-last-edited" th:if="${viewModel.projectLastEdited != null}" th:title="${#temporals.format(viewModel.projectLastEdited, 'MMM d, yyyy, h:mm a')}" style="margin-right: auto; font-size: 0.85rem; color: var(--muted-fg); display: inline-flex; align-items: center; gap: 0.25rem;">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7;">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <span>Last edited </span>
                    <span th:replace="~{fragments/lastEditedTime :: relativeTime(${viewModel.projectLastEdited})}"></span>
                </span>
                <button id="nav-undo" type="button" class="history-action-btn" aria-label="Undo">← Undo</button>
                <button id="nav-redo" type="button" class="history-action-btn" aria-label="Redo">Redo →</button>
                <div class="nav-dropdown" id="history-dropdown" style="display: inline-block;">
                    <button class="nav-dropdown-toggle" type="button" aria-haspopup="true" aria-expanded="false" title="History">🕒</button>
                    <div class="nav-dropdown-menu">
                        <a class="nav-dropdown-item" id="nav-version-history" th:href="@{/project/version/list(projectId=${viewModel.projectId})}" hx-boost="false">Version History</a>
                    </div>
                </div>
                <button id="text-size-decrease" type="button" aria-label="Decrease text size">A−</button>
                <button id="text-size-increase" type="button" aria-label="Increase text size">A+</button>
            </div>
        </div>
        <h1 class="scene-header"><span class="scene-name-wrap"><span class="scene-name-display" th:attr="hx-get=@{/scene/editNameInline(id=${viewModel.id})}" hx-trigger="click" hx-target="closest .scene-name-wrap" hx-swap="innerHTML" style="cursor: pointer; min-width: 10em; display: inline-block"><th:block th:if="${#strings.isEmpty(viewModel.name) || #strings.isEmpty(viewModel.name.trim())}"><span style="color: #ccc; font-style: italic">click to name scene</span></th:block><th:block th:unless="${#strings.isEmpty(viewModel.name) || #strings.isEmpty(viewModel.name.trim())}" th:text="${viewModel.name}"></th:block></span></span> <small><a th:href="@{/scene/delete(id=${viewModel.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this scene?') halt">delete</a></small></h1>
        <div class="tags-bulk-action">
            <label style="display: flex; align-items: center; margin: 0 0.5rem 0 0; cursor: pointer; user-select: none;">
                <input type="checkbox" id="select-all-blocks" style="margin-right: 6px;" /> Select All
            </label>
            <input type="text" id="bulk-tags-input" placeholder="Add tags to selected blocks (comma separated)..." style="flex-grow: 1; max-width: 400px; margin: 0;" />
            <button type="button" id="bulk-add-tags-btn" style="margin: 0;">Add Tags</button>
            <button type="button" id="bulk-delete-btn" class="bad" style="margin: 0;" title="Delete selected blocks">🗑️</button>
        </div>
        <div id="tag-filter-container" class="tag-filter-bar" style="display: none;"></div>
        <table id="table-blocks">
            <tr th:each="block,loop : ${viewModel.blocks}" draggable="true" th:attr="data-block-id=${block.id},data-block-order=${block.order},data-tags=${block.tags}">
                <td class="block-left-controls">
                    <div class="block-left-controls-inner">
                        <input type="checkbox" class="block-select-checkbox" th:value="${block.id}" />
                        <a th:attr="hx-get=@{/block/createBelowInline(id=${block.id})}" hx-target="closest tr" hx-swap="afterend" hx-boost="false" class="create-below" role="button">+</a>
                        <span class="drag-handle" title="Drag to reorder">&#8942;&#8942;</span>
                    </div>
                </td>
                <td class="block-content" th:attr="hx-get=@{/block/editInline(id=${block.id})}" hx-trigger="click[!event.target.closest('a')&amp;&amp;!event.target.closest('form')]" hx-swap="innerHTML">
                    <p th:if="${not #strings.isEmpty(block.personName)}" style="margin-bottom: 0; text-align: center">
                        <a th:href="@{/character/show(id=${block.personId})}" class="character-name" style="text-transform: uppercase" th:text="${block.personName}"></a>
                    </p>
                    <span style="white-space: pre-wrap;" th:text="${block.content}"></span>
                    <div th:if="${not #strings.isEmpty(block.tags)}" class="block-tags-list">
                        <span th:each="tag : ${#strings.arraySplit(block.tags, ',')}"
                              th:if="${not #strings.isEmpty(#strings.trim(tag))}"
                              th:text="${#strings.trim(tag)}"
                              class="block-tag clickable"></span>
                    </div>
                </td>
                <td>
                    <span class="nowrap">
                        <a th:href="@{/block/toggleBookmark(id=${block.id})}" th:title="${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:attr="aria-label=${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:text="${block.bookmarked} ? '★' : '☆'"></a>
                        <a th:href="@{/block/togglePinned(id=${block.id})}" th:title="${block.pinned} ? 'Unpin block' : 'Pin block'" th:attr="aria-label=${block.pinned} ? 'Unpin block' : 'Pin block'" th:style="${block.pinned} ? 'text-decoration: none;' : 'filter: grayscale(100%); opacity: 0.3; text-decoration: none;'">📌</a>
                        <a th:href="@{/block/edit(id=${block.id})}" role="button">edit</a>
                        <a th:href="@{/block/delete(id=${block.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this block?') halt">delete</a>
                        <a th:if="${not loop.last}" th:href="@{/block/moveDown(id=${block.id})}" class="move-down" role="button">&#8595;</a>
                        <a th:if="${not loop.first}" th:href="@{/block/moveUp(id=${block.id})}" class="move-up" role="button">&#8593;</a>
                    </span>
                </td>
            </tr>
            <tr th:attr="hx-get=@{/block/createInline(sceneId=${viewModel.id})}" hx-trigger="load" hx-swap="outerHTML"></tr>
        </table>
        <p>
            <a id="create-scene-btn" th:attr="hx-get=@{/scene/createBelowInline(id=${viewModel.id})}" hx-target="#create-scene-btn" hx-swap="afterend" role="button" _="on htmx:afterSwap hide me">Create New Scene</a>
            <a th:href="@{/character/create(projectId=${viewModel.projectId})}" role="button">Create New Character</a>
        </p>
        <nav aria-label="Scene navigation" class="scene-pager">
            <a th:if="${not #strings.isEmpty(viewModel.previousSceneName)}" th:href="@{/scene/show(id=${viewModel.previousSceneId})}" th:title="${viewModel.previousSceneName}">&larr; Previous Scene</a>
            <a th:if="${not #strings.isEmpty(viewModel.nextSceneName)}" th:href="@{/scene/show(id=${viewModel.nextSceneId})}" th:title="${viewModel.nextSceneName}" style="margin-left: auto">Next Scene &rarr;</a>
        </nav>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:src="@{/js/text-size.js}"></script>
    <script th:inline="javascript">
    (function() {
        var table = document.getElementById('table-blocks');
        var dragRow = null;

        table.addEventListener('dragstart', function(e) {
            var tr = e.target.closest('tr');
            if (!tr || !table.contains(tr)) { e.preventDefault(); return; }
            dragRow = tr;
            tr.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        table.addEventListener('dragend', function() {
            if (dragRow) dragRow.classList.remove('dragging');
            table.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            dragRow = null;
        });

        table.addEventListener('dragover', function(e) {
            e.preventDefault();
            var tr = e.target.closest('tr');
            if (!tr || !table.contains(tr) || tr === dragRow) return;
            table.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            tr.classList.add('drag-over');
        });

        table.addEventListener('dragleave', function(e) {
            var tr = e.target.closest('tr');
            if (tr) tr.classList.remove('drag-over');
        });

        table.addEventListener('drop', function(e) {
            e.preventDefault();
            var targetRow = e.target.closest('tr');
            if (!targetRow || !table.contains(targetRow) || !dragRow || targetRow === dragRow) return;
            var blockId = dragRow.getAttribute('data-block-id');
            var newOrder = window.scriptyCalcDropPosition
                ? window.scriptyCalcDropPosition(dragRow, targetRow, e.clientY)
                : parseInt(targetRow.getAttribute('data-block-order'), 10);
            var dragOrder = parseInt(dragRow.getAttribute('data-block-order'), 10);
            if (blockId && newOrder && newOrder !== dragOrder) {
                if (window.scriptyAbortUndoStatusFetch) {
                    window.scriptyAbortUndoStatusFetch();
                }
                var params = new URLSearchParams();
                params.append('id', blockId);
                params.append('position', String(newOrder));
                params.append('projectId', /*[[${viewModel.projectId}]]*/ '');
                fetch(/*[[@{/block/moveTo}]]*/ '/block/moveTo', {
                    method: 'POST',
                    credentials: 'same-origin',
                    cache: 'no-store',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: params.toString()
                }).then(function(response) {
                    if (response.ok || response.redirected) {
                        window.location.reload();
                    }
                });
            } else {
                var rect = targetRow.getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                if (e.clientY < mid) {
                    targetRow.parentNode.insertBefore(dragRow, targetRow);
                } else {
                    targetRow.parentNode.insertBefore(dragRow, targetRow.nextSibling);
                }
            }
        });

        var bulkAddTagsBtn = document.getElementById('bulk-add-tags-btn');
        if (bulkAddTagsBtn) {
            bulkAddTagsBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                var tagsInput = document.getElementById('bulk-tags-input');
                var tags = tagsInput ? tagsInput.value.trim() : '';
                if (!tags) {
                    alert('Please enter tags to add.');
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkAddTags}]]*/ '/block/bulkAddTags';
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var tagsValInput = document.createElement('input');
                tagsValInput.type = 'hidden';
                tagsValInput.name = 'tags';
                tagsValInput.value = tags;
                form.appendChild(tagsValInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                sceneIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        var bulkDeleteBtn = document.getElementById('bulk-delete-btn');
        if (bulkDeleteBtn) {
            bulkDeleteBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('.block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                
                var count = checkboxes.length;
                var confirmMsg = 'Are you sure you want to delete the ' + count + ' selected block' + (count > 1 ? 's' : '') + '?';
                if (!confirm(confirmMsg)) {
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkDelete}]]*/ '/block/bulkDelete';
                form.setAttribute('hx-boost', 'false');
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                sceneIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        var selectAllCheckbox = document.getElementById('select-all-blocks');
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', function() {
                var checkboxes = document.querySelectorAll('.block-select-checkbox');
                checkboxes.forEach(function(cb) {
                    cb.checked = selectAllCheckbox.checked;
                });
            });
        }

        document.addEventListener('change', function(e) {
            if (e.target && e.target.classList.contains('block-select-checkbox')) {
                var selectAllCheckbox = document.getElementById('select-all-blocks');
                if (selectAllCheckbox) {
                    var checkboxes = document.querySelectorAll('.block-select-checkbox');
                    var allChecked = checkboxes.length > 0;
                    checkboxes.forEach(function(cb) {
                        if (!cb.checked) allChecked = false;
                    });
                    selectAllCheckbox.checked = allChecked;
                }
            }
        });
    })();
    </script>
    <script>
    (function() {
        var table = document.getElementById('table-blocks');
        if (!table) return;

        var filterContainer = document.getElementById('tag-filter-container');
        if (!filterContainer) return;

        var currentActiveTag = 'all';

        function buildTagFilter() {
            var rows = table.querySelectorAll('tr[data-tags]');
            var tagCounts = {};
            var totalBlocks = 0;

            rows.forEach(function(row) {
                totalBlocks++;
                var tagsAttr = row.getAttribute('data-tags');
                if (tagsAttr) {
                    var tags = tagsAttr.split(',');
                    var uniqueRowTags = new Set();
                    tags.forEach(function(tag) {
                        var trimmed = tag.trim();
                        if (trimmed) {
                            var lower = trimmed.toLowerCase();
                            uniqueRowTags.add(lower);
                            if (!tagCounts[lower]) {
                                tagCounts[lower] = { name: trimmed, count: 0 };
                            }
                        }
                    });
                    uniqueRowTags.forEach(function(lowerTag) {
                        tagCounts[lowerTag].count++;
                    });
                }
            });

            var uniqueTagsKeys = Object.keys(tagCounts);
            if (uniqueTagsKeys.length === 0) {
                filterContainer.style.display = 'none';
                return;
            }
            filterContainer.style.display = 'flex';
            filterContainer.innerHTML = '';

            var label = document.createElement('span');
            label.className = 'tag-filter-label';
            label.textContent = 'Filter by Tags:';
            filterContainer.appendChild(label);

            var allPill = document.createElement('div');
            allPill.className = 'tag-filter-pill' + (currentActiveTag === 'all' ? ' active' : '');
            allPill.setAttribute('data-filter-tag', 'all');
            allPill.innerHTML = 'All <span class="tag-count">' + totalBlocks + '</span>';
            allPill.addEventListener('click', function() {
                setFilter('all');
            });
            filterContainer.appendChild(allPill);

            uniqueTagsKeys.sort();

            uniqueTagsKeys.forEach(function(key) {
                var tagInfo = tagCounts[key];
                var pill = document.createElement('div');
                pill.className = 'tag-filter-pill' + (currentActiveTag === key ? ' active' : '');
                pill.setAttribute('data-filter-tag', key);
                pill.innerHTML = escapeHtml(tagInfo.name) + ' <span class="tag-count">' + tagInfo.count + '</span>';
                pill.addEventListener('click', function() {
                    setFilter(key);
                });
                filterContainer.appendChild(pill);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function setFilter(tagKey) {
            currentActiveTag = tagKey;
            
            var pills = filterContainer.querySelectorAll('.tag-filter-pill');
            pills.forEach(function(pill) {
                if (pill.getAttribute('data-filter-tag') === tagKey) {
                    pill.classList.add('active');
                } else {
                    pill.classList.remove('active');
                }
            });

            var rows = table.querySelectorAll('tr');
            rows.forEach(function(row) {
                var tagsAttr = row.getAttribute('data-tags');
                if (tagsAttr !== null) {
                    if (tagKey === 'all') {
                        row.classList.remove('filtered-out');
                    } else {
                        var tags = tagsAttr.split(',').map(function(t) { return t.trim().toLowerCase(); });
                        if (tags.includes(tagKey)) {
                            row.classList.remove('filtered-out');
                        } else {
                            row.classList.add('filtered-out');
                        }
                    }
                } else {
                    if (row.querySelector('form[hx-post*="/block/createInline"]') || row.getAttribute('hx-get')) {
                        if (tagKey === 'all') {
                            row.classList.remove('filtered-out');
                        } else {
                            row.classList.add('filtered-out');
                        }
                    }
                }
            });
        }

        document.addEventListener('click', function(e) {
            var badge = e.target.closest('.block-tag.clickable');
            if (badge) {
                var tagText = badge.textContent.trim().toLowerCase();
                var pill = filterContainer.querySelector('.tag-filter-pill[data-filter-tag="' + tagText + '"]');
                if (pill) {
                    setFilter(tagText);
                    filterContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        });

        buildTagFilter();

        document.body.addEventListener('htmx:afterOnLoad', function() {
            buildTagFilter();
            var activePill = filterContainer.querySelector('.tag-filter-pill[data-filter-tag="' + currentActiveTag + '"]');
            if (activePill) {
                setFilter(currentActiveTag);
            } else {
                setFilter('all');
            }

            var selectAllCheckbox = document.getElementById('select-all-blocks');
            if (selectAllCheckbox) {
                var checkboxes = document.querySelectorAll('.block-select-checkbox');
                var allChecked = checkboxes.length > 0;
                checkboxes.forEach(function(cb) {
                    if (!cb.checked) allChecked = false;
                });
                selectAllCheckbox.checked = allChecked;
            }
        });
    })();
    </script>
</body>
</html>
