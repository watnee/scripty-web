<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Scene Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <aside class="top-bar hide-in-reader-view">
            <div class="top-bar-start">
                <nav aria-label="Breadcrumb">
                    <ol>
                        <li><a th:href="@{/project/list}">Projects</a></li>
                        <li>
                            <span class="breadcrumb-name-meta">
                                <a th:href="@{/project/show(id=${viewModel.projectId})}" th:text="${viewModel.projectTitle}"></a>
                                <span class="project-last-edited-line hide-in-reader-view sidebar menu" th:if="${viewModel.projectLastEdited != null}">
                                    <span th:replace="~{fragments/lastEditedLine :: line(${viewModel.projectLastEdited})}"></span>
                                </span>
                            </span>
                        </li>
                        <li aria-current="page" th:text="${viewModel.name}"></li>
                    </ol>
                </nav>
            </div>
            <div class="text-size-control">
                <button id="nav-bookmarks-toggle"
                        type="button"
                        class="nav-dropdown-toggle bookmark-filter-toggle"
                        aria-pressed="false"
                        aria-label="Hide bookmark buttons in blocks"
                        title="Hide bookmark buttons in blocks">
                    <span th:replace="~{fragments/bookmarkIcon :: toolbarIcon}"></span>
                </button>
                <button id="nav-pins-toggle"
                        type="button"
                        class="nav-dropdown-toggle pin-filter-toggle"
                        aria-pressed="false"
                        aria-label="Hide pin buttons in blocks"
                        title="Hide pin buttons in blocks">
                    <span th:replace="~{fragments/pinIcon :: toolbarIcon}"></span>
                </button>
                <span th:replace="~{fragments/historyToolbarButtons :: buttons}"></span>
                <div class="nav-dropdown" id="history-dropdown" style="display: inline-block;">
                    <button class="nav-dropdown-toggle" type="button" aria-haspopup="true" aria-expanded="false" title="Project menu" aria-label="Project menu">⋯</button>
                    <div class="nav-dropdown-menu">
                        <a class="nav-dropdown-item" th:href="@{/project/titlePage(id=${viewModel.projectId})}">Title Page</a>
                        <a class="nav-dropdown-item" id="nav-version-history" th:href="@{/project/version/list(projectId=${viewModel.projectId})}" hx-boost="false">Version History</a>
                    </div>
                </div>
                <button id="text-size-decrease" type="button" aria-label="Decrease text size">A−</button>
                <button id="text-size-increase" type="button" aria-label="Increase text size">A+</button>
            </div>
        </aside>
        <h1 class="scene-header"><span class="scene-name-wrap"><span class="scene-name-display" th:attr="hx-get=@{/scene/editNameInline(id=${viewModel.id})}" hx-trigger="click" hx-target="closest .scene-name-wrap" hx-swap="innerHTML" style="cursor: pointer; min-width: 10em; display: inline-block"><th:block th:if="${#strings.isEmpty(viewModel.name) || #strings.isEmpty(viewModel.name.trim())}"><span style="color: #ccc; font-style: italic">click to name scene</span></th:block><th:block th:unless="${#strings.isEmpty(viewModel.name) || #strings.isEmpty(viewModel.name.trim())}" th:text="${viewModel.name}"></th:block></span></span> <small><a th:href="@{/scene/delete(id=${viewModel.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this scene?') halt">delete</a></small></h1>
        <div id="tag-filter-container" class="tag-filter-bar hide-in-reader-view sidebar menu" style="display: none;"></div>
        <article class="script-content entry-content">
        <div class="scene-blocks-layout">
        <div class="block-bulk-toolbar scene-bulk-toolbar hide-in-reader-view sidebar menu">
            <div class="scene-bulk-select block-left-controls" th:insert="~{fragments/blockSelectAllControl :: controls('select-all-blocks')}"></div>
            <div class="tags-bulk-action tags-bulk-action--compact block-bulk-actions" id="scene-bulk-bar" hidden>
                <span class="bulk-selection-count" id="scene-bulk-count">0 selected</span>
                <input type="text" id="bulk-tags-input" placeholder="Add tags…" aria-label="Tags to add to selected blocks" />
                <button type="button" id="bulk-add-tags-btn" title="Add tags to selected blocks">Tag</button>
                <button type="button" id="bulk-delete-btn" class="bad" title="Delete selected blocks">Delete</button>
            </div>
        </div>
        <table id="table-blocks">
            <tr th:each="block,loop : ${viewModel.blocks}" th:attr="data-block-id=${block.id},data-block-order=${block.order},data-tags=${block.tags},data-bookmarked=${block.bookmarked},data-pinned=${block.pinned}">
                <td class="block-left-controls hide-in-reader-view sidebar menu">
                    <div class="block-left-controls-inner">
                        <input type="checkbox" class="block-select-checkbox" th:value="${block.id}" />
                        <a th:attr="hx-get=@{/block/createBelowInline(id=${block.id})}" hx-target="closest tr" hx-swap="afterend" hx-boost="false" class="create-below" role="button" title="Add block below" aria-label="Add block below">+</a>
                        <span class="drag-handle" draggable="true" title="Drag to reorder">&#8942;&#8942;</span>
                    </div>
                </td>
                <td class="block-content" th:attr="hx-get=@{/block/editInline(id=${block.id})}" hx-trigger="click[!event.target.closest('a')&amp;&amp;!event.target.closest('form')]" hx-swap="innerHTML">
                    <p th:if="${not #strings.isEmpty(block.personName)}" class="script-character-name">
                        <a th:href="@{/character/show(id=${block.personId})}" class="character-name" th:text="${block.personName}"></a>
                    </p>
                    <p class="script-block-text" th:text="${block.content}"></p>
                    <div th:if="${not #strings.isEmpty(block.tags)}" class="block-tags-list hide-in-reader-view sidebar menu">
                        <span th:each="tag : ${#strings.arraySplit(block.tags, ',')}"
                              th:if="${not #strings.isEmpty(#strings.trim(tag))}"
                              th:attr="title=${'Search: ' + #strings.trim(tag)}"
                              th:text="${#strings.trim(tag)}"
                              class="block-tag clickable"></span>
                    </div>
                </td>
                <td class="block-actions-cell hide-in-reader-view sidebar menu">
                    <span class="block-actions-controls">
                        <a class="block-action-bookmark" th:href="@{/block/toggleBookmark(id=${block.id})}" hx-boost="false" th:title="${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'" th:attr="aria-label=${block.bookmarked} ? 'Remove bookmark' : 'Bookmark block'">
                            <span th:replace="~{fragments/bookmarkIcon :: blockIcon(${block.bookmarked})}"></span>
                        </a>
                        <a class="block-action-pin" th:href="@{/block/togglePinned(id=${block.id})}" hx-boost="false" th:classappend="${block.pinned} ? ' is-pinned' : ''" th:title="${block.pinned} ? 'Unpin block' : 'Pin block'" th:attr="aria-label=${block.pinned} ? 'Unpin block' : 'Pin block'">
                            <span th:replace="~{fragments/pinIcon :: blockIcon(${block.pinned})}"></span>
                        </a>
                        <a th:if="${not loop.last}" th:href="@{/block/moveDown(id=${block.id})}" class="move-down block-action-move" role="button">&#8595;</a>
                        <span th:if="${loop.last}" class="block-action-slot" aria-hidden="true"></span>
                        <a th:if="${not loop.first}" th:href="@{/block/moveUp(id=${block.id})}" class="move-up block-action-move" role="button">&#8593;</a>
                        <span th:if="${loop.first}" class="block-action-slot" aria-hidden="true"></span>
                    </span>
                </td>
            </tr>
            <tr th:attr="hx-get=@{/block/createInline(sceneId=${viewModel.id})}" hx-trigger="load" hx-swap="outerHTML"></tr>
        </table>
        </div>
        </article>
        <p class="hide-in-reader-view">
            <a id="create-scene-btn" th:attr="hx-get=@{/scene/createBelowInline(id=${viewModel.id})}" hx-target="#create-scene-btn" hx-swap="afterend" role="button" _="on htmx:afterSwap hide me">Create New Scene</a>
            <a th:href="@{/character/create(projectId=${viewModel.projectId})}" role="button">Create New Character</a>
        </p>
        <nav aria-label="Scene navigation" class="scene-pager hide-in-reader-view">
            <a th:if="${not #strings.isEmpty(viewModel.previousSceneName)}" th:href="@{/scene/read(id=${viewModel.previousSceneId})}" th:title="${viewModel.previousSceneName}">&larr; Previous</a>
            <a th:href="@{/scene/all(projectId=${viewModel.projectId})}" hx-boost="false">Full script</a>
            <a th:if="${not #strings.isEmpty(viewModel.nextSceneName)}" th:href="@{/scene/read(id=${viewModel.nextSceneId})}" th:title="${viewModel.nextSceneName}" style="margin-left: auto">Next &rarr;</a>
        </nav>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script th:src="@{/js/text-size.js(v=${assetVersion})}"></script>
    <script th:inline="javascript">
    (function() {
        var table = document.getElementById('table-blocks');
        if (table && window.scriptyInitBlockDragDrop) {
            window.scriptyInitBlockDragDrop(table, { projectId: /*[[${viewModel.projectId}]]*/ '' });
        }

        var bulkAddTagsBtn = document.getElementById('bulk-add-tags-btn');
        if (bulkAddTagsBtn) {
            bulkAddTagsBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('tr[data-block-id] .block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                var tagsInput = document.getElementById('bulk-tags-input');
                var tags = tagsInput ? tagsInput.value.trim() : '';
                if (!tags) {
                    alert('Please enter tags to add.');
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkAddTags}]]*/ '/block/bulkAddTags';
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var tagsValInput = document.createElement('input');
                tagsValInput.type = 'hidden';
                tagsValInput.name = 'tags';
                tagsValInput.value = tags;
                form.appendChild(tagsValInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                sceneIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        var bulkDeleteBtn = document.getElementById('bulk-delete-btn');
        if (bulkDeleteBtn) {
            bulkDeleteBtn.addEventListener('click', function() {
                var checkboxes = document.querySelectorAll('tr[data-block-id] .block-select-checkbox:checked');
                if (checkboxes.length === 0) {
                    alert('Please select at least one block.');
                    return;
                }
                
                var count = checkboxes.length;
                var confirmMsg = 'Are you sure you want to delete the ' + count + ' selected block' + (count > 1 ? 's' : '') + '?';
                if (!confirm(confirmMsg)) {
                    return;
                }
                
                var ids = Array.from(checkboxes).map(function(cb) {
                    return cb.value;
                });
                
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = /*[[@{/block/bulkDelete}]]*/ '/block/bulkDelete';
                form.setAttribute('hx-boost', 'false');
                
                var idsInput = document.createElement('input');
                idsInput.type = 'hidden';
                idsInput.name = 'ids';
                idsInput.value = ids.join(',');
                form.appendChild(idsInput);
                
                var sceneIdInput = document.createElement('input');
                sceneIdInput.type = 'hidden';
                sceneIdInput.name = 'sceneId';
                sceneIdInput.value = /*[[${viewModel.id}]]*/ '';
                form.appendChild(sceneIdInput);
                
                document.body.appendChild(form);
                form.submit();
            });
        }

        if (window.scriptyInitBlockBulkSelection) {
            window.scriptyInitBlockBulkSelection({
                selectAllId: 'select-all-blocks',
                bulkBarId: 'scene-bulk-bar',
                bulkCountId: 'scene-bulk-count',
                scope: table
            });
        }
    })();
    </script>
    <script th:inline="javascript">
    (function() {
        var table = document.getElementById('table-blocks');
        if (!table) return;

        var filterContainer = document.getElementById('tag-filter-container');
        if (!filterContainer) return;

        var projectId = /*[[${viewModel.projectId}]]*/ 0;
        var currentActiveTag = 'all';

        if (window.scriptyInitBlockMarkerToggles) {
            window.scriptyInitBlockMarkerToggles({ projectId: projectId });
        }

        function rowPassesTagFilter(row, tagKey) {
            var tagsAttr = row.getAttribute('data-tags');
            if (tagsAttr !== null) {
                if (tagKey === 'all') {
                    return true;
                }
                var tags = tagsAttr.split(',').map(function(t) { return t.trim().toLowerCase(); });
                return tags.includes(tagKey);
            }
            if (row.querySelector('form[hx-post*="/block/createInline"]') || row.getAttribute('hx-get')) {
                return tagKey === 'all';
            }
            return true;
        }

        function applyRowFilters() {
            var rows = table.querySelectorAll('tr');
            rows.forEach(function(row) {
                if (rowPassesTagFilter(row, currentActiveTag)) {
                    row.classList.remove('filtered-out');
                } else {
                    row.classList.add('filtered-out');
                }
            });
        }

        function buildTagFilter() {
            var rows = table.querySelectorAll('tr[data-tags]');
            var tagCounts = {};
            var totalBlocks = 0;

            rows.forEach(function(row) {
                totalBlocks++;
                var tagsAttr = row.getAttribute('data-tags');
                if (tagsAttr) {
                    var tags = tagsAttr.split(',');
                    var uniqueRowTags = new Set();
                    tags.forEach(function(tag) {
                        var trimmed = tag.trim();
                        if (trimmed) {
                            var lower = trimmed.toLowerCase();
                            uniqueRowTags.add(lower);
                            if (!tagCounts[lower]) {
                                tagCounts[lower] = { name: trimmed, count: 0 };
                            }
                        }
                    });
                    uniqueRowTags.forEach(function(lowerTag) {
                        tagCounts[lowerTag].count++;
                    });
                }
            });

            var uniqueTagsKeys = Object.keys(tagCounts);
            if (uniqueTagsKeys.length === 0) {
                filterContainer.style.display = 'none';
                return;
            }
            filterContainer.style.display = 'flex';
            filterContainer.innerHTML = '';

            var label = document.createElement('span');
            label.className = 'tag-filter-label';
            label.textContent = 'Filter by Tags:';
            filterContainer.appendChild(label);

            var allPill = document.createElement('div');
            allPill.className = 'tag-filter-pill' + (currentActiveTag === 'all' ? ' active' : '');
            allPill.setAttribute('data-filter-tag', 'all');
            allPill.innerHTML = 'All <span class="tag-count">' + totalBlocks + '</span>';
            allPill.addEventListener('click', function() {
                setFilter('all');
            });
            filterContainer.appendChild(allPill);

            uniqueTagsKeys.sort();

            uniqueTagsKeys.forEach(function(key) {
                var tagInfo = tagCounts[key];
                var pill = document.createElement('div');
                pill.className = 'tag-filter-pill' + (currentActiveTag === key ? ' active' : '');
                pill.setAttribute('data-filter-tag', key);
                pill.innerHTML = escapeHtml(tagInfo.name) + ' <span class="tag-count">' + tagInfo.count + '</span>';
                pill.addEventListener('click', function() {
                    setFilter(key);
                });
                filterContainer.appendChild(pill);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function setFilter(tagKey) {
            currentActiveTag = tagKey;
            
            var pills = filterContainer.querySelectorAll('.tag-filter-pill');
            pills.forEach(function(pill) {
                if (pill.getAttribute('data-filter-tag') === tagKey) {
                    pill.classList.add('active');
                } else {
                    pill.classList.remove('active');
                }
            });

            applyRowFilters();
        }

        document.addEventListener('click', function(e) {
            var badge = e.target.closest('.block-tag.clickable');
            if (badge) {
                var tagText = badge.textContent.trim().toLowerCase();
                var pill = filterContainer.querySelector('.tag-filter-pill[data-filter-tag="' + tagText + '"]');
                if (pill) {
                    setFilter(tagText);
                    filterContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        });

        buildTagFilter();
        applyRowFilters();
        window.addEventListener('beforeprint', applyRowFilters);
        window.addEventListener('afterprint', applyRowFilters);

        document.body.addEventListener('htmx:afterOnLoad', function() {
            buildTagFilter();
            var activePill = filterContainer.querySelector('.tag-filter-pill[data-filter-tag="' + currentActiveTag + '"]');
            if (activePill) {
                setFilter(currentActiveTag);
            } else {
                setFilter('all');
            }
        });
    })();
    </script>
</body>
</html>
