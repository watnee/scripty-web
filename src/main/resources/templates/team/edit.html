<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Edit Team</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('teams')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/team/list}">Teams</a></li>
                <li aria-current="page">Edit Team</li>
            </ol>
        </nav>
        <h1>Edit Team</h1>
        <form th:action="@{/team/edit}" method="post" th:object="${commandModel}">
            <input type="hidden" th:field="*{id}" />
            <label>
                Team Name
                <input type="text" th:field="*{name}" />
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </label>
            
            <h2>Assign Projects</h2>
            <fieldset>
                <legend>Select projects for this team</legend>
                <div th:each="project : ${allProjects}">
                    <label>
                        <input type="checkbox" name="projectIds" th:value="${project.id}" 
                               th:checked="${project.team == commandModel.name}" />
                        <span th:text="${project.title}">Project Title</span>
                    </label>
                </div>
            </fieldset>
            
            <p>
                <a th:href="@{/team/list}" role="button">Cancel</a>
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
