<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Teams</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('teams')}"></div>
    <main>
        <nav aria-label="Breadcrumb">
            <ol>
                <li aria-current="page">Teams</li>
            </ol>
        </nav>
        <h1>Teams</h1>
        <table>
            <thead>
                <tr>
                    <th>Team Name</th>
                    <th>Projects</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="team : ${teams}">
                    <td th:text="${team.name}"></td>
                    <td>
                        <ul>
                            <li th:each="project : ${allProjects}" th:if="${project.team == team.name}">
                                <a th:href="@{/project/show(id=${project.id})}" th:text="${project.title}"></a>
                            </li>
                        </ul>
                    </td>
                    <td>
                        <a th:href="@{/team/edit(id=${team.id})}" role="button">edit/assign</a>
                        <a th:href="@{/team/delete(id=${team.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this team?') halt">delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p><a th:href="@{/team/create}" role="button">Create New Team</a></p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
