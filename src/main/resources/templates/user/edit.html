<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta charset="UTF-8">
    <title>Scripty - Edit User</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('')}"></div>
    <main>
        <h1>Edit User</h1>
        <form th:action="@{/user/edit}" method="post" th:object="${commandModel}">
            <input type="hidden" th:field="*{id}" />
            <label>
                Username
                <input type="text" th:field="*{username}" />
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </label>
            <label>
                Password <small>(leave blank to keep current)</small>
                <input type="password" th:field="*{password}" />
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </label>
            <label>
                First Name
                <input type="text" th:field="*{firstName}" />
                <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
            </label>
            <label>
                Last Name
                <input type="text" th:field="*{lastName}" />
                <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
            </label>
            <label>
                Team
                <input type="text" th:field="*{team}" />
                <span th:if="${#fields.hasErrors('team')}" th:errors="*{team}"></span>
            </label>
            <label>
                <input type="checkbox" th:field="*{admin}" />
                Admin
            </label>
            <label>
                <input type="checkbox" th:field="*{director}" />
                Director
            </label>
            <label>
                <input type="checkbox" th:field="*{producer}" />
                Producer
            </label>
            <p>
                <a th:href="@{/user/list}" role="button">Cancel</a>
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
