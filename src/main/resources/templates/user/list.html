<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/pwaMeta :: pwaMeta}"></th:block>
    <meta charset="UTF-8">
    <title>Scripty - Users</title>
    <link rel="stylesheet" href="/css/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('users')}"></div>
    <main>
        <p class="user-list-flash user-list-flash-error"
           th:if="${userError}"
           th:text="${userError}"
           role="alert"></p>
        <nav aria-label="Breadcrumb">
            <ol>
                <li aria-current="page">Users</li>
            </ol>
        </nav>
        <h1>Users</h1>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Name</th>
                    <th>Team</th>
                    <th>Role</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${viewModel.users}">
                    <td><a th:href="@{/user/show(id=${user.id})}" th:text="${user.username}"></a></td>
                    <td th:text="${user.firstName} + ' ' + ${user.lastName}"></td>
                    <td th:text="${user.team}"></td>
                    <td th:text="${user.rolesLabel}"></td>
                    <td>
                        <a th:href="@{/user/edit(id=${user.id})}" role="button">edit</a>
                        <a th:if="${user.username != currentUserId}"
                           th:href="@{/user/delete(id=${user.id})}"
                           role="button"
                           _="on click if not confirm('Are you sure you want to delete this user?') halt">delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p><a th:href="@{/user/create}" role="button">Create New User</a></p>
    </main>
    <script src="/js/htmx.min.js"></script>
    <script src="/js/htmx-security.js"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
