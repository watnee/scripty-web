<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/pwaMeta :: pwaMeta}"></th:block>
    <meta charset="UTF-8">
    <title>Scripty - Users</title>
    <link rel="stylesheet" href="/css/missing.min.css">
    <link th:href="@{/css/scripty.css(v=${assetVersion})}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('users')}"></div>
    <main class="user-list-page">
        <p class="user-list-flash user-list-flash-error"
           th:if="${userError}"
           th:text="${userError}"
           role="alert"></p>
        <div class="user-list-header">
            <div class="user-list-header-text">
                <h1>Users</h1>
                <p class="muted" th:if="${!#lists.isEmpty(viewModel.users)}">
                    <th:block th:with="count=${#lists.size(viewModel.users)}">
                        <span th:if="${count == 1}">1 account</span>
                        <span th:unless="${count == 1}" th:text="|${count} accounts|"></span>
                    </th:block>
                </p>
                <p class="muted" th:if="${#lists.isEmpty(viewModel.users)}">
                    Manage accounts, teams, and roles.
                </p>
            </div>
            <a th:href="@{/user/create}" role="button" class="user-list-create-btn">Create User</a>
        </div>

        <div class="user-list-toolbar project-list-toolbar" th:if="${!#lists.isEmpty(viewModel.users)}">
            <div class="project-list-search-wrap" id="user-list-search-wrap">
                <label class="visually-hidden" for="user-list-search">Search users</label>
                <span class="project-list-search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                    </svg>
                </span>
                <input type="search"
                       id="user-list-search"
                       class="project-list-search"
                       placeholder="Search by name, username, team, or role..."
                       autocomplete="off"
                       enterkeyhint="search" />
                <button type="button"
                        id="user-list-search-clear"
                        class="project-list-search-clear"
                        aria-label="Clear search"
                        hidden>&times;</button>
            </div>
            <div class="project-list-toolbar-actions">
                <label class="project-list-sort-label" for="user-list-sort">
                    <span class="visually-hidden">Sort users</span>
                    <select id="user-list-sort" class="project-list-sort" aria-label="Sort users">
                        <option value="name-asc" selected>Name A–Z</option>
                        <option value="name-desc">Name Z–A</option>
                        <option value="username-asc">Username A–Z</option>
                    </select>
                </label>
            </div>
        </div>

        <div class="user-list-panel project-list-panel" th:if="${!#lists.isEmpty(viewModel.users)}">
            <table id="table-users" class="user-list-table">
                <tbody>
                    <tr th:each="user : ${viewModel.users}"
                        class="user-list-row project-list-row"
                        th:attr="data-sort-name=${#strings.toLowerCase(user.firstName + ' ' + user.lastName)},
                                 data-sort-username=${#strings.toLowerCase(user.username)}">
                        <td class="user-list-main-cell">
                            <div class="user-list-item">
                                <div class="user-avatar user-avatar--list" aria-hidden="true">
                                    <span th:text="${#strings.substring(user.firstName, 0, 1)}"></span>
                                </div>
                                <div class="user-list-info">
                                    <div class="user-list-name-row">
                                        <a th:href="@{/user/show(id=${user.id})}"
                                           class="user-list-name project-list-title"
                                           th:text="${user.firstName} + ' ' + ${user.lastName}"></a>
                                        <span class="user-list-status"
                                              th:classappend="${user.enabled} ? ' user-list-status--enabled' : ' user-list-status--disabled'"
                                              th:text="${user.enabled} ? 'Enabled' : 'Disabled'"></span>
                                    </div>
                                    <div class="user-list-meta">
                                        <span class="user-list-username" th:text="'@' + ${user.username}"></span>
                                        <span class="user-list-meta-sep"
                                              aria-hidden="true"
                                              th:if="${user.team != null and !#strings.isEmpty(user.team)}"></span>
                                        <span class="user-list-team"
                                              th:if="${user.team != null and !#strings.isEmpty(user.team)}"
                                              th:text="${user.team}"></span>
                                    </div>
                                    <div class="user-list-roles">
                                        <span class="user-role-chip" th:if="${user.admin}">Admin</span>
                                        <span class="user-role-chip" th:if="${user.director}">Director</span>
                                        <span class="user-role-chip" th:if="${user.producer}">Producer</span>
                                        <span class="user-role-chip" th:if="${user.writer}">Writer</span>
                                        <span class="user-role-chip" th:if="${user.actor}">Actor</span>
                                        <span class="user-role-chip" th:if="${user.crew}">Crew</span>
                                        <span class="user-role-chip" th:if="${user.directorOfPhotography}">DoP</span>
                                        <span class="user-role-chip" th:if="${user.castingDirector}">Casting</span>
                                        <span class="user-role-chip user-role-chip--muted"
                                              th:if="${!user.admin and !user.director and !user.producer and !user.writer and !user.actor and !user.crew and !user.directorOfPhotography and !user.castingDirector}">User</span>
                                    </div>
                                </div>
                                <div class="user-list-actions project-list-actions">
                                    <a th:href="@{/user/edit(id=${user.id})}"
                                       role="button"
                                       class="project-list-action-btn">Edit</a>
                                    <a th:if="${user.username != currentUserId}"
                                       th:href="@{/user/delete(id=${user.id})}"
                                       role="button"
                                       class="project-list-action-btn bad"
                                       hx-boost="false"
                                       _="on click if not confirm('Are you sure you want to delete this user?') halt">Delete</a>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p class="project-list-no-results" id="user-list-no-results" hidden>
                No users match <strong id="user-list-search-query"></strong>.
            </p>
        </div>

        <div class="project-list-empty" th:if="${#lists.isEmpty(viewModel.users)}">
            <p class="project-list-empty-title">No users yet</p>
            <p class="muted">Create an account to give someone access to Scripty.</p>
            <a th:href="@{/user/create}" role="button">Create User</a>
        </div>
    </main>
    <script src="/js/htmx.min.js"></script>
    <script src="/js/htmx-security.js"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
    <script>
    (function() {
        const searchInput = document.getElementById('user-list-search');
        const clearBtn = document.getElementById('user-list-search-clear');
        const searchWrap = document.getElementById('user-list-search-wrap');
        const noResultsEl = document.getElementById('user-list-no-results');
        const noResultsQueryEl = document.getElementById('user-list-search-query');
        const sortSelect = document.getElementById('user-list-sort');
        const tbody = document.querySelector('#table-users tbody');
        if (!searchInput || !tbody) return;

        function sortUsers() {
            if (!sortSelect) return;
            const sortValue = sortSelect.value;
            const rows = Array.from(tbody.querySelectorAll('.user-list-row'));
            rows.sort(function(a, b) {
                if (sortValue === 'username-asc') {
                    return (a.getAttribute('data-sort-username') || '')
                        .localeCompare(b.getAttribute('data-sort-username') || '');
                }
                const comparison = (a.getAttribute('data-sort-name') || '')
                    .localeCompare(b.getAttribute('data-sort-name') || '');
                return sortValue === 'name-desc' ? -comparison : comparison;
            });
            rows.forEach(function(row) {
                tbody.appendChild(row);
            });
        }

        function performSearch() {
            const query = searchInput.value.trim();
            const normalizedQuery = query.toLowerCase();

            if (clearBtn) {
                clearBtn.hidden = !query;
            }
            if (searchWrap) {
                searchWrap.classList.toggle('has-value', !!query);
            }

            let visibleCount = 0;
            tbody.querySelectorAll('.user-list-row').forEach(function(row) {
                const searchText = row.textContent.toLowerCase();
                const matches = !normalizedQuery || searchText.includes(normalizedQuery);
                row.hidden = !matches;
                if (matches) visibleCount++;
            });

            if (noResultsEl) {
                noResultsEl.hidden = visibleCount > 0 || !query;
            }
            if (noResultsQueryEl) {
                noResultsQueryEl.textContent = query ? '"' + query + '"' : '';
            }
        }

        searchInput.addEventListener('input', performSearch);

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            }
        });

        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });
        }

        if (sortSelect) {
            const savedSort = sessionStorage.getItem('userListSort');
            if (savedSort && sortSelect.querySelector('option[value="' + savedSort + '"]')) {
                sortSelect.value = savedSort;
            }
            sortSelect.addEventListener('change', function() {
                sessionStorage.setItem('userListSort', sortSelect.value);
                sortUsers();
            });
            sortUsers();
        }
    })();
    </script>
</body>
</html>
